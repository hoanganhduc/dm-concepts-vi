name: Build and deploy book to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploying to gh-pages and creating releases both need write access;
# the acknowledgements list reads the repo's merged pull requests;
# release-pdf pulls the prebuilt TeX image from GHCR.
permissions:
  contents: write
  pull-requests: read
  packages: read

concurrency:
  group: dm-concepts-build
  cancel-in-progress: false

jobs:
  # Decide whether the book content changed AND compute the release version to
  # display. Web and PDF both consume `version`, so they never disagree. The PDF
  # release is skipped when a push only touches docs/meta files.
  version:
    runs-on: ubuntu-latest
    outputs:
      book: ${{ steps.f.outputs.book }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: f
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "book=true" >> "$GITHUB_OUTPUT"; exit 0   # first push / unknown base -> release
          fi
          changed=$(git diff --name-only "$base" "${{ github.sha }}")
          # book=true if any changed file is NOT a docs/meta/infra-only file.
          # docs/, docker/ and .github/ never cut a new PDF release (and so the
          # CI/image rollout below cannot race or trigger a spurious release).
          if printf '%s\n' "$changed" | grep -qvE '^(README\.md|LICENSE|\.gitignore)$|^docs/|^docker/|^\.github/'; then
            echo "book=true" >> "$GITHUB_OUTPUT"
          else
            echo "book=false" >> "$GITHUB_OUTPUT"
          fi
      - id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date +%Y.%m.%d)
          if [ "${{ steps.f.outputs.book }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # this run creates a new release: the next tag for today
            COUNT=$(gh release list --limit 300 --json tagName \
              --jq "[.[] | select(.tagName | startswith(\"${DATE}.\"))] | length")
            echo "version=${DATE}.$((COUNT + 1))" >> "$GITHUB_OUTPUT"
          else
            # docs-only: no new release; show the latest existing one
            LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
            echo "version=${LATEST:-$DATE}" >> "$GITHUB_OUTPUT"
          fi

  build-deploy:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PreTeXt + deps
        run: pip install pretext pyyaml

      - name: Validate entry data (build-gate)
        run: python3 workflow/scripts/validate-entry.py

      - name: Fetch merged pull requests (for the acknowledgements list)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --repo "$GITHUB_REPOSITORY" --state merged --limit 1000 \
            --json number,title,author,mergedAt \
            > workflow/acknowledgements/merged-prs.json \
            || echo '[]' > workflow/acknowledgements/merged-prs.json

      - name: Build web (locale, acknowledgements, HTML, search index, icons)
        # Wraps locale install + acknowledgements regen + pretext build web +
        # search index + quick-lookup bundle + FontAwesome channel icons.
        # RELEASE_VERSION makes the web footer match the PDF cover version.
        env:
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: bash workflow/scripts/build-web.sh

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/web
          publish_branch: gh-pages
          force_orphan: true

  # Build the print PDF and publish it as the latest GitHub Release. Runs only
  # after the web build/validation succeeds. Release tag (= the PDF's version) is
  # yyyy.mm.dd.N, where the date is the build (last-updated) date and N is the
  # release count for that day, starting at 1.
  release-pdf:
    needs: [build-deploy, version]
    # Only release when the book content changed (skip docs-only pushes).
    if: needs.version.outputs.book == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Run inside the prebuilt image (TeX Live + PreTeXt + fonts baked in), which
    # replaces ~165s of apt + pip + locale setup with a ~30s image pull. The
    # image is built/published by build-image.yml; its node:20 base lets the
    # JavaScript actions/checkout run inside the container.
    container:
      image: ghcr.io/hoanganhduc/dm-concepts-tex:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Inside a container GitHub defaults `run:` steps to sh (dash); force bash so
    # bashisms like `set -o pipefail` work, matching the non-container jobs.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Seed PreTeXt core resources (baked into the image)
        # GitHub overrides $HOME to /github/home for container jobs, so the
        # image's /root/.ptx is not visible; copy the baked cache into place so
        # build-print.sh's locale install is instant (no throwaway fetch).
        run: |
          mkdir -p "$HOME/.ptx"
          cp -a /opt/ptx-cache/. "$HOME/.ptx/" 2>/dev/null || true
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Fetch merged pull requests (for the acknowledgements list)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --repo "$GITHUB_REPOSITORY" --state merged --limit 1000 \
            --json number,title,author,mergedAt \
            > workflow/acknowledgements/merged-prs.json \
            || echo '[]' > workflow/acknowledgements/merged-prs.json

      - name: Build PDF (cover stamped with RELEASE_VERSION; links preserved)
        env:
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: bash workflow/scripts/build-print.sh

      - name: Release latest PDF as yyyy.mm.dd.N
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_VERSION"
          ASSET="Mot-so-thuat-ngu-Toan-roi-rac-va-KHMT-${TAG}.pdf"
          cp output/print/main.pdf "$ASSET"
          gh release create "$TAG" "$ASSET" \
            --title "PDF $TAG" \
            --notes "Bản PDF mới nhất, phiên bản ${TAG}. Tạo tự động từ commit ${GITHUB_SHA}."
