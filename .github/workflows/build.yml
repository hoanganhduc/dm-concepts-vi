name: Build and deploy book

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PreTeXt + deps
        run: pip install pretext pyyaml

      - name: Validate entry data (build-gate)
        run: python3 workflow/scripts/validate-entry.py

      - name: Build web target
        run: pretext build web

      - name: Build quick-lookup search index
        run: python3 workflow/scripts/build-search-index.py

      - name: Bundle quick-lookup page into the site
        run: cp assets/search/tra-cuu.html assets/search/lookup.js assets/search/entries.json output/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
