# Source registry for "Một số thuật ngữ trong Toán rời rạc".
#
# Maps each bibliography id (used as <biblio xml:id> in source/references.ptx and
# as vi_terms[].source_id in data/terms/*.yaml) to its Zotero item key and metadata.
#
# roles:
#   primary-en : the primary English source (Rosen).
#   reference  : an older Vietnamese translation, kept for reference only (NOT
#                preferred for the recommended term; may be outdated).
#   source     : a Vietnamese discrete-math / graph-theory terminology source.
#   secondary  : Vietnamese algorithms / data-structures book (graph & tree terms).
#   course     : the MAT3500 course lecture notes — authoritative for course-aligned
#                terms (may be the recommended/lead term).
meta:
  seeded_from: "Zotero collection 'Discrete Math' (IAEL4K2C) via keyword search"
  seeded_on: "2026-06-21"
  lookup_order: "Zotero -> Calibre -> online (strict)"
  terminology_policy: >
    PRIMARY comparison sources are the MOST RECENTLY PUBLISHED Vietnamese books
    (prefer 2019-2020 editions: bib-leanhvinh-2020, bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019). The recommended term should be one attested in those;
    list their citations first. Older books (2004-2011) corroborate. Old
    translations (notably bib-rosen-2003-vi, 2003) are OCR'd and mined as an extra
    comparison source to capture variants, but are reference-only and must never
    be chosen as the recommended/lead term.
  coverage_note: >
    Seeded with core Vietnamese DM / graph-theory titles found by keyword search
    of the 'Discrete Math' collection. Reconcile against the FULL collection in
    Phase 1 (a few titles not matching the seed keywords may be missing).

sources:
  - biblio_id: bib-rosen-2019
    zotero_key: ""          # English original; edition in library is 2018 (key TBD)
    role: primary-en
    lang: en
    year: 2019
    authors: ["Rosen, Kenneth H."]
    title: "Discrete Mathematics and Its Applications"

  - biblio_id: bib-libennowell-2022
    zotero_key: CWD5U6QZ
    role: primary-en
    lang: en
    year: 2022
    authors: ["Liben-Nowell, David"]
    title: "Connecting Discrete Mathematics and Computer Science"
    note: "Second primary English term source (Cambridge, 2022). Born-digital; per-chapter 'Key Terms' lists. Adds computer-science terms (coding theory, cryptography, complexity, computability, deeper probability). Used for the headword list only — definitions are written independently."

  - biblio_id: bib-west-grammar
    zotero_key: ""
    role: reference-en
    lang: en
    year: 2026
    authors: ["West, Douglas B."]
    title: "The Grammar According to West"
    note: "Public online guide (dwest.web.illinois.edu/grammar.html) on mathematical terminology, notation and usage. Reference for English term meaning/notation conventions (e.g. maximal vs maximum); content is public so its explanations may be used."

  - biblio_id: bib-harary-1969
    zotero_key: ""
    role: reference-en
    lang: en
    year: 1969
    authors: ["Harary, Frank"]
    title: "Graph Theory"
    note: "Classic monograph (Addison-Wesley, 1969). Reference for older/historical graph-theory terminology: point (vertex), line (edge), cutpoint (cut vertex), 1-factor (perfect matching), and the many alternative names of the line graph. Used to document old vs new term usage; cross-checked with Wikipedia's glossary of graph theory."

  - biblio_id: bib-berge-1985
    zotero_key: ""
    role: reference-en
    lang: en
    year: 1985
    authors: ["Berge, Claude"]
    title: "Graphs"
    note: "North-Holland (1985), revised edition. Origin of the 'stable set' terminology: internally stable set = independent set, externally stable set = dominating set (Vietnamese: tập ổn định trong / tập ổn định ngoài). Reference for classical graph-theory terms."

