# Source registry for "Một số thuật ngữ trong Toán rời rạc".
#
# Maps each bibliography id (used as <biblio xml:id> in source/references.ptx and
# as vi_terms[].source_id in data/terms/*.yaml) to its Zotero item key and metadata.
#
# roles:
#   primary-en : the primary English source (Rosen).
#   reference  : an older Vietnamese translation, kept for reference only (NOT
#                preferred for the recommended term; may be outdated).
#   source     : a Vietnamese discrete-math / graph-theory terminology source.
#   secondary  : Vietnamese algorithms / data-structures book (graph & tree terms).
meta:
  seeded_from: "Zotero collection 'Discrete Math' (IAEL4K2C) via keyword search"
  seeded_on: "2026-06-21"
  lookup_order: "Zotero -> Calibre -> online (strict)"
  terminology_policy: >
    PRIMARY comparison sources are the MOST RECENTLY PUBLISHED Vietnamese books
    (prefer 2019-2020 editions: bib-leanhvinh-2020, bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019). The recommended term should be one attested in those;
    list their citations first. Older books (2004-2011) corroborate. Old
    translations (notably bib-rosen-2003-vi, 2003) are reference-only and must
    never be chosen as the recommended/lead term.
  coverage_note: >
    Seeded with core Vietnamese DM / graph-theory titles found by keyword search
    of the 'Discrete Math' collection. Reconcile against the FULL collection in
    Phase 1 (a few titles not matching the seed keywords may be missing).

sources:
