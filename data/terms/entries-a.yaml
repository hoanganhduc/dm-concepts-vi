  notes: Only bib-ngodactan-2004 attests an antichain term; it uses "phản xích" with a full definition
    on tr. 274 (PDF) — a subset $$A$$ of a poset $$X$$ in which any two distinct elements are incomparable
    ("không so sánh được với nhau"), and Dilworth's theorem on tr. 275 (PDF). The candidate "phản chuỗi"
    returns zero hits in every source (normal and loose), so it is dropped. No 2019-2020 attestation exists;
    the recommended term "phản xích" is therefore cited from the oldest/only available source where the
    concept genuinely appears (the 2004 source), which is the best available standard attestation.
- id: asymptotic-notation
  letter: A
  headword_en: Asymptotic notation
  notation: O(g(x)),\ \Omega(g(x)),\ \Theta(g(x))
  rosen_ref: Rosen §3.2
  definition_vi: Các ký hiệu tiệm cận gồm ký hiệu ô lớn $$O$$, ký hiệu Ômêga $$\Omega$$ và ký hiệu têta
    $$\Theta$$, dùng để mô tả tốc độ tăng của một hàm $$f(x)$$ so với một hàm tham chiếu $$g(x)$$ khi
    $$x \to \infty$$. Ký hiệu $$f(x) = O(g(x))$$ chỉ ra rằng $$f$$ tăng không nhanh hơn một bội hằng số
    của $$g$$, $$f(x) = \Omega(g(x))$$ chỉ ra rằng $$f$$ tăng không chậm hơn một bội hằng số của $$g$$,
    và $$f(x) = \Theta(g(x))$$ chỉ ra rằng $$f$$ và $$g$$ có cùng tốc độ tăng.
  example_vi: Với $$f(x) = 3x^2 + 2x + 1$$ và $$g(x) = x^2$$, ta có $$f(x) = \Theta(g(x))$$, vì tồn tại
    các hằng số dương $$c_1$$, $$c_2$$ và $$k$$ sao cho $$c_1 g(x) \leq f(x) \leq c_2 g(x)$$ với mọi $$x
    \geq k$$.
