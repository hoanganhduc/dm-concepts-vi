  status: panel-approved
  see_ref: ''
  notes: 'Concept: an undirected graph containing no cycle. The definition is stated for the simple undirected
    setting so the connected-acyclic = tree and acyclic = forest characterizations are unambiguous; the
    directed (DAG) sense is left to the cross-reference "directed-acyclic-graph". The recommended standard
    named term "đồ thị phi chu trình" is attested with an explicit definition in the 2019 source bib-nguyenhuudien-2019
    (p.226: "Đồ thị có chu số bằng 0 được gọi là đồ thị phi chu trình"); note that the source defines
    the named term via chu số = 0 (cycle rank zero), a derived characterization, while this book takes
    the equivalent no-cycle formulation as its primary definition. The descriptive no-cycle phrasing is
    directly attested in the variant rows: bib-nguyenducnghia-2006 (p.230, "Giả sử G là đồ thị không có
    chu trình"; and p.200, where the connected case is named a tree and the general case a forest) and
    bib-hoangchithanh-2007 (p.123, "đồ thị là một cây nếu nó liên thông và không có chu trình"). The bare
    form "phi chu trình" is the adjectival predicate used in statements such as "$$G$$ là phi chu trình"
    (Định lý 9.3, nguyenhuudien-2019 p.226, which is in a directed setting). Note: the 2020 source bib-nguyenhoangthach-2020
    (p.93) and several other "không có chu trình" hits qualify the cycle type (chu trình âm / Euler /
    Hamilton / độ dài lẻ); these do NOT denote the general acyclic concept and are not used as citations
    for it. OCR sources (bib-leanhvinh-2020, bib-hoangchithanh-2007) were re-run with --loose: leanhvinh-2020
    yielded no occurrence of the named term "phi chu trình" (it uses "không có chu trình" descriptively),
    confirming the 2019 text as the strongest modern attestation of the recommended named term. The recommended
    named term (2019) is listed first.'
- id: algorithm
  letter: A
  headword_en: Algorithm
  notation: ''
  rosen_ref: Rosen §3.1
  definition_vi: Thuật toán là một dãy hữu hạn các chỉ dẫn (hay quy tắc) chính xác, rõ ràng, được thực
    hiện theo từng bước để giải một bài toán hoặc thực hiện một phép tính. Một thuật toán thường được
    đặc trưng bởi các tính chất đầu vào, đầu ra, tính chính xác, tính hữu hạn và tính tổng quát.
  example_vi: 'Thuật toán tìm phần tử lớn nhất trong một dãy hữu hạn các số nguyên $$a_1, a_2, \ldots,
    a_n$$: khởi tạo giá trị lớn nhất tạm thời bằng $$a_1$$, rồi lần lượt so sánh với từng $$a_i$$ và cập
    nhật giá trị lớn nhất tạm thời mỗi khi gặp $$a_i$$ lớn hơn; sau khi duyệt hết dãy, giá trị lớn nhất
    tạm thời chính là phần tử lớn nhất.'
