  notes: Khái niệm trong khai phá dữ liệu (data mining). Hai tập mục $$I$$ và $$J$$ thường được yêu cầu
    rời nhau, $$I \cap J = \emptyset$$. Cụm từ "luật kết hợp" trong các nguồn tiếng Việt khảo sát chỉ
    xuất hiện theo nghĩa tính chất kết hợp (associativity) của phép toán lôgic, không phải nghĩa khai
    phá dữ liệu ở đây; do đó thuật ngữ tiếng Việt được đề xuất theo bản dịch chuẩn, chưa có dẫn chứng
    từ kho ngữ liệu.
