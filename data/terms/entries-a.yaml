  status: panel-approved
  notes: 'Recommended term "tổ tiên" is attested in the newest source (nguyenhoangthach-2020, tr. 84)
    with an exact match for this concept: "u là một tổ tiên của v, v là một hậu duệ của u" (u is an ancestor
    of v, v is a descendant of u). The bare noun "tổ tiên" also appears inside the construction đỉnh "tổ
    tiên" (the vertex called "ancestor") in bib-hoangchithanh-2007 (tr. 138, attested in both normal and
    --loose modes) and bib-nguyenhuudien-2019 (tr. 252), both contrasting it with đỉnh "con cháu" (descendant
    vertices) in a rooted/hierarchical tree; these are recorded as variants of the same term "tổ tiên".
    The descriptive noun-phrase "đỉnh tổ tiên" (lit. "ancestor vertex") returned 0 hits as an exact phrase
    in both normal and --loose modes in all sources, so it is NOT recorded as a separate term; the source
    uses đỉnh "tổ tiên" with quotation marks around the bare noun. Loose-mode hits for "tờ tiền" (banknotes)
    in bib-ngodactan-2004 and combinatorics examples are OCR/false positives and were excluded. No attestation
    of this concept was found in bib-leanhvinh-2020, bib-nguyenducnghia-2006, or bib-ngodactan-2004. see_also:
    descendant, root, child, parent are cross-chapter forward references (kept as forward refs per the
    book-wide convention from chapters C/G); rooted-tree was likewise a cross-chapter forward reference
    and is omitted here only because it is multi-word in the source discussion, but the four kebab forward-reference
    ids are retained.'
- id: antichain
  letter: A
  headword_en: Antichain
  notation: A \subseteq X
  rosen_ref: Rosen §9.6
  definition_vi: Phản xích của một tập sắp thứ tự bộ phận $$X$$ là một tập con $$A \subseteq X$$ sao cho
    hai phần tử khác nhau bất kỳ của $$A$$ đều không so sánh được với nhau.
  example_vi: Cho $$X = \{2, 3, 4, 9\}$$ sắp thứ tự theo quan hệ chia hết. Khi đó $$A = \{2, 3\}$$ là
    một phản xích của $$X$$ vì $$2$$ và $$3$$ không so sánh được với nhau, trong khi $$\{2, 4\}$$ không
    phải là phản xích vì $$2 \mid 4$$.
  vi_terms:
  - term: phản xích
    source_id: bib-ngodactan-2004
    page: tr. 274 (PDF)
    recommended: true
    verified: true
    pdf_page: 274
    snippet: định nghĩa một phản xích. Tập A C X được gọi là một phản xích nếu
  see_also: []
  status: panel-approved
  notes: Only bib-ngodactan-2004 attests an antichain term; it uses "phản xích" with a full definition
    on tr. 274 (PDF) — a subset $$A$$ of a poset $$X$$ in which any two distinct elements are incomparable
    ("không so sánh được với nhau"), and Dilworth's theorem on tr. 275 (PDF). The candidate "phản chuỗi"
    returns zero hits in every source (normal and loose), so it is dropped. No 2019-2020 attestation exists;
    the recommended term "phản xích" is therefore cited from the oldest/only available source where the
    concept genuinely appears (the 2004 source), which is the best available standard attestation.
- id: asymptotic-notation
  letter: A
  headword_en: Asymptotic notation
  notation: O(g(x)),\ \Omega(g(x)),\ \Theta(g(x))
  rosen_ref: Rosen §3.2
  definition_vi: Các ký hiệu tiệm cận gồm ký hiệu ô lớn $$O$$, ký hiệu Ômêga $$\Omega$$ và ký hiệu têta
    $$\Theta$$, dùng để mô tả tốc độ tăng của một hàm $$f(x)$$ so với một hàm tham chiếu $$g(x)$$ khi
    $$x \to \infty$$. Ký hiệu $$f(x) = O(g(x))$$ chỉ ra rằng $$f$$ tăng không nhanh hơn một bội hằng số
    của $$g$$, $$f(x) = \Omega(g(x))$$ chỉ ra rằng $$f$$ tăng không chậm hơn một bội hằng số của $$g$$,
    và $$f(x) = \Theta(g(x))$$ chỉ ra rằng $$f$$ và $$g$$ có cùng tốc độ tăng.
  example_vi: Với $$f(x) = 3x^2 + 2x + 1$$ và $$g(x) = x^2$$, ta có $$f(x) = \Theta(g(x))$$, vì tồn tại
    các hằng số dương $$c_1$$, $$c_2$$ và $$k$$ sao cho $$c_1 g(x) \leq f(x) \leq c_2 g(x)$$ với mọi $$x
    \geq k$$.
  vi_terms:
  - term: big-O
    source_id: bib-nguyenhuudien-2019
    page: tr. 138 (PDF)
    recommended: false
    verified: true
    pdf_page: 138
    snippet: Ta viết f (n) = O( g(n)) và còn nói f (n) thoả mãn quan hệ big-O đối với g(n).
