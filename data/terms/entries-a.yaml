  definition_vi: Giá trị tuyệt đối của một số thực $$x$$, ký hiệu $$|x|$$, được định nghĩa bằng $$x$$
    nếu $$x \geq 0$$ và bằng $$-x$$ nếu $$x < 0$$. Như vậy $$|x|$$ luôn là một số không âm và biểu thị
    khoảng cách từ $$x$$ đến $$0$$ trên trục số.
