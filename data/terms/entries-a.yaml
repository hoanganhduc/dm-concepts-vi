  notes: 'Concept: a directed edge of a directed graph, the ordered pair $$(u, v)$$. The standard Vietnamese
    term is "cung" (arc), used precisely for a directed edge as distinct from "cạnh" (edge); recommended,
    attested in 2020 (nguyenhoangthach p.62 "cạnh có hướng (hay cung)", which equates the two terms) and
