    u gọi là đỉnh đầu và đỉnh v gọi là đỉnh cuối"), and across the corpus back to 2004 (ngodactan p.185
    "(a, b) được gọi là cung của G với đỉnh đầu là a, đỉnh cuối là b"). Defining-sense citations for the
    variants: "cạnh có hướng" (literal calque of "directed edge") is defined by the ordered pair in leanhvinh-2020
    p.11 ("Cặp (u,v) được gọi là cạnh có hướng của G đi từ u vào v"); the longer "cung của đồ thị có hướng"
    appears in ngodactan-2004 p.185 and nguyenducnghia-2006 p.190. Collocational/incidental rows: the
    "cạnh có hướng" rows at nguyenhuudien-2019 p.209 and nguyenducnghia-2006 p.154 record the term used
    while orienting an undirected edge (replacing each undirected edge by a pair of arcs), not the defining
    ordered-pair sense; they are retained as attestations of the variant but are weaker terminology evidence
    than the defining rows and should not be read as independent definitional support. OCR note: leanhvinh-2020
    and hoangchithanh-2007 cited snippets came through cleanly in normal mode. Many "cung" hits in the
    corpus are false positives (cung cấp = "provide", dây cung = "chord"); only directed-edge-sense snippets
    are recorded. The nguyenhuudien-2019 p.158 snippet carries an OCR spacing artifact ("cung của G .")
    but is substantively identical. The definition_vi mirrors the đỉnh đầu/đỉnh cuối phrasing from nguyenhuudien-2019
    p.158; the example is self-contained, introducing only the ordered pairs $$(u,v)$$ and $$(v,u)$$ over
    the two-vertex set.'
