- id: argument-form
  letter: A
  headword_en: Argument Form
  notation: p_1, p_2, \ldots, p_n \therefore q
  rosen_ref: Rosen §1.6
  definition_vi: Một dạng suy luận trong logic mệnh đề là một dãy các mệnh đề phức hợp chứa các biến mệnh
    đề. Một dạng suy luận là hợp lệ (đúng đắn) nếu cứ mỗi lần thay các biến mệnh đề trong dãy bằng những
    mệnh đề cụ thể mà tất cả các tiền đề trở thành đúng thì kết luận cũng trở thành đúng.
  example_vi: Dãy $$p \to q$$, $$p$$, do đó $$q$$ là một dạng suy luận với các biến mệnh đề $$p$$ và $$q$$.
    Thay $$p$$ và $$q$$ bằng các mệnh đề cụ thể bất kỳ, ta thu được một lập luận cụ thể; vì $$((p \to
    q) \wedge p) \to q$$ là một hằng đúng nên đây là một dạng suy luận hợp lệ.
