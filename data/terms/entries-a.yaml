  notes: 'Recommended term "thuật toán" is the standard Vietnamese rendering, attested in every corpus
    source and in all three 2019-2020 sources. The recommended=true flag sits on bib-nguyenhuudien-2019
    (2019) because that is the only DEFINITIONAL attestation: Chương 5 (§5.1 "Khái niệm thuật toán") gives
    a textbook definition matching Rosen (tr. 132 PDF): "Thuật toán là một bảng liệt kê các chỉ dẫn (hay
    quy tắc) cần thực hiện theo từng bước". The two 2020 occurrences (bib-leanhvinh-2020 p.34 "Thuật toán
