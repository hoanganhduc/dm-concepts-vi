- id: axiom
  letter: A
  headword_en: Axiom
  notation: ''
  rosen_ref: Rosen §1.6
  definition_vi: Tiên đề là một mệnh đề được giả định là đúng và được dùng làm điểm xuất phát để suy ra
    các mệnh đề khác trong một hệ thống toán học. Một hệ thống toán học gồm các tiên đề, các định nghĩa
    và các khái niệm không định nghĩa, từ đó dùng các quy tắc suy luận để chứng minh các định lý.
  example_vi: Trong lý thuyết tập hợp, tiên đề được sắp tốt khẳng định rằng mọi tập con khác rỗng của
    tập số nguyên dương đều có phần tử nhỏ nhất; đây là tiên đề dùng để chứng minh tính đúng đắn của quy
    nạp toán học.
