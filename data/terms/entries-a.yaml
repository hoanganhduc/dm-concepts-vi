    là một dãy các mệnh đề cụ thể với một kết luận, còn dạng suy luận là sơ đồ trừu tượng gồm các mệnh
    đề phức hợp chứa các biến mệnh đề; thay các biến mệnh đề bằng những mệnh đề cụ thể trong một dạng
    suy luận sẽ cho một lập luận cụ thể. Một dạng suy luận hợp lệ là dạng mà mọi phép thay biến làm cho
    các tiền đề đúng đều khiến kết luận đúng. Bản dịch Rosen (2003) dùng cụm "các dạng ... của suy luận"
    (tr. 209); cụm "dạng suy luận" là bản dịch chuẩn được khuyến nghị cho thuật ngữ này.
