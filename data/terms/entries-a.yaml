- id: average-degree
  letter: A
  headword_en: Average degree
  notation: \bar{d}(G) = \frac{2|E(G)|}{|V(G)|}
  rosen_ref: Rosen §10.2
  definition_vi: Bậc trung bình của một đồ thị $$G$$ với tập đỉnh $$V(G)$$ và tập cạnh $$E(G)$$ là trung
    bình cộng bậc của tất cả các đỉnh, ký hiệu $$\bar{d}(G)$$ và bằng $$\displaystyle \bar{d}(G) = \frac{2|E(G)|}{|V(G)|}$$.
  example_vi: Xét đồ thị $$G$$ có $$|V(G)| = 4$$ đỉnh và $$|E(G)| = 5$$ cạnh. Khi đó bậc trung bình của
    $$G$$ là $$\displaystyle \bar{d}(G) = \frac{2 \cdot 5}{4} = \frac{5}{2}$$.
  vi_terms:
  - term: bậc trung bình
    source_id: bib-leanhvinh-2020
    page: tr. 153 (PDF)
    recommended: true
    verified: true
    pdf_page: 153
    snippet: Bồ đề 6.13. Cho dé thị G bậc n với bậc trung bình d(G) = d và Ơ
  - term: bậc trung bình của đồ thị
    source_id: bib-leanhvinh-2020
    page: tr. 195 (PDF)
    recommended: false
    verified: true
    pdf_page: 195
    snippet: bình của đồ thị nhận được sẽ không nhỏ hơn bậc trung bình của đỏ
  see_also:
  - degree-of-a-vertex
  - handshaking-theorem
  status: panel-approved
  notes: 'Thuật ngữ chỉ được chứng thực trong nguồn 2020 (bib-leanhvinh-2020); các nguồn 2019, 2007, 2006,
    2004 không dùng thuật ngữ này (find-term trả 0 kết quả, cả thường lẫn --loose). "bậc trung bình" là
    dạng chuẩn, ngắn gọn, được dùng nhiều nhất (tr. 153: "Cho đồ thị $$G$$ bậc $$n$$ với bậc trung bình
    $$d(G) = d$$"). Dạng dài "bậc trung bình của đồ thị" là cùng thuật ngữ kèm bổ ngữ sở hữu, xuất hiện
    trong văn bản chạy ở tr. 195; chuỗi đầy đủ không khớp chính xác do OCR làm hỏng chữ "thị" ("bậc trung
    bình của đỏ"). Vì đây chỉ là cùng thuật ngữ kèm bổ ngữ sở hữu (không phải biến thể độc lập) và đoạn
    trích bị OCR cắt, nó được giữ lại như một hàng chứng thực phụ chứ không phải bằng chứng thuật ngữ
    độc lập. Nguồn dùng kí hiệu $$d(G)$$ cho bậc trung bình; ký pháp $$\bar{d}(G) = \frac{2|E(G)|}{|V(G)|}$$
    theo Rosen §10.2 (do đó đoạn trích nguồn "d(G) = d" không hiển thị ký hiệu gạch ngang mà định nghĩa
    dùng).'
- id: ancestor
  letter: A
  headword_en: Ancestor
  notation: ''
  rosen_ref: Rosen §11.1
  definition_vi: Trong một cây có gốc, đỉnh $$u$$ được gọi là tổ tiên của đỉnh $$v$$ nếu $$u$$ nằm trên
    đường đi duy nhất từ gốc đến $$v$$ và $$u \neq v$$.
  example_vi: Xét cây có gốc với gốc $$r$$ và đường đi duy nhất từ $$r$$ đến đỉnh $$v$$ là $$r, a, b,
    v$$. Khi đó $$r$$, $$a$$ và $$b$$ đều là tổ tiên của $$v$$, còn $$v$$ không phải là tổ tiên của chính
    nó.
