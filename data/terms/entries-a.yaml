  rosen_ref: Rosen §3.3
  definition_vi: Phân tích thuật toán là quá trình đánh giá lượng tài nguyên mà một thuật toán cần dùng,
    chủ yếu là thời gian chạy và bộ nhớ, theo kích thước $$n$$ của dữ liệu vào. Độ phức tạp thời gian
    thường được biểu diễn qua số phép toán cơ bản và mô tả bằng ký hiệu tiệm cận $$O(f(n))$$ cho cỡ lớn
    của $$f(n)$$.
  example_vi: Thuật toán tìm kiếm tuyến tính trên một dãy có $$n$$ phần tử thực hiện trong trường hợp
    xấu nhất khoảng $$n$$ phép so sánh, nên có độ phức tạp thời gian $$O(n)$$. Trong khi đó thuật toán
    tìm kiếm nhị phân trên dãy đã sắp xếp chỉ cần $$O(\log n)$$ phép so sánh.
