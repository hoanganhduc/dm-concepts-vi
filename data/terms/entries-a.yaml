  - term: phản đối xứng
    source_id: bib-ngodactan-2004
    page: tr. 163 (PDF)
    recommended: false
    verified: true
    pdf_page: 163
    snippet: (ii) phản đối xứng n ế u v ớ i m ọ i X, y € X t ừ x a y v k y a x s u ý ra
  see_also:
  - reflexive-relation
  - symmetric-relation
  - transitive-relation
  - partial-order
  - equivalence-relation
  status: panel-approved
  notes: 'Hai biến thể được ghi nhận trong kho ngữ liệu, đều chỉ cùng khái niệm này. "phản xứng" được
    chọn làm thuật ngữ chuẩn vì xuất hiện trong nguồn mới nhất (Nguyễn Hữu Điển 2019) kèm chú thích tiếng
    Anh "(antisymmetric)" và điều kiện $$(xRy \wedge yRx) \Rightarrow x = y$$. "phản đối xứng" là biến
    thể, được dùng trong định nghĩa quan hệ thứ tự ở Ngô Đắc Tân 2004 (tr. 163) và cũng xuất hiện thay
    thế cho "phản xứng" trong Nguyễn Hữu Điển 2019 (tr. 111). Lưu ý: tuy "phản đối xứng" dịch sát nghĩa
    là "anti-symmetric", trong kho ngữ liệu nó vẫn chỉ đúng tính chất phản xứng (antisymmetric) chứ KHÔNG
    có nghĩa "không đối xứng"; cả "phản xứng" và "phản đối xứng" đều biểu thị cùng điều kiện $$(aRb \wedge
    bRa) \Rightarrow a = b$$. Các nguồn OCR đồ thị (bib-leanhvinh-2020, bib-hoangchithanh-2007) và các
    nguồn tổ hợp/đồ thị khác (bib-nguyenhoangthach-2020, bib-nguyenducnghia-2006) không có chỗ nào đề
    cập khái niệm này (đều cho 0 hit ở cả chế độ thường lẫn --loose), phù hợp vì chúng tập trung vào lý
    thuyết đồ thị chứ không trình bày tính chất quan hệ.'
- id: arborescence
  letter: A
  headword_en: Arborescence
  notation: ''
  rosen_ref: Rosen §11.1
  definition_vi: Cây có gốc (theo nghĩa có hướng) là một đồ thị có hướng $$T$$ với một đỉnh đặc biệt $$r$$
    gọi là gốc, sao cho với mỗi đỉnh $$v \neq r$$ tồn tại duy nhất một đường đi có hướng từ $$r$$ đến
    $$v$$; do đó mỗi đỉnh khác gốc có đúng một cung đi vào. Chính tính duy nhất của đường đi có hướng
    này phân biệt cây có gốc có hướng với cây có gốc vô hướng thông thường.
