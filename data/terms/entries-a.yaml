  - term: ký hiệu ô lớn
    source_id: bib-nguyenducnghia-2006
    page: tr. 85 (PDF)
    recommended: true
    verified: true
    pdf_page: 85
    snippet: Các biểu thức ... thường được gọi là ký hiệu ô lớn, Ômêga, têta đối với hàm ƒ.
  - term: ký hiệu Ômêga
    source_id: bib-nguyenducnghia-2006
    page: tr. 85 (PDF)
    recommended: false
