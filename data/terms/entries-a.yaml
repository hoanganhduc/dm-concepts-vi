  notes: Both "ma trận kề" and "ma trận liền kề" denote the adjacency matrix. "Ma trận kề" is the dominant,
    standard term, attested in two 2020 sources (bib-leanhvinh-2020 Định nghĩa 2.20 and bib-nguyenhoangthach-2020
    Định nghĩa 5.8) and in all four older sources, so it is recommended. The lead leanhvinh-2020 p.54
