- id: arithmetic-progression
  letter: A
  headword_en: Arithmetic progression
  notation: a + nd
  rosen_ref: Rosen §2.4
  definition_vi: Cấp số cộng là một dãy số có dạng $$a, a+d, a+2d, \ldots$$, trong đó mỗi số hạng nhận
    được từ số hạng liền trước bằng cách cộng thêm một số $$d$$ cố định, gọi là công sai. Số hạng tổng
    quát của dãy, ký hiệu $$a + nd$$, ứng với chỉ số $$n \geq 0$$.
  example_vi: Dãy $$3, 7, 11, 15, \ldots$$ là một cấp số cộng với số hạng đầu $$a = 3$$ và công sai $$d
    = 4$$; số hạng tổng quát của nó là $$3 + 4n$$.
  vi_terms:
  - term: cấp số cộng
    source_id: bib-ngodactan-2004
    page: tr. 318 (PDF)
    recommended: true
    verified: true
    pdf_page: 318
    snippet: bằng k màu đều có một cấp số cộng đơn sắc gồm p số hạng.
  - term: cấp số cộng
    source_id: bib-rosen-2003-vi
    page: tr. 282 (PDF)
    recommended: false
    verified: true
    pdf_page: 282
    snippet: của một cấp số cộng là
  see_also: []
  status: panel-approved
  see_ref: ''
  notes: '"cấp số cộng" is the standard Vietnamese term for arithmetic progression; "công sai" is the
    standard term for the common difference $$d$$. No 2019-2020 attestation exists; the recommended term
    is therefore cited from the oldest available source where the concept genuinely appears: bib-ngodactan-2004
    (tr. 318), in the van der Waerden theorem (a monochromatic arithmetic progression, "cấp số cộng đơn
    sắc"). A second genuine attestation of the same term "cấp số cộng" was found in the OCR''d reference
    translation bib-rosen-2003-vi (PDF page 282), in the context of the sum of the first terms of an arithmetic
    progression; this corroborates the term but is reference-only and is therefore recorded as verified=true,
    recommended=false (never the lead term per the registry policy). The current 2019-2020 corpus (bib-leanhvinh-2020,
    bib-nguyenhoangthach-2020, bib-nguyenhuudien-2019) does not attest this concept; their "cặp số" /
    "cấp số nhân" / "số công" occurrences are unrelated (pair of numbers, geometric progression, number
    of tasks/formulas). Both OCR sources (bib-leanhvinh-2020, bib-hoangchithanh-2007) were searched in
    normal and --loose modes with zero hits.'
