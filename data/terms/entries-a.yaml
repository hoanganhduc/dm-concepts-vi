  rosen_ref: Rosen §10.2
  definition_vi: 'Thứ tự bảng chữ cái là cách sắp xếp các từ hoặc các xâu ký tự dựa trên thứ tự của các
    chữ cái trong bảng chữ cái: so sánh hai xâu theo từng vị trí từ trái sang phải, và xâu nào có chữ
    cái đứng trước trong bảng chữ cái tại vị trí khác nhau đầu tiên thì đứng trước. Đây là trường hợp
    riêng của thứ tự từ điển khi tập nền là bảng chữ cái với thứ tự $$a \leq b \leq \cdots \leq z$$.'
  example_vi: Với ba từ $$discreet$$, $$discrete$$ và $$discreetness$$, thứ tự bảng chữ cái sắp xếp chúng
    thành $$discreet \leq discreetness \leq discrete$$, vì tại vị trí khác nhau đầu tiên ta có $$e$$ đứng
    trước $$t$$, còn $$discreet$$ là tiền tố của $$discreetness$$.
