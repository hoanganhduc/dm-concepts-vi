- id: adjacent-vertices
  letter: A
  headword_en: Adjacent vertices
  notation: u \sim v
  rosen_ref: Rosen §10.2
  definition_vi: Hai đỉnh $$u$$ và $$v$$ trong một đồ thị vô hướng $$G$$ được gọi là *kề nhau* nếu chúng
    là hai đầu mút của một cạnh chung của $$G$$, tức là $$uv \in E(G)$$; ký hiệu $$u \sim v$$.
  example_vi: Trong đồ thị $$G$$ với tập đỉnh $$V(G) = \{a, b, c\}$$ và tập cạnh $$E(G) = \{ab, bc\}$$,
    hai đỉnh $$a$$ và $$b$$ kề nhau vì $$ab \in E(G)$$, trong khi $$a$$ và $$c$$ không kề nhau vì $$ac
    \notin E(G)$$.
