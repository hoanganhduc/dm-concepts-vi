    snippet: Các biểu thức ... thường được gọi là ký hiệu ô lớn, Ômêga, têta đối với hàm ƒ.
  see_also: []
  status: panel-approved
  notes: 'Naming discipline (panel fix): "ký hiệu ô lớn" names ONLY the $$O$$ symbol (big-O); the three
    symbols $$O$$, $$\Omega$$, $$\Theta$$ together are the asymptotic notations, mirroring the source''s
    distributive naming in bib-nguyenducnghia-2006 (PDF p.85): "Các biểu thức ... thường được gọi là ký
    hiệu ô lớn, Ômêga, têta đối với hàm ƒ", where "ô" is the Vietnamese letter-name for O and "ký hiệu"
    applies distributively to all three names (ô lớn = O, Ômêga = Omega, têta = Theta). The O/Omega glosses
    carry the constant-factor qualifier ("không nhanh hơn một bội hằng số của g"), matching the rigor
    of the $$\Theta$$ example''s $$c_1, c_2, k$$ characterization. No 2019-2020 source supplies a Vietnamese
    family-name for the asymptotic-notation triple: bib-nguyenhuudien-2019 (2019) introduces only the
    borrowed English label "big-O" — "Ta viết f(n) = O(g(n)) và còn nói f(n) thoả mãn quan hệ big-O đối
    với g(n)" (PDF p.138), with "đánh giá big-O" for the corresponding estimate (PDF pp.150-151) — and
    does not name the Omega or Theta symbols. The recommended term is therefore the oldest available standard
    Vietnamese umbrella term "ký hiệu ô lớn" (together with "Ômêga", "têta") from bib-nguyenducnghia-2006;
    in the source snippet the three per-symbol names (ô lớn, Ômêga, têta) jointly constitute the family
    naming rather than "ô lớn" alone, while the 2019 borrowed label big-O is listed first as the newest
    attestation. The newer 2020 graph sources (bib-leanhvinh-2020, bib-nguyenhoangthach-2020) and the
    OCR sources only use $$O(\cdot)$$ in passing for algorithm complexity and do not define or name the
    asymptotic-notation concept; bib-nguyenhoangthach-2020 explicitly states it does not go deep into
    algorithm complexity. The lone "tiệm cận" hit in bib-nguyenducnghia-2006 (PDF p.48) refers to "dạng
    tiệm cận" of a counting function $$Z(p,n)$$, an unrelated context, so the candidate "ký hiệu tiệm
    cận" is NOT supported by that hit. The unattested standard candidate "ký hiệu tiệm cận" returned 0
    verbatim hits in every source; per the citation-hygiene rule its empty-page verified=false placeholder
    was dropped from vi_terms (which stays non-empty via the verified=true rows) and it is recorded here
    only as a forward-looking, currently-unattested variant. When wrapping symbols, use $$O(g(x))$$, $$\Omega(g(x))$$,
    $$\Theta(g(x))$$. The example is self-contained, illustrating $$\Theta$$ with the standard constant-pair
    $$c_1, c_2, k$$ characterization without invoking any quantity not introduced in the definition. see_also
    is empty: no other A-chapter entry is the natural neighbor of this concept.'
