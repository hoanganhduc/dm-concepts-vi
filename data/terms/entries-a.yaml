  rosen_ref: Rosen §12.3
  definition_vi: Cổng AND là một phần tử logic nhận nhiều đầu vào và tạo ra một đầu ra duy nhất bằng tích
    Boole của các giá trị đầu vào. Với hai đầu vào $$x$$ và $$y$$, đầu ra của cổng AND là $$x \cdot y$$
    (ký hiệu là $$xy$$), nên đầu ra bằng $$1$$ khi và chỉ khi mọi đầu vào đều bằng $$1$$, ngược lại bằng
    $$0$$.
  example_vi: 'Một cổng AND với hai đầu vào $$x$$ và $$y$$ cho đầu ra $$xy$$: nếu $$x = 1$$ và $$y = 1$$
    thì đầu ra bằng $$1$$, còn nếu $$x = 1$$ và $$y = 0$$ thì đầu ra bằng $$0$$. Cổng AND $$n$$ đầu vào
    $$x_1, x_2, \ldots, x_n$$ cho đầu ra $$x_1 x_2 \cdots x_n$$.'
