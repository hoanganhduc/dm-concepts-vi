- id: asymptotic-estimate
  letter: A
  headword_en: Asymptotic Estimate
  notation: f(n) = O(g(n))
  rosen_ref: Rosen §3.2
  definition_vi: Đánh giá tiệm cận của một hàm $$f$$ là việc mô tả độ tăng của $$f$$ khi đối số tiến ra
    vô cùng bằng một hàm so sánh $$g$$ đơn giản hơn, thường thông qua ký hiệu O lớn. Ta nói $$f(n)$$ là
    $$O(g(n))$$ (ký hiệu $$f(n) = O(g(n))$$) nếu tồn tại các hằng số $$C > 0$$ và $$k$$ sao cho $$|f(n)|
    \leq C\,|g(n)|$$ với mọi $$n \geq k$$.
  example_vi: Đa thức $$f(n) = 3n^2 + 5n + 1$$ có đánh giá tiệm cận $$f(n) = O(n^2)$$, vì với $$n \geq
    1$$ ta có $$3n^2 + 5n + 1 \leq 9n^2$$, nên có thể chọn $$C = 9$$ và $$k = 1$$.
