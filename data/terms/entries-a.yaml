- id: automorphism
  letter: A
  headword_en: Automorphism
  notation: \mathrm{Aut}(G)
  rosen_ref: Rosen §10.3
  definition_vi: Một *tự đẳng cấu* của đồ thị $$G$$ là một đẳng cấu từ $$G$$ vào chính nó, tức là một
    hoán vị $$\sigma$$ của tập đỉnh $$V(G)$$ sao cho $$uv \in E(G)$$ khi và chỉ khi $$\sigma(u)\sigma(v)
    \in E(G)$$. Tập tất cả các tự đẳng cấu của $$G$$, ký hiệu $$\mathrm{Aut}(G)$$, lập thành một nhóm
    đối với phép hợp thành ánh xạ.
  example_vi: Ánh xạ đồng nhất trên $$V(G)$$ là một tự đẳng cấu của mọi đồ thị $$G$$. Đồ thị đầy đủ $$K_n$$
    có $$n!$$ tự đẳng cấu, vì mọi hoán vị của tập đỉnh đều bảo toàn quan hệ kề.
  vi_terms:
  - term: tự đẳng cấu
    source_id: bib-leanhvinh-2020
    page: tr. 37 (PDF)
    recommended: true
    verified: true
    pdf_page: 37
    snippet: 'Bài tập 1.5. Tự đẳng cấu của một đồ thị là một đẳng cầu từ một đồ thị vào chính nó. Các
      đồ thị sau có bao nhiều tự đẳng cấu: K,, Ki»,'
  - term: tự đẳng cấu
    source_id: bib-ngodactan-2004
    page: tr. 140 (PDF)
    recommended: false
    verified: true
    pdf_page: 140
    snippet: Giả sử G là tập tất cả các tự đẳng cấu của hình vuông. Khi 'đó G là một nhóm đối với phép
      nhân ánh xạ. Mỗi tự đẳng cấu của hình...
  - term: phép tự đẳng cấu
    source_id: ''
    page: ''
    recommended: false
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - isomorphism
  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "tự đẳng cấu" is attested for THIS concept (an isomorphism from a graph to
    itself) in the newest source bib-leanhvinh-2020 (2020), tr. 37 (PDF), which defines it verbatim: "Tự
    đẳng cấu của một đồ thị là một đẳng cấu từ một đồ thị vào chính nó", with further graph usage on tr.
    46 (PDF) (the unique automorphism of a tree being the identity). The bib-ngodactan-2004 p.140 row
    is a same-term-different-domain corroboration, NOT graph-automorphism evidence: it uses the identical
    Vietnamese term "tự đẳng cấu" in an algebraic/geometry setting (automorphisms of a square forming
    a group). It is retained only to record that the same term is used in the corpus and to corroborate
    the group structure, not as evidence of the graph sense, which is already attested by leanhvinh-2020
    p.37. The longer candidate phrase "tự đẳng cấu của đồ thị" returned 0 contiguous hits and is not separately
    attested. OCR sources bib-hoangchithanh-2007 returned no hits (normal and --loose); bib-leanhvinh-2020
    --loose confirmed the same attestations plus index entries (tr. 257–258 PDF, "tự đẳng cấu, 38"). No
    attestation in bib-nguyenhoangthach-2020, bib-nguyenhuudien-2019, or bib-nguyenducnghia-2006. Math
    symbols in the leanhvinh snippet ($$K_n$$, $$K_{1,n}$$) are OCR-garbled in the source ("K,, Ki»,")
    but the defining sentence is clean. The notation $$\mathrm{Aut}(G)$$ and the group structure are standard
    (Rosen §10.3); the group statement is corroborated by bib-ngodactan-2004 tr. 140 (PDF) for the set
    of automorphisms forming a group under map composition.'
