  notes: Recommended term "kề nhau" is the standard Vietnamese rendering for two vertices being adjacent
    and is attested in the newest 2020 graph-theory source (bib-leanhvinh-2020, p.9 via OCR-loose) and
    the 2020 combinatorics source (bib-nguyenhoangthach-2020, p.63), as well as in every older source.
    The lead row rests on the OCR-mangled leanhvinh-2020 p.9 snippet ("ké nhau"), confirmed via --loose;
    clean 2020/2019 corroboration is available in bib-nguyenhoangthach-2020 p.63 ("hai đỉnh kề nhau")
    and bib-nguyenhuudien-2019 p.160. The formal definition "Hai đỉnh u và v ... được gọi là liền kề"
    appears in bib-nguyenhuudien-2019 (p.157), so "liền kề" is a fully equivalent variant; the matrix
    term "ma trận liền kề"/"ma trận kề" (adjacency matrix) is built from these. "đỉnh kề" is the noun
    form "an adjacent vertex / neighbor" (e.g. bib-hoangchithanh-2007 p.8, p.10). The bare adjective "kề"
    is used in collocations such as "kề với" and "ma trận kề". OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007
    mangle diacritics (e.g. "ké nhau", "kể nhau"); definitional snippets were confirmed via --loose. In
    bib-ngodactan-2004 the term also denotes adjacency of arcs/edges ("cung ... kề nhau"); the vertex
    sense is confirmed in the same definitional block (p.186) and is indexed as "hai đỉnh kề nhau, 186".
- id: adjacency-matrix
  letter: A
  headword_en: Adjacency matrix
  notation: A = [a_{ij}]
  rosen_ref: Rosen §10.3
  definition_vi: Ma trận kề của một đồ thị có tập đỉnh $$\{v_1, v_2, \ldots, v_n\}$$, ký hiệu $$A = [a_{ij}]$$,
    là ma trận vuông cấp $$n$$ trong đó phần tử $$a_{ij}$$ bằng số cạnh nối đỉnh $$v_i$$ với đỉnh $$v_j$$.
    Với một đơn đồ thị, $$a_{ij} = 1$$ nếu $$v_i$$ và $$v_j$$ kề nhau và $$a_{ij} = 0$$ nếu ngược lại.
  example_vi: 'Xét đồ thị có tập đỉnh $$\{v_1, v_2, v_3\}$$ với các cạnh $$v_1 v_2$$ và $$v_2 v_3$$. Ma
    trận kề của nó là

    ```math

    A = \begin{bmatrix} 0 & 1 & 0 \\ 1 & 0 & 1 \\ 0 & 1 & 0 \end{bmatrix}.

    ```'
