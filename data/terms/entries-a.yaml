    characteristic properties (Đầu vào/Input, Đầu ra/Output, Chính xác/Precision, Hữu hạn/Finiteness,
    Tổng quát/Generality). The candidate "giải thuật" returned 0 hits in every source under both strict
    and loose (OCR-tolerant) search, so it is not attested in this corpus; it is recorded here only as
    a known synonym used elsewhere in Vietnamese computer-science literature.'
- id: antisymmetric-relation
  letter: A
  headword_en: Antisymmetric relation
  notation: aRb \wedge bRa \Rightarrow a = b
  rosen_ref: Rosen §9.1
  definition_vi: Một quan hệ $$R$$ trên tập $$A$$ được gọi là phản xứng nếu với mọi $$a, b \in A$$, hễ
    $$(a, b) \in R$$ và $$(b, a) \in R$$ thì $$a = b$$. Nói cách khác, $$R$$ phản xứng khi và chỉ khi
    $$(aRb \wedge bRa) \Rightarrow a = b$$ với mọi $$a, b \in A$$.
  example_vi: Xét tập $$A = \{1, 2, 3\}$$ và quan hệ $$R = \{(1, 1), (1, 2), (2, 3)\}$$ trên $$A$$. Quan
    hệ này phản xứng vì cặp duy nhất $$(a, b) \in R$$ mà đồng thời $$(b, a) \in R$$ là $$(1, 1)$$, và
    khi đó $$1 = 1$$. Ngược lại, quan hệ $$R' = \{(1, 2), (2, 1)\}$$ trên $$A$$ không phản xứng vì $$(1,
    2) \in R'$$ và $$(2, 1) \in R'$$ nhưng $$1 \neq 2$$.
  vi_terms:
  - term: phản xứng
    source_id: bib-nguyenhuudien-2019
    page: tr. 110 (PDF)
    recommended: true
    verified: true
    pdf_page: 110
    snippet: • Ta nói quan hệ R có tính phản xứng (antisymmetric) nếu và chỉ nếu ( xRy và yRx ) ⇒
  - term: phản đối xứng
