- id: atomic-proposition
  letter: A
  headword_en: Atomic Proposition
  notation: p, q, r
  rosen_ref: Rosen §1.3
  definition_vi: Mệnh đề nguyên tử là một mệnh đề không thể phân tích thành các mệnh đề đơn giản hơn nhờ
    các phép toán logic, tức là một mệnh đề sơ cấp dùng làm thành phần cơ bản để xây dựng các mệnh đề
    phức hợp. Mỗi mệnh đề nguyên tử thường được ký hiệu bởi một biến mệnh đề (ký hiệu $$p$$, $$q$$, $$r$$).
  example_vi: 'Mệnh đề $$p$$: "Hà Nội là thủ đô của Việt Nam" là một mệnh đề nguyên tử. Trái lại, mệnh
    đề $$p \wedge q$$ là một mệnh đề phức hợp vì nó được tạo thành từ hai mệnh đề nguyên tử $$p$$ và $$q$$.'
