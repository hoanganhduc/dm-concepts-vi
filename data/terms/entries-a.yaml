  notes: 'Concept = arborescence: a rooted directed tree with a unique directed path from the root to
    every other vertex. The standard Vietnamese term is "cây có gốc", recommended and attested in 2020
    sources (newest first). Term-vs-concept caveat: "cây có gốc" is also the generic term for an UNDIRECTED
    rooted tree, so the directed (arborescence) sense must be read from context; the definition above
    pins the distinguishing property (uniqueness of the directed path). Concept-bearing (directed) attestations:
    the strongest match is bib-nguyenhoangthach-2020 tr. 84 (PDF), Định nghĩa 6.3, which defines "cây
    có gốc" explicitly as a directed graph ($$\text{đồ thị có hướng}$$), i.e. precisely an arborescence;
    bib-leanhvinh-2020 tr. 50 (PDF) reinforces the directed reading ("n−1 cạnh được định hướng ... cây
    có gốc"; also tr. 49 (PDF) "một góc là cây có gốc"). Same-term-different-sense attestations (generic
    UNDIRECTED rooted tree, recorded as variants, NOT as arborescence evidence): bib-nguyenhuudien-2019
    tr. 259 (PDF) and bib-nguyenducnghia-2006 tr. 211 (PDF). Vietnamese has no distinct attested term
    for the directed arborescence: the disambiguating candidates "cây có gốc có hướng" (0 hits) and "cây
    phân nhánh" (0 hits) returned no hits in any corpus source under normal or --loose search, so "cây
    có gốc" doubles for both senses. OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 were run
    with --loose: leanhvinh-2020 confirmed "cây có gốc" (with OCR variant "cây có góc" on tr. 50, 52 PDF);
    hoangchithanh-2007 returned no hits for any candidate. see_also: rooted-tree, directed-graph, tree,
    root-of-a-rooted-tree are cross-chapter forward references; arborescence/acyclic-graph are the same-chapter
    A neighbors.'
