  notation: ''
  rosen_ref: Rosen §3.3
  definition_vi: Độ phức tạp trường hợp trung bình của một thuật toán là số phép toán cơ bản trung bình
    mà thuật toán thực hiện trên các dữ liệu vào có kích thước $$n$$, lấy trung bình theo tất cả các dữ
    liệu vào có cùng kích thước đó. Đại lượng này thường được mô tả bằng ký hiệu tiệm cận $$O(f(n))$$
    và nói chung khó phân tích hơn so với trường hợp xấu nhất.
  example_vi: Với thuật toán tìm kiếm tuyến tính phần tử $$x$$ trong một dãy có $$n$$ phần tử, nếu giả
    thiết $$x$$ xuất hiện ở mỗi vị trí với xác suất như nhau thì số phép so sánh trung bình xấp xỉ $$\frac{n+1}{2}$$,
    nên độ phức tạp trường hợp trung bình là $$O(n)$$.
