  definition_vi: Một luật kết hợp là một kéo theo có dạng $$I \to J$$ liên hệ hai tập mục $$I$$ và $$J$$.
    Ở đây $$I$$ và $$J$$ là các tập con của một tập các mục cho trước, và luật biểu thị rằng các giao
    dịch chứa tập mục $$I$$ có xu hướng chứa cả tập mục $$J$$.
  example_vi: Trong phân tích giỏ hàng, nếu $$I = \{\text{bánh mì}, \text{bơ}\}$$ và $$J = \{\text{sữa}\}$$
    thì luật kết hợp $$I \to J$$ nói rằng các khách hàng mua cả bánh mì và bơ thường mua thêm sữa.
