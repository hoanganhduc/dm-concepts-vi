- id: acyclic-graph
  letter: A
  headword_en: Acyclic graph
  notation: ''
  rosen_ref: Rosen §10.4
  definition_vi: Trong một đồ thị vô hướng $$G$$, đồ thị phi chu trình là một đồ thị không chứa chu trình
    nào. Một đồ thị vô hướng liên thông và phi chu trình chính là một cây, còn một đồ thị vô hướng (không
    nhất thiết liên thông) phi chu trình là một rừng.
  example_vi: Mọi cây và mọi rừng đều là đồ thị phi chu trình. Đồ thị đầy đủ $$K_3$$ với các cạnh $$ab,
    bc, ca$$ không phải là đồ thị phi chu trình, vì dãy đỉnh $$a, b, c, a$$ tạo thành một chu trình.
