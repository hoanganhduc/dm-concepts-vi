- id: binary-tree
  letter: B
  headword_en: Binary tree
  notation: T
  rosen_ref: Rosen §11.1
  definition_vi: Cây nhị phân là một cây có gốc trong đó mỗi đỉnh có không quá hai con, và mỗi con được
    phân biệt là con trái hoặc con phải. Một cây nhị phân thường được ký hiệu là $$T$$.
  example_vi: Xét cây có gốc $$T$$ với gốc $$r$$, trong đó $$r$$ có con trái $$a$$ và con phải $$b$$,
    đỉnh $$a$$ có con trái $$c$$ và không có con phải, còn $$b$$ là lá. Vì mỗi đỉnh có không quá hai con
    và mỗi con được phân biệt là con trái hay con phải, $$T$$ là một cây nhị phân.
  vi_terms:
