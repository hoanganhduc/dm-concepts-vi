  status: panel-approved
  see_ref: ''
  notes: 'Rosen §9.6 concept: for a subset $$A$$ of a partially ordered set $$(X,\preceq)$$, an upper
    bound is an element $$x \in X$$ with $$a \preceq x$$ for every $$a \in A$$, and a lower bound is an
    element with $$x \preceq a$$ for every $$a \in A$$. The poset-specific definition is attested only
    in bib-ngodactan-2004 (2004) p.164, which defines "cận trên cho A trong X" (upper bound for A in X)
    and "cận dưới" in the same passage — exactly THIS concept (verified at p.164). The general head term
    for "bound" is "cận"; "cận trên" = upper bound, "cận dưới" = lower bound. The recommended "cận" row
    is now anchored to tr. 164, the poset upper/lower-bound definition page (snippet "được gọi là cận
    trên cho A trong X"), so the recommended-term citation matches the headword''s poset sense; the earlier
    tr. 22 generic-counting occurrence ("cận trên và cận") is retained as a recommended=false supporting
    row. The newest source bib-leanhvinh-2020 (2020) uses the variants "chặn" / "chặn trên" / "chặn dưới"
    for bounds on graph/numerical invariants (chromatic number, Ramsey number), not the poset order-bound,
    so those are recorded as attested variants of "bound" rather than the poset definition. No 2019-2020
    source gives the poset-specific definition; the recommended poset term "cận" (with "cận trên"/"cận
    dưới") is therefore attested in the 2004 source, the only poset-definition source. In nguyenducnghia-2006
    "cận trên"/"cận dưới" denote algorithmic branch-and-bound bounds, a related but distinct use; those
    pages are not the poset definition but confirm the same Vietnamese terms.'
- id: ball
  letter: B
  headword_en: Ball
  notation: 'B(x, r) = \{ y : d(x, y) \le r \}'
  rosen_ref: Rosen §9.1
  definition_vi: 'Cho một không gian mêtric với hàm khoảng cách $$d$$, một điểm tâm cố định $$x$$ và một
    bán kính $$r \geq 0$$. *Hình cầu* tâm $$x$$ bán kính $$r$$ là tập hợp tất cả các điểm $$y$$ có khoảng
    cách từ $$x$$ không vượt quá $$r$$, tức là $$d(x, y) \leq r$$; ký hiệu $$B(x, r) = \{ y : d(x, y)
    \leq r \}$$.'
  example_vi: 'Trên đường thẳng thực với khoảng cách $$d(x, y) = |x - y|$$, hình cầu tâm $$x = 0$$ bán
    kính $$r = 2$$ là tập $$B(0, 2) = \{ y : |y| \leq 2 \}$$, tức là đoạn $$[-2, 2]$$.'
