- id: binary-search-tree
  letter: B
  headword_en: Binary search tree
  notation: T
  rosen_ref: Rosen §11.2
  definition_vi: Một cây tìm kiếm nhị phân là một cây nhị phân trong đó mỗi đỉnh được gán một khóa sao
    cho khóa của mỗi đỉnh lớn hơn mọi khóa thuộc cây con bên trái của nó và nhỏ hơn mọi khóa thuộc cây
    con bên phải của nó (cây tìm kiếm nhị phân thường được ký hiệu $$T$$).
  example_vi: Với danh sách từ mathematics, physics, geography, zoology theo thứ tự từ điển, lấy mathematics
    làm khóa của gốc. Vì physics đứng sau mathematics nên physics là khóa của con bên phải gốc. Vì geography
    đứng trước mathematics nên geography là khóa của con bên trái gốc. Cuối cùng, zoology đứng sau cả
    mathematics lẫn physics nên là khóa của con bên phải của đỉnh có khóa physics.
  vi_terms:
