- id: bijection
  letter: B
  headword_en: Bijection
  notation: 'f : A \to B'
  rosen_ref: Rosen §2.3
  definition_vi: 'Song ánh là một ánh xạ $$f : A \to B$$ vừa đơn ánh vừa toàn ánh, nghĩa là mỗi phần tử
    của tập đích $$B$$ là ảnh của đúng một phần tử của tập nguồn $$A$$. Khi đó $$f$$ có ánh xạ ngược $$f^{-1}
    : B \to A$$.'
  example_vi: 'Ánh xạ $$f : \mathbb{Z} \to \mathbb{Z}$$ cho bởi $$f(x) = x + 1$$ là một song ánh, vì mỗi
    số nguyên $$y$$ là ảnh của đúng một số nguyên $$x = y - 1$$.'
