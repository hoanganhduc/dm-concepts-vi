- id: binary-relation
  letter: B
  headword_en: Binary relation
  notation: R \subseteq A \times B
  rosen_ref: Rosen §9.1
  definition_vi: Một *quan hệ hai ngôi* từ tập $$A$$ đến tập $$B$$ là một tập con của tích Descartes $$A
    \times B$$, tức là một tập hợp các cặp có thứ tự $$(a, b)$$ với $$a \in A$$ và $$b \in B$$; ký hiệu
    $$R \subseteq A \times B$$, và ta viết $$a \mathrel{R} b$$ khi $$(a, b) \in R$$. Khi $$A = B$$, ta
    nói $$R$$ là một quan hệ hai ngôi trên tập $$A$$.
  example_vi: Với $$A = \{1, 2\}$$ và $$B = \{x, y\}$$, ta có $$A \times B = \{(1, x), (1, y), (2, x),
    (2, y)\}$$, và $$R = \{(1, x), (2, y)\}$$ là một quan hệ hai ngôi từ $$A$$ đến $$B$$.
