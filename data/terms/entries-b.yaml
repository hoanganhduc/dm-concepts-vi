  notes: 'Phép thử Bernoulli là phép thử chỉ có hai kết cục, quy ước gọi là "thành công" và "thất bại".
    Đây là nền tảng của phân phối nhị thức: khi thực hiện $$n$$ phép thử Bernoulli độc lập với cùng xác
    suất thành công $$p$$, xác suất có đúng $$k$$ lần thành công là $$\binom{n}{k} p^{k} (1-p)^{n-k}$$.
    Thuật ngữ "phép thử Bernoulli" là cách dịch chuẩn; ngữ liệu hiện có không có dẫn chứng trực tiếp cho
    khái niệm này (các kết quả tìm thấy với "Bernoulli" trong ngữ liệu đều chỉ số Bernoulli, bất đẳng
    thức Bernoulli hoặc dòng họ Bernoulli, không phải phép thử Bernoulli).'
