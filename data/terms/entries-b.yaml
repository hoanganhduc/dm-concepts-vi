- id: base
  letter: B
  headword_en: Base
  notation: b
  rosen_ref: Rosen §4.2
  definition_vi: 'Cơ số $$b$$ (hay hệ cơ số $$b$$) là một số nguyên $$b \geq 2$$ được dùng làm nền tảng
    để biểu diễn các số nguyên: mọi số nguyên dương $$n$$ đều viết được duy nhất dưới dạng khai triển
    theo cơ số $$b$$, tức là $$n = a_k b^k + a_{k-1} b^{k-1} + \cdots + a_1 b + a_0$$, trong đó mỗi chữ
    số thỏa $$0 \leq a_i < b$$ và $$a_k \neq 0$$, ký hiệu là $$(a_k a_{k-1} \ldots a_1 a_0)_b$$.'
  example_vi: Với cơ số $$b = 8$$, khai triển của $$(12345)_{10}$$ là $$(30071)_8$$, vì $$12345 = 3 \cdot
    8^4 + 0 \cdot 8^3 + 0 \cdot 8^2 + 7 \cdot 8 + 1$$.
