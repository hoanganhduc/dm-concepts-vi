  notes: Thuật toán tìm kiếm nhị phân yêu cầu bảng kê đầu vào đã được sắp thứ tự; nó hiệu quả hơn tìm
    kiếm tuyến tính vì mỗi bước loại bỏ một nửa số phần tử, cho độ phức tạp $$O(\log_2 n)$$ phép so sánh
    trong trường hợp xấu nhất. Dẫn chứng tiếng Việt lấy từ bib-nguyenhuudien-2019, mục 5.2.3 đặt tên cho
    thuật toán; bản dịch Rosen tiếng Việt corroborate cùng thuật ngữ.
- id: bit-operation
  letter: B
  headword_en: Bit Operation
  notation: ''
  rosen_ref: Rosen §1.1
  definition_vi: 'Phép toán bit là một phép toán thực hiện trên một bit hoặc trên nhiều bit. Các phép
    toán bit trong máy tính tương ứng với các liên từ logic: thay các giá trị chân lý đúng và sai bằng
    các bit $$1$$ và $$0$$, ta nhận được các phép toán bit tương ứng với các toán tử $$\wedge$$, $$\vee$$
    và $$\oplus$$.'
  example_vi: 'Các phép toán bit OR, AND và XOR, ký hiệu lần lượt là $$\vee$$, $$\wedge$$ và $$\oplus$$,
    được định nghĩa trên từng cặp bit theo bảng giá trị của các liên từ logic tương ứng. Chẳng hạn, $$1
    \vee 0 = 1$$, $$1 \wedge 0 = 0$$ và $$1 \oplus 0 = 1$$. Các phép toán này được mở rộng cho các xâu
    bit cùng chiều dài bằng cách thực hiện trên từng vị trí: $$01101 \oplus 11001 = 10100$$.'
  vi_terms:
  - term: phép toán bit
    source_id: bib-nguyenhuudien-2019
    page: tr. 144 (PDF)
    recommended: true
    verified: true
    pdf_page: 144
    snippet: phức tạp tính toán của các thuật toán này thông qua số các phép toán bit thực sự được
  - term: phép toán bit
    source_id: bib-rosen-2003-vi
    page: tr. 14 (PDF)
    recommended: false
    verified: true
    pdf_page: 14
    snippet: Các phép toán bit trong máy tính tương ứng với các liên từ logic. Bằng
  see_also:
  - bit
  - xor-bit-operation
  - boolean-variable
  - logical-operators
  status: draft
  see_ref: ''
  notes: 'Phép toán bit là một phép toán tác động lên một hoặc nhiều bit. Mỗi giá trị chân lý (sai/đúng)
    ứng với một bit ($$0$$/$$1$$), nên mỗi liên từ logic cho một phép toán bit tương ứng: AND ($$\wedge$$),
    OR ($$\vee$$) và XOR ($$\oplus$$). Các phép toán bit được mở rộng cho xâu bit bằng cách áp dụng theo
    từng vị trí. Cần phân biệt "phép toán bit" (khái niệm chung) với "phép XOR theo bit" (xor-bit-operation,
    một phép toán bit cụ thể). Số phép toán bit cũng thường được dùng làm thước đo độ phức tạp của thuật
    toán.'
- id: bit-string
  letter: B
  headword_en: Bit String
  notation: b_1 b_2 \ldots b_n
  rosen_ref: Rosen §1.1
  definition_vi: Một xâu bit là một dãy các bit, tức là một dãy hữu hạn các chữ số $$0$$ và $$1$$. Số
    bit trong dãy được gọi là chiều dài (độ dài) của xâu bit.
  example_vi: Dãy $$101010011$$ là một xâu bit có chiều dài $$9$$. Các phép toán bit như OR, AND và XOR
    có thể được mở rộng cho hai xâu bit có cùng chiều dài bằng cách thực hiện phép toán trên từng cặp
    bit tương ứng.
