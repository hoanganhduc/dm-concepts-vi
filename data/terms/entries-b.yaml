    mọi lá nằm ở mức $$h$$ hoặc $$h - 1$$. Khái niệm này được dùng để cận chiều cao của cây $$m$$-phân
    theo số lá; một cây $$m$$-phân cân bằng có chiều cao nhỏ nhất có thể với số lá cho trước. Dẫn chứng
    tiếng Việt lấy từ bib-nguyenhoangthach-2020, định nghĩa cây $$m$$-phân cân bằng theo mức của các lá.'
