  status: panel-approved
  see_ref: ''
  notes: 'No corpus source attests any candidate name ("đại số Boole", "đại số Bool", "đại số Bun") for
    the Boolean algebra STRUCTURE $$(B, \vee, \wedge, \overline{\phantom{x}}, 0, 1)$$. Searches (normal
    + --loose, incl. OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007) returned zero hits for
    all three candidates. The recommended standard term "đại số Boole" is therefore kept verified=false
    with empty page, per the no-attestation rule, as the single row retained to keep vi_terms non-empty.


    Related-concept cross-references (NOT vi_terms of this headword; moved here per the concept-mismatch
    rule because they denote propositional logic / Boolean functions, not the Boolean-algebra structure):

    - "đại số logic" (bib-nguyenhuudien-2019 tr. 16 PDF, snippet "Điều này cho thấy rằng đại số logic
    là rõ ràng hoàn chỉnh ... Đại số logic còn đặc biệt quan trọng trong việc thiết kế mạch cho máy tính."):
    the algebra of propositional logic, the closest corpus rendering of the Boolean-algebra idea, but
    it names the propositional-logic system rather than the formal structure. Belongs with boolean-function
    / a propositional-logic entry.

    - "đại số lôgic" (bib-nguyenducnghia-2006 tr. 266 PDF, snippet "0,.1. Một hàm như thế được gọi là
    một hàm đại số lôgic."): older diacritic spelling, appearing only inside the compound "hàm đại số
    lôgic" (Boolean/logic-algebra function), i.e. the Boolean-function concept. An attested orthographic/related
    variant of the function term, not the structure.


    Other closest corpus evidence (all RELATED but distinct):

    - "hàm Boole" (bib-ngodactan-2004 tr. 118 PDF, snippet "gọi là hàm Boole n biến"): Boolean function
    — confirms "Boole" as the standard Vietnamese rendering of the proper name, but a distinct concept
    (see the boolean-function entry).

    - "tập hợp Boole B" (bib-nguyenhuudien-2019 tr. 46 PDF, snippet "Gọi Boole B là tập hợp gồm có hai
    giá trị : Sai (ký hiệu bởi 0), và Đúng (ký hiệu bởi 1)"): the underlying carrier set B = {0,1}, not
    the full structure.

    - Boolean-algebra laws (luật giao hoán, luật kết hợp, luật phân phối, luật De Morgan) appear in bib-nguyenhuudien-2019
    but applied to logical equivalence of propositions, never under the name "đại số Boole".


    Drafter note: recommended term "đại số Boole" is the established modern Vietnamese spelling (consistent
    with the attested "hàm Boole"); "đại số Bool" is an acceptable spelling variant; "đại số Bun"/"đại
    số logic" should be treated as nonstandard or related-concept renderings for this structure. The definition
    describes the structure as a set $$B$$ with two binary operations join $$\vee$$ and meet $$\wedge$$,
    a unary complement $$\overline{\phantom{x}}$$, and distinguished elements $$0$$ and $$1$$ satisfying
    the identity, complement, associative, commutative, and distributive laws.'
