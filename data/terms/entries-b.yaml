- id: boolean-product
  letter: B
  headword_en: Boolean Product
  notation: A \odot B
  rosen_ref: Rosen §2.6
  definition_vi: Tích Boole của hai ma trận không-một $$A = [a_{ij}]$$ cỡ $$m \times k$$ và $$B = [b_{ij}]$$
    cỡ $$k \times n$$, ký hiệu là $$A \odot B$$, là ma trận không-một $$C = [c_{ij}]$$ cỡ $$m \times n$$
    với phần tử $$c_{ij} = (a_{i1} \wedge b_{1j}) \vee (a_{i2} \wedge b_{2j}) \vee \cdots \vee (a_{ik}
    \wedge b_{kj})$$, trong đó $$\vee$$ là tổng Boole và $$\wedge$$ là tích Boole trên tập $$\{0, 1\}$$.
    Phép tính này tương tự nhân ma trận thông thường nhưng thay phép cộng bằng $$\vee$$ và phép nhân bằng
    $$\wedge$$.
  example_vi: Với $$A = \begin{bmatrix} 1 & 0 \\ 0 & 1 \\ 1 & 0 \end{bmatrix}$$ và $$B = \begin{bmatrix}
    1 & 1 & 0 \\ 0 & 1 & 1 \end{bmatrix}$$, tích Boole là $$A \odot B = \begin{bmatrix} 1 & 1 & 0 \\ 0
    & 1 & 1 \\ 1 & 1 & 0 \end{bmatrix}$$.
