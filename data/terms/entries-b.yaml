- id: block-cipher
  letter: B
  headword_en: Block Cipher
  notation: ''
  rosen_ref: Rosen §4.6
  definition_vi: Mật mã khối là một hệ mật mã mã hóa các khối ký tự có độ dài cố định. Thay vì mã hóa
    từng ký tự một, mỗi khối gồm một số ký tự được mã hóa cùng nhau thành một khối bản mã có độ dài tương
    ứng.
  example_vi: 'Mật mã chuyển vị theo khối là một ví dụ của mật mã khối: bản rõ được chia thành các khối
    có cùng độ dài cố định $$m$$, và trong mỗi khối các ký tự được hoán vị theo cùng một quy tắc, chẳng
    hạn theo một hoán vị $$\sigma$$ của các vị trí $$\{1, 2, \ldots, m\}$$.'
  vi_terms:
  - term: mật mã khối
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - private-key-cryptography
  - public-key-cryptography
  - block
  status: draft
  see_ref: ''
  notes: Còn gọi là mã khối. Mật mã khối mã hóa từng khối ký tự có độ dài cố định, đối lập với mật mã
    dòng (stream cipher) vốn mã hóa từng ký tự liên tiếp. Corpus và bản dịch Rosen (2003) có trình bày
    các hệ mật mã (mật mã Caesar, mật mã dịch, mật mã chuyển vị) nhưng không dùng thuật ngữ "mật mã khối"
    như một khái niệm riêng, nên không bổ sung được biến thể nào có dẫn chứng từ corpus; cụm "mật mã khối"
    là bản dịch chuẩn được khuyến nghị cho thuật ngữ này.
