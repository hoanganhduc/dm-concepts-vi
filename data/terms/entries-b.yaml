  status: panel-approved
  see_ref: ''
  notes: 'Concept: in a planar embedding, the boundary of a region (face) is the closed walk of edges
    and vertices bordering that region (Rosen §10.7). The boundary is a simple cycle only in the 2-connected
    case; in general a bridge or pendant edge bordering the face is traversed twice, so the boundary is
    a closed walk that may repeat an edge/vertex. The definition_vi was softened from the earlier "chu
    trình đóng" (cycle) to the closed-walk notion with the bridge caveat, consistent with the closed-walk
    forward reference in see_also; the K_4 example remains a valid cycle instance (a triangle is a closed
    walk) because K_4 is 2-connected.


    Recommended term: "biên của miền" (boundary of a region/face). It is attested for THIS concept in
    the newest available source bib-nguyenhoangthach-2020 (2020, p.79: "là biên của miền"), and the same
    phrase recurs in bib-nguyenhuudien-2019 (p.231: "Chu trình giới hạn miền là biên của miền") and bib-ngodactan-2004
    (p.208: "các cạnh ở trên biên của mỗi miền tạo thành một chu trình"). Vietnamese sources use both
    "miền" and "diện" for a face/region, so "biên của diện" (bib-nguyenhuudien-2019, p.232) is an equivalent
    variant.


    Bare "biên" / "cạnh biên" is used in the same sources to refer to the boundary edges of a face: bib-nguyenhoangthach-2020
    p.80 ("cạnh biên của một miền", "mỗi cạnh là biên của đúng hai miền"), bib-ngodactan-2004 p.214 ("mỗi
    cạnh là biên của đúng hai miền"), bib-hoangchithanh-2007 p.116 (OCR, "trên biên của một diện"). The
    hoangchithanh hit was confirmed under both normal and loose OCR search.


    Variant "đường biên": in this corpus the standalone "đường biên" / "đường biên giới" mostly denotes
    the shared national border in the four-color map-coloring application (bib-leanhvinh-2020 p.123 "có
    chung đường biên giới"; bib-nguyenhoangthach-2020 p.81-82 "có chung đường biên"). In bib-nguyenhuudien-2019
    p.235 "hai miền có chung nhau một đường biên" the term refers to the boundary SHARED BY TWO ADJACENT
    FACES/REGIONS (not the national border), i.e. the same face-boundary concept, so it is recorded as
    a verified variant; the vi_term notes field disambiguates this explicitly to prevent cross-linking
    to the four-color map-border application. Loose-mode OCR search of bib-leanhvinh-2020 found "biên"
    only in the "biên giới" (national-border) application sense or unrelated words ("biên soạn", "biến"
    = variable), so that 2020 source does not attest the pure graph face-boundary phrasing; the 2020 attestation
    for the recommended term therefore comes from bib-nguyenhoangthach-2020.


    Note on rendering: this is a planar-graph term; "miền" = region/face, "diện" is an older synonym for
    "miền" (face). The Vietnamese corpus consistently renders a face boundary as a "chu trình" (cycle),
    which is why the example uses a triangle; the more general notion of a closed walk is captured by
    the see_also forward reference closed-walk.'
- id: breadth-first-search
