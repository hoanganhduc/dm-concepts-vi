  see_ref: ''
  notes: 'Recommended term: "khối", the standard Vietnamese graph-theoretic name for a block. It is defined
    explicitly in bib-ngodactan-2004 (2004), tr. 267 (PDF): "Đồ thị con $$B$$ của một đồ thị $$G$$ được
    gọi là một khối của $$G$$ nếu hoặc..." and immediately characterized as "$$B$$ là cầu hoặc nó là đồ
    thị con 2-liên thông cực đại của $$G$$" (a bridge, or a MAXIMAL 2-connected subgraph), exactly matching
    Rosen''s definition. The maximality qualifier "cực đại" is therefore scoped to the 2-connected alternative,
    not globally over both clauses. The same source uses "khối đầu mút" (end block) at tr. 287 (PDF),
    confirming "khối" as the working term for this concept.


    No 2019-2020 corpus source attests "khối" in the graph-block sense: every 2019-2020 "khối" hit denotes
    a polyhedron ("khối đa diện", bib-leanhvinh-2020 tr. 119) or a set-partition block, not a graph block.
    The OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 were searched both normally and with
    --loose; their "khối" hits are either "khối đa diện" (polyhedron) or OCR noise for "khỏi"/"khởi",
    none denoting the graph block. The recommended term is therefore attested only in the 2004 source;
    verified=true is justified by the explicit ngodactan-2004 definition, and it is kept recommended as
    the established standard term despite lacking a newer attestation.


    Variant "đồ thị con 2-liên thông cực đại" (maximal 2-connected subgraph) is the descriptive phrasing
    used inside the same ngodactan-2004 definition. The exact normalized term returns 0 hits because the
    OCR reads "cực đặi" for "cực đại"; searching "đồ thị con 2-liên thông" (or the --loose form) confirms
    the single hit at tr. 267 (PDF) with snippet "B là cầu hoặc nó là đồ thị con 2-liên thông cực đặi
    của G". The recorded term is the spelling-corrected form of this OCR''d phrase; the snippet honestly
    preserves the artifact "cực đặi".


    Related-property cross-reference (NOT a vi_term of this headword): "song liên thông" (bib-nguyenhoangthach-2020,
    tr. 75, "Đồ thị $$G$$ gọi là song liên thông nếu nó không...") names the biconnected/2-connected PROPERTY
    of a whole graph, i.e. the connectivity a non-bridge block possesses, rather than the block subgraph
    itself. Per the concept-mismatch rule it is recorded here in notes only and removed from vi_terms.


    Candidate terms "thành phần song liên thông", "thành phần 2-liên thông", and "khối của đồ thị" returned
    0 hits in all sources (normal and --loose) and are not recorded.


    Definition wording: opens with the term, states the maximal-connected-no-cut-vertex form first, then
    gives the bridge-or-maximal-2-connected characterization from ngodactan-2004, matching Rosen §10.4.
    Example is self-contained: it uses only cut vertex, bridge, and 2-connectivity already named in the
    definition, with no derived quantity introduced, and now states the vertex-set extension $$G'' = G
    + uw$$ explicitly.'
- id: boolean-algebra
  letter: B
  headword_en: Boolean algebra
  notation: (B, \vee, \wedge, \overline{\phantom{x}}, 0, 1)
  rosen_ref: Rosen §12.1
  definition_vi: Một *đại số Boole* là một cấu trúc đại số gồm một tập hợp $$B$$ cùng với hai phép toán
    hai ngôi là phép tuyển $$\vee$$ và phép hội $$\wedge$$, một phép toán một ngôi lấy phần bù $$\overline{\phantom{x}}$$,
    và hai phần tử phân biệt $$0$$ và $$1$$, ký hiệu là $$(B, \vee, \wedge, \overline{\phantom{x}}, 0,
    1)$$. Các phép toán này thỏa mãn các luật đồng nhất, luật phần bù, luật kết hợp, luật giao hoán và
    luật phân phối.
  example_vi: Tập hợp $$B = \{0, 1\}$$ với phép tuyển $$\vee$$, phép hội $$\wedge$$, phép lấy phần bù
    $$\overline{\phantom{x}}$$ xác định bởi $$\overline{0} = 1$$ và $$\overline{1} = 0$$, cùng hai phần
    tử $$0$$ và $$1$$, tạo thành một đại số Boole.
