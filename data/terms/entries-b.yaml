- id: balanced-tree
  letter: B
  headword_en: Balanced Tree
  notation: ''
  rosen_ref: Rosen §11.1
  definition_vi: Một cây có chiều cao $$h$$ được gọi là cân bằng nếu mọi lá của nó đều nằm ở mức $$h$$
    hoặc mức $$h - 1$$, trong đó $$h$$ là chiều cao của cây.
  example_vi: Một cây nhị phân đầy đủ với mọi lá nằm ở mức $$h$$ là cân bằng; nếu một số lá nằm ở mức
    $$h$$ và các lá còn lại nằm ở mức $$h - 1$$ thì cây vẫn cân bằng, nhưng nếu có một lá nằm ở mức $$h
    - 2$$ thì cây không cân bằng.
