    một đỉnh gốc $$r$$, thăm tất cả các đỉnh ở khoảng cách $$1$$ tới $$r$$, rồi đến tất cả các đỉnh ở
    khoảng cách $$2$$, và cứ tiếp tục theo từng mức. Phép duyệt dùng một hàng đợi để lưu các đỉnh chờ
