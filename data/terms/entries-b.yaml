- id: binomial-theorem
  letter: B
  headword_en: Binomial theorem
  notation: (x+y)^n = \sum_{k=0}^{n} \binom{n}{k} x^{n-k} y^{k}
  rosen_ref: Rosen §6.4
  definition_vi: Định lý nhị thức là đẳng thức khai triển lũy thừa của một tổng thành tổng các đơn thức,
    phát biểu rằng với mọi số nguyên không âm $$n$$, ta có $$\displaystyle (x+y)^n = \sum_{k=0}^{n} \binom{n}{k}
    x^{n-k} y^{k}$$, trong đó $$\binom{n}{k}$$ là hệ số nhị thức. Các số $$\binom{n}{k}$$ với $$0 \leq
    k \leq n$$ được gọi là các hệ số trong khai triển.
  example_vi: Với $$n = 3$$, định lý nhị thức cho $$(x+y)^3 = \binom{3}{0} x^3 + \binom{3}{1} x^2 y +
    \binom{3}{2} x y^2 + \binom{3}{3} y^3 = x^3 + 3x^2 y + 3x y^2 + y^3$$.
