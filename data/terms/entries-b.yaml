  headword_en: Binary
  notation: (a_{k-1}\dots a_1 a_0)_2
  rosen_ref: Rosen §4.2
  definition_vi: Hệ nhị phân (hệ cơ số $$2$$) là hệ đếm dùng cơ số $$b = 2$$ với hai chữ số $$0$$ và $$1$$.
    Mỗi số nguyên không âm $$n$$ có duy nhất một khai triển nhị phân $$n = a_{k-1} 2^{k-1} + \dots + a_1
    2^1 + a_0 2^0$$, trong đó mỗi chữ số $$a_i \in \{0, 1\}$$, ký hiệu $$(a_{k-1} \dots a_1 a_0)_2$$.
  example_vi: Số $$19$$ có khai triển nhị phân là $$(10011)_2$$, vì $$19 = 1 \cdot 2^4 + 0 \cdot 2^3 +
    0 \cdot 2^2 + 1 \cdot 2^1 + 1 \cdot 2^0$$.
