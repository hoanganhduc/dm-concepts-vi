    bit" được dùng trong Rosen (bản dịch) và Nguyễn Hữu Điển (2019); một số tài liệu dùng "chuỗi bit"
    hoặc "xâu nhị phân".
- id: bit
  letter: B
  headword_en: Bit
  notation: ''
  rosen_ref: Rosen §1.1
  definition_vi: Một bit là một chữ số nhị phân, nghĩa là nó có giá trị $$0$$ hoặc $$1$$. Bit được dùng
    để biểu diễn thông tin trong máy tính; chẳng hạn, có thể dùng bit $$1$$ để biểu diễn giá trị chân
    lý đúng và bit $$0$$ để biểu diễn giá trị chân lý sai.
  example_vi: 'Một biến Boole nhận một trong hai giá trị đúng hoặc sai, nên có thể được biểu diễn bằng
    một bit: dùng $$1$$ cho đúng và $$0$$ cho sai. Một dãy gồm $$n$$ bit, gọi là một xâu bit có chiều
    dài $$n$$, có thể biểu diễn một tập con của một tập gồm $$n$$ phần tử, trong đó bit thứ $$i$$ bằng
    $$1$$ khi và chỉ khi phần tử thứ $$i$$ thuộc tập con đó.'
  vi_terms:
  - term: bit
    source_id: bib-rosen-2003-vi
    page: tr. 14 (PDF)
    recommended: true
    verified: true
    pdf_page: 14
    snippet: Các máy tính dùng các bit để biểu diễn thông tin. Một bit có hai giá
  - term: bit
    source_id: bib-nguyenhuudien-2019
    page: tr. 76 (PDF)
    recommended: false
    verified: true
    pdf_page: 76
    snippet: A trên máy tính bằng một xâu bit có chiều dài n, trong đó bit thứ i là 1 nếu ai ∈ A, còn
      bit
  see_also:
  - boolean-variable
  - binary-representation
  - binary
  - xor-bit-operation
  status: draft
  see_ref: ''
  notes: Thuật ngữ "bit" do nhà thống kê John Tukey đề xuất năm 1946, là dạng rút gọn của "binary digit"
    (chữ số nhị phân). Trong tiếng Việt thuật ngữ này thường được giữ nguyên dạng "bit". Một bit chỉ nhận
    một trong hai giá trị $$0$$ và $$1$$, nên nó tương ứng tự nhiên với một giá trị chân lý (sai/đúng)
    hay một biến Boole. Cần phân biệt bit (một chữ số nhị phân riêng lẻ) với xâu bit (một dãy gồm nhiều
    bit) và với biểu diễn nhị phân của một số (binary representation).
