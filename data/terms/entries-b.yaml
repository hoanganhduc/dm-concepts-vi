  notation: p \leftrightarrow q
  rosen_ref: Rosen §1.1
  definition_vi: Phép tương đương (phép kéo theo hai chiều) của hai mệnh đề $$p$$ và $$q$$, ký hiệu $$p
    \leftrightarrow q$$, là mệnh đề nhận giá trị đúng khi $$p$$ và $$q$$ có cùng giá trị chân lý, và nhận
    giá trị sai trong các trường hợp còn lại. Mệnh đề $$p \leftrightarrow q$$ được đọc là "$$p$$ nếu và
    chỉ nếu $$q$$".
