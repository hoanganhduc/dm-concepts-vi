- id: block
  letter: B
  headword_en: Block
  notation: B
  rosen_ref: Rosen §10.4
  definition_vi: Một *khối* của đồ thị $$G$$ là một đồ thị con liên thông cực đại của $$G$$ không chứa
    đỉnh cắt; nói cách khác, đó là một đồ thị con $$B$$ sao cho $$B$$ hoặc là một cầu (một cạnh đơn),
    hoặc là một đồ thị con $$2$$-liên thông cực đại của $$G$$.
  example_vi: Trong đồ thị $$G$$ gồm hai tam giác $$C_3$$ chung đúng một đỉnh $$v$$, đỉnh $$v$$ là đỉnh
    cắt và mỗi tam giác là một khối ($$2$$-liên thông) của $$G$$. Nếu lập đồ thị mới $$G' = G + uw$$ với
    $$u \in V(G)$$, $$w \notin V(G)$$ và $$V(G') = V(G) \cup \{w\}$$ thì cạnh $$uw$$ là một cầu và bản
    thân nó tạo thành một khối của $$G'$$.
