- id: boolean-expression
  letter: B
  headword_en: Boolean Expression
  notation: ''
  rosen_ref: Rosen §12.1
  definition_vi: 'Biểu thức Boole theo các biến $$x_1, x_2, \ldots, x_n$$ được định nghĩa đệ quy như sau:
    $$0$$, $$1$$, $$x_1$$, $$x_2$$, $$\ldots$$, $$x_n$$ là các biểu thức Boole; và nếu $$E_1$$ và $$E_2$$
    là các biểu thức Boole thì $$\overline{E_1}$$, $$(E_1 E_2)$$ và $$(E_1 + E_2)$$ cũng là các biểu thức
    Boole. Mỗi biểu thức Boole theo $$n$$ biến biểu diễn một hàm Boole $$F : B^n \to B$$, trong đó $$B
    = \{0, 1\}$$.'
  example_vi: Biểu thức $$x_1 \overline{x_2} + x_3$$ là một biểu thức Boole theo ba biến $$x_1$$, $$x_2$$,
    $$x_3$$; nó biểu diễn hàm Boole nhận giá trị $$1$$ khi $$x_1 = 1$$ và $$x_2 = 0$$, hoặc khi $$x_3
    = 1$$.
