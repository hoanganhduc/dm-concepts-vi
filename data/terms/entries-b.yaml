- id: binomial-coefficient
  letter: B
  headword_en: Binomial coefficient
  notation: \binom{n}{k}
  rosen_ref: Rosen §6.3
  definition_vi: Hệ số nhị thức, ký hiệu $$\binom{n}{k}$$, là số tập con gồm $$k$$ phần tử của một tập
    hợp gồm $$n$$ phần tử, với $$n$$ và $$k$$ là các số nguyên thỏa $$0 \leq k \leq n$$. Giá trị này được
    tính bởi công thức $$\displaystyle \binom{n}{k} = \frac{n!}{k!\,(n-k)!}$$.
  example_vi: Với $$n = 4$$ và $$k = 2$$, ta có $$\displaystyle \binom{4}{2} = \frac{4!}{2!\,2!} = 6$$,
    ứng với $$6$$ tập con gồm $$2$$ phần tử của tập $$\{1,2,3,4\}$$.
