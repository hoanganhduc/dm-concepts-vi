  notation: a \equiv b \pmod m
  rosen_ref: Rosen §3.4
  definition_vi: Cho $$m$$ là một số nguyên dương. Hai số nguyên $$a$$ và $$b$$ được gọi là đồng dư theo
    modulo $$m$$, ký hiệu $$a \equiv b \pmod m$$, nếu $$m$$ chia hết hiệu $$a - b$$. Khi đó $$a$$ và $$b$$
    có cùng số dư khi chia cho $$m$$.
