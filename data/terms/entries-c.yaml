- id: contingency
  letter: C
  headword_en: Contingency
  notation: ''
  rosen_ref: Rosen §1.2
  definition_vi: Tiếp liên là một mệnh đề phức hợp không phải là hằng đúng cũng không phải là mâu thuẫn,
    tức là giá trị chân lý của nó phụ thuộc vào giá trị chân lý của các biến mệnh đề thành phần. Nói cách
    khác, một mệnh đề $$P$$ là tiếp liên nếu bảng chân trị của nó chứa ít nhất một dòng nhận giá trị đúng
    và ít nhất một dòng nhận giá trị sai.
  example_vi: Mệnh đề $$p \vee q$$ là một tiếp liên, vì nó nhận giá trị đúng khi $$p$$ đúng và nhận giá
    trị sai khi cả $$p$$ và $$q$$ đều sai.
