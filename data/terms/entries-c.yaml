  notation: ''
  rosen_ref: Rosen §1.2
  definition_vi: Mâu thuẫn là một mệnh đề phức hợp luôn nhận giá trị sai với mọi cách gán giá trị chân
    lý cho các biến mệnh đề thành phần. Một ví dụ điển hình là mệnh đề $$p \wedge \neg p$$, vốn luôn sai
    vì $$p$$ và $$\neg p$$ không thể cùng đúng.
  example_vi: Mệnh đề $$p \wedge \neg p$$ là một mâu thuẫn, vì với $$p$$ đúng thì $$\neg p$$ sai và với
    $$p$$ sai thì $$\neg p$$ đúng, nên tích hội của chúng luôn sai. Đối lập với mâu thuẫn là mệnh đề hằng
    đúng, chẳng hạn $$p \vee \neg p$$.
