    là $$b^{n-1} \equiv 1 \pmod{n}$$ với mọi cơ sở như vậy, dù $$n$$ không phải số nguyên tố. Do đó số
    Carmichael vượt qua được phép kiểm tra Fermat theo mọi cơ sở nguyên tố cùng nhau với nó. Ba số Carmichael
    nhỏ nhất là $$561$$, $$1105$$ và $$1729$$. Thuật ngữ "số Carmichael" được dùng trong bản dịch tiếng
    Việt của Rosen (bib-rosen-2003-vi, tr. 206).
- id: carry
  letter: C
  headword_en: carry
  notation: c_j
  rosen_ref: Rosen §4.2
  ref_bib: ''
  definition_vi: Số nhớ là bit phụ, ký hiệu $$c_j$$, sinh ra khi cộng hai số nguyên trong khai triển nhị
    phân và được chuyển sang vị trí kế tiếp bên trái. Khi cộng cặp bit thứ $$j$$ là $$a_j$$ và $$b_j$$
    cùng với số nhớ trước đó $$c_{j-1}$$, tổng $$a_j + b_j + c_{j-1}$$ cho bit tổng $$s_j$$ và số nhớ
    mới $$c_j$$ thỏa $$a_j + b_j + c_{j-1} = 2 c_j + s_j$$, trong đó $$c_j \in \{0, 1\}$$.
  example_vi: Khi cộng $$a = (1 1)_2$$ và $$b = (0 1)_2$$, ở vị trí phải nhất ta có $$1 + 1 = (1 0)_2$$,
    nên bit tổng là $$0$$ và số nhớ là $$c_0 = 1$$. Cộng tiếp $$1 + 0 + 1 = (1 0)_2$$, cho bit tổng $$0$$
    và số nhớ $$c_1 = 1$$, dẫn đến $$a + b = (1 0 0)_2$$.
