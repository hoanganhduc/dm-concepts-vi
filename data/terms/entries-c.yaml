  definition_vi: Một tổ hợp chập $$r$$ của một tập hợp là một cách chọn không có thứ tự $$r$$ phần tử
    của tập hợp đó. Số tổ hợp chập $$r$$ của một tập hợp gồm $$n$$ phần tử, ký hiệu $$\binom{n}{r}$$,
    bằng $$\binom{n}{r} = \dfrac{n!}{r!\,(n-r)!}$$.
  example_vi: Số tổ hợp chập $$2$$ của tập hợp $$\{a, b, c, d\}$$ là $$\binom{4}{2} = 6$$, ứng với các
