- id: combinatorial-circuit
  letter: C
  headword_en: Combinatorial Circuit
  notation: ''
  rosen_ref: Rosen §10.3
  definition_vi: Mạch tổ hợp là một mạch logic được tạo thành từ các cổng logic (cổng $$\mathrm{AND}$$,
    cổng $$\mathrm{OR}$$ và cổng $$\mathrm{NOT}$$), trong đó các giá trị đầu ra chỉ phụ thuộc vào các
    giá trị đầu vào hiện tại mà không phụ thuộc vào trạng thái trước đó. Mỗi mạch tổ hợp tính một hàm
    Boolean, tức là một ánh xạ từ $$\{0,1\}^n$$ vào $$\{0,1\}$$.
  example_vi: Mạch tổ hợp với hai đầu vào $$x$$, $$y$$ gồm một cổng $$\mathrm{AND}$$ nhận $$x$$ và $$y$$
    rồi đưa qua một cổng $$\mathrm{NOT}$$ sẽ tính hàm Boolean $$\overline{x \cdot y}$$.
