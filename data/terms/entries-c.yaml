- id: complete-bipartite-graph
  letter: C
  headword_en: Complete bipartite graph
  notation: K_{m,n}
  rosen_ref: Rosen §10.2
  definition_vi: Đồ thị hai phía đầy đủ, ký hiệu $$K_{m,n}$$, là đồ thị đơn có tập đỉnh được phân hoạch
    thành hai tập rời nhau có kích thước $$m$$ và $$n$$, trong đó mỗi đỉnh thuộc tập này được nối với
    mọi đỉnh thuộc tập kia bằng đúng một cạnh và không có cạnh nào nối hai đỉnh trong cùng một tập.
  example_vi: Đồ thị $$K_{2,3}$$ có một tập gồm $$2$$ đỉnh và một tập gồm $$3$$ đỉnh, với tổng cộng $$6$$
    cạnh nối mỗi đỉnh của tập thứ nhất tới mỗi đỉnh của tập thứ hai.
