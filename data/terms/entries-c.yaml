  definition_vi: Một \emph{phép làm thô} (hay \emph{phân hoạch thô hơn}) của một phân hoạch $$P$$ trên
    tập $$S$$ là một phân hoạch $$Q$$ của $$S$$ sao cho mỗi khối của $$Q$$ là hợp của một số khối của
    $$P$$. Nói cách khác, $$Q$$ thu được bằng cách gộp một số khối của $$P$$ lại với nhau; khi đó $$P$$
    được gọi là \emph{mịn hơn} $$Q$$.
