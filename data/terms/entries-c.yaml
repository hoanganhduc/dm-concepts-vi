- id: conjunction
  letter: C
  headword_en: Conjunction
  notation: p \wedge q
  rosen_ref: Rosen §1.1
  definition_vi: Hội của hai mệnh đề $$p$$ và $$q$$, ký hiệu $$p \wedge q$$, là mệnh đề "$$p$$ và $$q$$".
    Mệnh đề $$p \wedge q$$ nhận giá trị đúng khi và chỉ khi cả $$p$$ lẫn $$q$$ đều đúng, và nhận giá trị
    sai trong các trường hợp còn lại.
  example_vi: Cho $$p$$ là mệnh đề "Hôm nay là thứ sáu" và $$q$$ là mệnh đề "Hôm nay trời mưa". Khi đó
    hội $$p \wedge q$$ là mệnh đề "Hôm nay là thứ sáu và hôm nay trời mưa", mệnh đề này chỉ đúng vào những
    ngày thứ sáu có mưa.
