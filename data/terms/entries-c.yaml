  status: panel-approved
  see_ref: ''
  notes: 'Rosen §10.2 defines C_n as the graph on n vertices with n cyclic edges (n >= 3). ''đồ thị vòng''
    is the exact match: bib-nguyenducnghia-2006 (pdf_page 159) gives the verbatim Rosen-style definition,
    and bib-nguyenhuudien-2019 (pdf_page 159) confirms ''...được gọi là đồ thị vòng, ký hiệu là C_n. Như
    vậy, mỗi đỉnh của C_n có bậc là 2.'' The candidate ''chu trình'' denotes a cycle as a closed walk
    (not the graph C_n); ''chu trình đơn'' denotes a simple cycle/closed walk; ''vòng'' appears only as
    ''vòng tròn''/''vòng hạt''. All three were unverifiable for this concept (empty page) and dropped;
    the recommended term for the graph C_n is ''đồ thị vòng''.'
