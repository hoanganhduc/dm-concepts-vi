  definition_vi: Giả thuyết continuum là phát biểu khẳng định rằng không có tập hợp nào có lực lượng nằm
    thực sự giữa lực lượng của tập các số nguyên và lực lượng của tập các số thực.
  example_vi: Tập các số nguyên $$\mathbb{Z}$$ có lực lượng $$\aleph_0$$ và tập các số thực $$\mathbb{R}$$
    có lực lượng $$2^{\aleph_0}$$; giả thuyết continuum khẳng định không tồn tại tập hợp $$S$$ với $$\aleph_0
    < |S| < 2^{\aleph_0}$$, tức là $$2^{\aleph_0} = \aleph_1$$.
