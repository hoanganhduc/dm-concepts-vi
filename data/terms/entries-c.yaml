    $$\aleph_0$$ của tập số nguyên và lực lượng $$2^{\aleph_0}$$ của tập số thực, tức là $$2^{\aleph_0}
    = \aleph_1$$. Đây là một trong các bài toán nổi tiếng của Hilbert; Gödel và Cohen đã chứng minh giả
    thuyết này độc lập với hệ tiên đề ZFC, nghĩa là không thể chứng minh cũng không thể bác bỏ trong ZFC.
