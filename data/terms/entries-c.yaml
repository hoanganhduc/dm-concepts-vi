    source_id: bib-rosen-2003-vi
    page: tr. 494 (PDF, bản dịch Rosen)
    recommended: false
    verified: true
    pdf_page: 494
    snippet: nhau. Ví dụ, dùng đồ thị để xác định xem có thực hiện một mạch điện
  see_also:
  - cycle
  - closed-walk
  - walk
  - trail
  - euler-circuit
  status: panel-approved
  notes: 'Rosen''s ''circuit'' is a closed walk of length at least one with no repeated edge (vertices
    may repeat). In a simple undirected graph an edge has no orientation, so a circuit/no-repeated-edge
    example must reuse no undirected edge. Source terminology splits two ways. In Ngo Dac Tan (2004) the
    single-word match for Rosen''s circuit is ''mạch'': ''Một hành trình khép kín được gọi là mạch nếu
    mọi cạnh của nó đều khác nhau'' (pdf_page 195); in that same source ''chu trình'' is reserved for
    a CYCLE (length >= 3, distinct vertices), so the bare ''chu trình'' does NOT denote this concept there.
    In Nguyen Duc Nghia & Nguyen To Thanh (2006) and Nguyen Huu Dien (2019), ''chu trình'' denotes a general
    closed walk and the circuit concept is named ''chu trình đơn''. ''chu trình đơn'' is the most widely
    used cross-corpus term and is recommended; ''mạch'' is the precise single-word match in the strongest
    graph-theory source and is surfaced in the definition. The bare ''chu trình'' and ''chu tuyến'' candidates
    were unverifiable (page empty) and dropped.'
