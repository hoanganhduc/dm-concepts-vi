- id: countable-set
  letter: C
  headword_en: Countable set
  notation: ''
  rosen_ref: Rosen §2.5
  definition_vi: Một tập hợp được gọi là tập đếm được nếu nó hữu hạn hoặc có cùng lực lượng với tập các
    số nguyên dương. Khi một tập vô hạn là đếm được, ta nói nó vô hạn đếm được và lực lượng của nó được
    ký hiệu là $$\aleph_0$$ (đọc là "aleph không").
  example_vi: Tập các số nguyên dương lẻ là tập đếm được, vì hàm $$f(n) = 2n - 1$$ là một song ánh từ
    tập các số nguyên dương lên tập đó.
  vi_terms:
  - term: tập đếm được
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: null
    snippet: ''
  see_also:
  - countably-infinite-set
  - cardinality
  - uncountable-set
  status: panel-approved
  notes: UNVERIFIED RECOMMENDED TERM (standard-usage basis). No candidate term ('tập đếm được', 'tập khả
    đếm', 'tập hợp đếm được') was found in the three text-layer sources, including under diacritics-insensitive
    (--loose) search (0 hits each, re-verified). 'tập đếm được' is standard Vietnamese terminology and
    is recommended on that basis, but it is the only chapter-C recommended term with verified=false; this
    status is surfaced here per the citation-hygiene convention. The related form 'vô hạn đếm được' (countably
    infinite) is attested once at bib-ngodactan-2004 pdf_page 321 ('các tập con vô hạn đếm được của tập
    M'), but it denotes the countably-infinite sub-notion rather than a standalone countable set, so it
    is NOT recorded as a verified hit for this headword. The two non-recommended unverifiable candidates
    were dropped; 'tập đếm được' is retained to keep the required vi_terms field non-empty and preserve
    the single-recommendation invariant.
