    các đỉnh của $$G$$ sao cho không có hai đỉnh kề nhau nào được tô cùng một màu.
  example_vi: Sắc số của đồ thị đầy đủ $$K_n$$ là $$\chi(K_n) = n$$, và sắc số của một đồ thị hai phía
    có ít nhất một cạnh là $$2$$.
