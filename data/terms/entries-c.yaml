- id: cycle
  letter: C
  headword_en: Cycle
  notation: C_n
  rosen_ref: Rosen §10.2
  definition_vi: Đồ thị vòng, ký hiệu là $$C_n$$ với $$n \geq 3$$, là đồ thị gồm $$n$$ đỉnh $$v_1, v_2,
    \ldots, v_n$$ và các cạnh $$\{v_1,v_2\}, \{v_2,v_3\}, \ldots, \{v_{n-1},v_n\}, \{v_n,v_1\}$$. Như
    vậy, mỗi đỉnh của $$C_n$$ có bậc là $$2$$.
