  status: panel-approved
  notes: 'In Ngo Dac Tan (2004) the loanword ''clique'' is used directly: ''số clique của nó cl(H) = 3
    (tức là không có đồ thị con K4)''. This verified hit attests the clique NUMBER cl(H) usage (tying
    ''clique'' to a complete subgraph) rather than a standalone definitional sentence, so the recommendation
    of the loanword ''clique'' rests on usage-grounding. The example was tightened to reference only the
    defined concept (a clique as a vertex set); the earlier clause ''số clique của K_n bằng n'' was removed
    because it referenced the clique number, an invariant not introduced in the definition. The descriptive
    forms ''đồ thị con đầy đủ'' and ''tập đỉnh đầy đủ'' are standard renderings but were not found in
    the three text sources (0 hits, strict and loose) and were dropped as unverifiable.'
