- id: consistent-compound-propositions
  letter: C
  headword_en: consistent compound propositions
  notation: ''
  rosen_ref: Rosen §1.1
  ref_bib: ''
  definition_vi: Một tập các mệnh đề phức hợp được gọi là nhất quán nếu tồn tại một phép gán các giá trị
    chân lý cho các biến mệnh đề làm cho tất cả các mệnh đề trong tập đó cùng nhận giá trị đúng.
  example_vi: 'Hai mệnh đề $$p \rightarrow q$$ và $$p \wedge \neg q$$ là không nhất quán, vì không có
    phép gán giá trị chân lý nào làm cho cả hai cùng đúng: nếu $$p \wedge \neg q$$ đúng thì $$p$$ đúng
    và $$q$$ sai, khi đó $$p \rightarrow q$$ sai. Ngược lại, hai mệnh đề $$p \vee q$$ và $$p \rightarrow
    q$$ là nhất quán, vì phép gán $$p$$ đúng và $$q$$ đúng làm cho cả hai cùng đúng.'
