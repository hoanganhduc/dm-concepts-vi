- id: codomain
  letter: C
  headword_en: codomain
  notation: 'f : A \to B'
  rosen_ref: Rosen §2.3
  ref_bib: ''
  definition_vi: 'Miền giá trị (tập đích) của một hàm $$f : A \to B$$ là tập hợp $$B$$ chứa mọi giá trị
    có thể có của hàm, ký hiệu là $$B$$. Với mỗi $$a \in A$$, ảnh $$f(a)$$ là một phần tử của $$B$$, nhưng
    không nhất thiết mọi phần tử của $$B$$ đều là ảnh của một phần tử nào đó thuộc miền xác định $$A$$.'
  example_vi: 'Xét hàm $$f : \mathbb{Z} \to \mathbb{Z}$$ cho bởi $$f(x) = x^2$$. Khi đó miền xác định
    và miền giá trị (tập đích) đều là $$\mathbb{Z}$$, mặc dù ảnh của $$f$$ chỉ gồm các số chính phương,
    là tập con thực sự của tập đích $$\mathbb{Z}$$.'
