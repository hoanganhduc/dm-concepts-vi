- id: carmichael-number
  letter: C
  headword_en: Carmichael number
  notation: ''
  rosen_ref: Rosen §3.5
  ref_bib: ''
  definition_vi: Số Carmichael là một hợp số $$n$$ sao cho $$n$$ là số giả nguyên tố theo mọi cơ sở nguyên
    tố cùng nhau với $$n$$.
  example_vi: 'Số $$561 = 3 \cdot 11 \cdot 17$$ là số Carmichael nhỏ nhất: nó là hợp số, nhưng với mọi
    số nguyên $$b$$ thỏa mãn $$\gcd(b, 561) = 1$$ ta đều có $$b^{560} \equiv 1 \pmod{561}$$, nên $$561$$
    là số giả nguyên tố theo mọi cơ sở như vậy.'
