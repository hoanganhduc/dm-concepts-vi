    viết xác suất của giao nhiều biến cố thành tích các xác suất có điều kiện liên tiếp: $$\displaystyle
    P(A_1\cap\cdots\cap A_n)=\prod_{i=1}^{n}P\!\left(A_i\mid A_1\cap\cdots\cap A_{i-1}\right),$$ với quy
