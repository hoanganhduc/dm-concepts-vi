- id: connectivity
  letter: C
  headword_en: Connectivity
  notation: \kappa(G)
  rosen_ref: Rosen §10.4
  definition_vi: Độ liên thông đỉnh của một đồ thị $$G$$, ký hiệu $$\kappa(G)$$, là số đỉnh nhỏ nhất cần
    loại bỏ để $$G$$ trở thành đồ thị không liên thông hoặc chỉ còn một đỉnh. Khái niệm tương ứng theo
    cạnh là độ liên thông cạnh $$\lambda(G)$$.
  example_vi: Với đồ thị đầy đủ $$K_n$$ ta có $$\kappa(K_n) = n - 1$$.
  vi_terms:
  - term: độ liên thông đỉnh
    source_id: bib-nguyenhoangthach-2020
    page: tr. 75 (PDF)
    recommended: true
    verified: true
    pdf_page: 75
    snippet: 'cắt đỉnh bé nhất được gọi là độ liên thông đỉnh của G, ký hiệu là κ(G): κ(G) = min{|W| :
      W lát cắt đỉnh của G}.'
  - term: số liên thông đỉnh
    source_id: bib-leanhvinh-2020
    page: tr. 225 (PDF)
    recommended: false
    verified: true
    pdf_page: 225
    snippet: Số liên thông đỉnh của G, kí hiệu bởi κ(G), là số nhỏ nhất các đỉnh [whose removal disconnects
      G — vertex-connectivity invariant; OCR-rendered].
  - term: độ liên thông
    source_id: bib-ngodactan-2004
    page: tr. 266 (PDF)
    recommended: false
    verified: true
    pdf_page: 266
    snippet: gọi là độ liên thông của G và được ký hiệu là k (G).
  - term: liên thông đỉnh
    source_id: bib-ngodactan-2004
    page: tr. 265 (PDF)
    recommended: false
    verified: true
    pdf_page: 265
    snippet: Đồ thị G = (V, E) được gọi là k-liên thông đỉnh hay gọi tắt là k-liên... [attests the k-vertex-connected
      property, not the κ(G) invariant]
  see_also:
  - cut-vertex
  - edge-connectivity
  status: panel-approved
  notes: Ngo Dac Tan (2004) defines độ liên thông of G with notation k(G) = κ(G) (pdf_page 266), characterized
    via the minimum number of vertices whose removal disconnects G (số nhỏ nhất các đỉnh tách được, pdf_page
    268) — matching Rosen's vertex-connectivity. The definition now leads with the recommended-term form
    and names the edge-connectivity counterpart độ liên thông cạnh λ(G) (pdf_page 266) to justify the
    see_also link. The deferred variant 'liên thông đỉnh' attests the parameterized k-vertex-connected
    property ('k-liên thông đỉnh', pdf_page 265) rather than the invariant κ(G) itself; this is annotated
    in its snippet. 'số liên thông' was unverifiable (0 hits, re-verified) and dropped. The value κ(K_n)
    = n-1 is a standard fact, not a verbatim quote.
