- id: cartesian-product
  letter: C
  headword_en: Cartesian Product
  notation: A \times B
  rosen_ref: Rosen §2.1
  definition_vi: 'Tích Đềcác của hai tập hợp $$A$$ và $$B$$, ký hiệu $$A \times B$$, là tập hợp tất cả
    các cặp có thứ tự $$(a, b)$$ với $$a \in A$$ và $$b \in B$$, tức là $$A \times B = \{(a, b) : a \in
    A \land b \in B\}$$. Mở rộng cho $$n$$ tập hợp, tích Đềcác $$A_1 \times A_2 \times \cdots \times A_n$$
    là tập hợp các bộ có thứ tự $$(a_1, a_2, \ldots, a_n)$$ với $$a_i \in A_i$$ với mọi $$i = 1, 2, \ldots,
    n$$.'
  example_vi: Với $$A = \{1, 2\}$$ và $$B = \{a, b, c\}$$, ta có $$A \times B = \{(1, a), (1, b), (1,
    c), (2, a), (2, b), (2, c)\}$$. Nói chung $$A \times B \neq B \times A$$ khi $$A \neq B$$ và cả hai
    đều khác rỗng.
