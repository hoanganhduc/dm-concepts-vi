- id: cryptosystem
  letter: C
  headword_en: cryptosystem
  notation: (\mathcal{P}, \mathcal{C}, \mathcal{K}, \mathcal{E}, \mathcal{D})
  rosen_ref: Rosen §4.6
  ref_bib: ''
  definition_vi: Một hệ thống mật mã là một bộ năm $$(\mathcal{P}, \mathcal{C}, \mathcal{K}, \mathcal{E},
    \mathcal{D})$$ gồm tập các bản rõ $$\mathcal{P}$$, tập các bản mã $$\mathcal{C}$$, tập các khóa $$\mathcal{K}$$,
    tập các hàm mã hóa $$\mathcal{E}$$ và tập các hàm giải mã $$\mathcal{D}$$. Với mỗi khóa $$k \in \mathcal{K}$$
    có một hàm mã hóa $$E_k \in \mathcal{E}$$ và một hàm giải mã $$D_k \in \mathcal{D}$$ tương ứng sao
    cho $$D_k(E_k(p)) = p$$ với mọi bản rõ $$p \in \mathcal{P}$$.
  example_vi: Mật mã Caesar là một hệ thống mật mã trong đó tập các bản rõ và bản mã đều là các chữ cái,
    tập khóa là $$\mathcal{K} = \{0, 1, \ldots, 25\}$$, và với khóa $$k$$ thì hàm mã hóa dịch mỗi chữ
    cái đi $$k$$ vị trí theo $$E_k(p) = (p + k) \bmod 26$$, còn hàm giải mã là $$D_k(c) = (c - k) \bmod
    26$$.
