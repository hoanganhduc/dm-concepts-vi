  definition_vi: Hàm tính được là một hàm mà tồn tại một chương trình máy tính tìm được các giá trị của
    nó. Nói cách khác, một hàm $$f$$ là tính được nếu có một chương trình máy tính, với mỗi đầu vào thuộc
    miền xác định, trả về giá trị tương ứng của $$f$$.
  example_vi: Hàm $$f(n) = n!$$ trên tập số nguyên dương là tính được, vì có một chương trình tính giai
    thừa trả về giá trị $$f(n)$$ với mọi $$n$$. Ngược lại, có những hàm không tính được, tức là không
    một chương trình máy tính nào tìm được mọi giá trị của chúng.
