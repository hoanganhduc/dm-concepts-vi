- id: correctness
  letter: C
  headword_en: Correctness
  notation: ''
  rosen_ref: Rosen §5.5
  definition_vi: 'Tính đúng đắn của một thuật toán (hay chương trình, thủ tục) là tính chất khẳng định
    rằng thuật toán luôn cho đầu ra đúng theo đặc tả với mọi đầu vào hợp lệ và luôn kết thúc. Việc chứng
    minh tính đúng đắn thường gồm hai phần: tính đúng đắn bộ phận, tức nếu thuật toán dừng thì kết quả
    thỏa khẳng định đầu $$p$$ và khẳng định cuối $$q$$, và tính dừng, tức thuật toán kết thúc sau hữu
    hạn bước.'
  example_vi: Để chứng minh tính đúng đắn của thuật toán $$\mathrm{DFS}$$ trên đồ thị liên thông $$G$$,
    ta chỉ ra rằng thuật toán thăm mọi đỉnh của $$G$$ đúng một lần và luôn kết thúc.
