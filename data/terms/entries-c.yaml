- id: cardinality
  letter: C
  headword_en: Cardinality
  notation: '|A|'
  rosen_ref: Rosen §2.5
  definition_vi: Lực lượng của một tập hợp $$A$$, ký hiệu $$|A|$$, là số phần tử của $$A$$. Hai tập hợp
    $$A$$ và $$B$$ được gọi là đồng lực lượng (có cùng lực lượng) khi tồn tại một song ánh từ $$A$$ vào
    $$B$$.
  example_vi: Nếu $$A = \{a, b, c\}$$ thì $$|A| = 3$$; tập hợp rỗng có lực lượng $$|\varnothing| = 0$$.
