  definition_vi: Công sai là hằng số $$d$$ sao cho mỗi số hạng của một cấp số cộng nhận được từ số hạng
    liền trước bằng cách cộng thêm $$d$$. Cấp số cộng là dãy có dạng $$a, a + d, a + 2d, \ldots, a + nd,
    \ldots$$, trong đó $$a$$ là số hạng đầu (ký hiệu $$a$$) và $$d$$ là công sai (ký hiệu $$d$$).
  example_vi: Dãy $$2, 5, 8, 11, 14, \ldots$$ là một cấp số cộng với số hạng đầu $$a = 2$$ và công sai
    $$d = 3$$.
