- id: chinese-postman-problem
  letter: C
  headword_en: Chinese Postman Problem
  notation: ''
  rosen_ref: Rosen §10.5
  definition_vi: Bài toán người đưa thư Trung Hoa là bài toán tìm một chu trình khép kín có tổng trọng
    số nhỏ nhất trong một đồ thị liên thông có trọng số, sao cho chu trình đó đi qua mỗi cạnh ít nhất
    một lần rồi trở về đỉnh xuất phát. Nếu đồ thị có chu trình Euler thì lời giải tối ưu chính là chu
    trình Euler đó, vì khi đó mỗi cạnh được đi qua đúng một lần.
  example_vi: Một người đưa thư cần đi qua tất cả các con phố (cạnh) trong khu vực rồi quay về bưu cục
    (đỉnh xuất phát) với tổng quãng đường đi ngắn nhất. Khi mọi đỉnh của đồ thị đều có bậc chẵn, đồ thị
    có chu trình Euler và đây chính là tuyến đường tối ưu cần tìm.
