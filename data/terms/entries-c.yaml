- id: centre
  letter: C
  headword_en: centre
  notation: C(G)
  rosen_ref: Rosen §10.4
  ref_bib: ''
  definition_vi: Tâm của một đồ thị liên thông $$G$$, ký hiệu $$C(G)$$, là tập hợp các đỉnh có độ lệch
    tâm nhỏ nhất, nghĩa là các đỉnh $$v$$ với $$e(v)$$ bằng bán kính $$r(G) = \min_{u \in V(G)} e(u)$$,
    trong đó độ lệch tâm $$e(v) = \max_{u \in V(G)} \mathrm{dist}_G(v, u)$$. Mỗi đỉnh như vậy được gọi
    là đỉnh tâm của $$G$$.
  example_vi: Với đường đi $$P_n$$ có $$n$$ đỉnh, tâm gồm đúng một đỉnh ở giữa khi $$n$$ lẻ và gồm hai
    đỉnh ở giữa khi $$n$$ chẵn. Mọi cây đều có tâm gồm một đỉnh hoặc hai đỉnh kề nhau.
