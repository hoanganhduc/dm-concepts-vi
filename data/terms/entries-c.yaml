- id: common-difference
  letter: C
  headword_en: Common Difference
  notation: d
  rosen_ref: Rosen §2.4
  definition_vi: Công sai là hằng số $$d$$ sao cho mỗi số hạng của một cấp số cộng nhận được từ số hạng
    liền trước bằng cách cộng thêm $$d$$. Cấp số cộng là dãy có dạng $$a, a + d, a + 2d, \ldots, a + nd,
    \ldots$$, trong đó $$a$$ là số hạng đầu (ký hiệu $$a$$) và $$d$$ là công sai (ký hiệu $$d$$).
  example_vi: Dãy $$2, 5, 8, 11, 14, \ldots$$ là một cấp số cộng với số hạng đầu $$a = 2$$ và công sai
    $$d = 3$$.
  vi_terms:
  - term: công sai
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
    pdf_page: 0
    snippet: ''
  see_also: []
  status: panel-approved
  notes: Công sai $$d$$ là tham số đặc trưng của cấp số cộng (arithmetic progression). Trong các tài liệu
    tiếng Việt khảo sát, thuật ngữ "công sai" không xuất hiện riêng như một khái niệm độc lập; cấp số
    cộng chỉ được nhắc tới trong ngữ cảnh lý thuyết Ramsey (cấp số cộng đơn sắc).
- id: common-ratio
  letter: C
  headword_en: Common Ratio
  notation: r
  rosen_ref: Rosen §2.4
  definition_vi: Công bội của một cấp số nhân là tỷ số không đổi $$r$$ giữa hai số hạng liên tiếp của
    cấp số đó. Cấp số nhân có số hạng đầu $$a$$ và công bội $$r$$ là dãy có dạng $$a, ar, ar^2, ar^3,
    \dots$$, trong đó số hạng tổng quát là $$a_n = ar^n$$ với $$a, r$$ là các số thực và $$r \neq 0$$.
  example_vi: Dãy $$3, 6, 12, 24, \dots$$ là một cấp số nhân với số hạng đầu $$a = 3$$ và công bội $$r
