  definition_vi: Lý thuyết tổ hợp là ngành nghiên cứu về cách sắp xếp các đối tượng. Nó gắn liền với việc
    đếm và nghiên cứu các cách bố trí những đối tượng của một tập hợp, có kể tới thứ tự hoặc không.
  example_vi: Nhiều bài toán có thể diễn đạt dưới dạng sắp xếp các đối tượng của một tập hợp. Chẳng hạn,
    số cách sắp xếp có thứ tự $$k$$ trong $$n$$ đối tượng khác nhau là $$\displaystyle\frac{n!}{(n-k)!}$$,
    còn số cách chọn không kể thứ tự $$k$$ trong $$n$$ đối tượng là $$\displaystyle\binom{n}{k}$$. Việc
    đếm các sắp xếp như vậy là một bài toán cơ bản của lý thuyết tổ hợp.
