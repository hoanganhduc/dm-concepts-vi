- id: cantor-diagonalization-argument
  letter: C
  headword_en: Cantor Diagonalization Argument
  notation: ''
  rosen_ref: Rosen §2.5
  definition_vi: 'Lập luận đường chéo của Cantor là kỹ thuật chứng minh một tập hợp là không đếm được
    bằng phản chứng: giả sử tập đó đếm được nên có thể liệt kê các phần tử thành dãy, rồi xây dựng một
    phần tử mới khác phần tử thứ $$n$$ trong dãy ở thành phần thứ $$n$$ (chẳng hạn ở chữ số thứ $$n$$
    của khai triển thập phân), nên phần tử mới này không có mặt trong dãy, dẫn tới mâu thuẫn. Cantor dùng
    lập luận này để chứng minh tập các số thực $$\mathbb{R}$$ là không đếm được.'
  example_vi: Để chứng minh tập các số thực trong khoảng $$(0,1)$$ là không đếm được, giả sử liệt kê được
    chúng thành dãy $$r_1, r_2, r_3, \ldots$$ với khai triển thập phân $$r_i = 0.d_{i1} d_{i2} d_{i3}
    \ldots$$; chọn số $$r = 0.e_1 e_2 e_3 \ldots$$ với $$e_n \neq d_{nn}$$, thì $$r$$ khác mọi $$r_n$$,
    mâu thuẫn với giả thiết liệt kê đầy đủ.
  vi_terms:
  - term: lập luận đường chéo của Cantor
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
    pdf_page: 0
    snippet: ''
  see_also: []
  status: panel-approved
  notes: Giáo trình MAT3500 dùng thuật ngữ "lập luận đường chéo của Cantor". Bản dịch Rosen tiếng Việt
    trình bày lập luận này ở Ví dụ 12 (tr. 103 PDF) khi chứng minh tập số thực là không đếm được, nhưng
    không gọi tên kỹ thuật là "đường chéo"; các kết quả tìm được cho "đường chéo" trong kho ngữ liệu đều
    chỉ đường chéo hình học hoặc đường chéo ma trận, còn "Cantor" trong Rosen chỉ "khai triển Cantor"
    (một khái niệm khác). Do đó không có nguồn ngữ liệu nào chứng thực đúng thuật ngữ này.
- id: carry
  letter: C
  headword_en: Carry
  notation: c_j
  rosen_ref: Rosen §4.2
  definition_vi: Số nhớ là bit phụ, ký hiệu $$c_j$$, sinh ra khi cộng hai số nguyên trong khai triển nhị
    phân và được chuyển sang vị trí kế tiếp bên trái. Khi cộng cặp bit thứ $$j$$ là $$a_j$$ và $$b_j$$
    cùng với số nhớ trước đó $$c_{j-1}$$, tổng $$a_j + b_j + c_{j-1}$$ cho bit tổng $$s_j$$ và số nhớ
    mới $$c_j$$ thỏa $$a_j + b_j + c_{j-1} = 2 c_j + s_j$$, trong đó $$c_j \in \{0, 1\}$$.
  example_vi: Khi cộng $$a = (1 1)_2$$ và $$b = (0 1)_2$$, ở vị trí phải nhất ta có $$1 + 1 = (1 0)_2$$,
    nên bit tổng là $$0$$ và số nhớ là $$c_0 = 1$$. Cộng tiếp $$1 + 0 + 1 = (1 0)_2$$, cho bit tổng $$0$$
    và số nhớ $$c_1 = 1$$, dẫn đến $$a + b = (1 0 0)_2$$.
