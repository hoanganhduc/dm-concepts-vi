- id: cover
  letter: C
  headword_en: Cover
  notation: ''
  rosen_ref: Rosen §10.2
  definition_vi: Bao phủ của một đồ thị $$G$$ là một tập con các đỉnh hoặc các cạnh sao cho mọi cạnh (tương
    ứng, mọi đỉnh) của $$G$$ đều có ít nhất một đầu mút (tương ứng, được kề bởi một cạnh) thuộc tập đó.
    Một tập phủ đỉnh là tập $$C \subseteq V(G)$$ sao cho mỗi cạnh của $$G$$ có ít nhất một đầu mút thuộc
    $$C$$, còn một tập phủ cạnh là tập $$C \subseteq E(G)$$ sao cho mỗi đỉnh của $$G$$ là đầu mút của
    một cạnh nào đó trong $$C$$.
  example_vi: Trong đồ thị đầy đủ $$K_n$$, tập gồm $$n-1$$ đỉnh bất kỳ là một tập phủ đỉnh, vì mọi cạnh
    đều có đầu mút nằm trong tập này.
  vi_terms:
  - term: bao phủ
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
