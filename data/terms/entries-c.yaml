- id: counterexample
  letter: C
  headword_en: Counterexample
  notation: ''
  rosen_ref: Rosen §1.7
  definition_vi: Phản ví dụ của một mệnh đề có lượng từ phổ dụng $$\forall x\, P(x)$$ là một phần tử $$x$$
    trong miền xác định sao cho $$P(x)$$ sai. Sự tồn tại của một phản ví dụ chứng tỏ rằng mệnh đề $$\forall
    x\, P(x)$$ là sai.
  example_vi: 'Mệnh đề "mọi số nguyên dương đều là tổng của ba bình phương" là sai, vì $$7$$ là một phản
    ví dụ: không thể viết $$7$$ thành tổng của ba bình phương.'
