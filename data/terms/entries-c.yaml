  rosen_ref: Rosen §1.3
  definition_vi: Dạng hội chuẩn tắc của một mệnh đề phức hợp là một biểu thức tương đương logic được viết
    dưới dạng hội (phép $$\wedge$$) của một hay nhiều mệnh đề, trong đó mỗi mệnh đề thành phần là một
    tuyển (phép $$\vee$$) của các literal (mỗi biến mệnh đề $$p$$ hoặc phủ định $$\neg p$$ của nó). Mỗi
    mệnh đề phức hợp đều có thể đưa về một dạng hội chuẩn tắc tương đương logic.
  example_vi: Biểu thức $$(p \vee \neg q) \wedge (\neg p \vee q \vee r) \wedge (\neg r)$$ có dạng hội
    chuẩn tắc, vì nó là hội của ba tuyển các literal. Chẳng hạn, mệnh đề $$p \rightarrow q$$ được đưa
    về dạng hội chuẩn tắc $$\neg p \vee q$$.
