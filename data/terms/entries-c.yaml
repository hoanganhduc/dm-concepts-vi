    đề đơn lẻ: nhất quán chỉ đòi hỏi tồn tại một phép gán giá trị chân lý làm cho tất cả các mệnh đề trong
    tập cùng đúng, chứ không đòi hỏi chúng đúng với mọi phép gán. Một tập gồm các mệnh đề tự mâu thuẫn
    không thể nhất quán. Khái niệm này thường được dùng để kiểm tra tính tương thích của các đặc tả hệ
    thống (system specifications) trong Rosen §1.1. Thuật ngữ "nhất quán" chỉ có dẫn chứng trực tiếp trong
    bản dịch Rosen-VI (tr. 22 bản PDF), tại đúng đoạn nêu định nghĩa; các giáo trình tiếng Việt mới hơn
    trong kho ngữ liệu không đề cập trực tiếp khái niệm nhất quán của mệnh đề phức hợp.'
