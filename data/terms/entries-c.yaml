  rosen_ref: Rosen §10.4
  ref_bib: ''
  definition_vi: Chu trình đơn trong một đồ thị $$G$$ là một đường đi khép kín có độ dài $$\geq 1$$, tức
    là bắt đầu và kết thúc tại cùng một đỉnh, sao cho không có cạnh nào bị lặp lại (các đỉnh có thể được
    lặp lại). Trong Ngô Đắc Tân (2004), khái niệm này được gọi bằng từ đơn 'mạch'; xem ghi chú.
  example_vi: 'Xét đồ thị gồm các cạnh $$ab, bc, ca, bd, de, eb$$. Dãy đỉnh $$a, b, d, e, b, c, a$$ là
    một chu trình đơn: nó khép kín và không lặp lại cạnh nào (đỉnh $$b$$ được lặp lại). Trái lại, dãy
    $$a, b, a$$ không phải là chu trình đơn vì cạnh $$ab$$ được dùng lại hai lần.'
