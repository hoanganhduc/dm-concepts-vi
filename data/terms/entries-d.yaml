    số nguyên $$a$$ và số nguyên dương $$d$$, tồn tại duy nhất các số nguyên $$q$$ và $$r$$ với $$0 \leq
    r \lt d$$ sao cho $$a = dq + r$$; khi đó $$a$$ được gọi là số bị chia, $$d$$ là số chia, $$q$$ là
    thương và $$r$$ là số dư.
