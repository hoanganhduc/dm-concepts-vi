- id: duality-principle
  letter: D
  headword_en: Duality Principle
  notation: ''
  rosen_ref: Rosen §11.1
  definition_vi: Nguyên lý đối ngẫu khẳng định rằng một hằng đẳng thức giữa các hàm Boole vẫn còn đúng
    khi ta thay nó bằng hằng đẳng thức đối ngẫu, tức là đổi mỗi phép $$\cdot$$ thành $$+$$, mỗi phép $$+$$
    thành $$\cdot$$, đồng thời đổi mỗi hằng $$0$$ thành $$1$$ và mỗi hằng $$1$$ thành $$0$$ (các biến
    giữ nguyên). Đối ngẫu của một biểu thức Boole $$E$$, ký hiệu $$E^{d}$$, nhận được bằng cách thực hiện
    các phép đổi này.
  example_vi: Đối ngẫu của hằng đẳng thức $$x \cdot 1 = x$$ là $$x + 0 = x$$, và cả hai đều đúng trong
    mọi đại số Boole. Tương tự, từ luật hấp thụ $$x \cdot (x + y) = x$$ ta suy ra ngay hằng đẳng thức
    đối ngẫu $$x + (x \cdot y) = x$$.
