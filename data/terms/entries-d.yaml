  notes: 'Definition completed per Rosen §10.7 so the edge correspondence E(G) <-> E(G*) is a bijection:
    an edge of G bordering two distinct regions R1, R2 yields an edge of G* joining the corresponding
    vertices, while an edge bordering the SAME region on both sides (a bridge / cut-edge) yields a LOOP
    at that single vertex. The earlier wording covered only the two-region case and silently dropped the
    bridge/loop case, which would have made G* have fewer edges than G; the bijection is now stated explicitly.


    Recommended term "đồ thị đối ngẫu" is the standard rendering, attested in the newest corpus (bib-nguyenhoangthach-2020,
    tr. 81-82), and again in bib-nguyenhuudien-2019 (tr. 235) and bib-ngodactan-2004 (tr. 294-295). vi_terms
    ordered newest-source first.


    The bare adjective "đối ngẫu" alone is NOT recorded as a standalone variant: across all sources it
    most often denotes unrelated concepts (ideal thứ tự đối ngẫu, mạng/lát cắt đối ngẫu, lập luận đối
    ngẫu) rather than the dual graph; its only graph-relevant occurrences are inside the full phrase "đồ
    thị đối ngẫu" already captured. The hit in bib-nguyenducnghia-2006 (tr. 13) is an isolated bare parenthetical
    "- (đối ngẫu)" with no surrounding context tying it to the plane-graph dual, so it is excluded as
    unverified for THIS concept.


    "đồ thị đối ngẫu của" is the same head term with the genitive particle "của" (= "of"); recorded as
    a phrase variant where it appears in the defining sentence.


    OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 returned 0 hits for both "đồ thị đối ngẫu"
    and "đối ngẫu" in normal and --loose modes; no attestation there.


    Note that in all attesting Vietnamese sources the dual graph $$G^{*}$$ is introduced via a map/plane
    graph (bản đồ): each region (miền) becomes a vertex of $$G^{*}$$, matching Rosen''s definition.


    The example uses only objects the definition introduces (a plane graph and its regions/edges), with
    $$C_4$$ as a concrete plane graph; it derives no quantity outside the definition''s scope.'
- id: depth-first-search
  letter: D
  headword_en: Depth-first search
  notation: ''
  rosen_ref: Rosen §11.4
  definition_vi: \emph{Duyệt theo chiều sâu} là một phép duyệt đồ thị xây dựng một cây khung của đồ thị
    liên thông $$G$$ bằng cách bắt đầu từ một đỉnh gốc, rồi lặp lại việc đi xa nhất có thể dọc theo mỗi
    nhánh và chỉ quay lui khi không còn đỉnh kề chưa được thăm. Mỗi cạnh dùng để đi tới một đỉnh chưa
    thăm được thêm vào cây khung, nên kết quả là một cây khung của $$G$$.
  example_vi: Xét đồ thị $$G$$ với tập đỉnh $$V(G)=\{a,b,c,d\}$$ và tập cạnh $$E(G)=\{ab,bc,bd,cd\}$$.
    Bắt đầu duyệt theo chiều sâu tại đỉnh gốc $$a$$, ta đi $$a\to b\to c\to d$$; tại $$d$$ mọi đỉnh kề
    đều đã được thăm nên ta quay lui. Cây khung thu được có tập cạnh $$\{ab,bc,cd\}$$.
