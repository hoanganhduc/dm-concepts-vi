- id: direct-proof
  letter: D
  headword_en: Direct Proof
  notation: ''
  rosen_ref: Rosen §1.6
  definition_vi: Chứng minh trực tiếp là phương pháp chứng minh mệnh đề kéo theo $$p \rightarrow q$$ bằng
    cách giả sử $$p$$ đúng rồi dùng các bước suy diễn (định nghĩa, tiên đề, định lý đã biết) để dẫn tới
    kết luận $$q$$ đúng. Vì trường hợp $$p$$ sai đã làm cho $$p \rightarrow q$$ đúng, ta chỉ cần xét trường
    hợp $$p$$ đúng.
  example_vi: Để chứng minh "nếu $$n$$ là số lẻ thì $$n^2$$ là số lẻ", ta giả sử $$n$$ lẻ, viết $$n =
    2k+1$$ với $$k$$ nguyên, suy ra $$n^2 = 4k^2 + 4k + 1 = 2(2k^2 + 2k) + 1$$ là số lẻ.
  vi_terms:
