- id: de-morgans-laws-for-quantifiers
  letter: D
  headword_en: De Morgan's Laws for Quantifiers
  notation: \neg \forall x\, P(x) \equiv \exists x\, \neg P(x),\ \neg \exists x\, P(x) \equiv \forall
    x\, \neg P(x)
  rosen_ref: Rosen §1.4
  definition_vi: Luật De Morgan cho lượng từ là quy tắc lấy phủ định của một mệnh đề lượng từ hóa, theo
    đó phủ định của lượng từ với mọi cho ra lượng từ tồn tại và ngược lại, đồng thời biểu thức vị từ được
    thay bằng phủ định của nó (ký hiệu $$\neg \forall x\, P(x) \equiv \exists x\, \neg P(x)$$ và $$\neg
    \exists x\, P(x) \equiv \forall x\, \neg P(x)$$).
  example_vi: Phủ định của mệnh đề $$\forall x\, P(x)$$, trong đó $$P(x)$$ là "$$x$$ đã học môn giải tích",
    là $$\exists x\, \neg P(x)$$, nghĩa là "tồn tại một $$x$$ chưa học môn giải tích".
