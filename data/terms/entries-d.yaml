- id: divisibility
  letter: D
  headword_en: Divisibility
  notation: a \mid b
  rosen_ref: Rosen §4.1
  definition_vi: Cho hai số nguyên $$a$$ và $$b$$ với $$a \neq 0$$, ta nói $$a$$ \emph{chia hết} $$b$$,
    ký hiệu $$a \mid b$$, nếu tồn tại một số nguyên $$c$$ sao cho $$b = ac$$; nếu $$a$$ không chia hết
    $$b$$ ta viết $$a \nmid b$$. Khi $$a \mid b$$, ta nói $$a$$ là một ước của $$b$$ và $$b$$ là một bội
    của $$a$$.
  example_vi: Ta có $$3 \mid 12$$ vì $$12 = 3 \cdot 4$$ với $$4$$ là số nguyên, nhưng $$3 \nmid 7$$ vì
    không tồn tại số nguyên $$c$$ nào sao cho $$7 = 3c$$.
