- id: decision-tree
  letter: D
  headword_en: Decision Tree
  notation: ''
  rosen_ref: Rosen §10.2
  definition_vi: Cây quyết định là một cây có gốc, trong đó mỗi đỉnh trong biểu diễn một quyết định và
    mỗi cạnh đi xuống ứng với một kết cục có thể của quyết định đó, còn mỗi lá biểu diễn một kết quả cuối
    cùng. Với cây quyết định nhị phân giải quyết một bài toán có $$n$$ kết cục có thể, số phép so sánh
    tối thiểu trong trường hợp xấu nhất bằng chiều cao của cây, ít nhất là $$\lceil \log_2 n \rceil$$.
  example_vi: Bài toán tìm một đồng xu giả nhẹ hơn trong tám đồng xu bằng cách cân được biểu diễn bằng
    một cây quyết định; vì cây có tám lá nên chiều cao của nó ít nhất là $$\lceil \log_2 8 \rceil = 3$$,
    do đó cần ít nhất ba lần cân khi mỗi lần cân chỉ cho hai kết cục.
