- id: dijkstra-algorithm
  letter: D
  headword_en: Dijkstra's algorithm
  notation: ''
  rosen_ref: Rosen §10.6
  definition_vi: \emph{Thuật toán Dijkstra} là một thủ tục tham lam tìm độ dài đường đi ngắn nhất giữa
    hai đỉnh trong một đồ thị liên thông có trọng số với mọi trọng số cạnh không âm. Bắt đầu từ đỉnh nguồn,
    thuật toán lặp lại việc thêm vào một tập hợp $$S$$ đỉnh chưa thuộc $$S$$ có khoảng cách đã biết nhỏ
    nhất tính từ đỉnh nguồn, cho đến khi đỉnh đích được thêm vào $$S$$.
  example_vi: Trong đồ thị có trọng số với các đỉnh $$a, b, c$$, các cạnh $$ab$$ trọng số $$4$$, $$bc$$
    trọng số $$1$$, và $$ac$$ trọng số $$6$$, thuật toán Dijkstra xuất phát từ $$a$$ chọn lần lượt $$b$$
    (khoảng cách $$4$$) rồi $$c$$ (khoảng cách $$5$$), cho đường đi ngắn nhất từ $$a$$ đến $$c$$ có độ
    dài $$5$$.
