- id: decryption
  letter: D
  headword_en: Decryption
  notation: ''
  rosen_ref: Rosen §3.6
  definition_vi: 'Giải mã là quá trình đưa một bức thư bí mật trở về dạng ban đầu của nó. Nói cách khác,
    giải mã là phép biến đổi ngược của mã hóa: từ bức thư đã được mã hóa, ta khôi phục lại bức thư gốc.'
  example_vi: 'Trong mật mã Caesar, mỗi chữ cái được dịch đi $$3$$ vị trí trong bảng chữ cái khi mã hóa,
    tức là chữ ở vị trí $$p$$ được thay bởi chữ ở vị trí $$(p + 3) \bmod 26$$. Để giải mã, ta thực hiện
    phép dịch ngược lại: chữ ở vị trí $$p$$ được thay bởi chữ ở vị trí $$(p - 3) \bmod 26$$. Chẳng hạn,
    bức thư đã mã hóa "PHHW" được giải mã thành "MEET".'
