  notes: 'Six attestations across five distinct corpus sources confirm this concept. The recommended head
    term "khoảng cách" appears in the 2020 definition (bib-leanhvinh-2020, PDF p.17): "Với hai đỉnh u,
    v ∈ V, khoảng cách giữa u và v, kí hiệu bởi $$d_G(u,v)$$ ... là độ dài đường đi ngắn nhất giữa chúng.
