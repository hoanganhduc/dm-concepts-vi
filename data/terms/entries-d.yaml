- id: disjunctive-syllogism
  letter: D
  headword_en: Disjunctive Syllogism
  notation: '[(p \lor q) \land \neg p] \rightarrow q'
  rosen_ref: Rosen §1.6
  definition_vi: Tam đoạn luận tuyển là quy tắc suy diễn cho phép từ một tuyển $$p \lor q$$ và phủ định
    $$\neg p$$ của một thành phần suy ra thành phần còn lại $$q$$, ký hiệu $$[(p \lor q) \land \neg p]
    \rightarrow q$$. Quy tắc này đúng vì biểu thức $$[(p \lor q) \land \neg p] \rightarrow q$$ là một
    hằng đúng.
  example_vi: Từ tiền đề "Hôm nay trời mưa hoặc trời nắng" ($$p \lor q$$) và "Hôm nay trời không mưa"
    ($$\neg p$$), theo tam đoạn luận tuyển ta suy ra "Hôm nay trời nắng" ($$q$$).
