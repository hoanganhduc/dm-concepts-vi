- id: directed-acyclic-graph
  letter: D
  headword_en: Directed Acyclic Graph
  notation: G = (V, E)
  rosen_ref: Rosen §10.5
  definition_vi: Đồ thị có hướng không có chu trình là một đồ thị có hướng $$G = (V, E)$$ không chứa bất
    kỳ chu trình có hướng nào, nghĩa là không tồn tại đường đi có hướng nào xuất phát từ một đỉnh và quay
    trở lại chính đỉnh đó. Một đồ thị có hướng $$G$$ là không có chu trình khi và chỉ khi có thể đánh
    số các đỉnh của $$G$$ sao cho mọi cạnh $$(u, v) \in E$$ đều thỏa mãn số thứ tự của $$u$$ nhỏ hơn số
    thứ tự của $$v$$.
  example_vi: Trong đồ thị có hướng với các đỉnh $$\{1, 2, 3\}$$ và các cạnh $$(1,2), (2,3), (1,3)$$,
    không có chu trình có hướng nào nên đây là một đồ thị có hướng không có chu trình; nếu thêm cạnh $$(3,1)$$
    thì xuất hiện chu trình $$1 \to 2 \to 3 \to 1$$ và đồ thị không còn là đồ thị có hướng không có chu
    trình.
