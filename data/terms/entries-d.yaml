- id: decimal-representation
  letter: D
  headword_en: Decimal Representation
  notation: n = a_k 10^k + a_{k-1} 10^{k-1} + \cdots + a_1 10 + a_0
  rosen_ref: Rosen §4.2
  definition_vi: Biểu diễn thập phân của một số nguyên $$n$$ là cách viết $$n$$ trong hệ cơ số $$10$$,
    tức là dãy các chữ số $$a_k a_{k-1} \ldots a_1 a_0$$ với mỗi $$a_i \in \{0,1,\ldots,9\}$$ và $$a_k
    \neq 0$$, ký hiệu $$n = a_k 10^k + a_{k-1} 10^{k-1} + \cdots + a_1 10 + a_0$$. Mỗi số nguyên dương
    có duy nhất một biểu diễn thập phân.
  example_vi: Số $$n = 2024$$ có biểu diễn thập phân $$2024 = 2 \cdot 10^3 + 0 \cdot 10^2 + 2 \cdot 10
    + 4$$.
