    and "Số hoán vị mất thứ tự của n phần tử được ký hiệu là Dn." The core noun "mất thứ tự"/"số mất thứ
    tự" is the dominant attestation chain across all text sources (2019 nguyenhuudien p.85, 2006 nguyenducnghia
    p.29, 2004 ngodactan p.98/99/112/136) and all use notation Dn. The descriptive variant "hoán vị không
    có điểm bất động" appears once in ngodactan-2004 (p.99 PDF). Candidate "phép thế hoàn toàn" had 0
