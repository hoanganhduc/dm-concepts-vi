- id: disjunction
  letter: D
  headword_en: Disjunction
  notation: p \vee q
  rosen_ref: Rosen §1.1
  definition_vi: Tuyển của hai mệnh đề $$p$$ và $$q$$, ký hiệu $$p \vee q$$, là mệnh đề "$$p$$ hoặc $$q$$".
    Mệnh đề $$p \vee q$$ sai khi cả $$p$$ và $$q$$ đều sai, và đúng trong các trường hợp còn lại.
  example_vi: Với $$p$$ là "Hôm nay trời mưa" và $$q$$ là "Hôm nay trời nắng", tuyển $$p \vee q$$ là mệnh
    đề "Hôm nay trời mưa hoặc trời nắng", đúng khi có ít nhất một trong hai mệnh đề thành phần đúng.
