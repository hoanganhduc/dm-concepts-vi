- id: degree-distribution
  letter: D
  headword_en: Degree Distribution
  notation: P(k)
  rosen_ref: Rosen §10.4
  definition_vi: Phân phối bậc của một đồ thị (hay một mạng) $$G$$ là hàm $$P(k)$$ (ký hiệu) cho biết
    tỉ lệ các đỉnh có bậc bằng $$k$$, tức là $$P(k) = \frac{n_k}{n}$$, trong đó $$n_k$$ là số đỉnh có
    bậc $$k$$ và $$n = |V(G)|$$ là tổng số đỉnh. Một cách tương đương, $$P(k)$$ là xác suất để một đỉnh
    được chọn ngẫu nhiên có bậc đúng bằng $$k$$.
  example_vi: 'Trong đồ thị đầy đủ $$K_n$$, mọi đỉnh đều có bậc $$n - 1$$, nên phân phối bậc tập trung
    tại một giá trị: $$P(n-1) = 1$$ và $$P(k) = 0$$ với mọi $$k \neq n - 1$$.'
  vi_terms:
