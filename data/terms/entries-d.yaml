- id: degree
  letter: D
  headword_en: Degree of a vertex
  notation: \deg_G(v)
  rosen_ref: Rosen §10.2
  definition_vi: \emph{Bậc của đỉnh} $$v$$ trong đồ thị vô hướng $$G$$, ký hiệu $$\deg_G(v)$$, là số cạnh
    kề với $$v$$, trong đó mỗi khuyên tại $$v$$ được tính hai lần.
  example_vi: Trong đồ thị $$G$$ với tập đỉnh $$\{u, v, w\}$$ và các cạnh $$uv$$, $$uw$$ cùng một khuyên
    tại $$v$$, ta có $$\deg_G(u) = 2$$, $$\deg_G(v) = 3$$ và $$\deg_G(w) = 1$$.
