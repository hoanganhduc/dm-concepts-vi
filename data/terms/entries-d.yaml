    suất của $$X$$, không nên nhầm với "luật phân phối" (distributive law) trong logic và lý thuyết tập
    hợp. Trong kho ngữ liệu hiện có chưa thấy cụm "phân phối của biến ngẫu nhiên" được dùng trực tiếp,
    nên thuật ngữ khuyến nghị là bản dịch chuẩn; cụm "biến ngẫu nhiên" được trích dẫn để đối chiếu.
