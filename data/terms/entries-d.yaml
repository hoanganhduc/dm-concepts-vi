- id: decreasing
  letter: D
  headword_en: Decreasing
  notation: ''
  rosen_ref: Rosen §2.3
  definition_vi: Một hàm $$f$$ từ tập số thực vào tập số thực được gọi là giảm nếu $$f(x) > f(y)$$ với
    mọi $$x$$ và $$y$$ thuộc miền xác định thỏa mãn $$x < y$$. Hàm $$f$$ được gọi là không tăng nếu chỉ
    đòi hỏi $$f(x) \geq f(y)$$ khi $$x < y$$.
  example_vi: Hàm $$f(x) = -3x + 1$$ trên tập số thực là một hàm giảm, vì nếu $$x < y$$ thì $$-3x > -3y$$,
    suy ra $$f(x) > f(y)$$. Mọi hàm giảm đều là hàm đơn ánh.
