  notes: Per Rosen §10.2 the degree sequence is the list of all vertex degrees; listing it in nonincreasing
    order is a presentation convention, not part of the definition. The definition_vi now states the concept
    as the sequence of all vertex degrees and marks the nonincreasing ordering and the notation $$(d_1,
    \ldots, d_n)$$ as an optional convention. Recommended term "dãy bậc" is formally defined in bib-leanhvinh-2020
    (2020) at PDF p.9 (Định nghĩa 1.2) and used with the canonical notation $$(a_1, \ldots, a_n)$$ on
    p.64; it is the standard term attested in a 2020 source. The fuller variant "dãy bậc của các đỉnh"
    (sequence of the degrees of the vertices) is attested in bib-ngodactan-2004 (2004) p.280. The candidate
    terms "dãy bậc của đồ thị" and "dãy các bậc" returned 0 hits in both normal and loose modes across
    all six corpus sources and are therefore not recorded as verified variants. The phrase "bậc của các
    đỉnh" appears widely but denotes the degrees of the vertices in general, not the ordered sequence,
    so it is not a term for this concept on its own. No attestation found in bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019, bib-hoangchithanh-2007, or bib-nguyenducnghia-2006 (OCR sources checked with
    --loose).
- id: derangement
  letter: D
  headword_en: Derangement
  notation: D_n
  rosen_ref: Rosen §8.6
  definition_vi: Một \emph{hoán vị mất thứ tự} của một tập hợp là một hoán vị $$\sigma$$ của các phần
    tử của tập hợp đó không giữ cố định phần tử nào, tức là $$\sigma(i) \neq i$$ với mọi phần tử $$i$$.
    Số các hoán vị mất thứ tự của một tập hợp gồm $$n$$ phần tử được ký hiệu là $$D_n$$.
  example_vi: Với tập hợp $$\{1, 2, 3\}$$, hoán vị đưa $$1 \mapsto 2$$, $$2 \mapsto 3$$, $$3 \mapsto 1$$
    là một hoán vị mất thứ tự vì không phần tử nào được giữ cố định, trong khi hoán vị đưa $$1 \mapsto
    1$$, $$2 \mapsto 3$$, $$3 \mapsto 2$$ thì không phải vì $$\sigma(1) = 1$$.
