  see_ref: ''
  notes: 'Recommended term "bậc của đỉnh" is the dominant standard form. The recommended=true citation
    is anchored to the clean (non-OCR) 2020 source bib-nguyenhoangthach-2020 p.63 ("5.1.1 Bậc của đỉnh")
    with correct diacritics; the OCR 2020 source bib-leanhvinh-2020 p.153 is demoted to a recommended=false
    supporting attestation because its snippet is OCR-mangled ("bạc của đỉnh", notation d(v)). The term
    is also attested in the 2019 source bib-nguyenhuudien-2019 (p.157, formal Định nghĩa 6.8) and in older
    sources (bib-hoangchithanh-2007, bib-ngodactan-2004, bib-nguyenducnghia-2006); citations ordered newest-first,
    clean source first. Variant "bậc của một đỉnh" appears in bib-nguyenhoangthach-2020 (p.63) and bib-hoangchithanh-2007
    (p.14, OCR --loose). The bare term "bậc" is used widely once the vertex is clear from context. Notation
    varies across sources: bib-nguyenhuudien-2019 and bib-nguyenhoangthach-2020 use deg(v); bib-ngodactan-2004
    uses deg_G(v); bib-leanhvinh-2020 uses d(v); bib-hoangchithanh-2007 uses r(a). OCR sources (bib-leanhvinh-2020,
    bib-hoangchithanh-2007) were mined with both normal and --loose modes; snippets show OCR-mangled diacritics
    but unambiguously denote this concept. The loop-counted-twice convention follows Rosen §10.2; Vietnamese
    sources state "số cạnh kề" and the loop rule is added for completeness with the English ground truth.'
- id: degree-sequence
  letter: D
  headword_en: Degree sequence
  notation: (d_1, d_2, \ldots, d_n)
  rosen_ref: Rosen §10.2
  definition_vi: \emph{Dãy bậc} của một đồ thị $$G$$ có $$n$$ đỉnh là dãy gồm bậc của tất cả các đỉnh
    của $$G$$. Khi cần, ta sắp xếp dãy này theo thứ tự không tăng và ký hiệu $$(d_1, d_2, \ldots, d_n)$$
    với $$d_1 \geq d_2 \geq \cdots \geq d_n$$.
  example_vi: Xét đồ thị $$G$$ có các đỉnh $$v_1, v_2, v_3, v_4$$ với $$\deg_G(v_1) = 3$$, $$\deg_G(v_2)
    = 2$$, $$\deg_G(v_3) = 2$$, $$\deg_G(v_4) = 1$$. Khi đó dãy bậc của $$G$$ sắp theo thứ tự không tăng
    là $$(3, 2, 2, 1)$$.
