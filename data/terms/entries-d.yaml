- id: digital-signature
  letter: D
  headword_en: Digital Signature
  notation: ''
  rosen_ref: Rosen §4.6
  definition_vi: Chữ ký số là một phương pháp mà người nhận có thể dùng để xác định người gửi của một
    thông điệp. Bằng cách áp dụng một phép biến đổi mật mã mà chỉ riêng người gửi mới thực hiện được lên
    thông điệp, người nhận có thể kiểm tra và xác nhận rằng thông điệp đúng là do người gửi đó tạo ra.
  example_vi: Trong hệ mật mã khóa công khai $$RSA$$, người gửi ký một thông điệp $$M$$ bằng cách áp dụng
    hàm giải mã với khóa bí mật của mình để tạo ra $$S = M^{d} \bmod n$$; người nhận dùng khóa công khai
    $$(e, n)$$ của người gửi để khôi phục $$M = S^{e} \bmod n$$, nhờ đó xác nhận chính người gửi đã tạo
    ra thông điệp.
  vi_terms:
  - term: chữ ký số
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - public-key-cryptography
  - private-key-cryptography
  status: draft
  see_ref: ''
  notes: 'Chữ ký số dựa trên mật mã khóa công khai: người gửi áp dụng phép biến đổi với khóa bí mật mà
    chỉ mình họ biết, còn người nhận kiểm tra bằng khóa công khai tương ứng. Không tìm thấy thuật ngữ
    này trong kho ngữ liệu tiếng Việt đã số hóa; "chữ ký số" là bản dịch chuẩn (đôi khi gọi là "chữ ký
    điện tử"). Cần phân biệt với "public-key cryptography" (cơ chế mật mã nền tảng).'
- id: directed-multigraph
  letter: D
  headword_en: Directed Multigraph
  notation: G = (V, E)
  rosen_ref: Rosen §10.1
  definition_vi: Một đa đồ thị có hướng là một đồ thị có hướng có thể chứa nhiều cạnh có hướng giữa cùng
    một cặp đỉnh.
  example_vi: Nếu $$G = (V, E)$$ với $$V = \{a, b\}$$ có hai cạnh có hướng từ $$a$$ đến $$b$$ và một cạnh
    có hướng từ $$b$$ đến $$a$$, thì $$G$$ là một đa đồ thị có hướng vì nó cho phép nhiều cạnh có hướng
    giữa hai đỉnh.
