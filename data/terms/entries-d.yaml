- id: dominating-set
  letter: D
  headword_en: Dominating set
  notation: D \subseteq V(G)
  rosen_ref: Rosen §10.1
  definition_vi: Một \emph{tập thống trị} của đồ thị $$G$$ là một tập con $$D \subseteq V(G)$$ các đỉnh
    sao cho mỗi đỉnh của $$G$$ hoặc thuộc $$D$$, hoặc kề với một đỉnh nào đó trong $$D$$. Nói cách khác,
    với mọi đỉnh $$v \in V(G)$$ ta có $$v \in D$$ hoặc tồn tại $$u \in D$$ sao cho $$uv \in E(G)$$.
  example_vi: Xét đường đi $$P_5$$ với các đỉnh $$v_1, v_2, v_3, v_4, v_5$$ và các cạnh $$v_1 v_2$$, $$v_2
    v_3$$, $$v_3 v_4$$, $$v_4 v_5$$. Tập $$D = \{v_2, v_4\}$$ là một tập thống trị, vì $$v_1$$ kề $$v_2$$,
    $$v_3$$ kề cả $$v_2$$ và $$v_4$$, $$v_5$$ kề $$v_4$$, còn $$v_2, v_4$$ thì thuộc $$D$$.
