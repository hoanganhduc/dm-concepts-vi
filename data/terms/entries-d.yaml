- id: derivation-tree
  letter: D
  headword_en: Derivation Tree
  notation: ''
  rosen_ref: Rosen §13.1
  definition_vi: Cây dẫn xuất là một cây có gốc được sắp thứ tự biểu diễn cách một xâu được dẫn xuất trong
    một văn phạm. Gốc của cây biểu diễn ký hiệu xuất phát, mỗi đỉnh trong biểu diễn một ký hiệu không
    kết thúc, mỗi lá biểu diễn một ký hiệu kết thúc, và các con của một đỉnh tương ứng với vế phải của
    luật sản xuất được áp dụng.
  example_vi: Trong văn phạm sinh ra câu "the hungry rabbit eats quickly", cây dẫn xuất có gốc là ký hiệu
    xuất phát của câu, các đỉnh trong là các thành phần ngữ pháp như cụm danh từ và cụm động từ, còn các
    lá lần lượt là các từ $$\textit{the}$$, $$\textit{hungry}$$, $$\textit{rabbit}$$, $$\textit{eats}$$,
    $$\textit{quickly}$$.
