    b$$. Trong đẳng thức này, $$b$$ được gọi là số chia, $$a$$ là số bị chia, $$q$$ là thương và $$r$$
    là số dư.'
  example_vi: Với $$a = 17$$ và $$b = 5$$, ta có $$17 = 5 \cdot 3 + 2$$, trong đó số chia là $$b = 5$$,
    thương là $$q = 3$$ và số dư là $$r = 2$$.
