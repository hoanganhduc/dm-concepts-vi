    2020 source bib-nguyenhoangthach-2020 (p.24) describing two disjoint sets $$S$$ and $$T$$, and confirmed
    in bib-nguyenducnghia-2006 (p.15) with the canonical phrasing "Nếu $$A$$ và $$B$$ là hai tập hợp rời
    nhau" (if $$A$$ and $$B$$ are two disjoint sets). The first-introduction emphasis in definition_vi
    now uses \emph{rời nhau} (replacing the earlier Markdown asterisks) to match the chapter-wide \emph{...}
    convention. Variants: "tập rời nhau" is the common shortened form attested in bib-leanhvinh-2020 (p.37,
    "hai tập rời nhau khác rỗng" = two nonempty disjoint sets; p.202) and bib-ngodactan-2004 (p.21). "rời
    nhau" alone is the predicate form ("hai tập ... là rời nhau"), attested in bib-leanhvinh-2020 (p.69)
    and bib-hoangchithanh-2007 (p.106). "tập con rời nhau" (disjoint subsets) appears in bib-nguyenducnghia-2006
    (p.15) in the addition-principle generalization. "không giao nhau" (not intersecting / having no common
    element) is a descriptive variant attested across four sources including bib-nguyenhuudien-2019 (p.228),
    bib-nguyenducnghia-2006 (p.210), bib-ngodactan-2004 (p.206), and bib-hoangchithanh-2007 (p.18); it
    conveys the same emptiness-of-intersection idea but is typically used as a property phrase rather
    than a noun for the sets themselves. OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 were
    checked with both normal and --loose modes; results were identical for the relevant terms.'
- id: distance
  letter: D
