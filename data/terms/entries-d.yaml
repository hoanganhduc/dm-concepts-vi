  notation: ''
  rosen_ref: Rosen §1.4
  definition_vi: Miền xác định (hay vũ trụ biện luận) là tập hợp các giá trị mà một biến trong hàm mệnh
    đề $$P(x)$$ có thể nhận. Khi xét lượng từ trên hàm mệnh đề, mỗi biến chỉ lấy giá trị trong miền xác
    định của nó.
  example_vi: 'Với hàm mệnh đề $$P(x): x > 0$$ trên miền xác định là tập các số nguyên $$\mathbb{Z}$$,
    biến $$x$$ chỉ nhận các giá trị nguyên; mệnh đề $$\forall x\, P(x)$$ là sai vì $$P(-1)$$ sai, còn
    $$\exists x\, P(x)$$ là đúng vì $$P(1)$$ đúng.'
