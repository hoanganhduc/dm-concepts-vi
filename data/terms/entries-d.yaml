- id: discrete-logarithm
  letter: D
  headword_en: Discrete Logarithm
  notation: \log_r a \pmod p
  rosen_ref: Rosen §4.6
  definition_vi: Cho $$p$$ là một số nguyên tố và $$r$$ là một căn nguyên thủy modulo $$p$$. Lôgarit rời
    rạc của một số nguyên $$a$$ theo cơ số $$r$$ modulo $$p$$ là số nguyên $$e$$ thỏa mãn $$r^e \equiv
    a \pmod p$$.
  example_vi: Lấy $$p = 11$$ và căn nguyên thủy $$r = 2$$ modulo $$11$$. Vì $$2^4 = 16 \equiv 5 \pmod{11}$$,
    nên lôgarit rời rạc của $$5$$ theo cơ số $$2$$ modulo $$11$$ là $$4$$.
  vi_terms:
  - term: lôgarit rời rạc
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - logarithm
  - congruence
  - modular-arithmetic
  status: draft
  see_ref: ''
  notes: Thuật ngữ chuẩn là "lôgarit rời rạc", dịch từ "discrete logarithm". Khái niệm này thuộc lý thuyết
    số (số mũ $$e$$ sao cho $$r^e \equiv a \pmod p$$ với $$r$$ là căn nguyên thủy), khác với mục "logarithm"
    là lôgarit thực thông thường. Kho ngữ liệu hiện chưa có chứng thực cho cụm "lôgarit rời rạc"; bản
    dịch Rosen và các tài liệu trong kho chỉ dùng "lôgarit"/"logarit" cho lôgarit thực.
- id: distribution-of-a-random-variable
  letter: D
  headword_en: Distribution of a Random Variable
  notation: ''
  rosen_ref: Rosen §7.2
  definition_vi: Phân phối của một biến ngẫu nhiên $$X$$ trên một không gian mẫu là tập hợp các cặp $$(r,
    p(X = r))$$ ứng với mọi giá trị $$r$$ mà biến ngẫu nhiên $$X$$ có thể nhận. Nói cách khác, phân phối
    cho biết với mỗi giá trị $$r$$ của $$X$$, xác suất để $$X$$ nhận giá trị đó là $$p(X = r)$$.
  example_vi: Giả sử tung một đồng xu cân đối hai lần và $$X$$ là biến ngẫu nhiên đếm số lần xuất hiện
    mặt ngửa. Khi đó phân phối của $$X$$ gồm các cặp $$(0, 1/4)$$, $$(1, 1/2)$$ và $$(2, 1/4)$$, vì $$p(X
    = 0) = 1/4$$, $$p(X = 1) = 1/2$$ và $$p(X = 2) = 1/4$$.
