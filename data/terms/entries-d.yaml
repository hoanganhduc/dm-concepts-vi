- id: directed-graph
  letter: D
  headword_en: Directed graph
  notation: G = (V, E)
  rosen_ref: Rosen §10.2
  definition_vi: Một \emph{đồ thị có hướng} $$G = (V, E)$$ gồm một tập khác rỗng các đỉnh $$V$$ và một
    tập các cạnh có hướng $$E$$, trong đó mỗi cạnh có hướng được gắn với một cặp đỉnh có thứ tự $$(u,
    v)$$ thể hiện hướng của nó từ đỉnh $$u$$ đến đỉnh $$v$$.
  example_vi: Cho tập đỉnh $$V = \{a, b, c\}$$ và tập cạnh có hướng $$E = \{(a, b), (b, c), (a, c)\}$$.
    Khi đó $$G = (V, E)$$ là một đồ thị có hướng, trong đó cạnh $$(a, b)$$ đi từ đỉnh $$a$$ đến đỉnh $$b$$.
