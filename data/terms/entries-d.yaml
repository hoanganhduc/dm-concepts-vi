- id: dynamic-programming
  letter: D
  headword_en: Dynamic Programming
  notation: ''
  rosen_ref: ''
  definition_vi: Quy hoạch động là một mô hình thuật toán tìm lời giải tối ưu bằng cách kết hợp các lời
    giải của những bài toán con gối nhau. Mỗi bài toán con chỉ được giải một lần, sau đó lời giải của
    nó được lưu lại và dùng lại để tạo nên lời giải tối ưu cho bài toán ban đầu.
  example_vi: 'Các thuật toán tìm đường đi ngắn nhất như thuật toán Dijkstra và thuật toán Bellman–Ford
    là những ví dụ về quy hoạch động: chúng xây dựng đường đi ngắn nhất từ $$s$$ tới $$t$$ bằng cách kết
    hợp các đường đi ngắn nhất tới những đỉnh trung gian, là các bài toán con gối nhau.'
