  notation: d(u, v)
  rosen_ref: Rosen §10.4
  definition_vi: \emph{Khoảng cách} giữa hai đỉnh $$u$$ và $$v$$ trong một đồ thị $$G$$, ký hiệu $$d(u,
    v)$$, là độ dài của một đường đi ngắn nhất giữa $$u$$ và $$v$$. Nếu không tồn tại đường đi nào giữa
