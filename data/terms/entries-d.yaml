  notation: f(n) = a\,f(n/b) + g(n)
  rosen_ref: Rosen §8.3
  definition_vi: Chia để trị là kỹ thuật thiết kế thuật toán trong đó một bài toán kích thước $$n$$ được
    phân rã thành $$a$$ bài toán con, mỗi bài toán con có kích thước $$n/b$$, rồi giải các bài toán con
    đó và kết hợp các lời giải lại. Độ phức tạp $$f(n)$$ của thuật toán thỏa mãn hệ thức truy hồi chia
    để trị $$f(n) = a\,f(n/b) + g(n)$$, trong đó $$g(n)$$ là chi phí phân chia và kết hợp.
  example_vi: Thuật toán tìm kiếm nhị phân trên dãy đã sắp xếp chia bài toán kích thước $$n$$ thành một
    bài toán con kích thước $$n/2$$, cho hệ thức $$f(n) = f(n/2) + 2$$ với $$n$$ là lũy thừa của $$2$$.
