    thuyết mạng và đồ thị ngẫu nhiên. Không tìm thấy thuật ngữ tương ứng được định nghĩa trong các nguồn
    đối chiếu của ngữ liệu hay bản dịch Rosen; cần phân biệt với "dãy bậc" (degree sequence) là một khái
    niệm khác.
