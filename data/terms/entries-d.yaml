  notes: 'Recommended term "thuật toán Dijkstra" is the standard name, attested in both 2020 sources (bib-leanhvinh-2020
    tr. 34, bib-nguyenhoangthach-2020 tr. 92) and in every other corpus source (2019, 2007, 2006, 2004);
    vi_terms listed newest-source first. The leanhvinh-2020 source is OCR; both normal and --loose searches
    return the same 6 clean hits for this term, so the attestation is reliable. The candidate "giải thuật
    Dijkstra" returned 0 hits in every source (normal and --loose), so it is not recorded. The descriptive
    variant "thuật toán Dijkstra tìm đường đi ngắn nhất" appears as a section/proposition heading in bib-nguyenhoangthach-2020
    (tr. 92), bib-nguyenhuudien-2019 (tr. 207), and bib-hoangchithanh-2007 (tr. 93, OCR all-caps "DUONG
    DI NGẮN NHẤT"); it is recorded as a non-standard descriptive variant rather than the headword name.
    The concept is confirmed in context: bib-leanhvinh-2020 "giúp ta tìm được đường đi ngắn nhất", bib-nguyenhoangthach-2020
    "tìm đường đi ngắn nhất giữa hai đỉnh" — both denote this shortest-path greedy procedure. definition_vi
    opens with the recommended term, states the greedy shortest-path procedure formally, clarifies that
    the vertex of smallest known distance is added to $$S$$, and notes the nonnegative-weight condition
    matching Rosen §10.6; example_vi is self-contained (introduces its own weighted graph and edge weights,
    deriving only the shortest-path length the definition mentions). Verifier re-ran find-term.py for
    all 9 vi_terms: every source_id/pdf_page/snippet matches exactly (OCR sources confirmed identical
    under normal and --loose). Example arithmetic checked: a→b→c = 4+1 = 5 is shorter than direct a→c
    = 6, so Dijkstra from a selects b (dist 4) then c (dist 5), length 5. Exactly one recommended=true.'
