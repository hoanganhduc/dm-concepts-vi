    topic absent from graph-only texts.'
- id: diameter
  letter: D
  headword_en: Diameter
  notation: \operatorname{diam}(G)
  rosen_ref: Rosen §10.4
  definition_vi: \emph{Đường kính} của một đồ thị liên thông $$G$$, ký hiệu $$\operatorname{diam}(G)$$,
    là khoảng cách lớn nhất giữa hai đỉnh bất kỳ của $$G$$, tức là $$\operatorname{diam}(G) = \max_{u,v}
    d(u,v)$$, trong đó cực đại được lấy trên mọi cặp đỉnh $$u, v \in V(G)$$.
  example_vi: Trong đồ thị đường đi $$P_n$$ với $$n$$ đỉnh, hai đỉnh đầu mút có khoảng cách lớn nhất,
    nên $$\operatorname{diam}(P_n) = n - 1$$. Trong đồ thị đầy đủ $$K_n$$ với $$n \geq 2$$, mọi cặp đỉnh
    đều kề nhau, do đó $$\operatorname{diam}(K_n) = 1$$.
