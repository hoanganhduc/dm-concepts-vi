    tô màu các cạnh của $$G$$ sao cho hai cạnh kề nhau bất kỳ được tô hai màu khác nhau.
  example_vi: Với đồ thị đầy đủ $$K_4$$ ta có $$\chi'(K_4) = 3$$; tổng quát, với chu trình $$C_n$$ thì
    $$\chi'(C_n) = 2$$ khi $$n$$ chẵn và $$\chi'(C_n) = 3$$ khi $$n$$ lẻ.
