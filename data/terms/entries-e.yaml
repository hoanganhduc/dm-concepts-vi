  definition_vi: Một \emph{đồ thị Euler} là một đồ thị liên thông $$G$$ chứa một chu trình Euler. Với
    $$G$$ liên thông và có ít nhất hai đỉnh, $$G$$ là đồ thị Euler khi và chỉ khi mọi đỉnh của $$G$$ đều
    có bậc chẵn. Nếu $$G$$ chứa một đường đi Euler nhưng không chứa chu trình Euler thì $$G$$ được gọi
    là đồ thị nửa Euler.
