  notes: 'Recommended "đồ thị Euler" is attested in two 2019-2020 sources (bib-nguyenhoangthach-2020 tr.
    76, bib-nguyenhuudien-2019 tr. 181), with the definitional snippet in nguyenhoangthach: "Nếu $$G$$
    có một chu trình Euler thì ta nói $$G$$ là một đồ thị Euler." The even-degree criterion is a biconditional
    only under connectedness (Rosen §10.5 Theorem 1: a connected multigraph with at least two vertices
    has an Euler circuit iff every vertex has even degree); the definition was restated so that connectedness
    and the at-least-two-vertices hypothesis explicitly govern the "khi và chỉ khi" clause - a disconnected
    even-degree graph is not Eulerian. The corpus matches this: ngodactan-2004 tr. 201 "G = (V, E) là
    đồ thị Euler khi và chi khi mọi đỉnh..." within the connected setting. The variant "đồ thị nửa Euler"
    (semi-Eulerian: has an Euler path but no Euler circuit) is attested in bib-nguyenhuudien-2019, bib-nguyenducnghia-2006,
    and bib-ngodactan-2004. The orthographic variant "đồ thị Ơle" returned 0 hits across all six corpus
    sources (both normal and --loose), so it is omitted from vi_terms; it appears in older Vietnamese
    texts that transliterate "Euler" as "Ơle". The OCR sources bib-hoangchithanh-2007 and bib-leanhvinh-2020
    discuss "chu trình Euler" (Euler circuit) and "đường đi Euler" (Euler path) but do not use the noun
    phrase "đồ thị Euler" for the graph itself in OCR-recoverable form (verified via both normal and --loose
    searches), so they are not cited here. The example uses $$K_5$$, whose vertices each have degree $$4$$
    (even), making it Eulerian; the degree value is self-contained from the definition''s even-degree
    condition.'
