  status: panel-approved
  notes: 'Recommended term "độ liên thông cạnh" is the standard form, attested in a 2020 source (bib-nguyenhoangthach-2020,
    tr. 75) and earlier in bib-ngodactan-2004 (tr. 266), where it carries the book-standard notation $$\lambda(G)$$
    (OCR renders it "A(ỡ)"). Both ngodactan-2004 and nguyenhoangthach-2020 define it as the minimum number
    of edges whose removal disconnects $$G$$, with the convention for the trivial/disconnected case, matching
    the Rosen concept. The minimum-edge-cut clause is taken as primary; the equivalence with the "largest
    $$k$$ such that $$G$$ is $$k$$-liên thông cạnh" formulation holds only for $$|V(G)| \geq 2$$ (the
    single-vertex case $$K_1$$ is governed by the convention in the first clause), so the definition now
    states that boundary assumption. Variants in bib-leanhvinh-2020 (2020): "chỉ số liên thông cạnh" (tr.
    26, the largest-$$k$$ formulation, "G là $$k$$-liên thông cạnh") and "số liên thông cạnh" (tr. 225);
    leanhvinh-2020 uses the notation $$\kappa''(G)$$ for this parameter rather than $$\lambda(G)$$. The
    leanhvinh-2020 attestations were confirmed via --loose (OCR drops diacritics: "Chi số", "thong").
    The related adjective form "$$k$$-liên thông cạnh" ($$k$$-edge-connected) appears across ngodactan-2004
    and leanhvinh-2020 but denotes the property, not the parameter, so it is not listed as a synonym for
    $$\lambda(G)$$. No attestation found in bib-nguyenhuudien-2019, bib-nguyenducnghia-2006, or bib-hoangchithanh-2007
    (the latter searched both normal and --loose).'
- id: eigenvalue
  letter: E
  headword_en: Eigenvalue
  notation: A\mathbf{x} = \lambda \mathbf{x}
  rosen_ref: Rosen §10.3
  definition_vi: \emph{Giá trị riêng} của một ma trận vuông $$A$$ là một số vô hướng $$\lambda$$ sao cho
    tồn tại một vectơ khác không $$\mathbf{x}$$ thỏa mãn $$A\mathbf{x} = \lambda\mathbf{x}$$. Giá trị
    riêng của một đồ thị $$G$$ là giá trị riêng của ma trận kề $$A_G$$ của nó.
  example_vi: Với ma trận $$A = \begin{pmatrix} 0 & 1 \\ 1 & 0 \end{pmatrix}$$, số $$\lambda = 1$$ là
    một giá trị riêng vì $$A\mathbf{x} = \mathbf{x}$$ với $$\mathbf{x} = \begin{pmatrix} 1 \\ 1 \end{pmatrix}
    \neq \mathbf{0}$$.
  vi_terms:
