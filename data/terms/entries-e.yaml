- id: expected-value
  letter: E
  headword_en: expected value
  notation: E(X) = \sum_{s \in S} p(s)\,X(s)
  rosen_ref: Rosen §7.4
  ref_bib: ''
  definition_vi: '\emph{Giá trị kì vọng} của một biến ngẫu nhiên $$X$$ trên không gian mẫu $$S$$ là trung
    bình có trọng số các giá trị $$X(s)$$ của nó, mỗi giá trị được lấy trọng số bằng xác suất $$p(s)$$
    của kết quả $$s$$. Giá trị này được ký hiệu $$E(X)$$ và xác định bởi

    ```math

    E(X) = \sum_{s \in S} p(s)\,X(s).

    ```'
  example_vi: Khi tung một con xúc xắc cân đối, không gian mẫu là $$S = \{1,2,3,4,5,6\}$$ với $$p(s) =
    \tfrac{1}{6}$$ cho mỗi $$s$$, và biến ngẫu nhiên $$X(s) = s$$ ghi lại số chấm xuất hiện. Khi đó giá
    trị kì vọng là $$E(X) = \sum_{s \in S} \tfrac{1}{6}\,s = \tfrac{1}{6}(1+2+3+4+5+6) = \tfrac{7}{2}$$.
