  definition_vi: Khóa mã hóa là một giá trị $$k$$ xác định hàm mã hóa nào trong một họ các hàm mã hóa
    được sử dụng. Mỗi khóa $$k$$ trong tập khóa $$\mathcal{K}$$ chọn ra một hàm mã hóa $$E_k$$ tương ứng
