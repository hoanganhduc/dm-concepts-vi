  see_ref: ''
  notes: 'Concept: an even integer is an integer $$n$$ divisible by $$2$$, that is, $$n = 2k$$ for some
    integer $$k$$. Two distinct Vietnamese terms denote this concept across the corpus. "số nguyên chẵn"
    is the literal rendering of "even integer" and is attested in the 2019 source (bib-nguyenhuudien-2019,
    tr. 40 (PDF): "11 là số nguyên chẵn"); it is set as the recommended term for headword fidelity (the
    exact translation of "even integer"). The tradeoff is explicit: "số chẵn" ("even number") is the more
    widely and more recently attested form, appearing in BOTH 2020 sources (bib-leanhvinh-2020, bib-nguyenhoangthach-2020)
    and in every other source, so the newest-source preference would favour "số chẵn"; "số nguyên chẵn"
    is chosen instead for precise headword match. The $$n = 2k$$ phrasing appears with "số chẵn" in bib-nguyenhuudien-2019,
    tr. 58 (PDF): "m là số chẵn, tức là m = 2k với k là một số nguyên dương." Important: that snippet
    restricts $$k$$ to a positive integer, which would wrongly exclude $$0$$ and negatives; the entry''s
    own definition deliberately uses "số nguyên nào đó" (some integer), so the definition is correct and
    the snippet''s restriction is not inherited. The third candidate "số nguyên chia hết cho 2" has NO
    attestation in any source (0 hits, normal and loose) and is dropped per citation hygiene. OCR sources
    bib-leanhvinh-2020 and bib-hoangchithanh-2007 only attest "số chẵn" via --loose (OCR renders "chẵn"
    as "chan"/"chẩn"/"chắn"); neither attests "số nguyên chẵn" in normal or loose mode.'
