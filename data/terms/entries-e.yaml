- id: existential-generalization
  letter: E
  headword_en: existential generalization
  notation: \dfrac{P(c)}{\therefore\ \exists x\, P(x)}
  rosen_ref: Rosen §1.6
  ref_bib: ''
  definition_vi: Tổng quát hóa hiện sinh là quy tắc suy luận cho phép, từ tính đúng của $$P(c)$$ với một
    phần tử cụ thể $$c$$ nào đó trong miền xác định, kết luận rằng $$\exists x\, P(x)$$ là đúng. Nói cách
    khác, nếu biết có một phần tử thỏa mãn $$P$$ thì khẳng định tồn tại được, ký hiệu $$P(c) \vdash \exists
    x\, P(x)$$. Thuật ngữ tiếng Việt cho khái niệm này hiện chưa thống nhất.
  example_vi: Từ mệnh đề "$$4$$ là một số nguyên dương thỏa mãn $$x > 3$$", tức $$P(4)$$ đúng, ta dùng
    tổng quát hóa hiện sinh để kết luận $$\exists x\, P(x)$$, nghĩa là tồn tại một số nguyên dương lớn
    hơn $$3$$.
