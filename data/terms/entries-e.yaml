    attested in nguyenhuudien-2019 (p.129) and nguyenducnghia-2006 (p.14); it is a longer phrasal form
    of the same concept, not a distinct term. The defining property "tính truyền" (transitivity) is also
    called "tính bắc cầu" in some sources; only "truyền" is used in the definition to avoid an in-definition
    synonym gloss, and "bắc cầu" is recorded here as the equivalent term. OCR sources (leanhvinh-2020,
    hoangchithanh-2007) returned identical hits under both normal and --loose searches; OCR noise appears
    in surrounding words ("đỏ thi", "đẳng cau") but the headword "quan hệ tương đương" is clean. vi_terms
    ordered newest-source first (2020 -> 2019 -> 2007 -> 2006 -> 2004).
