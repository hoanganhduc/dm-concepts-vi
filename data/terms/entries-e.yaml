  status: panel-approved
  notes: 'Standard term is "cạnh", attested as definitional in the 2020 source bib-leanhvinh-2020 (tr.
    8 PDF): "được gọi là cạnh của G với hai đầu mút u và v" (an edge of $$G$$ with endpoints $$u$$ and
    $$v$$). "cạnh của đồ thị" is the same concept with the modifier "of the graph". For an undirected
    edge the corpus uses "cạnh vô hướng" and for a directed edge "cạnh có hướng (hay cung)" - i.e. "cung"
    (arc) denotes the directed edge $$(u,v)$$ of a directed graph; see nguyenhuudien-2019 (tr. 158 PDF):
    "nếu (u, v) là một cung của G. Đỉnh u gọi là đỉnh đầu và đỉnh v gọi là đỉnh cuối". The candidate "cung"
    is therefore a directed-edge variant, not a synonym for the undirected edge of the primary definition
    (the two "cung" rows are tagged as directed-edge attestations in notes). Note the corpus token "cung"
    is heavily overloaded (e.g. "cung cấp" = supply, "dây cung" = chord); only graph-theoretic directed-edge
    occurrences are recorded here. Older sources (hoangchithanh-2007, ngodactan-2004, nguyenducnghia-2006)
    likewise use "cạnh". For a simple graph the identification of an edge with the unordered pair $$\{u,v\}$$
    is exact; in a multigraph distinct parallel edges share the same endpoints, so the pair no longer
    determines the edge uniquely (Rosen §10.1 uses the same simple-graph simplification).'
- id: edge-coloring
  letter: E
  headword_en: Edge coloring
  notation: \chi'(G)
  rosen_ref: Rosen §10.8
  definition_vi: Một \emph{tô màu cạnh} của đồ thị $$G$$ là một phép gán màu cho các cạnh của $$G$$ sao
    cho không có hai cạnh kề nhau (cùng chung một đỉnh đầu mút) nào được gán cùng một màu. Số màu nhỏ
    nhất cần dùng để có một tô màu cạnh của $$G$$ được gọi là sắc số cạnh, ký hiệu $$\chi'(G)$$.
  example_vi: Đồ thị chu trình $$C_4$$, trong đó hai cạnh liên tiếp dọc theo chu trình thì kề nhau, có
    thể được tô bằng $$2$$ màu, tô luân phiên hai màu dọc theo chu trình, nên $$\chi'(C_4) = 2$$.
