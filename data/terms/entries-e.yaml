  see_also:
  - adjacency-matrix
  status: panel-approved
  notes: 'Tất cả các trích dẫn xác nhận đều đến từ bib-leanhvinh-2020 (2020, lý thuyết phổ đồ thị); đây
    là nguồn duy nhất trong kho ngữ liệu đề cập khái niệm giá trị riêng. Trang định nghĩa pdf_page 206
    nêu rõ: giá trị riêng của một đồ thị $$G$$ là giá trị riêng của ma trận kề $$A_G$$ của nó, đúng với
    khái niệm này. Biến thể "trị riêng" KHÔNG được xác nhận như một thuật ngữ độc lập: mọi lần xuất hiện
    đều nằm trong cụm "giá trị riêng" (ví dụ tiêu đề mục 8.1 "Giá trị riêng của đồ thị"), nên không có
    nguồn nào chứng thực nó như một thuật ngữ riêng; do đó biến thể này được ghi lại ở đây trong notes
    thay vì trong vi_terms. Các nguồn cũ hơn (2004-2007 OCR, 2006/2019 văn bản) không có thuật ngữ tương
    ứng cho khái niệm này. Sourcing nuance: định nghĩa giá trị riêng là khái niệm đại số tuyến tính chuẩn
    áp dụng cho lý thuyết phổ đồ thị; Rosen §10.3 trình bày ma trận kề nhưng không định nghĩa giá trị
    riêng một cách tường minh, nên rosen_ref §10.3 là tham chiếu gần nhất (ma trận kề) chứ không phải
    một định nghĩa trực tiếp của giá trị riêng. Định nghĩa đưa ra ở đây là chuẩn và đúng về mặt toán học.'
- id: empty-graph
  letter: E
  headword_en: Empty graph
  notation: \overline{K_n}
  rosen_ref: Rosen §10.2
  definition_vi: \emph{Đồ thị rỗng} trên $$n$$ đỉnh, ký hiệu $$\overline{K_n}$$, là đồ thị có $$n$$ đỉnh
    và không có cạnh nào, tức là $$E(\overline{K_n}) = \varnothing$$. Do đó mọi đỉnh của $$\overline{K_n}$$
    đều là đỉnh cô lập.
  example_vi: Đồ thị $$\overline{K_3}$$ gồm ba đỉnh và không có cạnh nào; cả ba đỉnh đều là đỉnh cô lập.
