  status: panel-approved
  notes: 'Khái niệm "endpoint" gồm hai trường hợp: (1) đầu mút của một cạnh (vô hướng) là một trong hai
    đỉnh mà cạnh đó nối; (2) với cạnh có hướng (cung) $$(u,v)$$, $$u$$ là đỉnh đầu (initial vertex) và
    $$v$$ là đỉnh cuối (terminal vertex). Khi cạnh là một khuyên $$\{u,u\}$$, hai đầu mút trùng nhau tại
    một đỉnh.


    Thuật ngữ chuẩn cho đầu mút của một cạnh vô hướng là "đầu mút", được dùng phổ biến và có trong nguồn
    mới nhất (leanhvinh-2020, tr. 8 (PDF): "cạnh của $$G$$ với hai đầu mút $$u$$ và $$v$$"). Biến thể
    "điểm đầu mút" có định nghĩa rõ ràng trong nguyenhuudien-2019, tr. 157 (PDF): "Các đỉnh $$u$$ và $$v$$
    gọi là các điểm đầu mút của cạnh $$e$$." Biến thể "đỉnh đầu mút" có trong ngodactan-2004, tr. 186
    (PDF): "$$a$$ và $$b$$ được gọi là các đỉnh đầu mút của cạnh $$e$$."


    Đối với cạnh có hướng (cung): "đỉnh đầu" = initial vertex, "đỉnh cuối" = terminal vertex; cả hai đều
    được nhiều nguồn dùng (leanhvinh-2020, hoangchithanh-2007, nguyenducnghia-2006, ngodactan-2004). Định
    nghĩa rõ ràng nhất cho cung nằm ở ngodactan-2004, tr. 185 (PDF): "$$(a,b)$$ được gọi là cung của $$G$$
    với đỉnh đầu là $$a$$, đỉnh cuối là $$b$$." Biến thể danh từ "cung" cho cạnh có hướng được ghi ở mục
    edge và không lặp lại làm chú giải trong định nghĩa.


    Loại bỏ: "mút" đứng riêng không có nguồn nào dùng độc lập để chỉ khái niệm này (chỉ xuất hiện trong
    các cụm "đầu mút"/"đỉnh đầu mút"). "điểm cuối" đứng riêng trong các nguồn 2019-2020 (nguyenhoangthach-2020,
    nguyenhuudien-2019) chỉ đầu cuối của một ĐƯỜNG ĐI ("điểm cuối của đường đi"), không phải đầu mút của
    một cạnh, nên không ghi làm biến thể của khái niệm này. "đỉnh mút" trong hoangchithanh-2007, tr. 8
    (PDF) lại chỉ khuyên (đỉnh kề chính nó), là khái niệm khác, nên cũng loại bỏ.'
