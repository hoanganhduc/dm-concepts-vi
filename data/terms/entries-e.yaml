    the edgeless graph - not attested for this concept. Candidate "đồ thị rời rạc" returned 0 hits (only
    the qualified form "hoàn toàn rời rạc" exists). OCR sources bib-hoangchithanh-2007 and bib-nguyenducnghia-2006
