  definition_vi: Độ lệch tâm của một đỉnh $$v$$ trong đồ thị liên thông $$G$$, ký hiệu $$e(v)$$, là khoảng
    cách lớn nhất từ $$v$$ tới mọi đỉnh khác của $$G$$, tức là $$e(v) = \max_{u \in V(G)} d(u,v)$$, trong
    đó $$d(u,v)$$ là độ dài đường đi ngắn nhất giữa $$u$$ và $$v$$.
  example_vi: Trong đường đi $$P_4$$ với các đỉnh $$v_1, v_2, v_3, v_4$$, ta có $$e(v_1) = 3$$ và $$e(v_2)
    = 2$$; đỉnh có độ lệch tâm nhỏ nhất là đỉnh trung tâm.
