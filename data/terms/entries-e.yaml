    only "chu trình Euler" denotes the closed Euler circuit of this entry. The related class term "đồ
    thị Euler" (Euler graph = graph having an Euler circuit) is attested but names a different object
    and is not listed here. An Euler circuit traverses each edge exactly once but may revisit vertices,
    so it is generally not a simple cycle; the $$K_3$$ example happens to be a simple cycle, which is
    still a correct Euler circuit.'
