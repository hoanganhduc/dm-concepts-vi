    \mathcal{K}, \mathcal{E}, \mathcal{D})$$). Khái niệm này thuộc Rosen §4.6 và khác với "key" (khóa
    của một quan hệ $$n$$-ngôi / cơ sở dữ liệu, Rosen §9.2). Không có nguồn nào trong sáu nguồn đối chiếu
    (đều là sách lý thuyết đồ thị và tổ hợp) chứng thực thuật ngữ "khóa mã hóa"; bản dịch Rosen (2003)
    dùng "khóa" cho thành phần này nhưng không kèm định từ "mã hóa". Vì vậy thuật ngữ khuyến nghị "khóa
    mã hóa" là bản dịch chuẩn, để verified=false với page rỗng. Trong tiếng Việt, từ "khóa" đơn lẻ đa
    nghĩa (khóa của quan hệ, chìa khóa hồ sơ trong hàm băm, khóa học), nên cụm "khóa mã hóa" được ưu tiên
    để tránh nhầm lẫn.
