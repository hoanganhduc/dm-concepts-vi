- id: edge
  letter: E
  headword_en: edge
  notation: e = \{u, v\}
  rosen_ref: Rosen §10.1
  ref_bib: ''
  definition_vi: \emph{Cạnh} của một đồ thị $$G$$ nối một cặp đỉnh $$u$$ và $$v$$, gọi là hai đầu mút
    của nó, ký hiệu $$e = \{u, v\}$$. Trong đồ thị vô hướng, một cạnh là một cặp đỉnh không sắp thứ tự
    $$\{u, v\}$$; trong đồ thị có hướng, một cạnh là một cặp đỉnh sắp thứ tự $$(u, v)$$.
  example_vi: Trong đồ thị $$G$$ với tập đỉnh $$V(G) = \{u, v, w\}$$, cặp không sắp thứ tự $$\{u, v\}$$
    là một cạnh có hai đầu mút $$u$$ và $$v$$, trong khi $$\{u, w\}$$ không phải là cạnh của $$G$$ nếu
    $$u$$ và $$w$$ không được nối với nhau.
