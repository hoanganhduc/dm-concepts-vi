  definition_vi: Lý thuyết đồ thị cực hạn là nhánh nghiên cứu giá trị lớn nhất hoặc nhỏ nhất của một tham
    số đồ thị (thường là số cạnh) trên lớp các đồ thị thỏa mãn một ràng buộc cho trước, chẳng hạn không
    chứa một đồ thị con $$H$$ nào đó. Số cạnh cực đại của một đồ thị $$n$$ đỉnh không chứa $$H$$ làm đồ
    thị con được ký hiệu là $$\mathrm{ex}(n; H)$$, và đồ thị đạt giá trị này được gọi là đồ thị cực hạn.
  example_vi: Định lý Turán xác định số cạnh cực đại của một đồ thị $$n$$ đỉnh không chứa $$K_r$$ làm
    đồ thị con, đạt được bởi đồ thị Turán $$T(n, r-1)$$.
