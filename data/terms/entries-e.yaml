  notes: 'Headword "Edge coloring" denotes the assignment of colors to edges. The recommended term "tô
    màu cạnh" directly translates this and is attested in the newest source bib-leanhvinh-2020 (2020)
    as the §4.4 section title "Tô màu cạnh" (pdf_page 107-110), and in bib-ngodactan-2004 §9.3 (pdf_page
    292: "Một tô màu cạnh của một đồ thị là một phép gán các màu cho các cạnh của đồ thị đó sao cho hai
    cạnh kề nhau bất kỳ có màu khác nhau") and bib-nguyenducnghia-2006 (pdf_page 70). The descriptive
    variant "tô màu các cạnh" (coloring the edges) also appears in bib-leanhvinh-2020 (pdf_page 37, 107,
    109, 143, 145, 158, 163) and bib-nguyenducnghia-2006 (pdf_page 71). The related term "sắc số cạnh"
    denotes the edge chromatic number $$\chi''(G)$$ - a numeric invariant, not the coloring itself - and
    is therefore a related-but-distinct term, not a synonym of "tô màu cạnh"; it is retained in vi_terms
    with this disambiguation, and the see_also link to edge-chromatic-number carries the cross-reference.
    Attestations of "sắc số cạnh": bib-leanhvinh-2020 pdf_page 107 ("Sắc số cạnh của một đồ thị $$G$$,
    kí hiệu bởi $$\chi''(G)$$, là số màu $$k$$ nhỏ nhất...") and bib-ngodactan-2004 pdf_page 292 ("gọi
    là sắc số cạnh của $$G$$ và được ký hiệu là $$\chi''(G)$$"). bib-leanhvinh-2020 and bib-hoangchithanh-2007
    are OCR sources, so both normal and --loose searches were run; OCR mangles some diacritics (e.g. "Ơ"
    for "G", "x''(Ơ)" for "$$\chi''(G)$$") but the terms are confirmed. The candidate "phép tô màu cạnh"
    returned 0 hits in all sources (normal and --loose) and is dropped. Example correctness: in $$C_4$$
    only consecutive edges along the cycle are adjacent (opposite edges share no endpoint), and the two
    color classes are the two pairs of opposite edges, giving $$\chi''(C_4) = 2$$; the example uses only
    objects the definition introduces (a graph, its edges, colors).'
- id: edge-connectivity
  letter: E
  headword_en: edge connectivity
  notation: \lambda(G)
  rosen_ref: Rosen §10.4
  ref_bib: ''
  definition_vi: \emph{Độ liên thông cạnh} của một đồ thị $$G$$, ký hiệu $$\lambda(G)$$, là số cạnh ít
    nhất cần xóa để làm cho $$G$$ mất liên thông hoặc trở thành đồ thị chỉ có một đỉnh. Với $$G$$ có ít
    nhất hai đỉnh, $$\lambda(G)$$ cũng bằng số nguyên $$k$$ lớn nhất sao cho $$G$$ là $$k$$-liên thông
    cạnh.
  example_vi: Với đồ thị chu trình $$C_n$$ (trong đó $$n \geq 3$$), ta có $$\lambda(C_n) = 2$$, vì cần
    xóa ít nhất hai cạnh mới làm cho $$C_n$$ mất liên thông.
