    steps/other definitions). The notation $$\overline{K_n}$$ denotes the complement of the complete graph
    $$K_n$$; ngodactan-2004 uses $$O_n$$ for the empty graph on $$n$$ vertices. The case $$n = 1$$ is
    consistent: its single vertex has degree $$0$$ and is isolated. The see_also targets (complete-graph,
