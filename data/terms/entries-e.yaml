  notation: '[a]_R = \{ x : x\,R\,a \}'
  rosen_ref: Rosen §9.5
  definition_vi: '\emph{Lớp tương đương} của phần tử $$a$$ theo quan hệ tương đương $$R$$ trên tập $$S$$,
    ký hiệu $$[a]_R$$, là tập tất cả các phần tử của $$S$$ có quan hệ $$R$$ với $$a$$, tức là $$[a]_R
    = \{x \in S : x\,R\,a\}$$. Các lớp tương đương phân biệt tạo thành một phân hoạch của $$S$$.'
  example_vi: 'Xét quan hệ đồng dư theo modulo $$2$$ trên tập số nguyên $$\mathbb{Z}$$, trong đó $$a\,R\,b$$
    khi $$a - b$$ chia hết cho $$2$$. Quan hệ này có đúng hai lớp tương đương: lớp $$[0]_R$$ gồm các số
    chẵn và lớp $$[1]_R$$ gồm các số lẻ, và hai lớp này tạo thành một phân hoạch của $$\mathbb{Z}$$.'
