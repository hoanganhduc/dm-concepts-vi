  notes: 'Thuật ngữ chuẩn cho khái niệm này là "hàm sinh mũ", chỉ được chứng thực trong nguồn cũ nhất
    phủ khái niệm - bib-ngodactan-2004 (2004), với định nghĩa đầy đủ ở mục 2.3 "Phương pháp đếm bằng hàm
    sinh mũ". Không có nguồn 2019-2020 nào trình bày riêng biến thể hàm sinh mũ: các nguồn mới (bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019) và bib-nguyenducnghia-2006 chỉ trình bày "hàm sinh" (hàm sinh thông thường
    / ordinary generating function nói chung), không phải hàm sinh mũ. Vì vậy thuật ngữ khuyến nghị được
    chứng thực ở nguồn tốt nhất hiện có (2004); không có nguồn 2019-2020 nào để đáp ứng yêu cầu newest-source.
    Biến thể ứng viên "hàm sinh dạng mũ" không xuất hiện trong bất kỳ nguồn nào (0 hit). Thuật ngữ giống
    loài "hàm sinh" (ordinary generating function) là một khái niệm liên quan nhưng KHÁC, không phải biến
    thể đồng nghĩa của hàm sinh mũ; nó được liệt kê làm related/genus term và được chứng thực trong các
    nguồn 2020/2006/2004. Rosen §8.4 trình bày exponential generating function, phù hợp với định nghĩa
    ở đây; hệ số dãy số thực hẹp hơn một chút so với hệ số tổng quát của Rosen nhưng là chuẩn trong các
    ví dụ của §8.4.'
