  see_ref: ''
  notes: 'Concept = giá trị kỳ vọng (trung bình) của một biến ngẫu nhiên $$X$$ trên không gian mẫu $$S$$,
    tức trung bình có trọng số $$E(X) = \sum_{s \in S} p(s)\,X(s)$$ (Rosen §7.4, hữu hạn/đếm được). The
    descriptor "trung bình" (average) appears naturally inside the definition ("trung bình có trọng số")
    rather than as a synonym gloss. Mining results: in the corpus only bib-leanhvinh-2020 (2020) attests
    a term denoting THIS concept, and its OCR consistently renders the standard spelling "kỳ vọng" as
    "kì vọng" (grave accent on i). The recommended term is the full headword-fidelity phrase "giá trị
    kì vọng" (= "expected value"), attested at bib-leanhvinh-2020 pdf_page 193 ("giá trị kì vọng của số
    cạnh giữa hai tập đỉnh sẽ"); the bare partitive "kì vọng" (the expectation operation/quantity) is
    recorded as a short variant at pdf_page 191. All occurrences sit in the probabilistic-method context
    (expected value of a count of edges/tuples/embeddings). The diacritic-standard forms "kỳ vọng" and
    "giá trị kỳ vọng" return zero hits even under --loose, so they are not directly attested; "kì" and
    "kỳ" are orthographic variants of the same word ("kỳ vọng" the more common modern spelling, "kì vọng"
    the variant actually printed in this source). Those two unverified diacritic variants and the candidate
    "giá trị trung bình" were dropped per citation hygiene (verified=false with empty page); "giá trị
    trung bình" returns zero hits and all "trung bình" hits denote "bậc trung bình" (average degree) or
    the averaging operation "lấy trung bình", NOT the random-variable expectation. No older source (2004-2007)
    attests this probabilistic concept under any candidate term (bib-hoangchithanh-2007 returns zero hits
    for kì/kỳ vọng). see_also is empty: no same-chapter E-terms (e.g. biến ngẫu nhiên / không gian mẫu
    / phương sai) exist to link, and cross-chapter items would be forward references only.'
