- id: finite-set
  letter: F
  headword_en: Finite set
  notation: '|S| = n'
  rosen_ref: Rosen §2.1
  definition_vi: Một tập hợp $$S$$ được gọi là một \emph{tập hữu hạn} nếu nó có đúng $$n$$ phần tử phân
    biệt với $$n$$ là một số nguyên không âm nào đó. Khi đó số phần tử của $$S$$ được ký hiệu là $$|S|
    = n$$.
  example_vi: Tập hợp $$S = \{a, b, c\}$$ là một tập hữu hạn với $$|S| = 3$$. Tập rỗng $$\varnothing$$
    cũng là một tập hữu hạn với $$|\varnothing| = 0$$.
