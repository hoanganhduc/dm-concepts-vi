  notation: a^{p-1} \equiv 1 \pmod{p}
  rosen_ref: Rosen §4.4
  definition_vi: \emph{Định lý nhỏ Fermat} khẳng định rằng nếu $$p$$ là một số nguyên tố và $$a$$ là một
    số nguyên không chia hết cho $$p$$, thì $$a^{p-1} \equiv 1 \pmod{p}$$. Một cách tương đương, với mọi
