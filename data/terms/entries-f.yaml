  status: panel-approved
  see_ref: ''
  notes: 'Concept: a function $$f : A \to B$$ assigns exactly one element of $$B$$ to each element of
    $$A$$. The earlier draft wrapped the Vietnamese term in math delimiters as $$hàm số$$, which renders
    prose as italic math variables; this was corrected to \emph{hàm số} (first-introduction emphasis),
    reserving $$...$$ for genuine symbols ($$f$$, $$A$$, $$B$$, $$f : A \to B$$). Three distinct Vietnamese
    terms attest this concept across the corpus. Recommended "hàm số" is attested in the 2019 discrete-math
    source (bib-nguyenhuudien-2019, tr. 102) with the Rosen framing "hàm số từ tập A ... vào tập B" (functions
    from a set A to a set B); this is a counting-exercise usage, the most definitional occurrence of the
    term in the graph/combinatorics-focused corpus. It also appears in the 2020 combinatorics source (bib-nguyenhoangthach-2020,
    tr. 46). "hàm" is the shorter discrete-math variant, attested in the 2020 graph-theory source (bib-leanhvinh-2020,
    tr. 48: "một hàm ƒ : [n] → [n]"). "ánh xạ" (map/mapping) is the term for the more abstract mapping
    notion and is widely attested (bib-leanhvinh-2020 tr. 90 defines a $$k$$-coloring as a map; bib-hoangchithanh-2007
    tr. 6; bib-ngodactan-2004 tr. 41), but in the discrete-math context of Rosen §2.3 the standard everyday
    term for $$f : A \to B$$ is "hàm/hàm số", so "hàm số" is recommended. OCR sources (bib-leanhvinh-2020,
    bib-hoangchithanh-2007) were searched both normally and with --loose; OCR mangles diacritics (e.g.
    "ƒ : [n] = In|" for $$f : [n] \to [n]$$) but the term "ánh xạ"/"hàm" is legible. The definition introduces
    "tập nguồn" (domain $$A$$) and "tập đích" (codomain $$B$$) informally so the example needs no quantity
    the definition did not name; precise treatments of these live under the domain and codomain entries.
    function is a same-chapter id linked from function-composition.'
- id: function-composition
  letter: F
  headword_en: function composition
  notation: (g \circ f)(a) = g(f(a))
  rosen_ref: Rosen §2.3
  ref_bib: ''
  definition_vi: '\emph{Hợp thành} của hai hàm $$g : B \to C$$ và $$f : A \to B$$ là hàm từ $$A$$ vào
    $$C$$, ký hiệu $$g \circ f$$, được xác định bởi $$(g \circ f)(a) = g(f(a))$$ với mọi $$a \in A$$.'
  example_vi: 'Cho $$f : \mathbb{R} \to \mathbb{R}$$ với $$f(a) = a + 1$$ và $$g : \mathbb{R} \to \mathbb{R}$$
    với $$g(b) = 2b$$. Khi đó hợp thành $$g \circ f : \mathbb{R} \to \mathbb{R}$$ được cho bởi $$(g \circ
    f)(a) = g(f(a)) = 2(a + 1)$$ với mọi $$a \in \mathbb{R}$$.'
