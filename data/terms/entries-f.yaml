- id: fallacy
  letter: F
  headword_en: fallacy
  notation: ''
  rosen_ref: Rosen §1.6
  ref_bib: ''
  definition_vi: Ngụy biện là một dạng suy luận sai dựa trên một quy tắc suy diễn không hợp lệ, nhưng
    thường bị nhầm tưởng là đúng, dẫn đến các chứng minh sai. Chẳng hạn, ngụy biện khẳng định kết luận
    suy ra giả thiết $$p$$ từ việc $$p \rightarrow q$$ và $$q$$ đều đúng, mặc dù $$((p \rightarrow q)
    \wedge q) \rightarrow p$$ không phải là một hằng đúng.
