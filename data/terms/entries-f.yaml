  status: draft
  see_ref: ''
  notes: 'Full entry (not a stub): the book has a separate "Half adder" entry (id half-adder), but a half
    adder adds two bits with no carry input, while a full adder adds two bits plus a carry-in bit and
    so is a distinct concept, not a synonym; "Combinatorial Circuit" (id combinatorial-circuit) is the
    broader category, not the same concept. Definition split into two sentences per the readability convention:
    one for the cumulative carry-adding role, one for the three inputs and two outputs. The notation field
    gives the standard sum and carry-out Boolean formulas; $$\oplus$$ denotes the XOR (sum) gates, $$\wedge$$
    the AND gates, and $$\vee$$ the OR gate combining the carry, consistent with the Boolean-function
    notation used elsewhere in the book and with the half-adder entry. No Vietnamese source in the mined
    corpus attests the full-adder concept. The candidate terms "mạch cộng toàn phần", "mạch cộng", "bộ
    cộng", "bán phần", "bit nhớ", "cổng XOR", and "mạch tổ hợp" return 0 relevant hits in both normal
    and --loose mode across all six sources (bib-leanhvinh-2020, bib-nguyenhoangthach-2020, bib-nguyenhuudien-2019,
    bib-hoangchithanh-2007, bib-nguyenducnghia-2006, bib-ngodactan-2004) and in the Rosen-VI reference
    (bib-rosen-2003-vi); "toàn phần" hits in Rosen-VI (pp.96,861,862) all denote total functions ("hàm
    toàn phần"), not full adders; "bộ cộng" (--loose) yields only the false positive "toàn bộ công trình"
    ("the entire work", bib-nguyenducnghia-2006 p.234). Adjacent searches confirm the gap: "mạch logic"
    (bib-nguyenducnghia-2006 p.290) is a generic control-logic-circuit design exercise, and "phép cộng
    bit" (bib-nguyenhuudien-2019 pp.145,147) means "bit-addition operation" in an algorithm-complexity
    context, neither denoting a full adder. The full adder is a combinational/Boolean logic circuit topic
    (Rosen §12.3); the mined corpus covers graph theory, combinatorics, and discrete mathematics, none
    of which treat digital logic gates, so the concept is genuinely absent. The recommended term "mạch
    cộng toàn phần" is the standard Vietnamese rendering (literally "full-portion adder circuit"), parallel
    to the half-adder entry''s "mạch cộng bán phần"; per the sanctioned exception it is kept verified=false/page=""
    so vi_terms is non-empty and the single-recommendation invariant holds, pending attestation from an
    electronics or computer-architecture source outside this corpus.'
