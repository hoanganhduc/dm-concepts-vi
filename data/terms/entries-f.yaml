    là hàm). Không nguồn nào trong kho ngữ liệu (vốn tập trung vào lý thuyết đồ thị và tổ hợp) định nghĩa
    trực tiếp hợp thành của hai $$\textit{hàm}$$ theo nghĩa Rosen §2.3. Recommended term "hợp thành" được
    xác nhận trong nguyenhuudien-2019 (2019, §4.3.2, tr. 114) cho phép hợp thành hai quan hệ: "$$Q$$ gọi
    là quan hệ hợp thành giữa hai quan hệ $$R$$ và $$S$$", ký hiệu $$Q = R.S$$. Đây là điểm cần lưu ý
    về độ chính xác thuật ngữ: trang được trích dẫn định nghĩa hợp thành của QUAN HỆ (một đối tượng tổng
    quát hơn), không phải hợp thành của hai hàm; do hợp thành hàm là trường hợp riêng nên definition_vi
    vẫn đúng, và "hợp thành" được chọn làm thuật ngữ khuyến nghị vì có nguồn 2019 và đã được dùng cho
    phép toán này trong mục automorphism của kho ("phép hợp thành ánh xạ"). Các thuật ngữ ứng viên "hàm
    hợp" (cách gọi quy ước cho hàm số hợp trong giải tích) và "tích ánh xạ" (cách gọi thay thế trong đại
    số) đều KHÔNG xuất hiện trong kho ngữ liệu này (0 lần truy xuất, cả normal lẫn --loose) nên đã được
    loại khỏi vi_terms theo quy tắc citation hygiene và chỉ ghi nhận là 0-hit ở đây. Các lần truy xuất
    "hợp thành" trong ngodactan-2004 chỉ "hợp thành của số nguyên $$n$$" (một khái niệm tổ hợp khác) và
    đã được loại trừ. Ví dụ tự chứa: chỉ dùng $$f$$, $$g$$ và phép hợp thành mà định nghĩa đã giới thiệu.
    function là liên kết cùng chương (same-chapter F).'
- id: functionally-complete
