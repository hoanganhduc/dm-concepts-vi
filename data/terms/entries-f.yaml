- id: floor
  letter: F
  headword_en: Floor
  notation: \lfloor x \rfloor
  rosen_ref: Rosen §2.3
  definition_vi: Hàm sàn gán cho mỗi số thực $$x$$ số nguyên lớn nhất nhỏ hơn hoặc bằng $$x$$, ký hiệu
    $$\lfloor x \rfloor$$. Như vậy $$\lfloor x \rfloor$$ là số nguyên $$n$$ duy nhất thỏa mãn $$n \leq
    x < n+1$$.
  example_vi: Chẳng hạn $$\lfloor 2.7 \rfloor = 2$$, $$\lfloor 5 \rfloor = 5$$ và $$\lfloor -1.5 \rfloor
    = -2$$.
