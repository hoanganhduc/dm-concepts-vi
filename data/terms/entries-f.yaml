    và ngụy biện phủ nhận giả thiết.
- id: field
  letter: F
  headword_en: Field
  notation: (F, +, \cdot)
  rosen_ref: Rosen §4.1
  definition_vi: Trường là một tập $$F$$ cùng hai phép toán cộng và nhân, ký hiệu $$(F, +, \cdot)$$, sao
    cho $$(F, +)$$ là một nhóm giao hoán với phần tử trung hòa $$0$$, tập các phần tử khác không $$F \setminus
    \{0\}$$ cùng phép nhân là một nhóm giao hoán với phần tử đơn vị $$1 \neq 0$$, và phép nhân phân phối
    đối với phép cộng. Nói cách khác, trường là một vành giao hoán có đơn vị trong đó mọi phần tử khác
    $$0$$ đều khả nghịch.
  example_vi: Tập các số hữu tỉ $$\mathbb{Q}$$, số thực $$\mathbb{R}$$ và số phức $$\mathbb{C}$$ đều là
    trường. Với $$p$$ là số nguyên tố, tập $$\mathbb{Z}_p = \{0, 1, \ldots, p-1\}$$ với phép cộng và nhân
    theo modulo $$p$$ là một trường hữu hạn.
