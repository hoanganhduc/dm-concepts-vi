    logic), and pdf p.46-47 give the substantive content — a predicate $$P(n)$$ over a variable, plus
    the universal quantifier "với mọi" ($$\forall$$) and existential quantifier "tồn tại" ($$\exists$$):
    "Ký hiệu ∀ và ∃ được gọi là lượng từ với mọi và lượng từ tồn tại." The recommended-term citation points
    at this definitional p.47 occurrence rather than the p.45 chapter-title heading. This matches first-order
    (predicate) logic with quantifiers. Recommended term "lôgic vị từ" attested in a 2019 source (newest
    available for this concept). The variant "vị từ và lượng từ" (section 2.1 title, "predicate and quantifier")
    names the two components rather than the logic system itself; recorded as a verified variant with
    its section-title snippet. Diacritic-free spelling "logic vị từ" returned 0 hits in every source (including
    loose OCR matching of bib-leanhvinh-2020 and bib-hoangchithanh-2007) and is kept only as an unattested
    spelling note. The explicit first-order form "lôgic vị từ cấp một" was not attested (0 hits), consistent
    with the introductory single-domain rendering used here; full first-order logic also allows multi-place
    predicates and nested quantifiers, which are outside Rosen §1.4''s introductory scope. None of the
    graph-theory/combinatorics sources (bib-leanhvinh-2020, bib-nguyenhoangthach-2020, bib-hoangchithanh-2007,
    bib-nguyenducnghia-2006, bib-ngodactan-2004) contain predicate-logic terminology, consistent with
    this logic concept being absent from those graph-focused texts. see_also entries (predicate, quantifier,
    universal-quantifier, existential-quantifier, propositional-logic) are cross-chapter forward references
    (P/Q/U/E chapters), not same-chapter F-terms; they are kept as the genuinely related concepts for
    the eventual cross-reference index.'
