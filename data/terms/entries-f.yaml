  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "biểu thức logic" is attested with a formal formation-rules definition in the
    2019 source bib-nguyenhuudien-2019: Định nghĩa 1.5 builds logical expressions from propositional variables
    using connectives ($$\land, \lor, \to, \leftrightarrow$$), and §1.3 (pdf pp. 19–26) develops them
    inductively (Định nghĩa 1.5–1.9, including normal forms / dạng chính tắc), matching Rosen''s propositional
    well-formed formula. Also attested earlier in bib-nguyenducnghia-2006 (pdf p. 99). Newest source listed
    first. The definition was restricted to PROPOSITIONAL well-formed formulas to match the cited Rosen
    §1.1: an earlier draft introduced quantifiers $$\forall, \exists$$ in the preamble but the inductive
    clauses gave no formation rule for $$\forall x\, E$$ / $$\exists x\, E$$, leaving the recursion incomplete;
    quantified well-formed formulas belong to first-order logic (Rosen §1.4/1.5, see first-order-logic).
    Unattested candidates (NOT recorded as verified vi_terms): "công thức logic" — 0 hits (normal + loose);
    "công thức hợp thức" — 0 hits; "công thức" alone — 327 hits but all denote named mathematical formulas
    (Công thức Cayley, công thức Euler), NOT logic formulas, so it is a false friend for this concept;
    "công thức mệnh đề" — 0 hits; "hợp thức" — only 2 loose hits, both OCR false positives ("tổ hợp thực
    tế" mis-split), no genuine "well-formed/hợp thức" sense. The graph-theory OCR sources (bib-leanhvinh-2020,
    bib-hoangchithanh-2007) and combinatorics sources do not cover propositional/predicate logic formulas,
    as expected for this discrete-math logic concept. The parenthetical gloss "(công thức hợp thức của
    phép tính mệnh đề)" in definition_vi mirrors the English headword "well-formed formula" with the propositional
    scope; it is a literal rendering of the English term, not an attested Vietnamese variant, so it is
    not recorded in vi_terms. Note: the running-prose spelling "logic" here matches the recommended source-attested
    term "biểu thức logic", and differs from the "lôgic" spelling in first-order-logic where the recommended
    source-attested term is "lôgic vị từ"; both spellings are source-faithful to their respective recommended
    terms.'
