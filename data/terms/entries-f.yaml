- id: factor
  letter: F
  headword_en: factor
  notation: a \mid b
  rosen_ref: Rosen §4.1
  ref_bib: ''
  definition_vi: Ước của một số nguyên $$b$$ là một số nguyên $$a \neq 0$$ sao cho tồn tại số nguyên $$c$$
    với $$b = ac$$; khi đó ta nói $$a$$ chia hết $$b$$, ký hiệu $$a \mid b$$, và gọi $$a$$ là một ước
    (hay thừa số) của $$b$$.
  example_vi: Các ước nguyên dương của $$12$$ là $$1, 2, 3, 4, 6, 12$$, vì mỗi số trong chúng đều chia
    hết $$12$$.
