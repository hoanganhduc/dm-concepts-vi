  notes: 'Concept: a network flow is the function $$f : E \to \mathbb{R}^{+} \cup \{0\}$$ on a transportation
    network with source $$s$$ and sink $$t$$ that respects every edge capacity and conserves flow at each
    vertex other than $$s$$ and $$t$$. The recommended term "luồng vận tải" is attested definitionally
    in the newest text source (bib-nguyenhuudien-2019, tr. 210); note that source defines an INTEGER-valued
    flow ("nhận giá trị nguyên"), whereas the headword notation $$f : E \to \mathbb{R}^{+} \cup \{0\}$$
    is real-valued, matching Rosen and bib-ngodactan-2004 (tr. 255, 257, 259: "Hàm $$f : E \to \mathbb{R}^{+}
    \cup \{0\}$$ được gọi là luồng trong mạng vận tải"). The real-valued notation is kept as the general
    form, with the integer-valued restriction of the recommended source noted here. Variants: "luồng trong
    mạng" (bib-nguyenducnghia-2006, tr. 242, 245-246), "luồng qua mạng" (bib-hoangchithanh-2007, tr. 102
    section heading "Luồng qua mạng", tr. 104; the same phrase appears in bib-nguyenhuudien-2019 tr. 210
    but there denotes the flow VALUE/intensity "cường độ luồng", not the flow function), and bare "luồng"
    used throughout once the network context is fixed. The derived term "luồng cực đại" (maximum flow)
    — heavily attested in bib-nguyenducnghia-2006 (Chương 7) and bib-nguyenhuudien-2019 (§8.2) — denotes
    a different concept (the optimization target) and is excluded here. bib-leanhvinh-2020 was mined normal
    and --loose: no attestation of this concept (0 hits). bib-nguyenhoangthach-2020 also has no attestation;
    its --loose "luồng" hits are all OCR collisions with "đại lượng"/"số lượng"/"lực lượng". The recommended
    2019 source is the newest with this concept.'
- id: fermats-little-theorem
  letter: F
  headword_en: Fermat's little theorem
  notation: a^{p-1} \equiv 1 \pmod{p}
  rosen_ref: Rosen §4.4
  definition_vi: \emph{Định lý nhỏ Fermat} khẳng định rằng nếu $$p$$ là một số nguyên tố và $$a$$ là một
    số nguyên không chia hết cho $$p$$, thì $$a^{p-1} \equiv 1 \pmod{p}$$. Một cách tương đương, với mọi
    số nguyên $$a$$ ta có $$a^{p} \equiv a \pmod{p}$$.
  example_vi: Với $$p = 5$$ và $$a = 2$$, ta có $$2^{4} = 16 \equiv 1 \pmod{5}$$.
  vi_terms:
  - term: định lý nhỏ Fermat
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - eulers-theorem
  - congruence
  - prime
  status: panel-approved
  notes: 'No Vietnamese corpus source attests any term denoting Fermat''s little theorem ($$a^{p-1} \equiv
    1 \pmod{p}$$). This is a number-theory topic (Rosen §4.4) outside the graph-theory/combinatorics scope
    of the six mined sources, so the recommended term "định lý nhỏ Fermat" is kept with verified=false
    and the pdf_page:0 / empty-page sentinel to keep vi_terms non-empty, as permitted by citation hygiene.
    Search evidence: (1) "Fermat" appears only in passing historical mentions of the mathematician alongside
    Pascal, Leibnitz, Euler (bib-ngodactan-2004 p.19; bib-nguyenducnghia-2006 p.11). (2) The single "định
    lý Fermat" loose hit (bib-nguyenducnghia-2006 p.56, "...khó có thể tìm được. Ngoài định lý Fermat")
    occurs in a motivational passage about a hard-to-find/unsolved result, denoting Fermat''s LAST theorem
    (định lý lớn / định lý cuối cùng Fermat), NOT the little theorem — so it does not attest this concept.
    (3) All "đồng dư" hits (bib-nguyenhuudien-2019 pp.39,106,110,116) are generic congruence-relation-modulo-n
    usages with no Fermat connection. OCR sources (bib-leanhvinh-2020, bib-hoangchithanh-2007) return
    zero "Fermat" hits even with --loose. Distinct candidate variants for this concept, each 0-hit and
    none attested: "định lý nhỏ Fermat" (recommended standard form, 0 hits), "định lí Fermat nhỏ" (0 hits),
    "định lý Fermat bé" (0 hits), "đồng dư Fermat" (0 hits).'
- id: fixed-point
  letter: F
  headword_en: Fixed point
  notation: f(a) = a
  rosen_ref: Rosen §8.5
  definition_vi: '\emph{Điểm bất động} của một hàm $$f : A \to A$$ là một phần tử $$a \in A$$ thỏa mãn
    $$f(a) = a$$. Đối với một hoán vị, điểm bất động là một phần tử mà hoán vị giữ nguyên không thay đổi.'
  example_vi: Với hoán vị $$\pi$$ trên tập $$\{1, 2, 3\}$$ xác định bởi $$\pi(1) = 1$$, $$\pi(2) = 3$$
    và $$\pi(3) = 2$$, phần tử $$1$$ là một điểm bất động vì $$\pi(1) = 1$$, còn $$2$$ và $$3$$ không
    phải là điểm bất động.
  vi_terms:
  - term: điểm bất động
