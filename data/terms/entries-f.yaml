  status: panel-approved
  notes: Recommended term "mặt" is attested in the newest 2020 source (bib-leanhvinh-2020). The lead citation
    points at the definitional occurrence "tập các mặt của G" (p.116); the term also reads "số mặt của
    một đồ thị phẳng" in the Euler-relation statement (p.114) and the descriptive form "mặt của đồ thị"
    appears at p.120, all in the same source. "miền" (region) is the most common synonym, attested across
    nguyenhoangthach-2020 (which explicitly writes "các miền (hay mặt)", equating the two on p.79), nguyenhuudien-2019,
    nguyenducnghia-2006, and ngodactan-2004. "diện" is an older term used by hoangchithanh-2007 (p.116).
    The single unbounded exterior region is rendered "mặt ngoài" (leanhvinh-2020 p.128, 130), and also
    appears as "miền vô hạn" (nguyenhuudien-2019 p.231) or "diện vô hạn" (hoangchithanh-2007 p.116). The
    definition uses "mặt" for the recommended term and "mặt ngoài" for the unbounded exterior region,
    both attested in leanhvinh-2020. see_also targets planar-graph and eulers-formula-planar are cross-chapter
    forward references (no F-chapter entries currently exist to link as same-chapter).
- id: factorial
  letter: F
  headword_en: Factorial
  notation: n!
  rosen_ref: Rosen §6.3
  definition_vi: \emph{Giai thừa} của một số nguyên không âm $$n$$, ký hiệu $$n!$$, là tích của tất cả
    các số nguyên dương từ $$1$$ đến $$n$$, tức là $$n! = 1 \times 2 \times \cdots \times n$$, với quy
    ước $$0! = 1$$.
  example_vi: Với $$n = 4$$, ta có $$4! = 1 \times 2 \times 3 \times 4 = 24$$.
