- id: flowchart
  letter: F
  headword_en: Flowchart
  notation: ''
  rosen_ref: ''
  definition_vi: Sơ đồ khối (lưu đồ) là một cách biểu diễn trực quan một thuật toán bằng các khối hình
    học nối với nhau bởi các mũi tên, trong đó mỗi khối ứng với một bước tính toán hoặc một quyết định
    và các mũi tên chỉ thứ tự thực hiện các bước. Đây là một trong các cách trình bày thuật toán bên cạnh
    ngôn ngữ tự nhiên và ngôn ngữ lập trình.
  example_vi: 'Một thuật toán tìm giá trị lớn nhất trong một dãy hữu hạn $$a_1, a_2, \ldots, a_n$$ có
    thể được trình bày bằng sơ đồ khối: một khối gán giá trị ban đầu, một khối quyết định so sánh $$a_i$$
    với giá trị lớn nhất hiện tại, và một mũi tên quay lại khi $$i \leq n$$.'
