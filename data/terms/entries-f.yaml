- id: formal-proof
  letter: F
  headword_en: Formal Proof
  notation: ''
  rosen_ref: Rosen §1.7
  definition_vi: Chứng minh hình thức của một mệnh đề là một dãy hữu hạn các mệnh đề, trong đó mỗi mệnh
    đề là một tiên đề, một giả thiết, hoặc được suy ra từ các mệnh đề đứng trước nhờ một quy tắc suy luận,
    và mệnh đề cuối cùng chính là mệnh đề cần chứng minh. Mọi bước trong chứng minh hình thức đều phải
    được biện minh đầy đủ và rõ ràng.
  example_vi: Để chứng minh hình thức $$p \rightarrow r$$ từ các giả thiết $$p \rightarrow q$$ và $$q
    \rightarrow r$$, ta áp dụng quy tắc tam đoạn luận giả định (hypothetical syllogism) trên hai giả thiết
    để thu được trực tiếp $$p \rightarrow r$$.
  vi_terms:
  - term: chứng minh hình thức
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
    pdf_page: 0
    snippet: ''
  see_also: []
  status: panel-approved
  notes: Chứng minh hình thức trình bày đầy đủ mọi bước suy luận; trong thực hành, các chứng minh thông
    thường (informal proof) thường lược bớt các bước hiển nhiên. Thuật ngữ này không xuất hiện trong các
    nguồn tiếng Việt đã quét, nên chỉ có thuật ngữ giáo trình được xác nhận.
