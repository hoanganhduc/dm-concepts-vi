- id: face
  letter: F
  headword_en: Face of a planar graph
  notation: F
  rosen_ref: Rosen §10.7
  definition_vi: Cho $$G$$ là một đồ thị phẳng liên thông cùng với một biểu diễn phẳng của nó trên mặt
    phẳng. Biểu diễn này chia mặt phẳng thành các vùng liên thông; mỗi vùng như vậy được gọi là một \emph{mặt}
    của $$G$$, và tập tất cả các mặt được ký hiệu là $$F$$. Mặt không bị giới hạn, bao quanh toàn bộ biểu
    diễn, được gọi là mặt ngoài.
  example_vi: 'Một đồ thị phẳng liên thông là một chu trình $$C_4$$ vẽ trên mặt phẳng có hai mặt: vùng
    bên trong chu trình và mặt ngoài bao quanh chu trình.'
