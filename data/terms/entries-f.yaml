    hậu kiện $$q$$ rồi suy ngược ra tiền kiện $$p$$ nên suy luận không hợp lệ.
- id: fallacy-of-denying-the-hypothesis
  letter: F
  headword_en: Fallacy Of Denying The Hypothesis
  notation: ((p \rightarrow q) \wedge \neg p) \rightarrow \neg q
  rosen_ref: Rosen §1.6
  definition_vi: Ngụy biện phủ định giả thiết là suy luận sai khi từ giả thiết $$p \rightarrow q$$ và
    $$\neg p$$ kết luận rằng $$\neg q$$ đúng. Suy luận này không hợp lệ vì mệnh đề $$((p \rightarrow q)
    \wedge \neg p) \rightarrow \neg q$$ không phải là hằng đúng (chẳng hạn khi $$p$$ sai và $$q$$ đúng).
  example_vi: Từ "nếu trời mưa thì đường ướt" ($$p \rightarrow q$$) và quan sát "trời không mưa" ($$\neg
    p$$), nếu kết luận "đường không ướt" ($$\neg q$$) thì đó là ngụy biện phủ định giả thiết, vì đường
    vẫn có thể ướt do nguyên nhân khác.
