- id: fibonacci-sequence
  letter: F
  headword_en: Fibonacci sequence
  notation: f_n = f_{n-1} + f_{n-2}
  rosen_ref: Rosen §8.1
  definition_vi: \emph{Dãy Fibonacci} là dãy $$(f_n)$$ xác định bởi các điều kiện đầu $$f_0 = 0$$, $$f_1
    = 1$$ và hệ thức truy hồi $$f_n = f_{n-1} + f_{n-2}$$ với mọi $$n \geq 2$$.
  example_vi: Từ $$f_0 = 0$$ và $$f_1 = 1$$ ta tính được $$f_2 = f_1 + f_0 = 1$$, $$f_3 = f_2 + f_1 =
    2$$ và $$f_4 = f_3 + f_2 = 3$$.
