- id: fallacious-argument
  letter: F
  headword_en: fallacious argument
  notation: ''
  rosen_ref: ''
  ref_bib: bib-libennowell-2022
  definition_vi: \emph{Lập luận ngụy biện} là một lập luận mà kết luận không được suy ra một cách hợp
    lệ từ các tiền đề, nghĩa là tồn tại cách gán giá trị chân lý làm cho mọi tiền đề đều đúng nhưng kết
    luận lại sai. Một lập luận như vậy không bảo toàn tính đúng đắn dù bề ngoài có vẻ thuyết phục.
  example_vi: Lập luận "nếu $$p$$ thì $$q$$; $$q$$ đúng; vậy $$p$$ đúng" (khẳng định hệ quả) là một lập
    luận ngụy biện, vì $$q$$ có thể đúng ngay cả khi $$p$$ sai.
