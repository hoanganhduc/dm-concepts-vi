  headword_en: function
  notation: 'f : A \to B'
  rosen_ref: Rosen §2.3
  ref_bib: ''
  definition_vi: 'Một \emph{hàm số} $$f$$ từ tập $$A$$ vào tập $$B$$ là một phép gán mỗi phần tử của $$A$$
    với đúng một phần tử của $$B$$, ký hiệu $$f : A \to B$$. Tập $$A$$ được gọi là tập nguồn và tập $$B$$
    được gọi là tập đích của $$f$$.'
  example_vi: 'Cho $$A = \{1, 2, 3\}$$ và $$B = \{a, b\}$$. Phép gán $$f(1) = a$$, $$f(2) = b$$, $$f(3)
    = a$$ là một hàm số $$f : A \to B$$, vì mỗi phần tử của $$A$$ được gán với đúng một phần tử của $$B$$.'
