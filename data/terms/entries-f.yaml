  status: panel-approved
  notes: 'Recommended term "điểm bất động" is the standard Vietnamese term for a fixed point $$f(a) =
    a$$ (here, of a permutation). It is attested only in bib-ngodactan-2004 (2004): "điểm bất động của
    hoán vị" (fixed point of a permutation), permutations "không có điểm bất động" (derangements), and
    "tập các điểm bất động" (set of fixed points) at pdf pages 98, 99, 112, 113, 142, 151. No 2019-2020
    source attests any candidate term, so the recommended term cannot be backed by a newest-source citation;
    the 2004 attestation is the newest available and is listed first. Candidate variants "điểm cố định"
    and "điểm bất biến" returned zero hits across all sources (including OCR --loose runs on bib-leanhvinh-2020
    and bib-hoangchithanh-2007) and are dropped per citation hygiene. The phrase "phần tử cố định" appears
    in bib-nguyenhuudien-2019 (pdf 52, 54) and bib-nguyenducnghia-2006 (pdf 33) but denotes "a fixed/chosen
    element a" in a counting argument, NOT the fixed-point concept $$f(a) = a$$; it is a false positive
    and excluded.'
- id: formula
  letter: F
  headword_en: Formula (well-formed formula)
  notation: E, F
  rosen_ref: Rosen §1.1
  definition_vi: \emph{Biểu thức logic} (công thức hợp thức của phép tính mệnh đề) là biểu thức được xây
    dựng từ các biến mệnh đề bằng các phép nối logic ($$\neg, \land, \lor, \to, \leftrightarrow$$) theo
    các quy tắc tạo lập. Mỗi biến mệnh đề là một biểu thức logic, và nếu $$E$$, $$F$$ là các biểu thức
    logic thì $$\neg E$$, $$E \land F$$, $$E \lor F$$, $$E \to F$$, $$E \leftrightarrow F$$ cũng là các
    biểu thức logic.
  example_vi: Nếu $$p$$, $$q$$ là các biến mệnh đề thì $$(p \land \neg q) \to (q \lor p)$$ là một biểu
    thức logic, trong khi chuỗi ký hiệu $$p \land \to q$$ không phải là biểu thức logic vì không tuân
    theo quy tắc tạo lập.
  vi_terms:
  - term: biểu thức logic
    source_id: bib-nguyenhuudien-2019
    page: tr. 20 (PDF)
    recommended: true
    verified: true
    pdf_page: 20
    snippet: Định nghĩa 1.5 Trong phép tính mệnh đề ta cũng có các biểu thức logic được xây dựng từ ...
      Giả sử E, F là 2 biểu thức logic, khi ấy E, E ∧ F, E ∨ F, E → F, E ↔ F cũng là các biểu thức
  - term: biểu thức logic
    source_id: bib-nguyenducnghia-2006
    page: tr. 99 (PDF)
    recommended: false
    verified: true
    pdf_page: 99
    snippet: đề cử và việc xác định giá trị của biểu thức logic <cháp nhận ?>. Thông thường giá trị
  see_also:
  - propositional-variable
  - logical-connective
  - quantifier
  - predicate
  status: panel-approved
  notes: 'Recommended term "biểu thức logic" is attested with a formal formation-rules definition in the
    2019 source bib-nguyenhuudien-2019: Định nghĩa 1.5 builds logical expressions from propositional variables
    using connectives ($$\land, \lor, \to, \leftrightarrow$$), and §1.3 (pdf pp. 19–26) develops them
    inductively (Định nghĩa 1.5–1.9, including normal forms / dạng chính tắc), matching Rosen''s propositional
    well-formed formula. Also attested earlier in bib-nguyenducnghia-2006 (pdf p. 99). Newest source listed
    first. The definition was restricted to PROPOSITIONAL well-formed formulas to match the cited Rosen
    §1.1: an earlier draft introduced quantifiers $$\forall, \exists$$ in the preamble but the inductive
    clauses gave no formation rule for $$\forall x\, E$$ / $$\exists x\, E$$, leaving the recursion incomplete;
    quantified well-formed formulas belong to first-order logic (Rosen §1.4/1.5, see first-order-logic).
    Unattested candidates (NOT recorded as verified vi_terms): "công thức logic" — 0 hits (normal + loose);
    "công thức hợp thức" — 0 hits; "công thức" alone — 327 hits but all denote named mathematical formulas
    (Công thức Cayley, công thức Euler), NOT logic formulas, so it is a false friend for this concept;
    "công thức mệnh đề" — 0 hits; "hợp thức" — only 2 loose hits, both OCR false positives ("tổ hợp thực
    tế" mis-split), no genuine "well-formed/hợp thức" sense. The graph-theory OCR sources (bib-leanhvinh-2020,
    bib-hoangchithanh-2007) and combinatorics sources do not cover propositional/predicate logic formulas,
    as expected for this discrete-math logic concept. The parenthetical gloss "(công thức hợp thức của
    phép tính mệnh đề)" in definition_vi mirrors the English headword "well-formed formula" with the propositional
    scope; it is a literal rendering of the English term, not an attested Vietnamese variant, so it is
    not recorded in vi_terms. Note: the running-prose spelling "logic" here matches the recommended source-attested
    term "biểu thức logic", and differs from the "lôgic" spelling in first-order-logic where the recommended
    source-attested term is "lôgic vị từ"; both spellings are source-faithful to their respective recommended
    terms.'
