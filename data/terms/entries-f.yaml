  notes: 'Distinct Vietnamese terms denoting the floor function were found in two sources. The newest,
    bib-nguyenhuudien-2019 (p.86, PDF), names the concept both "hàm sàn" and "hàm phần nguyên", giving
    the explicit floor definition ("số nguyên lớn nhất có giá trị nhỏ hơn hoặc bằng x") and the notations
    $$[x]$$ and $$\lfloor x \rfloor$$. The same page distinguishes the ceiling "hàm trần" with $$\lceil
