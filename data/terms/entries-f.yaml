    là mệnh đề.
- id: functionally-complete
  letter: F
  headword_en: Functionally Complete
  notation: ''
  rosen_ref: Rosen §1.2
  definition_vi: Một tập hợp các toán tử logic được gọi là đầy đủ (về mặt chức năng) nếu mọi mệnh đề phức
    hợp đều tương đương lôgic với một mệnh đề chỉ dùng các toán tử trong tập đó. Chẳng hạn, tập $$\{\neg,
    \wedge, \vee\}$$ là đầy đủ vì mọi hàm mệnh đề đều biểu diễn được qua phép phủ định, hội và tuyển.
  example_vi: 'Tập $$\{\neg, \wedge\}$$ là đầy đủ: phép tuyển biểu diễn được bằng $$p \vee q \equiv \neg(\neg
    p \wedge \neg q)$$, do đó mọi mệnh đề phức hợp đều viết được chỉ với $$\neg$$ và $$\wedge$$. Tương
    tự, riêng phép NAND $$\{\mid\}$$ cũng tạo thành một tập đầy đủ.'
  vi_terms:
  - term: đầy đủ
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
    pdf_page: 0
    snippet: ''
  - term: đầy đủ
    source_id: bib-rosen-2003-vi
