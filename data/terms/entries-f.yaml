    is attested in only one, bib-hoangchithanh-2007 (2007), where p.147 states and proves a leaf-count
    property of a "cây nhị phân đầy đủ" (a proof exercise rather than a formal definition). The reference-only
    bib-rosen-2003-vi (p.624) gives a clean definitional occurrence — "T... là cây nhị phân đầy đủ, vì
    mỗi đỉnh trong của nó đều có hai con" — corroborating the concept, but it is reference-only and cannot
    supply the recommended citation, so the 2007 occurrence remains the newest usable attestation. No
    2019-2020 source attests the full-binary-tree term specifically. The candidate "cây nhị phân" (binary
    tree) was found 25+ times in bib-hoangchithanh-2007, bib-nguyenhoangthach-2020, and bib-nguyenhuudien-2019,
    but it denotes the GENERAL binary tree ("mỗi đỉnh của nó có không quá hai con" = each vertex has at
    most two children), a distinct concept, so it is not listed as a variant here. The candidate "cây
    nhị phân hoàn chỉnh" returned 0 hits in all sources (normal and --loose). The definition and example
    are Rosen-correct: in the example the internal vertices $$r$$ and $$u$$ each have exactly two children.'
- id: function-composition
  letter: F
  headword_en: Function composition
  notation: (g \circ f)(a) = g(f(a))
  rosen_ref: Rosen §2.3
  definition_vi: '\emph{Hợp thành} của hai hàm $$g : B \to C$$ và $$f : A \to B$$ là hàm từ $$A$$ vào
    $$C$$, ký hiệu $$g \circ f$$, được xác định bởi $$(g \circ f)(a) = g(f(a))$$ với mọi $$a \in A$$.'
  example_vi: 'Cho $$f : \mathbb{R} \to \mathbb{R}$$ với $$f(a) = a + 1$$ và $$g : \mathbb{R} \to \mathbb{R}$$
    với $$g(b) = 2b$$. Khi đó hợp thành $$g \circ f : \mathbb{R} \to \mathbb{R}$$ được cho bởi $$(g \circ
    f)(a) = g(f(a)) = 2(a + 1)$$ với mọi $$a \in \mathbb{R}$$.'
