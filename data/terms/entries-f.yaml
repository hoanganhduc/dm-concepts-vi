    "Có bao nhiêu cây không gốc không đẳng cấu với n đỉnh"), which cannot supply the lead term, so the
    recommended-term choice is the closest attested 2019-2020 expression. Findings: (1) The newest non-reference
    source bib-leanhvinh-2020 (2020, p.52) writes the free/unrooted tree as "cây (không có gốc)" — a plain
    tree explicitly parenthetically qualified as having no root — in the Cayley-formula context for counting
    labeled trees on $$n+1$$ vertices; this is set recommended=true. (2) bib-nguyenducnghia-2006 (p.200)
    gives the exact Rosen definition: "Đồ thị vô hướng liên thông không có chu trình được gọi là cây"
    (a connected undirected graph with no cycle is called a tree), i.e. these books treat the plain term
    "cây" as the free tree. (3) The rooted contrast term "cây có gốc" (rooted tree) is widely attested
    (bib-leanhvinh-2020 p.49-50, bib-nguyenhoangthach-2020 p.84, bib-nguyenducnghia-2006 p.211, bib-nguyenhuudien-2019
    p.259), confirming the free/rooted distinction in the corpus; "cây có gốc" belongs to the separate
    "rooted tree" entry, not here. Candidate "cây vô hướng" is unattested as a standalone term — the books
    use "đồ thị vô hướng" (undirected graph) only inside the definition of "cây". The "tự do" hits found
    (bib-ngodactan-2004 p.160, bib-nguyenducnghia-2006 p.65, bib-nguyenhuudien-2019 p.50) are all unrelated
    senses (free movement, free circuit list, free variable) and do not denote this concept. The earlier
    draft''s intuitive remark "mọi đỉnh đều có vai trò như nhau" was removed because vertices in a free
    tree can have different degrees and are not structurally interchangeable; only the absence of a designated
    root is defining. forest is a same-chapter (F) link.'
