- id: free-variable
  letter: F
  headword_en: Free Variable
  notation: ''
  rosen_ref: Rosen §1.4
  definition_vi: Biến tự do là biến trong một hàm mệnh đề mà không bị ràng buộc bởi bất kỳ lượng từ nào,
    do đó giá trị chân lý của biểu thức còn phụ thuộc vào giá trị gán cho biến đó. Trong biểu thức $$\exists
    x\, P(x, y)$$, biến $$x$$ bị ràng buộc bởi lượng từ, còn biến $$y$$ là biến tự do.
  example_vi: Trong biểu thức $$\forall x\, (x > y)$$, biến $$x$$ là biến bị ràng buộc còn biến $$y$$
    là biến tự do; biểu thức này chưa phải là một mệnh đề vì giá trị chân lý của nó còn phụ thuộc vào
    $$y$$.
  vi_terms:
  - term: biến tự do
    source_id: bib-mat3500
