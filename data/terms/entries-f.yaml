- id: factorial
  letter: F
  headword_en: Factorial
  notation: n!
  rosen_ref: Rosen §6.3
  definition_vi: \emph{Giai thừa} của một số nguyên không âm $$n$$, ký hiệu $$n!$$, là tích của tất cả
    các số nguyên dương từ $$1$$ đến $$n$$, tức là $$n! = 1 \times 2 \times \cdots \times n$$, với quy
    ước $$0! = 1$$.
  example_vi: Với $$n = 4$$, ta có $$4! = 1 \times 2 \times 3 \times 4 = 24$$.
