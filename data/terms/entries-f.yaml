    "rooted tree" entry, not here. Candidate "cây vô hướng" is unattested as a standalone term — the books
    use "đồ thị vô hướng" (undirected graph) only inside the definition of "cây". The "tự do" hits found
    (bib-ngodactan-2004 p.160, bib-nguyenducnghia-2006 p.65, bib-nguyenhuudien-2019 p.50) are all unrelated
    senses (free movement, free circuit list, free variable) and do not denote this concept. The earlier
    draft''s intuitive remark "mọi đỉnh đều có vai trò như nhau" was removed because vertices in a free
    tree can have different degrees and are not structurally interchangeable; only the absence of a designated
    root is defining. forest is a same-chapter (F) link.'
