    recommended: false
    verified: true
    pdf_page: 30
    snippet: Một tập hop cúc toón từ logic được gọi la đẩy đủ, nếu mỗi mệnh dề
  - term: hệ đầy đủ
    source_id: bib-nguyenducnghia-2006
    page: tr. 271 (PDF)
    recommended: false
    verified: true
    pdf_page: 271
    snippet: Một hệ đầy đủ được nghiên cứu nhiều nhất là hệ tuyển, hội và phủ định. Bài toán tìm
  see_also: []
  status: panel-approved
  notes: Thuật ngữ chuẩn của giáo trình MAT3500 là "đầy đủ" (đối với một tập toán tử logic). Bản dịch
    Rosen dùng "tập đầy đủ các toán tử logic"; tài liệu Nguyễn Đức Nghĩa dùng "hệ (hàm) đầy đủ" cho hệ
    các hàm đại số lôgic. Các tập $$\{\neg, \wedge, \vee\}$$, $$\{\neg, \wedge\}$$, $$\{\neg, \vee\}$$,
    $$\{\mid\}$$ (NAND) và $$\{\downarrow\}$$ (NOR) đều là tập đầy đủ.
