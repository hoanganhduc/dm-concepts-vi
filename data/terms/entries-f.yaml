    nhiều tài liệu Việt và bản dịch Rosen gọi là "hàm giai thừa" hoặc đọc $$n!$$ là "n giai thừa".
- id: fallacy-of-affirming-the-conclusion
  letter: F
  headword_en: Fallacy Of Affirming The Conclusion
  notation: ((p \rightarrow q) \wedge q) \rightarrow p
  rosen_ref: Rosen §1.6
  definition_vi: Ngụy biện khẳng định hậu kiện là suy luận sai khi từ giả thiết $$p \rightarrow q$$ và
    $$q$$ kết luận rằng $$p$$ đúng. Suy luận này không hợp lệ vì mệnh đề $$((p \rightarrow q) \wedge q)
    \rightarrow p$$ không phải là hằng đúng (chẳng hạn khi $$p$$ sai và $$q$$ đúng).
  example_vi: Từ "nếu trời mưa thì đường ướt" ($$p \rightarrow q$$) và quan sát "đường ướt" ($$q$$), nếu
    kết luận "trời đã mưa" ($$p$$) thì đó là ngụy biện khẳng định hậu kiện, vì đường có thể ướt do nguyên
    nhân khác.
