    in the 2019 source, the standard modern rendering matching Rosen''s "floor function". OCR sources
    bib-leanhvinh-2020 and bib-hoangchithanh-2007 were checked with both normal and --loose searches;
    loose hits on "sàn" were all false positives (sẵn sàng = "ready", công thức sàng = "sieve formula",
    sang/sáng), so neither OCR source attests this concept. The example uses the Vietnamese decimal comma
    inside math ($$2{,}7$$, $$-1{,}5$$) and the negative case correctly rounds toward negative infinity
    ($$\lfloor -1{,}5 \rfloor = -2$$).'
