    "cây" as the free tree. (3) The rooted contrast term "cây có gốc" (rooted tree) is widely attested
    (bib-leanhvinh-2020 p.49-50, bib-nguyenhoangthach-2020 p.84, bib-nguyenducnghia-2006 p.211, bib-nguyenhuudien-2019
