    b$$). Đây chính là khái niệm greatest lower bound của Rosen (= meet $$a\wedge b$$, đối ngẫu của join
    $$a\vee b$$). Cách viết chặn/chận là biến thể chính tả của cùng một thuật ngữ. Các hit "cận dưới"
    trong bib-rosen-2003-vi (tr.667, 703, 937) đều chỉ chặn dưới của một đại lượng số (độ phức tạp B-cây,
    số lá), KHÔNG phải chặn dưới lớn nhất theo nghĩa thứ tự, nên không đưa vào làm chứng thực khái niệm.
    Mục greatest lower bound (meet $$a\wedge b$$) là đối ngẫu của mục đã có join-lattice (least upper
    bound, $$a\vee b$$); hai khái niệm khác nhau nên đây là một mục đầy đủ riêng, không phải tham chiếu
    đồng nghĩa.'
