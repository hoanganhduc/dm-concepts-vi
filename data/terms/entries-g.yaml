- id: game-tree
  letter: G
  headword_en: game tree
  notation: ''
  rosen_ref: Rosen §11.2
  ref_bib: ''
  definition_vi: Cây trò chơi là một cây có gốc trong đó các đỉnh biểu diễn các hình trạng của một trò
    chơi và các cạnh biểu diễn các nước đi.
  example_vi: Trong trò chơi Nim với một cọc gồm $$n$$ que, mỗi đỉnh của cây trò chơi ứng với số que còn
    lại và mỗi cạnh ứng với một nước bốc que của một đấu thủ; gốc ứng với hình trạng ban đầu $$n$$ que,
    còn các lá ứng với các hình trạng kết thúc khi không còn nước đi nào.
  vi_terms:
  - term: cây trò chơi
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - decision-tree
  - rooted-tree
  - tree-diagram
  status: draft
  see_ref: ''
  notes: 'Cây trò chơi là một mô hình bằng cây có gốc cho các trò chơi tuần tự: mỗi đỉnh là một hình trạng,
    mỗi cạnh là một nước đi, gốc là hình trạng ban đầu và các lá là các hình trạng kết thúc. Mức của một
    đỉnh thường cho biết lượt của đấu thủ nào sẽ đi. Khái niệm này gắn với "value of a vertex in a game
    tree" (giá trị của một đỉnh trong cây trò chơi) dùng để phân tích chiến lược tối ưu. Thuật ngữ "trò
    chơi" được dùng nhất quán trong các nguồn tiếng Việt (ví dụ lý thuyết trò chơi Nim trong bib-hoangchithanh-2007),
    nhưng hợp từ "cây trò chơi" không xuất hiện trong kho ngữ liệu nên thuật ngữ khuyến nghị ở dạng dịch
    chuẩn, chưa được dẫn chứng (verified=false).'
- id: gate
  letter: G
  headword_en: gate
  notation: ''
  rosen_ref: Rosen §12.3
  ref_bib: ''
  definition_vi: Cổng (cổng logic) là phần tử mạch cơ bản nhận một hay nhiều đầu vào nhị phân và cho một
    đầu ra nhị phân, trong đó đầu ra là giá trị của một phép toán Boole áp dụng cho các giá trị đầu vào.
    Ba loại cổng cơ bản là cổng đảo (NOT), thực hiện phép $$\overline{x}$$, cổng OR, thực hiện phép $$x
    + y$$, và cổng AND, thực hiện phép $$x \cdot y$$; bằng cách ghép nối các cổng ta thu được các mạch
    logic (mạch tổ hợp).
  example_vi: Cổng AND với hai đầu vào $$x$$ và $$y$$ cho đầu ra bằng $$1$$ khi và chỉ khi $$x = y = 1$$,
    tức là đầu ra bằng $$x \cdot y$$; cổng OR cho đầu ra $$x + y$$, bằng $$0$$ khi và chỉ khi $$x = y
    = 0$$.
