  - term: đồ thị lưới
    source_id: bib-leanhvinh-2020
    page: tr. 217
    recommended: true
    verified: true
    pdf_page: 216
    snippet: Vi dụ 8.18. Với n nguyên dương, đỏ thị lưới L,, có tập đỉnh là các ... các đỉnh của L,, là
      các điểm trên lưới vuông
  see_also:
  - regular-graph
  status: panel-approved
  see_ref: ''
  notes: 'CONCEPT-DIVERGENCE FLAG (panel high). headword_en "Grid graph" is Rosen''s standard rectangular
    grid: vertices are the points of an $$m \times n$$ lattice and two vertices are adjacent iff they
    differ by exactly one unit horizontally or vertically (the Cartesian product $$P_m \square P_n$$).
    The ONLY Vietnamese source attesting both the term "đồ thị lưới" and the notation $$L_n$$ is bib-leanhvinh-2020
    (2020), tr. 216 (Ví dụ 8.18, Hình 8.7) and tr. 244 (Bài tập 8.11) — but there $$L_n$$ is defined on
    $$[n]^2$$ with $$(a,b) \sim (c,d)$$ iff $$a = c$$ HOẶC $$b = d$$ (same row or same column), i.e. the
    ROOK''S GRAPH / Hamming graph $$K_n \square K_n$$ (strongly regular), and Hình 8.7 explicitly states
    $$L_2$$ equals the Paley graph $$P_5$$ — NOT the unit-distance grid (whose $$L_2$$ is a 4-cycle).
    The source''s object is therefore a different graph than the headword. RESOLUTION (panel fix (b)):
    the standard Rosen grid-graph definition is kept as the headword and generalized to the $$m \times
    n$$ grid; the notation field is left empty so $$L_n$$ is NOT presented as if it denoted Rosen''s grid;
    the divergence is stated in definition_vi and here; and the single vi_term "đồ thị lưới" stays verified=true
    (the term IS genuinely attested) but carries a per-term divergence note recording that the source
    binds it to the rook''s graph. No corpus source attests "đồ thị lưới" for Rosen''s unit-distance rectangular
    grid; the recommended Vietnamese name is retained because it is the natural rendering and the only
    attested form, with the divergence disclosed. Candidate "đồ thị dạng lưới" returned 0 hits (normal
    + --loose). The 2004 source (ngodactan) uses "lưới nguyên"/"lưới vuông"/"điểm lưới" for the geometric
    integer lattice, not as a graph name, so they are not variants here. OCR of bib-leanhvinh-2020 shows
    "đỏ thị lưới"; --loose matched.'
- id: group
  letter: G
