- id: genus
  letter: G
  headword_en: genus
  notation: g(G)
  rosen_ref: Rosen §10.7
  ref_bib: ''
  definition_vi: Giống của một đồ thị $$G$$ là số quai ít nhất cần gắn thêm vào mặt cầu để $$G$$ có thể
    được vẽ trên mặt thu được mà không có cạnh nào cắt nhau; ký hiệu $$g(G)$$.
  example_vi: Mặt cầu là mặt giống $$0$$ và mặt xuyến là mặt giống $$1$$. Do đó một đồ thị phẳng có $$g(G)
    = 0$$, vì nó vẽ được trên mặt cầu mà không có cạnh nào cắt nhau.
