  definition_vi: 'Một \emph{nhóm} là một tập hợp $$G$$ cùng với một phép toán hai ngôi $$\ast$$ trên $$G$$,
    ký hiệu $$(G, \ast)$$, thỏa mãn ba điều kiện: phép toán $$\ast$$ có tính kết hợp, tồn tại phần tử
    đơn vị $$e \in G$$ sao cho $$e \ast a = a \ast e = a$$ với mọi $$a \in G$$, và mỗi phần tử $$a \in
    G$$ đều có phần tử nghịch đảo $$a'' \in G$$ sao cho $$a \ast a'' = a'' \ast a = e$$.'
  example_vi: 'Tập các số nguyên $$\mathbb{Z}$$ với phép cộng $$+$$ là một nhóm: phép cộng có tính kết
    hợp, $$0$$ là phần tử đơn vị, và mỗi $$a \in \mathbb{Z}$$ có nghịch đảo $$-a$$.'
