- id: generalized-product-rule
  letter: G
  headword_en: generalized product rule
  notation: ''
  rosen_ref: ''
  ref_bib: bib-libennowell-2022
  definition_vi: \emph{Quy tắc nhân tổng quát} là mở rộng của quy tắc nhân cho phép số lựa chọn ở mỗi
    bước phụ thuộc vào các lựa chọn trước đó, miễn là số lựa chọn ở mỗi bước luôn cố định. Nếu một thủ
    tục gồm $$k$$ bước, bước thứ $$i$$ luôn có đúng $$n_i$$ lựa chọn bất kể các bước trước, thì tổng số
    kết quả là $$\displaystyle\prod_{i=1}^{k} n_i$$.
  example_vi: 'Số cách xếp $$3$$ phần tử phân biệt thành dãy có thứ tự là $$3 \cdot 2 \cdot 1 = 6$$: bước
    đầu có $$3$$ lựa chọn, bước sau còn $$2$$, rồi $$1$$, dù tập còn lại thay đổi qua mỗi bước.'
