  status: panel-approved
  see_ref: ''
  notes: 'No 2019-2020 source attests the genus concept. The only Vietnamese source covering it is bib-ngodactan-2004
    (2004), Section 6 (pp. 210-214), where the noun "giống" denotes the genus of a graph: "Giống của mỗi
    đồ thị $$G$$ không vượt quá giao số của nó" (Định lý 6.14, p.212, verified) and the genus theorem
    Định lý 6.17 (p.214, verified) is applied to $$K_n$$. The recommended term "giống" is therefore verified
    only against this 2004 source (no newer attestation exists; "giống" in the 2020 sources is only "giống
    nhau/hệt/như" = identical/similar, never the topological genus). The source defines a surface of genus
    $$g$$ as a sphere with $$g$$ handles added (p.212), and a graph has genus $$g$$ if it embeds in some
    genus-$$g$$ surface but not in a genus-$$(g-1)$$ surface (p.212), matching the English ground truth.
    The notation $$g(G)$$ is attested at p.214 ("$$2 - 2g(G) \leq v - e + \dots$$"). NOTATION COLLISION:
    $$g(G)$$ here means genus; the girth entry also uses $$g(G)$$ (girth also uses $$\delta$$ in some
    sources) — readers should note which quantity is meant in each entry. The exact candidate "giống của
    đồ thị" does not appear verbatim in any source (0 hits, including --loose); the book''s actual phrasings
    are "Giống của mỗi đồ thị $$G$$" and the construction "đồ thị giống $$g$$". The variant "giống của
    mặt" denotes the genus of a SURFACE (p.212), the related topological notion underlying the graph definition.
    The single "giống" hit in bib-leanhvinh-2020 (p.103) is the adverb "giống như" (= "similar to"). OCR
    sources searched in both normal and --loose modes: only "giống như"/"giống nhau" appear, no genus
    attestation.'
- id: geodesic
  letter: G
  headword_en: geodesic
  notation: d(u,v)
  rosen_ref: Rosen §10.4
  ref_bib: ''
  definition_vi: Một đường đi ngắn nhất nối hai đỉnh $$u$$ và $$v$$ trong một đồ thị $$G$$ là một đường
    đi giữa $$u$$ và $$v$$ có độ dài nhỏ nhất. Độ dài của đường đi ngắn nhất đó được gọi là khoảng cách
    giữa hai đỉnh $$u$$ và $$v$$, ký hiệu $$d(u,v)$$.
  example_vi: Trong đồ thị đường đi $$P_4$$ với các đỉnh $$v_1, v_2, v_3, v_4$$ nối tiếp nhau, đường đi
    $$v_1 v_2 v_3 v_4$$ là đường đi ngắn nhất giữa $$v_1$$ và $$v_4$$, do đó $$d(v_1, v_4) = 3$$.
