  ref_bib: ''
  definition_vi: 'Đồ thị lưới là đồ thị đơn vô hướng mà tập đỉnh gồm các điểm của một lưới chữ nhật $$m
    \times n$$ trong mặt phẳng, trong đó hai đỉnh kề nhau khi và chỉ khi chúng cách nhau đúng một đơn
    vị theo phương ngang hoặc phương dọc. (Lưu ý: trong nguồn tiếng Việt duy nhất chứng thực tên này,
    ký hiệu $$L_n$$ lại chỉ một đối tượng khác — đồ thị quân xe trên $$[n]^2$$; xem ghi chú.)'
  example_vi: Đồ thị lưới $$2 \times 2$$ có $$4$$ đỉnh nằm tại bốn điểm lưới và $$4$$ cạnh nối các đỉnh
    cách nhau một đơn vị theo phương ngang hoặc phương dọc, tạo thành một chu trình bốn cạnh.
