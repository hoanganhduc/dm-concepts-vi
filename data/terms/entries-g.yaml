- id: graph-isomorphism
  letter: G
  headword_en: graph isomorphism
  notation: G_1 \cong G_2
  rosen_ref: Rosen §10.3
  ref_bib: ''
  definition_vi: 'Hai đồ thị đơn $$G_1 = (V_1, E_1)$$ và $$G_2 = (V_2, E_2)$$ được gọi là đẳng cấu, ký
    hiệu $$G_1 \cong G_2$$, nếu tồn tại một song ánh $$f : V_1 \to V_2$$ sao cho với mọi cặp đỉnh $$u,
    v \in V_1$$, hai đỉnh $$u$$ và $$v$$ kề nhau trong $$G_1$$ khi và chỉ khi $$f(u)$$ và $$f(v)$$ kề
    nhau trong $$G_2$$. Khi đó, song ánh $$f$$ được gọi là một đẳng cấu giữa $$G_1$$ và $$G_2$$.'
  example_vi: 'Cho $$G_1$$ có tập đỉnh $$\{a, b, c, d\}$$ và các cạnh $$ab, bc, cd, da$$, và $$G_2$$ có
    tập đỉnh $$\{1, 2, 3, 4\}$$ và các cạnh $$12, 23, 34, 41$$. Song ánh $$f$$ xác định bởi $$f(a) = 1$$,
    $$f(b) = 2$$, $$f(c) = 3$$, $$f(d) = 4$$ bảo toàn quan hệ kề: mỗi cạnh của $$G_1$$ tương ứng với một
    cạnh của $$G_2$$ và ngược lại. Do đó $$G_1 \cong G_2$$.'
