    the section that actually treats cycles and paths (panel fix). Girth is not a headword term in Rosen;
    the standard graph-theory definition is used. The corpus splits notation: $$\delta$$ in the 2007/2019
    texts, $$g$$ in the 2004/2020 texts. This lexicon standardizes on $$g(G)$$. NOTATION COLLISION: $$g(G)$$
    here means girth; the genus entry also uses $$g(G)$$ — see the genus entry, which states its own usage.


