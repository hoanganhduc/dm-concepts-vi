    - "chu vi nhỏ nhất" — bib-ngodactan-2004 (tr.207), explicitly glossed in-text "(girth)".

    - "chu trình ngắn nhất" — the phrase for the shortest cycle itself, head of the recommended longer
    form.


    The definition_vi states the concept formally with "ký hiệu $$g(G)$$" and notes girth is undefined
    for acyclic $$G$$. Per the no-inline-gloss convention, the English "(girth)" parenthetical was dropped
    from definition_vi (panel fix); the English equivalent is carried by headword_en. example_vi is self-contained:
