  notes: 'Recommended term "đồ thị" is the universal Vietnamese standard, attested with a formal definition
    $$G = (V, E)$$ in BOTH 2020 sources (leanhvinh-2020 Def 1.1, nguyenhoangthach-2020 Def 5.1) and in
    all four older sources. Newest citations are listed first. The first introduction of the central concept
    is marked with \emph{đồ thị} OUTSIDE math (panel fix: the previous draft wrapped the Vietnamese word
    in $$...$$, which the math-wrapping convention forbids — math delimiters wrap symbols only, e.g. $$G$$,
    $$V$$, $$E$$). "đồ thị G" is not a separate term but the same word applied to a named graph $$G$$
    (recorded as a variant from hoangchithanh-2007 p.6). The English loanword "graph" appears only as
    a parenthetical gloss next to "đồ thị" in hoangchithanh-2007 p.5 ("Đồ thị (graph)..."); it is not
    used as a standalone Vietnamese term and is recorded only for completeness. Several sources introduce
    the concept via "đơn đồ thị" (simple graph), "đa đồ thị" (multigraph), and "giả đồ thị" (pseudograph)
    — these are restricted variants of the general "đồ thị" and belong to their own entries. nguyenhuudien-2019''s
    Def 6.1 states the simple-graph case; the bare term "đồ thị" for the general object is attested there
    throughout (e.g. p.157 "đồ thị G = (V, E)"). OCR sources (leanhvinh-2020, hoangchithanh-2007) were
    searched both normally and with --loose; diacritics confirmed correct in the cited definitional snippets.
    The definition follows Rosen §10.1''s general graph (edges with one or two endpoints, allowing loops
    and multiple edges); "đầu mút" is the standard Vietnamese rendering of "endpoint". see_also targets
    are cross-chapter forward references except where their own chapter-G entries are created.'
