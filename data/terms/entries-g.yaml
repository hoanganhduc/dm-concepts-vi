- id: generalized-binomial-coefficient
  letter: G
  headword_en: generalized binomial coefficient
  notation: \binom{u}{k}
  rosen_ref: Rosen §5.4
  ref_bib: ''
  definition_vi: Hệ số nhị thức tổng quát, ký hiệu $$\binom{u}{k}$$, mở rộng hệ số nhị thức cho số mũ
    trên là một số thực $$u$$ tùy ý và $$k$$ là số nguyên không âm, xác định bởi $$\binom{u}{k} = \dfrac{u(u-1)\cdots(u-k+1)}{k!}$$
    khi $$k > 0$$ và $$\binom{u}{0} = 1$$.
  example_vi: Với $$u = -2$$ và $$k = 3$$ ta có $$\binom{-2}{3} = \dfrac{(-2)(-3)(-4)}{3!} = -4$$.
