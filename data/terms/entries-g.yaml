- id: generating-function
  letter: G
  headword_en: generating function
  notation: G(x) = \sum_{k=0}^{\infty} a_k x^k
  rosen_ref: Rosen §8.4
  ref_bib: ''
  definition_vi: Hàm sinh của dãy số thực $$a_0, a_1, \ldots, a_k, \ldots$$ là chuỗi lũy thừa hình thức
    $$\displaystyle\sum_{k=0}^{\infty} a_k x^k$$, ký hiệu $$G(x)$$. Mỗi số hạng $$a_k$$ của dãy là hệ
    số của $$x^k$$ trong chuỗi này.
