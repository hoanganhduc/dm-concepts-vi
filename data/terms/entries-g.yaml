- id: euclidean-algorithm
  letter: G
  headword_en: greatest common divisor (Euclidean algorithm)
  notation: \gcd(a,b)
  rosen_ref: Rosen §4.3
  ref_bib: ''
  definition_vi: Thuật toán Euclide là thủ tục tính ước chung lớn nhất của hai số nguyên dương $$a$$ và
    $$b$$, ký hiệu $$\gcd(a,b)$$, bằng cách lặp lại việc thay cặp $$(a, b)$$ bởi cặp $$(b, a \bmod b)$$
    cho đến khi thành phần thứ hai bằng $$0$$. Khi đó thành phần thứ nhất chính là $$\gcd(a, b)$$.
  example_vi: 'Để tính $$\gcd(662, 414)$$, ta thực hiện liên tiếp: $$(662, 414) \to (414, 248) \to (248,
    166) \to (166, 82) \to (82, 2) \to (2, 0)$$, vì $$662 \bmod 414 = 248$$, $$414 \bmod 248 = 166$$,
    $$248 \bmod 166 = 82$$, $$166 \bmod 82 = 2$$ và $$82 \bmod 2 = 0$$. Thành phần thứ nhất khi thành
    phần thứ hai bằng $$0$$ là $$2$$, do đó $$\gcd(662, 414) = 2$$.'
