- id: graph-of-a-function
  letter: G
  headword_en: graph of a function
  notation: '\{(a, f(a)) : a \in A\}'
  rosen_ref: Rosen §2.3
  ref_bib: ''
  definition_vi: 'Đồ thị của hàm số $$f$$ từ tập $$A$$ đến tập $$B$$ là tập các cặp sắp thứ tự gồm mỗi
    phần tử $$a \in A$$ và ảnh $$f(a)$$ của nó, ký hiệu


    ```math

    \{(a, b) : a \in A \text{ và } f(a) = b\}.

    ```


