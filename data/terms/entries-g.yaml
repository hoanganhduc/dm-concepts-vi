  status: panel-approved
  see_ref: ''
  notes: 'Concept: A coloring of a simple graph $$G$$ is an assignment of a color to each vertex of $$G$$
    so that no two adjacent vertices receive the same color (Rosen §10.8). Rosen''s "coloring" already
    means a proper coloring, so the no-two-adjacent-same-color constraint IS the properness condition;
    the see_also target proper-coloring is the same notion under a fuller name, not a distinct concept.


    Recommended term: "tô màu đồ thị" — the standard chapter-title term attested in both 2019-2020 sources
    (nguyenhoangthach-2020 tr. 81; nguyenhuudien-2019 tr. 223/227; leanhvinh-2020 tr. 90) and consistently
    used across the older corpus. Citations ordered newest source first.


    Variant terms:

    - "tô màu các đỉnh" ("coloring the vertices") — matches Rosen''s vertex-assignment phrasing.

    - "bài toán tô màu" ("the coloring PROBLEM") — concept-divergence flag: this names the decision/optimization
    PROBLEM (nguyenducnghia-2006 tr. 166 "Bài toán tô màu đồ thị"), a related framing of the headword,
    NOT the coloring assignment itself; recorded as a variant but not a synonym of the recommended term.

    - "tô màu đỉnh" / "tô màu" (bare) — ngodactan-2004 tr. 283 abbreviates vertex coloring to "tô màu".

    - "tô màu tốt" ("proper/good coloring") — leanhvinh-2020 tr. 90; "tốt" encodes the no-two-adjacent-same-color
    constraint.

    - "phép tô màu đồ thị" ("a coloring of a graph") — nominal form for the coloring map (nguyenducnghia-2006
    tr. 166), used as the definition''s leading phrase.


    Definition wording uses the recommended "tô màu đồ thị" (nominal "phép tô màu đồ thị"), states the
    constraint formally, and restates it edge-wise with $$uv \in E(G)$$. Example is self-contained: $$C_4$$
    with an explicit 2-coloring; no chromatic number is invoked.


    see_also: cross-chapter kebab forward references are permitted (per the chapter-C precedent, whose
    see_also freely links cross-chapter ids); the earlier draft incorrectly claimed a same-chapter-only
    restriction and dropped bipartite-graph/planar-graph on that mistaken ground. The kept targets chromatic-number
    (chapter C) and proper-coloring are the closest related concepts and are forward references. bipartite-graph
    and planar-graph are omitted for conceptual distance, not for any chapter restriction.


    OCR note: leanhvinh-2020 and hoangchithanh-2007 are OCR sources; loose search confirmed the cited
    pages. All vi_term source_id/pdf_page/snippet verified verbatim.'
