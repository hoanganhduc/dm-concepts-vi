- id: geometric-distribution
  letter: G
  headword_en: geometric distribution
  notation: P(X = k) = (1-p)^{k-1} p
  rosen_ref: Rosen §7.4
  ref_bib: ''
  definition_vi: Phân phối hình học là phân phối của một biến ngẫu nhiên cho số phép thử cần thực hiện
    cho đến khi đạt được thành công đầu tiên. Nếu mỗi phép thử thành công với xác suất $$p$$ một cách
    độc lập, thì xác suất để thành công đầu tiên xảy ra ở phép thử thứ $$k$$ là $$P(X = k) = (1-p)^{k-1}
    p$$ với $$k = 1, 2, 3, \ldots$$.
  example_vi: Gieo một con xúc xắc cho đến khi xuất hiện mặt $$6$$ đầu tiên; mỗi lần gieo thành công với
    xác suất $$p = \tfrac{1}{6}$$, nên xác suất để mặt $$6$$ xuất hiện lần đầu ở lần gieo thứ ba là $$P(X
    = 3) = \left(\tfrac{5}{6}\right)^{2} \cdot \tfrac{1}{6}$$. Khi đó số phép thử kỳ vọng đến khi thành
    công đầu tiên là $$\tfrac{1}{p} = 6$$.
