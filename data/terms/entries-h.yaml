- id: handshake-theorem
  letter: H
  headword_en: Handshake theorem
  notation: $$\sum_{v \in V(G)} \deg_G(v) = 2|E(G)|$$
  rosen_ref: Rosen §10.2
  definition_vi: Định lý bắt tay khẳng định rằng trong một đồ thị vô hướng $$G = (V, E)$$, tổng bậc của
    tất cả các đỉnh bằng hai lần số cạnh, ký hiệu $$\sum_{v \in V(G)} \deg_G(v) = 2|E(G)|$$. Hệ quả là
    số đỉnh có bậc lẻ trong $$G$$ luôn là một số chẵn.
  example_vi: Xét đồ thị vô hướng $$G$$ với tập đỉnh $$V = \{a, b, c\}$$ và tập cạnh $$E = \{ab, bc, ca\}$$.
    Khi đó mỗi đỉnh có bậc $$\deg_G(a) = \deg_G(b) = \deg_G(c) = 2$$, nên $$\sum_{v \in V(G)} \deg_G(v)
    = 2 + 2 + 2 = 6 = 2|E(G)|$$.
