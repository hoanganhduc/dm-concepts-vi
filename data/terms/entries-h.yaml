- id: hypothetical-syllogism
  letter: H
  headword_en: Hypothetical Syllogism
  notation: ((p \to q) \land (q \to r)) \to (p \to r)
  rosen_ref: Rosen §1.6
  definition_vi: Tam đoạn luận giả định là quy tắc suy diễn cho phép từ hai phép kéo theo $$p \to q$$
    và $$q \to r$$ suy ra phép kéo theo $$p \to r$$. Quy tắc này dựa trên hằng đúng (tautology) $$((p
    \to q) \land (q \to r)) \to (p \to r)$$, nên đôi khi còn gọi là quy tắc bắc cầu của phép kéo theo.
  example_vi: Từ "Nếu trời mưa thì đường ướt" ($$p \to q$$) và "Nếu đường ướt thì xe trơn" ($$q \to r$$),
    theo tam đoạn luận giả định ta suy ra "Nếu trời mưa thì xe trơn" ($$p \to r$$).
