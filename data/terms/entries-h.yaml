    snippet: đồng cấu nếu chúng có thể thu được từ cùng một đồ thị nào đó nhờ các phép chia canh.
  - term: đồng phôi
    source_id: bib-rosen-2003-vi
    page: tr. 587 (PDF, bản dịch Rosen)
    recommended: false
    verified: true
    pdf_page: 587
    snippet: cấp. Các đồ thị G, - (Vị, E,) và Ø2 = (V2, Ey) được gọi là đồng phôi
  see_also:
  - planar-graph
  - subgraph
  - graph-isomorphism
  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "đồng phôi" is attested in the newest source (bib-nguyenhoangthach-2020, 2020,
    tr. 81 PDF), where two graphs are called đồng phôi if both can be obtained from the same graph by
    edge subdivisions (phép chia cạnh) — exactly the Rosen concept. The same source (Định nghĩa 5.51,
    tr. 81 PDF) defines phép chia cạnh precisely: add a new vertex $$w$$ and replace edge $$uv$$ by the
    two edges $$uw$$ and $$wv$$; the definition_vi reuses this attested operation. The relation is used
    immediately in Định lý 5.52 (Kuratowski) — "một đồ thị con đồng phôi với $$K_5$$ hoặc $$K_{3,3}$$"
    — confirming the homeomorphic-subgraph framing. The older bib-nguyenducnghia-2006 (tr. 161 PDF) uses
    "đồng cấu" for the same relation; this is a documented variant but "đồng cấu" more commonly denotes
    graph/algebraic homomorphism in Vietnamese, so "đồng phôi" is preferred to avoid ambiguity. Excluded
    as off-concept: "đồng phôi" in bib-ngodactan-2004 (tr. 212, 298 PDF) denotes topological homeomorphism
    of surfaces (mặt), not graphs; "đồng cấu (dàn)" in bib-nguyenhuudien-2019 denotes lattice homomorphism.
    Candidate terms "đồ thị đồng phôi", "hai đồ thị đồng phôi", and "đồng cấu tô pô" returned 0 hits (normal
    and --loose) in every source. OCR sources bib-hoangchithanh-2007 (tr. 119 PDF) and bib-leanhvinh-2020
    (tr. 132 PDF) describe edge subdivision (chia cạnh) but do not name the homeomorphic-graph relation.
    Definition opens with the prerequisite operation phép chia cạnh, then the recommended term "đồng phôi",
    states it formally, and the example is self-contained — it builds two homeomorphic graphs from a single
    edge by edge subdivisions and invokes no derived quantity. see_also: planar-graph, subgraph, and graph-isomorphism
    are cross-chapter forward references (no other H-chapter entry is a confirmed sibling); planar-graph/subgraph
    capture the Kuratowski context in which the homeomorphic relation is used, and graph-isomorphism is
    the closest sibling graph-equivalence notion.'
