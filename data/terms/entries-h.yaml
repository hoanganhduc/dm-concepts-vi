- id: hamiltonian-cycle
  letter: H
  headword_en: Hamiltonian cycle
  notation: ''
  rosen_ref: Rosen §10.5
  definition_vi: Chu trình Hamilton của một đồ thị $$G$$ là một chu trình đơn đi qua mỗi đỉnh của $$G$$
    đúng một lần rồi quay về đỉnh xuất phát.
  example_vi: Trong đồ thị đầy đủ $$K_4$$ với các đỉnh $$a$$, $$b$$, $$c$$, $$d$$, chu trình $$a, b, c,
    d, a$$ đi qua mỗi đỉnh đúng một lần và trở về $$a$$, nên nó là một chu trình Hamilton.
  vi_terms:
  - term: chu trình Hamilton
    source_id: bib-leanhvinh-2020
    page: tr. 21 (PDF)
    recommended: true
    verified: true
    pdf_page: 21
    snippet: Định nghĩa 1.18. Chu trình Hamilton của dé thị G là một chu trình
  - term: chu trình Hamilton
    source_id: bib-hoangchithanh-2007
    page: tr. 82 (PDF)
    recommended: false
    verified: true
    pdf_page: 82
    snippet: đồ thị đúng một lần. Chu trình Hamilton là chu trình di qua mỗi đỉnh
  - term: chu trình Hamilton
    source_id: bib-rosen-2003-vi
    page: tr. 556 (PDF, bản dịch Rosen)
    recommended: false
    verified: true
    pdf_page: 556
    snippet: G = (V, E) được gọi là chu trình Hamilton nếu x,, x), .., x,-» Xn là
  see_also:
  - hamiltonian-path
  - circuit
  - cycle
  status: panel-approved
  see_ref: ''
  notes: 'Definition aligned with Rosen §10.5, which defines a Hamilton circuit as a SIMPLE circuit (chu
    trình đơn) passing through every vertex exactly once; the panel''s correctness fix added the ''đơn''
    (simple) qualifier so the cycle entry matches both Rosen and the sibling hamiltonian-path entry (which
    already writes ''đường đi đơn''). The redundant restatement sentence (''Nói cách khác, ...'') was
    dropped per the economy-of-expression fix. Recommended term "chu trình Hamilton" is attested definitionally
    in the newest available source bib-leanhvinh-2020 (2020, Định nghĩa 1.18, tr. 21 PDF) and again in
    bib-hoangchithanh-2007 (2007, tr. 82 PDF: "Chu trình Hamilton là chu trình đi qua mỗi đỉnh ... đúng
    một lần"); citations ordered newest-source first. Candidate variants "chu trình Hamiltơn" and "vòng
    Hamilton" were NOT attested in any corpus source: literal searches returned 0 hits (normal and --loose),
    and loose hits for "Hamiltơn" only matched the standard "Hamilton" spelling. The text sources bib-nguyenhuudien-2019,
    bib-nguyenhoangthach-2020, bib-nguyenducnghia-2006, and bib-ngodactan-2004 frame this topic through
    the related (distinct) term "đồ thị Hamilton" (Hamiltonian graph) — e.g. bib-ngodactan-2004 tr. 202
    "(V,E) được gọi là đồ thị Hamilton nếu nó có một chu trình Hamilton" — so they were not added as cycle-term
    attestations to keep this entry on the cycle concept itself. OCR sources (leanhvinh-2020, hoangchithanh-2007)
    were mined both normal and --loose. Both source snippets re-verified in corpus: leanhvinh-2020 ("Định
    nghĩa 1.18. Chu trình Hamilton của ... G là một chu trình", pdf_page 21) and hoangchithanh-2007 ("đồ
    thị đúng một lần. Chu trình Hamilton là chu trình di qua mỗi đỉnh", pdf_page 82).'
