  - recurrence-relation
  status: panel-approved
  see_ref: ''
  notes: Notation wrapped in $$...$$ per the math convention (was bare 'a_n = ...'). Bốn biến thể đều
    được kiểm chứng, sắp xếp theo nguồn mới nhất trước. Thuật ngữ khuyến nghị "hệ thức truy hồi tuyến
    tính thuần nhất" (bib-nguyenhuudien-2019, Định nghĩa 3.13, tr. 98) theo quy ước dịch "recurrence relation"
    thành "hệ thức truy hồi" của bản dịch Rosen và là cách dùng chuẩn nhất trong kho ngữ liệu; định nghĩa
    nguồn nêu rõ dạng $$a_n = c_1 a_{n-1} + \dots + c_k a_{n-k}$$ với $$c_1, \dots, c_k$$ là số thực và
    $$c_k \neq 0$$. Biến thể mới nhất "quan hệ truy hồi tuyến tính thuần nhất" (bib-nguyenhoangthach-2020,
    Định nghĩa 3.1, tr. 40, 2020) dùng "quan hệ" thay cho "hệ thức". Biến thể "công thức truy hồi tuyến
    tính thuần nhất" (bib-nguyenducnghia-2006, tr. 34) dùng "công thức". Biến thể cũ "phép truy toán tuyến
    tính thuần nhất" (bib-ngodactan-2004, tr. 79) dùng "phép truy toán", một lối diễn đạt cũ không còn
    thông dụng. Nguồn bib-leanhvinh-2020 (lý thuyết đồ thị) không có thuật ngữ này vì chủ đề hệ thức truy
    hồi thuộc tổ hợp/toán rời rạc, đã kiểm tra cả chế độ thường và --loose. Mặc dù thuật ngữ khuyến nghị
    thuộc nguồn 2019, biến thể nguồn 2020 vẫn được liệt kê đầu danh sách theo quy ước mới-nhất-trước;
    thuật ngữ khuyến nghị là dạng "hệ thức" vì khớp với cách dịch Rosen. Các id trong see_also (recurrence-relation,
    linear-recurrence-relation, characteristic-equation) thuộc các chương khác (R, L, C) theo cách sắp
    xếp từ điển theo chữ cái đầu, nên là tham chiếu chuyển tiếp liên chương sẽ được tạo trong chương tương
    ứng.
- id: huffman-coding
  letter: H
  headword_en: Huffman coding
  notation: ''
  rosen_ref: Rosen §11.2
  definition_vi: '\emph{Thuật toán Huffman} là thuật toán tham lam xây dựng một cây mã tiền tố tối ưu
    cho một tập ký hiệu $$A$$, trong đó mỗi ký hiệu $$x \in A$$ có tần suất $$\varphi(x)$$: thuật toán
    khởi tạo một rừng gồm các cây một đỉnh được gán nhãn $$\varphi(x)$$, rồi lặp lại việc chọn hai cây
    có gốc mang nhãn nhỏ nhất, gộp chúng dưới một đỉnh mới mang nhãn bằng tổng hai nhãn đó và nối bằng
    hai cạnh nhãn $$0$$, $$1$$ thành một cây nhị phân, cho đến khi chỉ còn một cây. Cây nhị phân thu được
    làm cực tiểu độ dài kỳ vọng của mã bản tin.'
  example_vi: Với tập ký hiệu $$A = \{a, b, c, d, e\}$$ có tần suất $$\varphi(a) = 23$$, $$\varphi(b)
    = 44$$, $$\varphi(c) = 17$$, $$\varphi(d) = 4$$, $$\varphi(e) = 12$$, thuật toán Huffman gộp trước
    hai cây có nhãn nhỏ nhất là $$d$$ và $$e$$ thành một cây con mang nhãn $$\varphi(d) + \varphi(e) =
    16$$.
