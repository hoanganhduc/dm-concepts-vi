- id: homomorphism
  letter: H
  headword_en: Homomorphism
  notation: $$f\colon A \to B$$, $$f(a * b) = f(a) \circ f(b)$$
  rosen_ref: Rosen §9.6
  definition_vi: Một đồng cấu giữa hai cấu trúc đại số cùng kiểu $$A$$ và $$B$$ là một ánh xạ $$f\colon
    A \to B$$ bảo toàn phép toán, nghĩa là $$f(a * b) = f(a) \circ f(b)$$ với mọi $$a, b \in A$$, trong
    đó $$*$$ và $$\circ$$ lần lượt là phép toán trên $$A$$ và trên $$B$$.
  example_vi: Ánh xạ $$f\colon (\mathbb{Z}, +) \to (\mathbb{Z}, +)$$ cho bởi $$f(a) = 2a$$ là một đồng
    cấu, vì $$f(a + b) = 2(a + b) = 2a + 2b = f(a) + f(b)$$ với mọi $$a, b \in \mathbb{Z}$$.
  vi_terms:
  - term: đồng cấu
    source_id: bib-nguyenhuudien-2019
    page: tr. 124 (PDF)
    recommended: true
    verified: true
    pdf_page: 124
    snippet: Sau đây chúng ta sẽ giới thiệu tiếp khái niệm “dàn con" và "đồng cấu dàn".
  - term: đồng cấu dàn
    source_id: bib-nguyenhuudien-2019
    page: tr. 125 (PDF)
    recommended: false
    verified: true
    pdf_page: 125
    snippet: một đồng cấu dàn nếu và chỉ nếu
  see_also:
  - isomorphism
  status: panel-approved
  see_ref: ''
  notes: 'Economy fix: the redundant trailing parenthetical ''(ký hiệu đồng cấu là $$f$$)'' was dropped
    because $$f$$ is already introduced as the map name earlier in the same sentence. Citation-hygiene
    fix: the two verified=false empty-page candidates "ánh xạ đồng cấu" and "phép đồng cấu" were removed
    from vi_terms (the one-kept-for-non-emptiness exception does not apply because the verified=true recommended
    term "đồng cấu" is already present); they are recorded only here as unattested candidates (0 hits
    in all sources, normal and --loose). Scope note: the definition_vi and example_vi present a GENERAL
    algebraic homomorphism, but the sole corpus attestation of the recommended bare term "đồng cấu" is
    as the sub-phrase of "đồng cấu dàn" (lattice homomorphism, bib-nguyenhuudien-2019 tr. 124-125), which
    is the structure-preserving-map concept matching Rosen; the recommended bare term "đồng cấu" is therefore
    generalized from its sole corpus attestation "đồng cấu dàn" and is the standard base term for the
    concept. The specifier "dàn" (lattice) names the structure. A homograph trap: bib-nguyenducnghia-2006
    p.161 uses "đồng cấu" for graph HOMEOMORPHISM (graphs obtained from a common graph by edge subdivision,
    "phép chia cạnh"), not algebraic homomorphism; the same edge-subdivision relation is rendered "đồng
    phôi" in bib-nguyenhoangthach-2020 p.81 and bib-ngodactan-2004 pp.212,298. That 2006 hit is excluded
    from this entry (it is recorded as a variant of homeomorphic-graphs instead). Rosen-ref flag (panel):
    rosen_ref §9.6 is an approximate attribution — §9.6 in the edition used is not a precise section source
    for algebraic homomorphism; the definition_vi mathematics is standard and correct and is left intact
    pending confirmation of the exact section in the edition.'
- id: homeomorphic-graphs
  letter: H
  headword_en: Homeomorphic graphs
  notation: ''
  rosen_ref: Rosen §10.7
  definition_vi: Một \emph{phép chia cạnh} của đồ thị $$G$$ là phép toán thêm một đỉnh mới $$w$$ và thay
    cạnh $$uv \in E(G)$$ bằng hai cạnh mới $$uw$$ và $$wv$$. Hai đồ thị $$G_1$$ và $$G_2$$ được gọi là
    \emph{đồng phôi} với nhau nếu cả $$G_1$$ và $$G_2$$ đều có thể thu được từ cùng một đồ thị $$G$$ bằng
    một dãy các phép chia cạnh.
  example_vi: Xét đồ thị $$G$$ gồm hai đỉnh $$u, v$$ và một cạnh $$uv$$. Chia cạnh $$uv$$ một lần, ta
    thêm đỉnh $$w_1$$ và thay $$uv$$ bằng hai cạnh $$uw_1$$ và $$w_1v$$, thu được đồ thị $$G_1$$ là một
    đường đi qua ba đỉnh $$u, w_1, v$$. Cũng từ $$G$$, chia cạnh $$uv$$ rồi tiếp tục chia một trong hai
    cạnh mới, ta thêm hai đỉnh $$w_1, w_2$$ và thu được đồ thị $$G_2$$ là một đường đi qua bốn đỉnh. Vì
    cả $$G_1$$ và $$G_2$$ đều thu được từ cùng đồ thị $$G$$ bằng các phép chia cạnh nên $$G_1$$ và $$G_2$$
    đồng phôi với nhau.
  vi_terms:
  - term: đồng phôi
    source_id: bib-nguyenhoangthach-2020
    page: tr. 81 (PDF)
    recommended: true
    verified: true
    pdf_page: 81
    snippet: Ta nói hai đồ thị là đồng phôi với nhau nếu chúng có thể được tạo ra từ
  - term: đồng cấu
