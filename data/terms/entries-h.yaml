    (semi-Hamiltonian graph: a graph having a Hamiltonian path) is recorded as a related variant attested
    in bib-nguyenhuudien-2019 and bib-ngodactan-2004; it denotes the path-based notion, not a graph with
    a Hamiltonian cycle. Per Rosen §10.5, a Hamiltonian graph is a graph that contains a Hamiltonian circuit/cycle,
    equivalently a Hamiltonian circuit/cycle of $$G$$ visiting every vertex of $$G$$ exactly once (panel
    fix: the earlier draft''s garbled clause ''mạch/chu trình $$G$$ visiting every vertex'' wrongly equated
    the symbol $$G$$ with the cycle, and has been reworded so $$G$$ denotes only the graph).'
- id: hasse-diagram
  letter: H
  headword_en: Hasse diagram
  notation: ''
  rosen_ref: Rosen §9.6
  definition_vi: \emph{Biểu đồ Hasse} của một tập hữu hạn được sắp thứ tự bộ phận $$(S, \preceq)$$ là
    một hình vẽ trong đó mỗi phần tử của $$S$$ được biểu diễn bằng một đỉnh và có một đoạn thẳng đi lên
    từ $$a$$ tới $$b$$ khi và chỉ khi $$b$$ phủ $$a$$. Ở đây $$b$$ phủ $$a$$ nghĩa là $$a \prec b$$ và
    không tồn tại phần tử $$c$$ nào với $$a \prec c \prec b$$. Các cạnh suy ra từ tính phản xạ và tính
    bắc cầu đều được lược bỏ.
  example_vi: Xét tập $$S = \{1, 2, 4\}$$ với quan hệ chia hết $$\preceq$$, trong đó $$a \preceq b$$ khi
    và chỉ khi $$a$$ chia hết $$b$$; vì $$2$$ phủ $$1$$ và $$4$$ phủ $$2$$, biểu đồ Hasse gồm ba đỉnh
    $$1, 2, 4$$ xếp từ dưới lên với đoạn thẳng nối $$1$$ với $$2$$ và đoạn thẳng nối $$2$$ với $$4$$.
  vi_terms:
  - term: biểu đồ Hasse
    source_id: bib-nguyenhuudien-2019
    page: tr. 122 (PDF)
    recommended: true
    verified: true
    pdf_page: 122
    snippet: khi công việc X đã được thực hiện hoàn tất. Biểu đồ Hasse cho 7 công việc ứng với thứ tự
  - term: sơ đồ Hasse
    source_id: bib-ngodactan-2004
    page: tr. 165 (PDF)
    recommended: false
    verified: true
    pdf_page: 165
    snippet: Người ta thường dùng sơ đồ Hasse để biểu diễn trực quan các tập
  see_also:
  - lattice
  status: panel-approved
  see_ref: ''
  notes: 'Definition split into two sentences per the readability fix: the first sentence gives the vertex
    rule and the upward covering segment, the second states the covering condition ($$a \prec b$$ with
    no intermediate $$c$$), and the third notes the omission of reflexive/transitive edges. Two distinct
    Vietnamese terms denote this concept in the corpus: "biểu đồ Hasse" (newest, bib-nguyenhuudien-2019,
    2019, tr. 122/124/126 PDF) and "sơ đồ Hasse" (bib-ngodactan-2004, 2004, tr. 165/180/274 PDF). Both
    are confirmed by snippet to denote the drawing of a partially ordered set. Recommended term is "biểu
    đồ Hasse" because it is the newest attestation (2019). The candidate "giản đồ Hasse" returned 0 hits
    across all sources (normal and loose). No 2020 source attests any candidate: bib-leanhvinh-2020 returned
    0 hits for both "biểu đồ Hasse" and "sơ đồ Hasse" in normal and --loose modes; the OCR source bib-hoangchithanh-2007
    returned 0 hits (--loose); bib-nguyenhoangthach-2020 and bib-nguyenducnghia-2006 also returned 0.
    Thus the recommended term is attested only as far back as 2019, the newest available attestation.
    The definition is grounded on ngodactan-2004 tr. 165 (corpus lines 22053-22062), which describes elements
    drawn as small circles with a line segment joining $$y$$ to $$x$$ whenever $$y$$ covers $$x$$ and
    $$x$$ is placed lower — i.e. the covering relation — matching Rosen §9.6; the covering condition is
    stated explicitly so the example needs no externally derived quantity. The first introduction of the
    central concept is marked with \emph{Biểu đồ Hasse} OUTSIDE math (Vietnamese words are never wrapped
    in $$...$$; only symbols such as $$a$$, $$b$$, $$S$$, $$\preceq$$ are). The notation field is empty
    because the Hasse diagram has no standard single symbol. see_also targets (partially-ordered-set,
    covering-relation, lattice) are cross-chapter forward references; there are no related same-chapter
    H-terms in the corpus to link.'
