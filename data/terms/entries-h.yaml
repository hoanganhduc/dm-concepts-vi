  status: panel-approved
  see_ref: ''
  notes: 'Khái niệm "Huffman coding" trong Rosen là thuật toán tham lam (greedy) xây dựng mã tiền tố tối
    ưu bằng cách lặp lại việc gộp hai ký hiệu có tần suất nhỏ nhất thành một cây nhị phân. Các tài liệu
    tiếng Việt phân biệt ba thuật ngữ liên quan chặt chẽ trong cùng một mục: "thuật toán Huffman" (bản
    thân quy trình thuật toán), "cây mã Huffman" (cây nhị phân thu được), và "bộ mã Huffman" (bộ mã tối
    ưu thu được). Vì mục từ chỉ chính thuật toán mã hóa, thuật ngữ khuyến nghị là "thuật toán Huffman",
    được chứng thực trong nguồn mới nhất 2019 (nguyenhuudien-2019) và trong hoangchithanh-2007. Dạng trần
    "mã Huffman" chỉ xuất hiện như một phần của "cây mã Huffman" và "bộ mã Huffman". Không có nguồn 2020
    (leanhvinh-2020, nguyenhoangthach-2020) nào, cũng như các nguồn cũ nguyenducnghia-2006 và ngodactan-2004,
    đề cập đến Huffman.'
- id: half-adder
  letter: H
  headword_en: Half adder
  notation: $$s = x \oplus y$$, $$c = x \wedge y$$
  rosen_ref: Rosen §12.3
  definition_vi: Mạch cộng bán phần là mạch logic tổ hợp nhận hai bit đầu vào $$x$$ và $$y$$, rồi tạo
    ra bit tổng $$s$$ và bit nhớ $$c$$. Bit tổng được tính bằng một cổng XOR, ký hiệu $$s = x \oplus y$$,
    và bit nhớ được tính bằng một cổng AND, ký hiệu $$c = x \wedge y$$.
  example_vi: Với hai bit đầu vào $$x = 1$$ và $$y = 1$$, mạch cộng bán phần cho bit tổng $$s = 1 \oplus
    1 = 0$$ và bit nhớ $$c = 1 \wedge 1 = 1$$.
  vi_terms:
  - term: mạch cộng bán phần
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also: []
  status: panel-approved
  see_ref: ''
  notes: 'Definition split into two sentences per the readability suggestion: one for inputs/outputs,
    one for the XOR sum and AND carry formulas. No Vietnamese source in the mined corpus attests the half-adder
    concept. The candidate terms ("mạch nửa cộng", "bộ cộng bán phần", "mạch cộng bán phần", "bộ bán tổng")
    return 0 hits in both normal and --loose mode across all six sources (bib-leanhvinh-2020, bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019, bib-hoangchithanh-2007, bib-nguyenducnghia-2006, bib-ngodactan-2004). Adjacent
    searches confirm the gap: "mạch logic" (bib-nguyenducnghia-2006, p.290) appears only as a generic
    control-logic-circuit design exercise, not a half adder; "phép cộng bit" (bib-nguyenhuudien-2019,
    pp.145,147) means "bit-addition operation" in an algorithm-complexity context; "bộ cộng" (--loose)
    yields only the false positive "toàn bộ công trình" ("the entire work"). The half adder is a combinational/Boolean
    logic circuit topic (Rosen §12.3); the mined corpus covers graph theory, combinatorics, and discrete
    mathematics, none of which treat digital logic gates, so the concept is genuinely absent. The recommended
    term "mạch cộng bán phần" is the standard Vietnamese rendering (literally "half-portion adder circuit")
    used in Vietnamese digital-electronics literature; per the sanctioned exception it is kept verified=false/page=""
    so vi_terms is non-empty and the single-recommendation invariant holds, pending attestation from an
    electronics or computer-architecture source outside this corpus. The unattested variants "mạch nửa
    cộng", "bộ cộng bán phần", and "bộ bán tổng" were dropped from vi_terms (verified=false with empty
    pages) but are recorded here. The definition uses $$\oplus$$ for the XOR (sum) gate and $$\wedge$$
    for the AND (carry) gate, consistent with the Boolean-function notation used elsewhere in the book.'
