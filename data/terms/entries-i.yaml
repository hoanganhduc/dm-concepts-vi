- id: inductive-step
  letter: I
  headword_en: Inductive Step
  notation: P(k) \rightarrow P(k+1)
  rosen_ref: Rosen §5.1
  definition_vi: Bước quy nạp là bước thứ hai trong chứng minh bằng quy nạp toán học, trong đó ta chứng
    minh phép kéo theo $$P(k) \rightarrow P(k+1)$$ đúng với mọi số nguyên dương $$k$$; tức là, giả sử
    $$P(k)$$ đúng (giả thiết quy nạp), ta suy ra $$P(k+1)$$ cũng đúng.
  example_vi: Trong chứng minh $$1 + 2 + \cdots + n = \frac{n(n+1)}{2}$$, bước quy nạp giả sử công thức
    đúng với $$n = k$$ rồi cộng thêm $$k+1$$ vào cả hai vế để suy ra công thức đúng với $$n = k+1$$.
