- id: inference-rule
  letter: I
  headword_en: Inference Rule
  notation: p_1, p_2, \ldots, p_n \vdash q
  rosen_ref: Rosen §1.6
  definition_vi: Quy tắc suy luận là một quy tắc cho phép suy ra một kết luận từ một tập hợp các tiền
    đề, dựa trên một hằng đúng có dạng kéo theo. Cụ thể, nếu các giả thiết $$p_1, p_2, \ldots, p_n$$ đều
    đúng thì kết luận $$q$$ cũng đúng, với điều kiện $$(p_1 \wedge p_2 \wedge \cdots \wedge p_n) \rightarrow
    q$$ là một hằng đúng.
  example_vi: 'Quy tắc Modus Ponens (quy tắc khẳng định) dựa trên hằng đúng $$(p \wedge (p \rightarrow
    q)) \rightarrow q$$: từ $$p$$ và $$p \rightarrow q$$ ta suy ra $$q$$.'
