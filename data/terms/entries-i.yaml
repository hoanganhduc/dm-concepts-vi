  notes: 'Khái niệm "không so sánh được" chỉ có nghĩa trong một tập có thứ tự bộ phận $$(S, \preceq)$$:
    hai phần tử $$a, b$$ không so sánh được khi không có $$a \preceq b$$ cũng không có $$b \preceq a$$.
    Trong một thứ tự toàn phần thì mọi cặp phần tử đều so sánh được, nên không tồn tại cặp không so sánh
    được. Một tập con gồm các phần tử đôi một không so sánh được chính là một phản xích (antichain). Nguồn
    đối chiếu bib-ngodactan-2004 là bản OCR nên đoạn trích có một số ký tự sai (ví dụ "€" thay cho "\in").'
- id: independent-events
  letter: I
  headword_en: Independent Events
  notation: p(E \cap F) = p(E)p(F)
  rosen_ref: Rosen §6.2
  definition_vi: Hai biến cố $$E$$ và $$F$$ được gọi là độc lập nếu $$p(E \cap F) = p(E)p(F)$$. Nói cách
    khác, hai biến cố là độc lập khi xác suất xảy ra đồng thời của chúng bằng tích các xác suất riêng
    lẻ.
  example_vi: Giả sử ta tung một đồng xu cân đối ba lần, mỗi biến cố là một tập con của tập các kết cục
    có thể. Xét biến cố $$E$$ là "lần tung đầu tiên được mặt sấp" và biến cố $$F$$ là "lần tung thứ hai
    được mặt sấp"; vì $$p(E \cap F) = \frac{1}{4} = \frac{1}{2} \cdot \frac{1}{2} = p(E)p(F)$$, nên $$E$$
    và $$F$$ là hai biến cố độc lập.
