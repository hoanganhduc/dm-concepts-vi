- id: implicant
  letter: I
  headword_en: Implicant
  notation: ''
  rosen_ref: Rosen §12.4
  definition_vi: Nguyên nhân của một hàm Boole $$f$$ là một tích các tục biến (một hội sơ cấp) mà từ đó
    suy ra $$f$$, nghĩa là tại mọi bộ giá trị làm cho tích đó bằng $$1$$ thì $$f$$ cũng nhận giá trị $$1$$.
    Nói cách khác, nếu ký hiệu tích các tục biến là $$g$$ thì $$g$$ là một nguyên nhân của $$f$$ khi và
    chỉ khi phép kéo theo $$g \rightarrow f$$ luôn nhận giá trị $$1$$.
  example_vi: Đối với hàm $$f = x + y$$, cả $$x$$ và $$y$$ đều là nguyên nhân của $$f$$, vì khi $$x =
    1$$ (tương ứng $$y = 1$$) thì $$f = 1$$.
