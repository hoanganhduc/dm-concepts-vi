- id: intersection
  letter: I
  headword_en: Intersection
  notation: A \cap B
  rosen_ref: Rosen §2.2
  definition_vi: 'Giao của hai tập hợp $$A$$ và $$B$$, ký hiệu $$A \cap B$$, là tập hợp gồm tất cả các
    phần tử đồng thời thuộc cả $$A$$ và $$B$$, tức là $$A \cap B = \{x : x \in A \wedge x \in B\}$$.'
  example_vi: Với $$A = \{1, 2, 3, 5\}$$ và $$B = \{2, 4, 5\}$$ thì $$A \cap B = \{2, 5\}$$.
