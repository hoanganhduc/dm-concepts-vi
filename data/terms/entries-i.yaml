- id: indirect-proof
  letter: I
  headword_en: Indirect Proof
  notation: ''
  rosen_ref: Rosen §1.6
  definition_vi: Chứng minh gián tiếp là phương pháp chứng minh mệnh đề kéo theo $$p \rightarrow q$$ bằng
    cách chứng minh mệnh đề phản đảo tương đương $$\neg q \rightarrow \neg p$$. Vì $$p \rightarrow q$$
    và $$\neg q \rightarrow \neg p$$ có cùng giá trị chân lý, nên việc giả sử $$\neg q$$ đúng rồi suy
    ra $$\neg p$$ đúng sẽ chứng tỏ $$p \rightarrow q$$ là đúng.
  example_vi: 'Để chứng minh "nếu $$3n + 2$$ là số lẻ thì $$n$$ là số lẻ", ta chứng minh gián tiếp: giả
    sử $$n$$ chẵn, tức $$n = 2k$$, khi đó $$3n + 2 = 6k + 2 = 2(3k + 1)$$ là số chẵn, nên $$3n + 2$$ không
    lẻ; theo mệnh đề phản đảo, kết luận được chứng minh.'
