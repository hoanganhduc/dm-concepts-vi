    the row=vertex, column=edge indexing. Candidate "ma trận tới" returned 0 hits across all sources (normal
    and --loose), so it is not recorded. The two OCR sources were confirmed: bib-hoangchithanh-2007 attests
    the term on PDF p.20 only via --loose (OCR mangled "trận" to "tran"; the snippet refers to a directed
    graph, but "ma trận liên thuộc" denotes the same concept for both directed and undirected graphs);
    bib-leanhvinh-2020 attests it cleanly in both normal and --loose passes. The cross-chapter id "adjacency-matrix"
    (chapter A) is a forward reference.'
- id: independent-set
