- id: inorder-traversal
  letter: I
  headword_en: Inorder Traversal
  notation: ''
  rosen_ref: Rosen §11.3
  definition_vi: Duyệt trung thứ tự là cách duyệt một cây có gốc có thứ tự $$T$$, trong đó nếu $$T$$ chỉ
    gồm một gốc $$r$$ thì kết quả là $$r$$; ngược lại, nếu $$r$$ có các cây con $$T_1, T_2, \ldots, T_k$$
    theo thứ tự từ trái sang phải, thì ta lần lượt duyệt trung thứ tự cây con $$T_1$$, viếng thăm gốc
    $$r$$, rồi duyệt trung thứ tự các cây con $$T_2, \ldots, T_k$$. Với cây nhị phân, thứ tự duyệt là
    cây con trái, gốc, rồi cây con phải.
  example_vi: Duyệt trung thứ tự cây nhị phân tìm kiếm các đỉnh $$\{1,2,3,4,5,6,7,9,10\}$$ cho ra dãy
    đỉnh được sắp xếp tăng dần $$5,2,6,1,3,9,7,10,4$$.
