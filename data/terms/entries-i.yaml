- id: implication
  letter: I
  headword_en: Implication
  notation: p \rightarrow q
  rosen_ref: Rosen §1.1
  definition_vi: Phép kéo theo của hai mệnh đề $$p$$ và $$q$$, ký hiệu $$p \rightarrow q$$, là mệnh đề
    có giá trị chân lý sai khi $$p$$ đúng và $$q$$ sai, và đúng trong mọi trường hợp còn lại. Trong $$p
    \rightarrow q$$, mệnh đề $$p$$ được gọi là giả thiết và $$q$$ được gọi là kết luận.
  example_vi: Mệnh đề "Nếu trời mưa thì đường ướt" có dạng $$p \rightarrow q$$, trong đó $$p$$ là "trời
    mưa" và $$q$$ là "đường ướt". Mệnh đề này chỉ sai khi trời mưa ($$p$$ đúng) nhưng đường không ướt
    ($$q$$ sai).
