- id: initial-term
  letter: I
  headword_en: Initial Term
  notation: a_0
  rosen_ref: Rosen §2.4
  definition_vi: Số hạng đầu tiên của một dãy $$\{a_n\}$$, thường ký hiệu $$a_0$$ hoặc $$a_1$$, là số
    hạng ứng với chỉ số nhỏ nhất trong miền của dãy. Trong một hệ thức truy hồi, các số hạng đầu tiên
    được cho trước làm điều kiện ban đầu để xác định toàn bộ dãy; trong một cấp số nhân với công bội $$r$$,
    số hạng đầu là $$a$$ sao cho $$a_n = a r^n$$.
  example_vi: Với cấp số nhân $$a_n = a r^n$$ thì số hạng đầu là $$a = a_0$$. Với dãy xác định bởi hệ
    thức truy hồi $$a_n = a_{n-1} + a_{n-2}$$, hai số hạng đầu $$a_0 = 0$$ và $$a_1 = 1$$ là điều kiện
    ban đầu cho dãy Fibonacci.
