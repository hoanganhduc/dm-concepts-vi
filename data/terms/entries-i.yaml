- id: isomorphism
  letter: I
  headword_en: isomorphism
  notation: G_1 \cong G_2
  rosen_ref: Rosen §10.3
  definition_vi: 'Một đẳng cấu giữa hai đồ thị $$G_1 = (V_1, E_1)$$ và $$G_2 = (V_2, E_2)$$ là một song
    ánh $$f: V_1 \to V_2$$ bảo toàn quan hệ kề, nghĩa là hai đỉnh $$u$$ và $$v$$ kề nhau trong $$G_1$$
    khi và chỉ khi $$f(u)$$ và $$f(v)$$ kề nhau trong $$G_2$$. Khi tồn tại một đẳng cấu như vậy, ta nói
    $$G_1$$ và $$G_2$$ đẳng cấu với nhau, ký hiệu $$G_1 \cong G_2$$.'
  example_vi: Xét $$G_1$$ với các đỉnh $$\{a, b, c\}$$ và các cạnh $$\{ab, bc\}$$, và $$G_2$$ với các
    đỉnh $$\{x, y, z\}$$ và các cạnh $$\{xy, yz\}$$. Song ánh $$f$$ xác định bởi $$f(a) = x$$, $$f(b)
    = y$$, $$f(c) = z$$ là một đẳng cấu, vì mỗi cạnh của $$G_1$$ tương ứng với một cạnh của $$G_2$$; do
    đó $$G_1 \cong G_2$$.
