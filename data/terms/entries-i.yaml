- id: inverse
  letter: I
  headword_en: Inverse
  notation: \neg p \to \neg q
  rosen_ref: Rosen §1.1
  definition_vi: Mệnh đề nghịch đảo (phản đề) của mệnh đề kéo theo $$p \to q$$, ký hiệu $$\neg p \to \neg
    q$$, là mệnh đề thu được bằng cách phủ định cả giả thiết và kết luận của mệnh đề ban đầu. Một mệnh
    đề kéo theo và mệnh đề nghịch đảo của nó không nhất thiết tương đương logic, nhưng mệnh đề nghịch
    đảo luôn tương đương với mệnh đề đảo $$q \to p$$.
  example_vi: Mệnh đề nghịch đảo của "Nếu $$n$$ chia hết cho $$4$$ thì $$n$$ chia hết cho $$2$$" là "Nếu
    $$n$$ không chia hết cho $$4$$ thì $$n$$ không chia hết cho $$2$$". Ở đây mệnh đề gốc đúng nhưng mệnh
    đề nghịch đảo lại sai (chẳng hạn với $$n = 6$$).
