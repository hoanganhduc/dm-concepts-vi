  see_ref: ''
  notes: Thuật ngữ chuẩn của giáo trình MAT3500 là "chỉ số lấy tổng". Bản dịch Rosen cũng dùng "chỉ số
    lấy tổng" cho cùng khái niệm. Các tài liệu khác trong kho dùng "chỉ số" cho những khái niệm khác (chỉ
    số liên thông, chỉ số đỉnh), không phải chỉ số trong ký hiệu tổng.
