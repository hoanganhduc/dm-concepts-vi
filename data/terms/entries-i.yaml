    tức là một tập con $$S \subseteq V(G)$$ sao cho không có cạnh nào của $$G$$ nối hai đỉnh thuộc $$S$$.
  example_vi: Trong đồ thị $$G$$ với tập đỉnh $$\{a, b, c\}$$ và tập cạnh $$\{ab, bc\}$$, tập $$\{a, c\}$$
    là một tập độc lập, vì $$a$$ và $$c$$ không kề nhau.
