      hàm đó.
  see_also: []
  status: draft
  see_ref: ''
  notes: Hàm khả nghịch tương đương với song ánh (vừa đơn ánh vừa toàn ánh). Hàm ngược $$f^{-1}$$, nếu
    tồn tại, là duy nhất.
- id: irrational-number
  letter: I
  headword_en: Irrational Number
  notation: \mathbb{R} \setminus \mathbb{Q}
  rosen_ref: Rosen §1.7
  definition_vi: Số vô tỷ là số thực $$x$$ không thể viết được dưới dạng tỷ số $$p/q$$ của hai số nguyên
    $$p$$ và $$q$$ với $$q \neq 0$$; nói cách khác, $$x$$ là số vô tỷ khi và chỉ khi $$x$$ không phải
    là số hữu tỷ, ký hiệu $$x \in \mathbb{R} \setminus \mathbb{Q}$$.
  example_vi: '$$\sqrt{2}$$ là một số vô tỷ: nếu giả sử $$\sqrt{2} = p/q$$ với $$p, q$$ nguyên và phân
    số tối giản thì dẫn đến mâu thuẫn, nên $$\sqrt{2} \notin \mathbb{Q}$$.'
