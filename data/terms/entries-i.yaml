- id: inclusion-exclusion-principle
  letter: I
  headword_en: Inclusion-Exclusion Principle
  notation: \left| \bigcup_{i=1}^{n} A_i \right|
  rosen_ref: Rosen §7.5
  definition_vi: Nguyên lý bù trừ là công thức đếm số phần tử của hợp các tập hữu hạn $$A_1, A_2, \ldots,
    A_n$$ bằng cách cộng kích thước của từng tập, rồi trừ kích thước của các giao từng cặp, cộng lại các
    giao bộ ba, và tiếp tục đan dấu cho đến giao của cả $$n$$ tập, ký hiệu $$\left| \bigcup_{i=1}^{n}
    A_i \right|$$. Với hai tập, công thức là $$|A_1 \cup A_2| = |A_1| + |A_2| - |A_1 \cap A_2|$$.
  example_vi: Số nguyên dương không vượt quá $$1000$$ chia hết cho $$3$$, $$5$$ hoặc $$7$$ được tính bằng
    $$|A \cup B \cup C|$$ qua nguyên lý bù trừ, trong đó $$A$$, $$B$$, $$C$$ lần lượt là các tập số chia
    hết cho $$3$$, $$5$$, $$7$$.
