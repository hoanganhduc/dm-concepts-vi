  see_ref: ''
  notes: 'Khái niệm độc lập của biến ngẫu nhiên mở rộng khái niệm độc lập của biến cố: $$X$$ và $$Y$$
    độc lập khi và chỉ khi mọi biến cố dạng $$X = r_1$$ và mọi biến cố dạng $$Y = r_2$$ là độc lập. Khi
    $$X$$ và $$Y$$ độc lập thì kỳ vọng của tích bằng tích các kỳ vọng, tức $$E(XY) = E(X)\,E(Y)$$. Thuật
    ngữ "biến ngẫu nhiên độc lập" là cách dịch chuẩn; ngữ liệu hiện có chỉ có dẫn chứng trực tiếp cho
    thành phần "biến ngẫu nhiên" (bib-leanhvinh-2020), chưa có dẫn chứng cho cụm đầy đủ "biến ngẫu nhiên
    độc lập".'
- id: initial-conditions
  letter: I
  headword_en: Initial Conditions
  notation: a_0, a_1, \ldots, a_{k-1}
  rosen_ref: Rosen §8.1
  definition_vi: Điều kiện ban đầu của một dãy là các giá trị của những số hạng đứng trước các số hạng
    được xác định bởi một hệ thức truy hồi. Cùng với hệ thức truy hồi, các điều kiện ban đầu này xác định
    duy nhất toàn bộ dãy; chẳng hạn, một hệ thức truy hồi tuyến tính thuần nhất bậc $$k$$ được xác định
    hoàn toàn bởi một bộ $$k$$ điều kiện ban đầu $$a_0, a_1, \ldots, a_{k-1}$$.
  example_vi: Với dãy Fibonacci $$f_n = f_{n-1} + f_{n-2}$$ (bậc $$2$$), các điều kiện ban đầu là $$f_0
    = 0$$ và $$f_1 = 1$$. Cùng với hệ thức truy hồi, hai giá trị này xác định duy nhất mọi số hạng còn
    lại của dãy.
