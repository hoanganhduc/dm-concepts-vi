- id: index-of-summation
  letter: I
  headword_en: Index Of Summation
  notation: \sum_{j=m}^{n} a_j
  rosen_ref: Rosen §2.4
  definition_vi: Chỉ số lấy tổng là biến chạy $$j$$ trong ký hiệu tổng $$\sum_{j=m}^{n} a_j$$, lần lượt
    nhận tất cả các giá trị nguyên từ giới hạn dưới $$m$$ đến giới hạn trên $$n$$ để xác định các số hạng
    được cộng. Việc chọn chữ cái cho chỉ số lấy tổng là tùy ý, nghĩa là $$\sum_{j=m}^{n} a_j = \sum_{i=m}^{n}
    a_i$$.
  example_vi: Trong tổng $$\sum_{j=1}^{100} j$$, chỉ số lấy tổng là $$j$$ với giới hạn dưới là $$1$$ và
    giới hạn trên là $$100$$, do đó tổng này bằng $$1 + 2 + \cdots + 100$$.
  vi_terms:
  - term: chỉ số lấy tổng
    source_id: bib-rosen-2003-vi
    page: tr. 99 (PDF)
    recommended: true
    verified: true
    pdf_page: 99
    snippet: Ỏ đây biến j được gọi là chỉ số lấy tổng và việc chọn chữ j là hoàn
  see_also: []
