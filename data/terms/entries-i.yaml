    \in A$$" was removed from the notation slot per the panel''s consistency fix; the full quantified
    condition remains in the definition).


    Concept: a relation $$R$$ on a set $$A$$ is irreflexive if no element of $$A$$ is related to itself,
    i.e. $$(a, a) \notin R$$ for all $$a \in A$$.


