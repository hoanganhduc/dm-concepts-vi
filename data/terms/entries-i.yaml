  letter: I
  headword_en: inverse relation
  notation: R^{-1}
  rosen_ref: Rosen §9.1
  definition_vi: 'Quan hệ ngược của một quan hệ $$R$$ từ tập $$A$$ vào tập $$B$$, ký hiệu $$R^{-1}$$,
    là quan hệ từ $$B$$ vào $$A$$ thu được bằng cách đảo thứ tự của mỗi cặp có thứ tự thuộc $$R$$; nghĩa
