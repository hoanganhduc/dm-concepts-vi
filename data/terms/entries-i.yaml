  notes: 'Nguyễn Đức Nghĩa (2006, tr. 274) dùng thuật ngữ "nguyên nhân" cho "implicant": một hội sơ cấp
    $$g$$ là nguyên nhân của $$f$$ nếu $$g \rightarrow f$$ luôn đúng. Một nguyên nhân mà không thể xoá
    bớt tục biến nào mà vẫn còn là nguyên nhân được gọi là nguyên nhân nguyên tố (prime implicant); khái
    niệm này là một mục riêng.'
- id: incomparable
  letter: I
  headword_en: Incomparable
  notation: ''
  rosen_ref: Rosen §9.6
  definition_vi: Hai phần tử $$a$$ và $$b$$ của một tập có thứ tự bộ phận $$(S, \preceq)$$ được gọi là
    không so sánh được nếu cả $$a \preceq b$$ lẫn $$b \preceq a$$ đều không xảy ra. Nói cách khác, $$a$$
    và $$b$$ không so sánh được khi chúng không so sánh được với nhau theo quan hệ thứ tự bộ phận $$\preceq$$.
  example_vi: Trong tập $$(\mathbb{Z}^{+}, \mid)$$ với quan hệ chia hết, hai số $$3$$ và $$5$$ là không
    so sánh được vì $$3 \nmid 5$$ và $$5 \nmid 3$$. Ngược lại, $$3$$ và $$9$$ là so sánh được vì $$3 \mid
    9$$.
