- id: independent-random-variables
  letter: I
  headword_en: Independent Random Variables
  notation: ''
  rosen_ref: Rosen §7.4
  definition_vi: Hai biến ngẫu nhiên $$X$$ và $$Y$$ được gọi là độc lập nếu phân phối đồng thời của chúng
    phân tích thành tích của các phân phối lề. Nói cách khác, $$X$$ và $$Y$$ độc lập khi $$p(X = r_1 \text{
    và } Y = r_2) = p(X = r_1) \cdot p(Y = r_2)$$ với mọi giá trị $$r_1$$ của $$X$$ và mọi giá trị $$r_2$$
    của $$Y$$.
  example_vi: Tung hai đồng xu cân đối một cách riêng rẽ, gọi $$X$$ là số mặt ngửa của đồng xu thứ nhất
    và $$Y$$ là số mặt ngửa của đồng xu thứ hai. Khi đó $$X$$ và $$Y$$ là hai biến ngẫu nhiên độc lập,
    chẳng hạn $$p(X = 1 \text{ và } Y = 1) = \frac{1}{4} = \frac{1}{2} \cdot \frac{1}{2} = p(X = 1)\,p(Y
    = 1)$$.
