    citations ordered newest-source first. Variant "ma trận liên thuộc đỉnh-cạnh" (vertex-edge incidence
    matrix) is attested only in bib-nguyenducnghia-2006 (p.171: "được gọi là ma trận liên thuộc đính-cạnh";
