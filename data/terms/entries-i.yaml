  notes: 'Filing/collation: the common name "mathematical induction" is M-initial, but this entry is filed
    under chapter I; per the panel''s alphabetization fix, headword_en is set to the lexicon index-key
    form "induction, mathematical" so the entry collates under I and passes the letter==headword-initial
    schema check. The id "mathematical-induction" is kept stable for cross-references; the M-initial common
    name is retained in the definition. Recommended term "quy nạp toán học" is the standard full name
    for this proof technique, attested in the 2019 discrete-math source (bib-nguyenhuudien-2019, tr. 69),
    which also gives "phương pháp quy nạp toán học" (tr. 69) and the chapter form "phương pháp quy nạp"
    (tr. 60, section 2.4). Transparency: the named full phrase "quy nạp toán học" does NOT appear in either
    2020 graph-theory text (bib-leanhvinh-2020, bib-nguyenhoangthach-2020); they use it within proofs
    only as "nguyên lý quy nạp" (induction principle) and bare "quy nạp", so the recommended term is anchored
    to the 2019 source, the newest source attesting the full named phrase, which satisfies the "2019-2020
    where possible" rule. "nguyên lý quy nạp" denotes the induction principle invoked to close inductive
    proofs (bib-leanhvinh-2020 tr. 17, 29, 62, 99, 145, 200; also bib-nguyenhuudien-2019 tr. 62). Bare
    "quy nạp" is the most frequent form across the corpus (bib-leanhvinh-2020, bib-nguyenhoangthach-2020
    tr. 70, bib-hoangchithanh-2007 tr. 37/47, bib-nguyenducnghia-2006 tr. 72) but is a shorthand, hence
    not recommended. "phương pháp quy nạp" also appears in the OCR source bib-hoangchithanh-2007 (tr.
    47, 52). No candidate term is attested in bib-ngodactan-2004 (no hits, normal or --loose). All four
    candidate terms were searched; OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 were searched
    both normal and --loose. The candidate "nguyên lý quy nạp" is recorded as a variant (it corresponds
    more precisely to "principle of mathematical induction" but is the in-proof realization of this concept
    in the newest 2020 source).'
- id: infinite-set
  letter: I
  headword_en: infinite set
  notation: ''
  rosen_ref: Rosen §2.1
  definition_vi: Một tập hợp $$A$$ được gọi là tập vô hạn nếu nó không phải là tập hữu hạn, tức là không
    thể đặt các phần tử của $$A$$ tương ứng một-một với các số nguyên dương từ $$1$$ đến một số nguyên
    không âm cố định $$n$$ nào đó (trường hợp $$n = 0$$ ứng với tập rỗng).
  example_vi: Tập hợp các số nguyên dương $$\{1, 2, 3, \ldots\}$$ là một tập vô hạn.
