  status: panel-approved
  notes: Recommended term "tập độc lập" is attested in the newest source (bib-leanhvinh-2020, 2020) with
    extensive definitional and proof usage; citations are listed newest-source first. "tập ổn định trong"
    is the classical terminology used by bib-hoangchithanh-2007 (Định nghĩa 3.1) and bib-nguyenhuudien-2019,
    where the same concept is named as an "internally stable set" and the complement notion "tập ổn định
    ngoài" (externally stable set) also appears. "tập đỉnh độc lập" (independent vertex set) is a variant
    attested in bib-leanhvinh-2020 and bib-ngodactan-2004. The candidate "tập độc lập của đồ thị" is not
    attested as a fixed phrase (0 hits); it is just "tập độc lập" followed by "của G/của đồ thị" in context,
    so it is folded into the recommended term rather than listed separately. Sources bib-nguyenhoangthach-2020
    and bib-nguyenducnghia-2006 use the underlying concept ("hai đỉnh không kề nhau") but do not attest
    any named set term for it. The definition follows Rosen §10.8 (a set of vertices no two of which are
    adjacent) and is grounded in the leanhvinh-2020 p.80 characterization that every edge of $$G$$ has
    at most one endpoint in an independent set. The first introduction of the central concept is marked
    with \emph{tập độc lập} OUTSIDE math, per the math-wrapping convention (delimiters wrap symbols only,
    e.g. $$G$$, $$S$$, $$V(G)$$). The example is self-contained, using a concrete three-vertex graph and
    introducing no derived invariant (the independence number is deliberately not invoked). The vi_terms
    list is sorted by source recency across all variants (newest source first), so the two distinct surface
    forms 'tập độc lập' and 'tập đỉnh độc lập' are interleaved by source date rather than grouped by surface
    form. see_also target clique is the complementary concept (pairwise-adjacent vertices) and is a cross-chapter
    (chapter C) forward reference; the clique entry already links back to independent-set. No independence-number
    or maximal-independent-set entry exists yet, so no same-chapter I-term is linked.
