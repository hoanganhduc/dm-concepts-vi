    translation (bib-rosen-2003-vi) confirms both the term and the canonical example: at p.58 it reads
    "Tập hợp các số nguyên dương là một tập vô hạn" (Ví dụ 10), and "tập vô hạn" recurs at pp.58, 87,
    97, 102, 129. The example_vi reuses this Rosen example; it is self-contained and introduces no derived
    quantity. Per the panel''s precision fix, finiteness is stated as a one-to-one correspondence with
    $$\{1, 2, \ldots, n\}$$ for some NONNEGATIVE integer $$n$$ (allowing $$n = 0$$), so the negation defining
    ''infinite'' cleanly covers the empty set (the empty set is finite). Candidate variants "tập hợp vô
    hạn" and "tập hợp không hữu hạn" returned 0 hits (normal and --loose) in every source, so they are
    not recorded as verified terms; "tập hợp A không hữu hạn" appears only as a definitional clause ("set
    A that is not finite"), not as a standalone noun phrase for the concept. OCR sources checked with
    both normal and --loose: bib-leanhvinh-2020 confirms "tập vô hạn"; bib-hoangchithanh-2007 yields no
    hit for this concept (only "vô hạn" in unrelated planar-graph/region context). bib-nguyenhoangthach-2020
    and bib-nguyenducnghia-2006 use "vô hạn" only for "dãy vô hạn"/"chuỗi vô hạn" (infinite sequence/series),
    not infinite set. vi_terms ordered newest-source first (2020, 2019, 2004). see_also entries are cross-chapter
    forward references (finite-set, cardinality, countable-set in chapter F/C); no other chapter-I entries
    exist yet to link.'
