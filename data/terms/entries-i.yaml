- id: invertible-function
  letter: I
  headword_en: Invertible Function
  notation: f^{-1}
  rosen_ref: Rosen §2.3
  definition_vi: 'Hàm khả nghịch là hàm $$f: A \to B$$ tồn tại hàm $$g: B \to A$$ sao cho $$g \circ f$$
    là hàm đồng nhất trên $$A$$ và $$f \circ g$$ là hàm đồng nhất trên $$B$$; khi đó $$g$$ gọi là hàm
    ngược của $$f$$, ký hiệu $$f^{-1}$$. Một hàm là khả nghịch khi và chỉ khi nó là song ánh.'
  example_vi: 'Hàm $$f: \mathbb{R} \to \mathbb{R}$$ cho bởi $$f(x) = 2x + 3$$ là khả nghịch, với hàm ngược
    $$f^{-1}(y) = (y - 3)/2$$. Hàm $$f: \mathbb{Z} \to \mathbb{Z}$$ cho bởi $$f(x) = x^2$$ không khả nghịch
    vì nó không là song ánh.'
  vi_terms:
  - term: hàm khả nghịch
    source_id: bib-rosen-2003-vi
    page: tr. 88 (PDF)
    recommended: true
    verified: true
    pdf_page: 88
