- id: mathematical-induction
  letter: I
  headword_en: induction, mathematical
  notation: ''
  rosen_ref: Rosen §5.1
  definition_vi: Quy nạp toán học là kỹ thuật chứng minh một khẳng định $$P(n)$$ đúng với mọi số nguyên
    dương $$n$$, gồm bước cơ sở chứng minh $$P(1)$$ đúng và bước quy nạp chứng minh rằng nếu $$P(k)$$
    đúng thì $$P(k+1)$$ cũng đúng với mọi số nguyên dương $$k$$.
  example_vi: Để chứng minh $$1 + 2 + \cdots + n = \frac{n(n+1)}{2}$$ với mọi số nguyên dương $$n$$, ở
    bước cơ sở ta kiểm tra đẳng thức đúng với $$n = 1$$, và ở bước quy nạp ta giả sử đẳng thức đúng với
    $$n = k$$ rồi suy ra nó đúng với $$n = k+1$$.
