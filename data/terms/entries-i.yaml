- id: inverse-modulo-m
  letter: I
  headword_en: Inverse Modulo M
  notation: \bar{a}
  rosen_ref: Rosen §4.4
  definition_vi: Nghịch đảo của $$a$$ theo môđun $$m$$ là một số nguyên $$\bar{a}$$ là nghịch đảo phép
    nhân của $$a$$ theo môđun $$m$$, tức là $$\bar{a} a \equiv 1 \pmod{m}$$.
  example_vi: Số $$3$$ là nghịch đảo của $$5$$ theo môđun $$7$$ vì $$3 \cdot 5 = 15 \equiv 1 \pmod{7}$$.
    Nghịch đảo của $$a$$ theo môđun $$m$$ tồn tại và là duy nhất theo môđun $$m$$ khi và chỉ khi $$a$$
    và $$m$$ nguyên tố cùng nhau.
  vi_terms:
  - term: nghịch đảo của $$a$$ theo môđun $$m$$
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  - term: nghịch đảo của $$a$$ theo môđun $$m$$
    source_id: bib-rosen-2003-vi
    page: tr. 874 (PDF)
    recommended: false
    verified: true
    pdf_page: 874
    snippet: Hàm giải mã là $$g(q) = \bar{a}(q - b) \bmod 26$$ với $$\bar{a}$$ là nghịch đảo của $$a$$
      theo môđun $$26$$
  see_also:
  - linear-congruence
  - congruence
  - modular-arithmetic
  status: draft
  see_ref: ''
  notes: Nghịch đảo của $$a$$ theo môđun $$m$$ là số nguyên $$\bar{a}$$ thoả $$\bar{a} a \equiv 1 \pmod{m}$$.
    Nghịch đảo này tồn tại khi và chỉ khi $$\gcd(a, m) = 1$$, và khi tồn tại thì duy nhất theo môđun $$m$$;
    nó được dùng để giải phương trình đồng dư tuyến tính $$a x \equiv b \pmod{m}$$ bằng cách nhân hai
    vế với $$\bar{a}$$. Có thể tìm $$\bar{a}$$ bằng thuật toán Euclid mở rộng. Thuật ngữ "nghịch đảo của
    $$a$$ theo môđun $$m$$" là cách dịch chuẩn; ngữ liệu Rosen-VI (tr. 874) dùng cụm này trong phần mật
    mã học, còn các kết quả "nghịch đảo" ở các nguồn khác chủ yếu chỉ công thức nghịch đảo, ma trận hoặc
    đa thức nghịch đảo, không phải nghịch đảo theo môđun.
