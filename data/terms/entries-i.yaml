- id: increasing
  letter: I
  headword_en: Increasing
  notation: x < y \implies f(x) \leq f(y)
  rosen_ref: Rosen §2.3
  definition_vi: Hàm $$f$$ từ tập số thực vào tập số thực được gọi là tăng nếu với mọi $$x$$ và $$y$$
    thuộc miền xác định mà $$x < y$$ thì $$f(x) \leq f(y)$$. Nếu điều kiện mạnh hơn $$f(x) < f(y)$$ luôn
    đúng khi $$x < y$$, ta nói $$f$$ tăng thực sự (ký hiệu $$x < y \implies f(x) < f(y)$$).
  example_vi: Hàm $$f(x) = x + 1$$ là tăng (và tăng thực sự), vì nếu $$x < y$$ thì $$x + 1 < y + 1$$.
    Tương tự, một dãy $$\langle a_1, a_2, \ldots \rangle$$ với $$a_i \leq a_{i+1}$$ là một dãy tăng.
