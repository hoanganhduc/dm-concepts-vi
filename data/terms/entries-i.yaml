    không phản xạ vì $$(1, 1) \notin R$$" — exactly this concept. The compound form "quan hệ ... không
    phản xạ" also appears on the same page ("quan hệ $$R$$ là không phản xạ"), so the recommended standard
    term is "quan hệ không phản xạ" (verified=true; this is the normalized form of the phrase "quan hệ
    R là không phản xạ" found verbatim at tr. 111 and tr. 128). Re-run find-term: the contiguous string
    "quan hệ không phản xạ" returns 0 hits, but "quan hệ R là không phản xạ" returns 2 hits (tr. 111 and
    tr. 128); the vi_term snippet is stored verbatim as returned by the tool. The candidates "quan hệ
    phản phản xạ", "phản phản xạ", "bất phản xạ", "phi phản xạ", "phản xạ ngược" do not appear in any
    source (0 hits in both normal and --loose searches, including the two OCR sources bib-leanhvinh-2020
    and bib-hoangchithanh-2007).


    Note: the two OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 do not attest "không phản
    xạ" (0 hits, --loose), so the only anchoring source for this concept is bib-nguyenhuudien-2019. The
    same source at tr. 128 (PDF) uses "không phản xạ" in a sentence relating reflexive/irreflexive; the
    tr. 111 context (defined via $$(a, a) \notin R$$, with the relation matrix having zero main diagonal)
    is the clearest conceptual anchor.'
