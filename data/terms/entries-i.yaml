- id: incidence-matrix
  letter: I
  headword_en: incidence matrix
  notation: M
  rosen_ref: Rosen §10.3
  definition_vi: Ma trận liên thuộc của đồ thị $$G$$ với tập đỉnh $$V(G) = \{v_1, v_2, \ldots, v_n\}$$
    và tập cạnh $$E(G) = \{e_1, e_2, \ldots, e_m\}$$, ký hiệu $$M = (m_{ij})$$, là ma trận cỡ $$n \times
    m$$ trong đó $$m_{ij} = 1$$ nếu đỉnh $$v_i$$ liên thuộc với cạnh $$e_j$$ và $$m_{ij} = 0$$ trong trường
    hợp ngược lại.
  example_vi: Với đồ thị $$G$$ có các đỉnh $$v_1, v_2, v_3$$ và các cạnh $$e_1 = v_1 v_2$$, $$e_2 = v_2
    v_3$$, ma trận liên thuộc là ma trận cỡ $$3 \times 2$$ với $$m_{11} = m_{21} = 1$$, $$m_{22} = m_{32}
    = 1$$ và các phần tử còn lại bằng $$0$$.
