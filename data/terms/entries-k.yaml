  notes: 'Concept match confirmed. Định nghĩa 3.3 in bib-hoangchithanh-2007 (PDF tr. 34) defines "nhân
    của đồ thị $$G$$" as a set $$B \subseteq V$$ that is both "tập ổn định trong" (internally stable =
    independent: no arc joins two vertices of $$B$$) and "tập ổn định ngoài" (externally stable = absorbing:
    every vertex outside $$B$$ has an arc into $$B$$). This is exactly Rosen''s kernel (independent +
    absorbing). The source also states the two conditions are equivalent to an identity $$F^{-1}(B) =
    V \setminus B$$ where $$F$$ is the successor (out-neighbor) map of the digraph.


