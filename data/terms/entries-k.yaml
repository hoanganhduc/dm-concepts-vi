- id: k-coloring
  letter: K
  headword_en: k-coloring
  notation: 'c: V(G) \to \{1, 2, \ldots, k\}'
  rosen_ref: Rosen §10.8
  ref_bib: ''
  definition_vi: 'Một k-tô màu của một đồ thị đơn $$G$$ là một phép gán cho mỗi đỉnh của $$G$$ một trong
    $$k$$ màu, tức một hàm $$c: V(G) \to \{1, 2, \ldots, k\}$$ thỏa mãn $$c(u) \neq c(v)$$ với mọi cạnh
    $$uv \in E(G)$$, nghĩa là không có hai đỉnh kề nhau nào được gán cùng một màu.'
  example_vi: 'Đồ thị chu trình $$C_4$$ có một k-tô màu với $$k = 2$$: tô hai đỉnh đối nhau bằng màu thứ
    nhất và hai đỉnh còn lại bằng màu thứ hai, khi đó không có hai đỉnh kề nhau nào cùng màu.'
