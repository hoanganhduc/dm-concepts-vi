    - bib-hoangchithanh-2007 (2007, OCR) names it "bài toán mã đi tuần" / "mã đi tuần" (pdf p.82): "Cho
    quân mã đi trên bàn cờ vua sao cho nó đi qua mỗi ô đúng một lần (bài toán mã đi tuần)." This is the
    standard, established Vietnamese name for the knight''s-tour problem.

    Recommended term: "mã đi tuần" is the canonical/standard Vietnamese term, but it is attested only
    in 2007. "hành trình của con mã" is the newest attestation (2019) and is a legitimate named section/figure
    title, so it is set as recommended to satisfy the 2019-2020 preference. If the established name should
    win over recency, "mã đi tuần" is the strongest alternative. No attestation found in the 2020 sources;
    both normal and --loose searches on the OCR sources were run.

    "con mã" and "quân mã" both appear in the corpus for the chess knight piece (nguyenhuudien-2019 /
    hoangchithanh-2007), used interchangeably.

    Definition follows Rosen''s general tour (visit every square exactly once) as ground truth, with the
    closed/open distinction added because the 2019 source describes the re-entrant variant. CAUTION (kept
    out of the entry): one source snippet (nguyenhuudien-2019 p.188) wrongly describes the knight moving
    "theo đường chéo" (diagonally); the knight moves in an L-shape, so definition_vi deliberately writes
    only "nước đi của con mã" and does not propagate that error. A closed knight''s tour corresponds to
    a Hamiltonian circuit and an open tour to a Hamiltonian path on the knight''s-move graph (Rosen §10.5).


    EDITOR (chapter K final): applied two terminology fixes. (1) Removed the inline English glosses "(closed)"
    and "(open)" from definition_vi, keeping only the Vietnamese "khép kín"/"hở" per the no-inline-gloss
    convention; the EN correspondence is documented here in notes. (2) Per the chapter-wide see_also forward-reference
    policy, added the cross-chapter forward references hamiltonian-path and hamiltonian-circuit (chapter
    H), which are the graph-theoretic correspondents of the open and closed tours. All four verified terms
    re-confirmed via find-term.py.'
- id: kruskals-algorithm
  letter: K
  headword_en: Kruskal's algorithm
  notation: ''
  rosen_ref: Rosen §11.5
  ref_bib: ''
  definition_vi: \emph{Thuật toán Kruskal} là thuật toán tìm cây bao trùm nhỏ nhất của một đồ thị liên
    thông, vô hướng và có trọng số $$G = (V, E)$$ với hàm trọng số $$c \colon E \to \mathbb{R}$$. Bắt
    đầu từ rừng gồm $$|V|$$ đỉnh rời nhau và không có cạnh, ở mỗi bước thuật toán xét các cạnh theo thứ
    tự trọng số tăng dần và thêm vào cạnh có trọng số nhỏ nhất trong số các cạnh còn lại mà không tạo
    thành một chu trình, cho đến khi thu được một cây bao trùm.
  example_vi: Xét đồ thị liên thông $$G$$ trên bốn đỉnh $$\{a, b, c, d\}$$ với các cạnh có trọng số $$c(ab)
    = 1$$, $$c(bc) = 2$$, $$c(cd) = 3$$ và $$c(ac) = 4$$. Thuật toán Kruskal lần lượt chọn $$ab$$, $$bc$$,
    rồi $$cd$$; cạnh $$ac$$ bị bỏ qua vì nó tạo thành chu trình với $$ab$$ và $$bc$$, và ta thu được cây
    bao trùm nhỏ nhất gồm các cạnh $$ab$$, $$bc$$, $$cd$$ với tổng trọng số $$6$$.
