    p.181 figure + p.10 TOC), "bảy cái cầu ở Konigsberg" (bib-nguyenhuudien-2019 p.181), "bài toán 7 cây
    cầu ở Konigsberg" (bib-hoangchithanh-2007 p.76, OCR ''Bai toán 7 cây cầu ở Konigsberg''), "bài toán
    về bảy chiếc cầu ở Königsberg" (bib-ngodactan-2004 p.184 caption ''Hình 6.1: Bài toán về bầy clìiếc
    cầu ở Kõnigsberg'', also p.15 TOC and p.183). Spelling note: city name appears as "Königsberg" (umlaut,
    modern text sources) and as OCR-mangled "Konigsberg"/"Kõnigsberg" in scanned sources. The four Königsberg
    vertices have degrees 3,3,3,5 (all odd); 4 odd-degree vertices > 2, so no Euler path and no Euler
    circuit.'
