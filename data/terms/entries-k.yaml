- id: k-regular-graph
  letter: K
  headword_en: k-regular graph
  notation: \deg_G(v) = k
  rosen_ref: Rosen §10.2
  ref_bib: ''
  definition_vi: Cho $$k$$ là một số nguyên không âm. \emph{Đồ thị $$k$$ chính quy} là đồ thị $$G$$ trong
    đó mọi đỉnh đều có bậc đúng bằng $$k$$, tức là $$\deg_G(v) = k$$ với mọi $$v \in V(G)$$.
  example_vi: Đồ thị đầy đủ $$K_n$$ là đồ thị $$(n-1)$$ chính quy, vì mỗi đỉnh kề với tất cả $$n-1$$ đỉnh
    còn lại; chu trình $$C_n$$ với $$n \geq 3$$ là đồ thị $$2$$ chính quy.
