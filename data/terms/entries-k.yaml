  notes: 'Concept attested only in bib-leanhvinh-2020, bib-nguyenducnghia-2006, and bib-ngodactan-2004.
    In bib-nguyenhoangthach-2020, bib-nguyenhuudien-2019, and bib-hoangchithanh-2007 the string "đồ thị
    đều" appears only as the universal adverb "đều" (every/all), e.g. "mọi đỉnh của đồ thị đều có bậc...",
    not as the regular-graph term; those are not citations of this concept. In bib-leanhvinh-2020 the
    book uses "đồ thị đều bậc k" as the primary form (pp. 10, 89, 93, 214) with "đồ thị k chính quy" given
    as the explicit alternate ("hay còn gọi là", p. 214); the generalized "đồ thị đều bậc d" / "đồ thị
    d chính quy" also appears (p. 10). The recommended term "đồ thị k chính quy" is attested in the newest
    source (bib-leanhvinh-2020, 2020). The variant "đồ thị đều bậc k" is equally standard and also from
    2020. Older sources use the older orthography "chính qui" (modern "chính quy"): bib-ngodactan-2004
    p. 191 defines "đồ thị chính qui bậc k" / short form "k-chính qui"; bib-nguyenducnghia-2006 p. 164
    uses "chính qui bậc k". The synonym "đồ thị bậc k" in bib-ngodactan-2004 is attested via the book
    index ("đồ thị bậc k, 191", PDF p. 336), which points to the definition on p. 191; no verbatim definition-line
    snippet for that exact phrase is recoverable from the OCR text, so the verifiable index snippet is
    cited. Caution: in bib-leanhvinh-2020 the unrelated phrases "đồ thị bậc n" mean "graph on n vertices"
    (order n), not a regular graph, and "đồ thị chính quy mạnh" means "strongly regular graph" — both
    excluded. Definition is mathematically correct against Rosen §10.2 (every vertex has degree exactly
    $$k$$); the nonnegative-integer constraint on $$k$$ is correct (0-regular = empty graph is valid).
    Snippets from OCR sources (bib-leanhvinh-2020, bib-ngodactan-2004) reproduce OCR artifacts verbatim.
    EDITOR (chapter K final): the notation field stores the bare token $$\deg_G(v) = k$$ without $$...$$
    wrapping per the book-wide convention (the structured notation field is wrapped by the build layer,
    as confirmed against output/web/entries.json); no wrapping change applied. Added the $$k \geq 0$$
    lead-in to the definition for parameter scope, consistent with the source convention.'
