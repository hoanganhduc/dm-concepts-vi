  notes: 'EDITOR (chapter K final): applied the panel HIGH correctness fix. The prior definition added
    a standalone defining clause "có nhiều hơn $$k$$ đỉnh" (more than $$k$$ vertices) joined by "và" to
    the deletion clause; that is over-restrictive and non-standard. Rosen §10.4 defines a connected graph
    to be $$k$$-connected iff its vertex connectivity satisfies $$\kappa(G) \geq k$$, which is exactly
    what the cited source nguyenhoangthach-2020 (tr. 75) states ("G là k-liên thông nếu κ(G) ≥ k"). The
    definition now leads with $$\kappa(G) \geq k$$ and states the equivalent operational characterization
    (cannot be disconnected, or reduced to the trivial one-vertex graph, by deleting fewer than $$k$$
    vertices). Also normalized the relation symbol from \ge to \geq in both notation and definition_vi
    per book convention.


    Recommended term "k-liên thông" is attested in two 2020 sources; the cleanest definitional attestation
    is nguyenhoangthach-2020 (tr. 75 PDF), which matches Rosen''s notation $$\kappa(G) \geq k$$. leanhvinh-2020
    uses it throughout Chapter 1 (Whitney/Dirac theorems). ngodactan-2004 (tr. 265 PDF) defines "đồ thị
    k-liên thông đỉnh" (vertex k-connectivity) and abbreviates it to "k-liên thông" — the same concept
    as this entry. The fuller noun phrase "đồ thị k-liên thông" is a stylistic variant. The candidate
    "k-liên thông cạnh" (edge k-connectivity, $$\kappa''(G) \geq k$$ / $$\lambda(G) \geq k$$) is a DIFFERENT
    concept and is excluded; it appears in leanhvinh-2020 (tr. 26 PDF) and ngodactan-2004 (tr. 270 PDF).
    The candidate "liên thông bậc k" is NOT attested in any corpus source. Sources nguyenhuudien-2019,
    nguyenducnghia-2006, and hoangchithanh-2007 contain only general connectivity ("liên thông") and do
    not define the k-connected concept. see_also targets are cross-chapter forward references: "connectivity"
    and "cut-vertex" exist in chapter C; "vertex-connectivity" and "edge-connectivity" are forward references.
    No same-chapter K links. All five verified vi_terms re-confirmed via find-term.py at their cited pages
    with matching snippets (leanhvinh-2020 confirmed under both normal and loose OCR modes).'
