    tương đương với $$F^{-1}(B) = V \setminus B$$" from definition_vi: the symbol $$F$$ (the successor
    map) was never defined in the entry, so importing $$F^{-1}$$ broke the self-containment requirement,
    and the equivalence is convention-dependent. The independent + absorbing (tập ổn định trong + tập
    ổn định ngoài) characterization is complete, standard, and self-contained; the $$F^{-1}$$ identity
    is described in this note instead. (2) Fixed rosen_ref: the previous value "Rosen §10.2" (Graph Terminology
    and Special Types of Graphs) does not cover the directed-graph kernel concept and appears copied from
    the default §10.2 used by the genuine §10.2 entries. The kernel of a digraph (independent dominating
