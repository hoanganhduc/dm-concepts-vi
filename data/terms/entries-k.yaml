  notes: 'Only "bài toán cái túi" is attested for this concept, in bib-nguyenducnghia-2006 (2006), with
    11 hits (pp. 115, 116, 119, 121, 122, 123, 124, 150). Page 115 confirms the concept: an explorer carries
    a bag of capacity at most $$D$$ and there are $$n$$ items, item $$j$$ having weight $$a_j$$ and value
    $$c_j$$, the goal being to choose a subset of maximum total value within the capacity; the formal
    optimization form on p. 116 maximizes $$\sum c_j x_j$$ subject to $$\sum a_j x_j \leq D$$ over binary
    vectors $$x$$. No 2019-2020 source attests any term for this concept, so the recommended term''s newest
    attestation is from 2006. The candidate variants "bài toán xếp ba lô", "bài toán ba lô", and "bài
    toán chiếc túi" returned zero hits in every source under both normal and loose matching (OCR sources
    bib-leanhvinh-2020 and bib-hoangchithanh-2007 were searched with --loose). They are common Vietnamese
    names for the knapsack problem in the wider literature but are unattested in this corpus, so they
    are listed here in notes only. Note: "chiếc túi" appears in bib-ngodactan-2004 (p. 51), but only inside
    counting/enumeration exercises ("6 chiếc túi?", "12 chiếc túi?") that do not denote the knapsack optimization
    problem; those hits were excluded. The example''s choice {1,2} (weight 5, value 7) is optimal among
    feasible subsets: item 3 alone gives 5; subsets {1,3}, {2,3}, {1,2,3} all exceed capacity 5.


    EDITOR (chapter K final): rosen_ref left as "Rosen §8.1" per the chapter''s prior provenance assignment;
    flagged for editor-at-large to confirm against a Rosen copy, since the knapsack problem in Rosen is
    typically a dynamic-programming application of recurrences (§8.1 covers applications of recurrence
    relations) rather than a standalone §8.1 definition. Could not open a Rosen copy in this environment
