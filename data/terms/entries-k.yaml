  see_ref: ''
  notes: 'Recommended term "thuật toán Kruskal" is attested in all six corpus sources, including both
    2020 sources (bib-leanhvinh-2020 tr. 61, bib-nguyenhoangthach-2020 tr. 95) and the 2019 source (bib-nguyenhuudien-2019
    tr. 250). The candidate "giải thuật Kruskal" returned zero hits in every source under both normal
    and --loose matching, so it is not recorded as a verified vi_term. The candidate "thuật toán Kruskal
    tìm cây khung nhỏ nhất" is not attested as a fixed term; bib-leanhvinh-2020 tr. 61 has only the running
    descriptive phrase "Thuật toán Kruskal tìm cây bao trùm nhỏ nhất trong mạng lưới", not a coined compound
    term, so it is not recorded as a separate variant. Note the differing renderings of "minimum spanning
    tree": newer/southern sources use "cây bao trùm nhỏ nhất" (leanhvinh, nguyenhuudien, hoangchithanh,
    ngodactan use "cây bao"), while nguyenhoangthach and nguyenducnghia use "cây khung nhỏ nhất". The
    definition_vi follows the lead source bib-leanhvinh-2020, which renders the target as "cây bao trùm
    nhỏ nhất"; bib-leanhvinh-2020 tr. 61 frames Kruskal as a greedy algorithm ("một thuật toán tham lam")
    that repeatedly adds the smallest-weight edge until a spanning tree is obtained, and bib-nguyenhuudien-2019
    tr. 250 gives the formal setting "đồ thị vô hướng G với tập cạnh E và hàm trọng số c". The cycle-avoidance
    condition ("không tạo thành một chu trình") corresponds to the English ground truth''s "does not create
    a circuit"; the equivalent stopping condition is reaching $$|V|-1$$ edges (a spanning tree). Definition
    faithfully matches Rosen §11.5.


