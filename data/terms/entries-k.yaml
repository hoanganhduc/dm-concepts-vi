    corpus entries list cross-chapter forward references), added the cross-chapter forward references
    minimum-spanning-tree, spanning-tree, prims-algorithm, and weighted-graph (chapters M, S, P, W). These
    are forward references to be created in their own letter chapters; there are no same-chapter K links.'
