- id: k-tuple
  letter: K
  headword_en: k-tuple
  notation: (a_1, a_2, \ldots, a_k)
  rosen_ref: Rosen §2.1
  ref_bib: ''
  definition_vi: Một \emph{$$k$$-bộ sắp thứ tự} là một dãy gồm $$k$$ đối tượng được liệt kê theo một thứ
    tự xác định, ký hiệu $$(a_1, a_2, \ldots, a_k)$$, trong đó $$a_i$$ là thành phần thứ $$i$$. Thứ tự
    của các thành phần là quan trọng và các thành phần được phép lặp lại, nên $$(a_1, a_2, \ldots, a_k)
    = (b_1, b_2, \ldots, b_k)$$ khi và chỉ khi $$a_i = b_i$$ với mọi $$i$$ thỏa $$1 \leq i \leq k$$.
  example_vi: Bộ $$(2, 1, 2)$$ là một $$3$$-bộ sắp thứ tự với $$a_1 = 2$$, $$a_2 = 1$$, $$a_3 = 2$$; nó
    khác với bộ $$(1, 2, 2)$$ vì thứ tự các thành phần khác nhau, mặc dù cả hai cùng dùng các phần tử
    $$1$$ và $$2$$.
