  definition_vi: Giao thức trao đổi khóa là một giao thức được hai bên sử dụng để cùng thống nhất về một
    khóa bí mật dùng chung. Khóa bí mật chung này sau đó có thể được dùng để mã hóa và giải mã các thông
    điệp trao đổi giữa hai bên.
  example_vi: Trong giao thức trao đổi khóa Diffie–Hellman, hai bên công khai chọn một số nguyên tố $$p$$
    và một số nguyên $$a$$ với $$2 \leq a \leq p-1$$. Mỗi bên chọn riêng một số mũ bí mật, lần lượt là
    $$k_1$$ và $$k_2$$ với $$1 \leq k_1, k_2 \leq p-1$$, rồi gửi cho bên kia các giá trị $$a^{k_1} \bmod
    p$$ và $$a^{k_2} \bmod p$$. Khi đó cả hai bên đều tính được cùng một khóa bí mật chung $$a^{k_1 k_2}
    \bmod p$$, trong khi một bên thứ ba chỉ biết $$p$$, $$a$$, $$a^{k_1} \bmod p$$ và $$a^{k_2} \bmod
    p$$ vẫn rất khó suy ra khóa này.
