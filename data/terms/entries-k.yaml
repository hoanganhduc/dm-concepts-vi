- id: knapsack-problem
  letter: K
  headword_en: knapsack problem
  notation: ''
  rosen_ref: Rosen §8.1
  ref_bib: ''
  definition_vi: \emph{Bài toán cái túi} là bài toán tối ưu trong đó cho một cái túi có sức chứa trọng
    lượng $$D$$ và $$n$$ đồ vật, đồ vật thứ $$j$$ có trọng lượng $$a_j$$ và giá trị $$c_j$$ (với $$j =
    1, 2, \ldots, n$$), yêu cầu chọn một tập con các đồ vật sao cho tổng giá trị là lớn nhất trong khi
    tổng trọng lượng không vượt quá $$D$$. Mỗi phương án chọn được biểu diễn bởi một vectơ nhị phân $$x
    = (x_1, x_2, \ldots, x_n)$$, trong đó $$x_j = 1$$ nghĩa là đồ vật thứ $$j$$ được chọn và $$x_j = 0$$
    nghĩa là không chọn, và mục tiêu là cực đại hóa $$\sum_{j=1}^{n} c_j x_j$$ với ràng buộc $$\sum_{j=1}^{n}
    a_j x_j \leq D$$.
  example_vi: Với sức chứa $$D = 5$$ và ba đồ vật có cặp trọng lượng và giá trị lần lượt là $$(a_1, c_1)
    = (2, 3)$$, $$(a_2, c_2) = (3, 4)$$, $$(a_3, c_3) = (4, 5)$$, chọn các đồ vật $$1$$ và $$2$$ cho tổng
    trọng lượng $$2 + 3 = 5 \leq 5$$ và tổng giá trị $$3 + 4 = 7$$, là phương án có tổng giá trị lớn nhất
    không vượt quá sức chứa.
