- id: k-connected-graph
  letter: K
  headword_en: k-connected graph
  notation: \kappa(G) \geq k
  rosen_ref: Rosen §10.4
  ref_bib: ''
  definition_vi: Cho $$k$$ là một số nguyên dương. Một đồ thị liên thông $$G$$ được gọi là \emph{$$k$$-liên
    thông} nếu độ liên thông đỉnh của nó thỏa mãn $$\kappa(G) \geq k$$, tức là không thể làm cho $$G$$
    mất liên thông (hoặc trở thành đồ thị tầm thường một đỉnh) bằng cách xóa đi ít hơn $$k$$ đỉnh bất
    kỳ.
  example_vi: Đồ thị đầy đủ $$K_n$$ với $$n \geq k+1$$ là $$k$$-liên thông, vì $$\kappa(K_n) = n-1 \geq
    k$$.
