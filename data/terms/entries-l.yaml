  see_ref: ''
  notes: 'Bốn biến thể đều chỉ cùng khái niệm đỉnh bậc một trong cây. "lá" là thuật ngữ chuẩn và được
    khuyến nghị: định nghĩa trực tiếp tại bib-leanhvinh-2020 tr.39 (PDF) "Trong cây, các đỉnh bậc một
    được gọi là lá" (nguồn lý thuyết đồ thị mới nhất 2019-2020). "đỉnh lá" là biến thể ghép, dùng phổ
    biến trong ngữ cảnh cây có gốc. "đỉnh treo" (pendant vertex) là thuật ngữ cho đỉnh $$\deg(v)=1$$ trong
    đồ thị tổng quát; trong cây nó trùng với lá: bib-nguyenhuudien-2019 tr.157 (PDF) "Đỉnh v gọi là đỉnh
    treo nếu $$\deg(v)=1$$", bib-nguyenhoangthach-2020 tr.64 (PDF) "một đỉnh bậc 1 được gọi là... một
    đỉnh treo". "đỉnh ngoài" là tên gọi của lá trong cây có gốc (đối lập với "đỉnh trong"): bib-leanhvinh-2020
    tr.39, bib-hoangchithanh-2007 tr.136, bib-nguyenhuudien-2019 tr.251. Lưu ý phân biệt với "tập ổn định
    ngoài" (external stable set / dominating set) ở bib-hoangchithanh-2007 §3.2, là khái niệm khác hoàn
    toàn. Các nguồn OCR (bib-leanhvinh-2020, bib-hoangchithanh-2007, bib-nguyenducnghia-2006) đã được
    kiểm tra cả chế độ thường và --loose; với bib-leanhvinh-2020 (đỉnh ngoài) và bib-nguyenducnghia-2006
    (đỉnh treo), thuật ngữ chỉ xuất hiện ở chế độ --loose do OCR làm sai dấu.'
- id: least-common-multiple
  letter: L
  headword_en: least common multiple
  notation: \operatorname{lcm}(a, b)
  rosen_ref: Rosen §4.3
  definition_vi: Bội số chung nhỏ nhất của hai số nguyên dương $$a$$ và $$b$$ là số nguyên dương nhỏ nhất
    chia hết cho cả $$a$$ và $$b$$, ký hiệu $$\operatorname{lcm}(a, b)$$.
  example_vi: Với $$a = 4$$ và $$b = 6$$, các số nguyên dương chia hết cho cả $$4$$ và $$6$$ là $$12,
    24, 36, \ldots$$, nên $$\operatorname{lcm}(4, 6) = 12$$.
