- id: logical-argument
  letter: L
  headword_en: logical argument
  notation: p_1, p_2, \ldots, p_n \therefore q
  rosen_ref: Rosen §1.5
  definition_vi: Một lập luận lôgic là một dãy các mệnh đề $$p_1, p_2, \ldots, p_n$$, gọi là các tiền
    đề, cùng với một mệnh đề $$q$$ ở cuối, gọi là kết luận. Lập luận là hợp lệ (đúng đắn) nếu khi tất
    cả các tiền đề $$p_1, p_2, \ldots, p_n$$ đều đúng thì kết luận $$q$$ cũng đúng, tức là $$(p_1 \wedge
    p_2 \wedge \cdots \wedge p_n) \to q$$ là một hằng đúng.
  example_vi: 'Suy luận $$p \to q$$, $$p$$, do đó $$q$$ (quy tắc Modus Ponens) là một lập luận lôgic hợp
    lệ: nếu cả $$p \to q$$ và $$p$$ đều đúng thì $$q$$ đúng.'
