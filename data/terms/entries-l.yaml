- id: loop-invariant
  letter: L
  headword_en: loop invariant
  notation: ''
  rosen_ref: Rosen §4.5
  definition_vi: Bất biến vòng lặp của một vòng lặp trong chương trình là một điều khẳng định $$p$$ vẫn
    còn đúng mỗi khi thân vòng lặp được thực hiện. Nói cách khác, nếu $$p$$ đúng trước một lần lặp thì
    $$p$$ cũng đúng sau lần lặp đó, nhờ vậy $$p$$ được dùng để chứng minh tính đúng đắn của vòng lặp.
  example_vi: Xét vòng lặp tính $$x^n$$ bằng cách nhân dồn, với điều khẳng định $$p$$ là "$$\texttt{power}
    = x^i$$ và $$i \leq n$$". Có thể kiểm tra $$p$$ đúng trước khi vào vòng lặp và vẫn đúng sau mỗi lần
    lặp, nên $$p$$ là một bất biến vòng lặp dùng để chứng minh chương trình cho kết quả $$x^n$$.
