- id: logical-rules-of-inference
  letter: L
  headword_en: logical rules of inference
  notation: ''
  rosen_ref: Rosen §1.6
  definition_vi: Các quy tắc suy luận lôgic là những mẫu suy luận hợp lệ cho phép từ một tập các giả thiết
    $$p_1, p_2, \dots, p_n$$ rút ra một kết luận $$q$$, trong đó mỗi quy tắc tương ứng với một hằng đúng
    có dạng $$(p_1 \wedge p_2 \wedge \dots \wedge p_n) \to q$$. Một suy luận dùng các quy tắc này được
    gọi là suy luận đúng đắn (suy luận có cơ sở).
  example_vi: 'Quy tắc khẳng định (modus ponens) có dạng $$\big(p \wedge (p \to q)\big) \to q$$: từ $$p$$
    và $$p \to q$$ ta suy ra $$q$$.'
