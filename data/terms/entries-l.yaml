    to the "đồ thị có nhân" loose hit in bib-hoangchithanh-2007 (pdf tr. 34, "Hinh 2.4 Đồ thị có nhân
    và đổ thị không có nhân"): OCR cannot distinguish "nhân" from "nhãn", and Section 3.3 "NHÂN CỦA ĐỒ
    THỊ" (KERNEL OF THE GRAPH), Định nghĩa 3.3 (corpus lines 1164-1168), confirms "nhân" here means graph
    KERNEL (lõi/nhân), not label. The phrases "gán nhãn"/"được gán nhãn" appear frequently in bib-hoangchithanh-2007
    (pdf tr. 92-93, 141) but only as the VERB "to assign a label to a vertex" inside BFS shortest-path,
    Dijkstra, and expression-tree labeling algorithms, never as the NOUN "labeled graph" (re-verified
    independently). Recommended term "đồ thị gán nhãn" is the standard modern Vietnamese rendering, kept
    so vi_terms is non-empty; verified=false because no source attests it as a noun. Variants (unattested):
    "đồ thị được gán nhãn", "đồ thị có nhãn", "đồ thị dán nhãn". definition_vi opens with the term, marks
    its first introduction with \emph{...} OUTSIDE math (math delimiters wrap symbols only, e.g. $$G$$),
    and follows Rosen §10.3 (each vertex or edge assigned a distinct label so vertices/edges can be distinguished).
    example_vi is self-contained, introducing only the labels named in the definition. see_also targets
    are cross-chapter forward references (graph, weighted-graph in chapter D; graph-coloring in C; vertex
    in E; edge in A) — there is no chapter-L file yet, so no same-chapter links exist and none are rendered
    as links; weighted-graph is the closest kin (a graph whose edges carry distinguishing values) and
    graph-coloring is the adjacent vertex/edge-assignment notion.'
- id: line-graph
  letter: L
  headword_en: line graph
  notation: L(G)
  rosen_ref: Rosen §10.2
  definition_vi: \emph{Đồ thị đường} của một đồ thị $$G$$, ký hiệu $$L(G)$$, là đồ thị có tập đỉnh là
    tập cạnh của $$G$$, trong đó hai đỉnh của $$L(G)$$ kề nhau khi và chỉ khi hai cạnh tương ứng của $$G$$
    có chung một đầu mút.
  example_vi: Xét đồ thị $$G$$ với các cạnh $$e_1 = ab$$ và $$e_2 = bc$$. Hai cạnh này có chung đầu mút
    $$b$$, nên trong $$L(G)$$ hai đỉnh $$e_1$$ và $$e_2$$ kề nhau.
  vi_terms:
