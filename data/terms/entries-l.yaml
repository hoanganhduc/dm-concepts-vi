- id: logarithm
  letter: L
  headword_en: logarithm
  notation: \log_b x
  rosen_ref: Rosen §3.2
  definition_vi: Lôgarit cơ số $$b$$ của một số dương $$x$$, ký hiệu $$\log_b x$$, là số mũ $$y$$ thỏa
    mãn $$b^y = x$$, trong đó cơ số $$b$$ là một số thực dương khác $$1$$. Nói cách khác, hàm lôgarit
    là hàm ngược của hàm mũ $$b^y$$.
  example_vi: Ta có $$\log_2 8 = 3$$ vì $$2^3 = 8$$, và $$\log_{10} 1000 = 3$$ vì $$10^3 = 1000$$. Trong
    phân tích độ phức tạp thuật toán, tìm kiếm nhị phân trên $$n$$ phần tử cần $$O(\log n)$$ phép so sánh,
    gọi là độ phức tạp lôgarit.
