    "line graph" (đường = line); some authors elsewhere prefer the edge-oriented gloss "đồ thị cạnh" (cạnh
    = edge), but no corpus source attests that variant. The example is self-contained: it introduces only
    the two edges $$e_1, e_2$$ and their shared endpoint $$b$$, then applies the adjacency rule directly,
