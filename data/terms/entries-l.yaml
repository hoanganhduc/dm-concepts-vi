    của đường" (without "đi") appears in bib-ngodactan-2004 (tr. 216, 285). Most corpus hits attach the
    term to the shortest-path / distance context ("độ dài đường đi ngắn nhất" = length of the shortest
    path), but the term itself denotes the length of a path generally; the definitional snippet in bib-nguyenhuudien-2019
    confirms the bare concept. (Verifier: all 9 vi_terms re-mined and confirmed; bib-hoangchithanh-2007
    loose search also exposes a plain definitional use "Độ dài của đường đi là k - 1" on tr. 11, not added
    here but reinforcing the bare-concept attestation.)'
- id: level-of-a-tree
  letter: L
  headword_en: level of a vertex in a rooted tree
  notation: ''
  rosen_ref: Rosen §11.1
  definition_vi: Mức của đỉnh $$v$$ trong cây có gốc là độ dài của đường đi duy nhất từ gốc tới $$v$$,
    trong đó gốc có mức bằng $$0$$. Nếu đỉnh cha có mức $$i$$ thì mỗi đỉnh con của nó có mức $$i + 1$$.
  example_vi: Trong cây có gốc $$a$$, nếu $$b$$ là con của $$a$$ và $$d$$ là con của $$b$$, thì $$a$$
    có mức $$0$$, $$b$$ có mức $$1$$ và $$d$$ có mức $$2$$.
