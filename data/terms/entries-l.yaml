    "chận dưới" appears in the same 2019 source (pp. 123–124) in the lattice context "chận dưới lớn nhất"
    (greatest lower bound); this reflects the alternate Vietnamese spelling chặn/chận. The variant "cận
    dưới" is attested in bib-ngodactan-2004, p. 164, listed alongside "phần tử nhỏ nhất, phần tử cực tiểu"
    in the order-theoretic sense. Many additional hits for "chặn dưới"/"cận dưới" in bib-leanhvinh-2020
    and bib-nguyenducnghia-2006 use the term for a bound on a numeric quantity (Ramsey number, chromatic
    number, branch-and-bound objective), not the order-theoretic lower bound of a poset subset, and were
    excluded as off-concept. The candidate "biên dưới" had 0 hits in any source (normal and loose) and
    is dropped. see_also is restricted to same-chapter L-terms (least-upper-bound, lattice); upper-bound,
    greatest-lower-bound, and partial-order are cross-chapter forward references (U, G, P) and are not
