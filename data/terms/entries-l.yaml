- id: lower-bound
  letter: L
  headword_en: lower bound
  notation: ''
  rosen_ref: Rosen §9.6
  definition_vi: Cho một tập con $$S$$ của một tập sắp thứ tự bộ phận $$(X, \preceq)$$. Một phần tử $$x
    \in X$$ được gọi là một chặn dưới của $$S$$ nếu $$x \preceq s$$ với mọi $$s \in S$$.
  example_vi: Trong tập sắp thứ tự $$(\{1, 2, 3, 4, 6, 12\}, \mid)$$ với quan hệ chia hết, xét tập con
    $$S = \{4, 6\}$$. Khi đó $$1$$ và $$2$$ là các chặn dưới của $$S$$, vì $$1 \mid 4$$, $$1 \mid 6$$,
    $$2 \mid 4$$ và $$2 \mid 6$$.
