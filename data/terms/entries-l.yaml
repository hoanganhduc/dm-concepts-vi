- id: linear-congruence
  letter: L
  headword_en: linear congruence
  notation: ax \equiv b \pmod{m}
  rosen_ref: Rosen §4.4
  definition_vi: Phương trình đồng dư tuyến tính là phương trình có dạng $$ax \equiv b \pmod{m}$$, trong
    đó $$a$$, $$b$$ là các số nguyên, $$m$$ là số nguyên dương và $$x$$ là ẩn nguyên cần tìm. Phương trình
    này có nghiệm khi và chỉ khi $$\gcd(a, m) \mid b$$, và khi đó số nghiệm phân biệt theo modulo $$m$$
    bằng $$\gcd(a, m)$$.
  example_vi: Phương trình $$3x \equiv 4 \pmod{7}$$ có nghiệm vì $$\gcd(3, 7) = 1 \mid 4$$. Vì nghịch
    đảo của $$3$$ theo modulo $$7$$ là $$5$$ nên $$x \equiv 5 \cdot 4 \equiv 20 \equiv 6 \pmod{7}$$.
