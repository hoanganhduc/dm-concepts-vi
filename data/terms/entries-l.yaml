  notes: 'Recommended term "bổ đề" is the standard Vietnamese term and is attested in the newest source
    (bib-leanhvinh-2020, 2020). The page-98 snippet shows the lemma-as-stepping-stone role ("Dé chứng
    minh Định lý 4.8, ta cin một số bổ đề sau", OCR for "Để chứng minh Định lý 4.8, ta cần một số bổ đề
