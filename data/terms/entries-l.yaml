- id: logically-equivalent
  letter: L
  headword_en: logically equivalent
  notation: p \equiv q
  rosen_ref: Rosen §1.2
  definition_vi: Hai mệnh đề (hay biểu thức lôgic) $$p$$ và $$q$$ được gọi là tương đương lôgic nếu chúng
    có cùng chân trị trong mọi cách gán giá trị chân lý cho các biến mệnh đề thành phần, tức là mệnh đề
    tương đương $$p \leftrightarrow q$$ là một hằng đúng. Khi đó ta viết $$p \equiv q$$ (ký hiệu khác
    là $$p \Leftrightarrow q$$).
  example_vi: Theo luật De Morgan, hai mệnh đề $$\neg(p \vee q)$$ và $$\neg p \wedge \neg q$$ là tương
    đương lôgic, vì chúng có cùng chân trị với mọi giá trị của $$p$$ và $$q$$, nên $$\neg(p \vee q) \equiv
    \neg p \wedge \neg q$$.
