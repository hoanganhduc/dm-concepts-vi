- id: lower-limit
  letter: L
  headword_en: lower limit
  notation: \sum_{i=m}^{n} a_i
  rosen_ref: Rosen §2.4
  definition_vi: Giới hạn dưới của một tổng $$\sum_{i=m}^{n} a_i$$ là giá trị nhỏ nhất $$m$$ của chỉ số
    lấy tổng $$i$$, tức là cận đầu của khoảng chạy của $$i$$ trong tổng. Chỉ số $$i$$ nhận lần lượt các
    giá trị nguyên từ giới hạn dưới $$m$$ đến giới hạn trên $$n$$ (với $$m \leq n$$).
  example_vi: Trong tổng $$\sum_{i=1}^{100} i^2$$, giới hạn dưới của chỉ số lấy tổng là $$1$$ và giới
    hạn trên là $$100$$.
