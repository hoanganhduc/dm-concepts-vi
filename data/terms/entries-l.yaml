  status: panel-approved
  notes: 'Recommended term "đồ thị đường" is attested in the newest source bib-leanhvinh-2020 (2020) on
    tr. 244 (formal definition, Bài tập 8.5) and tr. 245 (example with $$L(K_n)$$), and in the OCR source
    bib-hoangchithanh-2007 (2007) on tr. 90, where the English gloss "(line graph)" appears explicitly
    alongside "$$L(G)$$". The definition was grounded against the OCR corpus: bib-leanhvinh-2020 (Bài
    tập 8.5, tr. 244) reads "Đồ thị đường L(G) của một đồ thị G là đồ thị với tập đỉnh là các cạnh của
    G..." (OCR mangled to "Dé thị đường L(G) của một đỏ thi G là đỏ thị với tập"), and bib-hoangchithanh-2007
    (tr. 90) reads "Đồ thị đường (line graph) L(G) của đồ thị G là đồ thị có tập đỉnh [là tập cạnh của
    G]". Both match the English ground truth exactly: vertices of $$L(G)$$ are the edges of $$G$$, and
    two such vertices are adjacent iff the corresponding edges share a common endpoint. "đầu mút" follows
    the chapter-G "graph" entry''s standard rendering of "endpoint". OCR sources were searched both normally
    and with --loose; results were identical, and the 2007/2020 snippets show mild OCR mangling of diacritics
    ("đô thị", "dé thị", "đỏ thi") that does not affect identification of the headword. Verifier re-ran
    find-term.py for all three verified terms (normal and --loose): tr. 244, tr. 245, and tr. 90 hits
    and snippets all reproduce and denote THIS concept. Candidate "đồ thị cạnh": no genuine attestation.
    Its single --loose hit in bib-nguyenducnghia-2006 (tr. 72) is a false positive — the matched text
    is the unrelated fragment "...có màu đỏ thì cạnh này..." ("...is red, then this edge..."), not the
    line-graph term; reconfirmed by Verifier. Candidate "đồ thị đường thẳng": no attestation in any source
    (0 hits normal and --loose; reconfirmed). Both unattested candidates are dropped per citation hygiene;
    only the verified recommended term is kept. Note on translation: "đồ thị đường" literally renders
    "line graph" (đường = line); some authors elsewhere prefer the edge-oriented gloss "đồ thị cạnh" (cạnh
    = edge), but no corpus source attests that variant. The example is self-contained: it introduces only
    the two edges $$e_1, e_2$$ and their shared endpoint $$b$$, then applies the adjacency rule directly,
    using no derived quantity the definition did not introduce. see_also targets are cross-chapter forward
    references ("edge" exists as a chapter-E entry; "graph", "adjacent", "simple-graph", "vertex" are
    forward references kept per the chapter-G precedent); no same-chapter L-terms exist yet.'
- id: latin-square
  letter: L
  headword_en: Latin square
  notation: n \times n
  rosen_ref: Rosen §9.2
  definition_vi: Một hình vuông Latin bậc $$n$$ là một bảng vuông kích thước $$n \times n$$ được điền
    bằng $$n$$ ký hiệu phân biệt sao cho mỗi ký hiệu xuất hiện đúng một lần trên mỗi hàng và đúng một
    lần trên mỗi cột. Số $$n$$ được gọi là bậc (cấp) của hình vuông Latin.
  example_vi: 'Bảng $$3 \times 3$$ với các hàng $$\langle 1, 2, 3 \rangle$$, $$\langle 2, 3, 1 \rangle$$,
    $$\langle 3, 1, 2 \rangle$$ là một hình vuông Latin bậc $$3$$ trên tập ký hiệu $$\{1, 2, 3\}$$: mỗi
    ký hiệu xuất hiện đúng một lần trên mỗi hàng và mỗi cột.'
  vi_terms:
  - term: hình vuông Latin
    source_id: bib-leanhvinh-2020
    page: tr. 216 (PDF)
    recommended: true
    verified: true
    pdf_page: 216
    snippet: dương, hình vuông Latin bậc n là một bảng vuông n x n trong đó mỗi [...] lần trên cùng một
      hàng hay cùng một cột.
  - term: hình vuông La tinh
    source_id: bib-nguyenducnghia-2006
    page: tr. 48 (PDF)
    recommended: false
    verified: true
    pdf_page: 48
    snippet: Nếu ø = g = n, thì hình chữ nhật la tình được gọi là hình vuông la tnh. [...] vuông la tình
      cấp n được gọi là chuẩn nếu có dòng đầu và cột đầu là hoán vị 1 2....n.
  see_also:
  - latin-rectangle
  status: panel-approved
  notes: 'Recommended term "hình vuông Latin" is attested in the newest source bib-leanhvinh-2020 (2020),
    which gives a full definition matching Rosen on pdf page 216 ("hình vuông Latin bậc n là một bảng
    vuông n x n trong đó mỗi ký hiệu xuất hiện đúng một lần trên mỗi hàng và mỗi cột") and also names
    it on pages 71-72. Re-verified by Verifier: 8 normal hits / 10 loose hits across pdf pages 71, 72,
    216, 217, 258. The older bib-nguyenducnghia-2006 (2006) uses the orthographic variant "hình vuông
    La tinh", OCR-mangled to "la tỉnh" / "la tình" / "la tnh" on pdf pages 48, 55, 56, 76; the exact phrase
    "hình vuông La tinh" returns 0 normal hits but the loose search and broad-fragment search confirm
    the concept. Page 48 explicitly defines it: "Nếu m = n, thì hình chữ nhật la tình được gọi là hình
    vuông la tnh" (a Latin rectangle with m = n is called a Latin square) — same concept as Latin square.
    Candidate terms "bảng vuông Latin" and "ô vuông Latin" returned zero hits in every source (normal
    and --loose) and are dropped. Note leanhvinh-2020 uses the phrase "bảng vuông $$n \times n$$" only
    inside its prose definition, not as the term name. The related but DISTINCT concept "hình chữ nhật
    Latin" (Latin rectangle, an $$m \times n$$ array, $$m \leq n$$) appears in leanhvinh-2020 pp. 71-72
    (4 hits) and nguyenducnghia-2006 p. 263; it is recorded as a see_also forward reference (latin-rectangle),
    not as a variant of Latin square. The definition_vi follows the recommended source wording (n distinct
    symbols, each appearing exactly once per row and per column) and adds the standard "bậc (cấp)" order
    terminology found in both sources. The example is self-contained, using only the order n and symbol
    set already introduced by the definition. Verifier change: the snippet for the variant term "hình
    vuông La tinh" (pdf page 48) was tightened to quote the actual definitional sentence on that page
    ("hình chữ nhật la tình được gọi là hình vuông la tnh").'
- id: list-coloring
  letter: L
  headword_en: list coloring
  notation: L(v)
  rosen_ref: Rosen §10.8
  definition_vi: Tô màu danh sách của một đồ thị $$G$$ là phép gán cho mỗi đỉnh $$v \in V(G)$$ một màu
    lấy từ danh sách màu cho phép $$L(v)$$ định trước của đỉnh đó, sao cho hai đỉnh kề nhau bất kỳ nhận
    được hai màu khác nhau.
  example_vi: Cho đồ thị đường $$P_3$$ với các đỉnh $$u, v, w$$ và các cạnh $$uv, vw$$. Gán các danh sách
    $$L(u) = \{1, 2\}$$, $$L(v) = \{1, 3\}$$ và $$L(w) = \{2, 3\}$$. Khi đó phép gán $$u \mapsto 1$$,
    $$v \mapsto 3$$, $$w \mapsto 2$$ là một tô màu danh sách của $$P_3$$, vì mỗi đỉnh nhận một màu thuộc
    danh sách của nó và hai đỉnh kề nhau bất kỳ nhận hai màu khác nhau.
  vi_terms:
  - term: tô màu danh sách
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - graph-coloring
  - chromatic-number
  status: panel-approved
  notes: 'No Vietnamese source in the corpus attests "list coloring" (tô màu danh sách / choosability)
    as a concept. The recommended rendering tô màu danh sách and the candidate variants tô màu theo danh
    sách, tô màu chọn, and tô màu từ danh sách all returned 0 hits in both normal and --loose modes across
    all sources, including the OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007. Broader probes
    confirm the gap: the "danh sách" hits all denote "danh sách kề" (adjacency list, an unrelated data
    structure), and the single "chọn màu" hit (bib-hoangchithanh-2007, pdf p.57, "Cách chọn màu cho đỉnh
    mới") concerns greedy vertex coloring, not list coloring. Probes for "danh sách màu", "danh sách cho
    phép", "sắc danh sách", and English "list coloring"/"choosability" also returned 0 hits. List coloring
    / choosability is an advanced topic absent from these introductory Vietnamese textbooks. The recommended
    term tô màu danh sách is the standard Vietnamese rendering and is kept (verified=false, page empty)
    per the citation-hygiene rule so vi_terms is non-empty; the unattested candidate variants tô màu theo
    danh sách, tô màu chọn, and tô màu từ danh sách are recorded here only and dropped from vi_terms.'
- id: logic-gate
  letter: L
  headword_en: logic gate
  notation: ''
  rosen_ref: Rosen §12.3
  definition_vi: Cổng logic là khối xây dựng cơ bản của một mạch số, nhận một hoặc nhiều bit đầu vào và
    tạo ra một bit đầu ra theo một phép toán Boole cố định. Mỗi cổng logic ứng với một phép toán Boole
    sơ cấp như $$\mathrm{AND}$$, $$\mathrm{OR}$$ hoặc $$\mathrm{NOT}$$, biến các giá trị đầu vào trong
    $$\{0,1\}$$ thành một giá trị đầu ra trong $$\{0,1\}$$.
  example_vi: Cổng $$\mathrm{AND}$$ với hai bit đầu vào $$x$$ và $$y$$ tạo ra đầu ra $$x \cdot y$$, bằng
    $$1$$ khi và chỉ khi $$x = y = 1$$.
  vi_terms:
  - term: cổng logic
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - boolean-function
  - boolean-algebra
  - combinational-circuit
  status: panel-approved
  notes: 'No source in the mined Vietnamese corpus attests any candidate term for the digital-circuit
    concept "logic gate". The corpus consists of graph theory, combinatorics, and discrete mathematics
    textbooks, and the hardware notion of a logic gate (a Boolean primitive building block of a digital
    circuit) lies outside their scope. The recommended term "cổng logic" is the standard Vietnamese rendering
    but is kept verified=false with page="" because it has zero attestation: normal and loose/OCR searches
    both returned 0 hits for cổng logic, cổng lôgic, and cổng luận lý, and related candidates cửa logic,
    cổng AND, and mạch số also returned 0 hits. Note the near-miss "mạch logic" in bib-nguyenducnghia-2006
    p. 290 ("một mạch logic điều khiển hệ thống cảnh báo tự động"): this denotes a logic CONTROL CIRCUIT
    in an inclusion-exclusion application problem, not a single logic gate (a gate is one Boolean primitive
    inside such a circuit), so it does not attest THIS concept and is not recorded as a verified vi_term.
    Other false positives excluded: "phần tử logic" (bib-hoangchithanh-2007 p. 12) means matrix entries,
    not a logic gate. A search for "cổng" returns only 3 hits, none of which denote a logic gate (they
    mean "công thức" = formula via the OCR slip cổng thức, and computer "cổng" = ports in a counting exercise);
    "Boole" hits refer to Boolean functions, Boolean algebra, and Pascal boolean types, not to gates.'
