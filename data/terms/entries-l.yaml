    a, b] (bội số chung nhỏ nhất của a và b)" and the p. 123 text "chận trên nhỏ nhất chính là bội số
    chung nhỏ nhất của chúng" (the least upper bound of two natural numbers is their lcm). This satisfies
    the 2019-2020 attestation preference, so it is recommended. Standard real-world variants "bội chung
    nhỏ nhất" and "bội chung bé nhất" returned 0 hits in BOTH normal and --loose mode across all sources;
    abbreviation BCNN and variant "bội số chung bé nhất" also returned 0 hits. These unattested variants
    are recorded here for completeness but dropped from vi_terms per citation hygiene, since the recommended
    term is already attested and keeps vi_terms non-empty. None of the graph/combinatorics sources (leanhvinh-2020,
    nguyenhoangthach-2020, hoangchithanh-2007, nguyenducnghia-2006, ngodactan-2004) use the term; lcm
    appears only as a number-theory notion in the discrete-math source. The definition opens with the
    recommended term, states it formally, and gives the notation with "ký hiệu", mirroring the sibling
    greatest-common-divisor entry; all math symbols are wrapped in $$...$$. The example uses self-contained
    values (positive common multiples of 4 and 6, smallest identified), introducing no derived quantity
    the definition did not name. see_also links to greatest-common-divisor, the companion notion in the
    same number-theory source; gcd lives in chapter G, so this is a permitted cross-chapter forward reference,
    and the gcd entry already lists least-common-multiple in its own see_also.
- id: lemma
  letter: L
  headword_en: lemma
  notation: ''
  rosen_ref: Rosen §1.8
  definition_vi: Bổ đề là một mệnh đề đã được chứng minh, được dùng làm bước trung gian trong chứng minh
    của một định lý quan trọng hơn. Bổ đề thường được phát biểu và chứng minh trước định lý chính để làm
    cho lập luận của chứng minh đó ngắn gọn và rõ ràng hơn.
  example_vi: 'Để chứng minh định lý $$\sqrt{2}$$ là số vô tỉ, ta dùng bổ đề: nếu $$n^2$$ là số chẵn thì
    $$n$$ là số chẵn.'
  vi_terms:
  - term: bổ đề
    source_id: bib-leanhvinh-2020
    page: tr. 99
    recommended: true
    verified: true
    pdf_page: 98
    snippet: Dé chứng minh Định lý 4.8, ta cin một số bổ đề sau.
  - term: bổ đề
    source_id: bib-hoangchithanh-2007
    page: tr. 37
    recommended: false
    verified: true
    pdf_page: 37
    snippet: 'Trước hết ta có bổ đề sau:'
  - term: bổ đề
    source_id: bib-ngodactan-2004
    page: tr. 139
    recommended: false
    verified: true
    pdf_page: 139
    snippet: Trong mục này ta chứng minh bổ đề cơ sở làm nền tảng cho lý thuyết Pólya. Đó là bổ đề Burnside.
  see_also:
