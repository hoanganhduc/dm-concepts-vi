    cha là i thì mức của các đỉnh con là i + 1." This matches Rosen exactly (root at level zero; children
    one level deeper). Chosen as recommended because it is the standard term and is attested in the 2019
    text source with the precise definition. (2) "tầng của đỉnh" / "tầng" (layer/level) is an attested
    variant in the newest source bib-nguyenhoangthach-2020 (2020, p. 85): "Tầng của đỉnh u là khoảng cách
    từ u tới gốc" (distance from vertex to root = path length, same concept). vi_terms are ordered newest-source
    first (2020 tầng, then 2019/2007 mức); the recommended "mức của đỉnh" is the standard form even though
    the variant "tầng" appears in the slightly newer 2020 source. The bare "mức" hits in bib-nguyenhuudien-2019
    p. 19 (priority levels of logical connectives) and p. 257 (codeword length) are DIFFERENT senses and
    were excluded; the cited p. 252 snippet is the tree-example passage. The OCR source bib-hoangchithanh-2007
    was searched both normally and with --loose; both return the same p. 137 passage. Related term "chiều
    cao của cây" (height = highest level) appears alongside but is a separate concept (see height-of-a-tree).
    Verifier re-ran find-term.py for all six terms: every source_id/pdf_page/snippet confirmed denoting
    THIS concept; no fabrications.'
