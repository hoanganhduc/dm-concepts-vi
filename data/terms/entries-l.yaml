    G]". Both match the English ground truth exactly: vertices of $$L(G)$$ are the edges of $$G$$, and
    two such vertices are adjacent iff the corresponding edges share a common endpoint. "đầu mút" follows
    the chapter-G "graph" entry''s standard rendering of "endpoint". OCR sources were searched both normally
    and with --loose; results were identical, and the 2007/2020 snippets show mild OCR mangling of diacritics
