    flagged by the correctness panel). The general linear constant-coefficient recurrence adds an inhomogeneous
    term $$F(n)$$ ($$a_n = c_1 a_{n-1} + \cdots + c_k a_{n-k} + F(n)$$, with $$F(n) \equiv 0$$ giving
    this homogeneous case); bib-nguyenhoangthach-2020 covers both the homogeneous (§3.2.1, tr. 40 PDF)
    and non-homogeneous (§3.2.2 "không thuần nhất", tr. 44 PDF) cases. Two attested variants of the homogeneous
    form: "hệ thức truy hồi tuyến tính" (bib-nguyenhuudien-2019, Định nghĩa 3.13: "Một hệ thức truy hồi
