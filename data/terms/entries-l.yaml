    snippet: 'Xét công thức truy hồi tuyến tính thuần nhất hệ số hằng bậc #:'
  - term: hệ thức truy hồi tuyến tính thuần nhất
    source_id: bib-rosen-2003-vi
    page: tr. 387 (PDF, bản dịch Rosen)
    recommended: false
    verified: true
    pdf_page: 387
    snippet: ĐINH NGHĨA 1. Một hệ thức truy hồi tuyến tính thuần nhất bậc k voi
  see_also: []
  status: panel-approved
  notes: 'Recommended term "quan hệ truy hồi tuyến tính thuần nhất" is attested in the 2020 source bib-nguyenhoangthach-2020
    with a formal definition (Định nghĩa 3.1, tr. 40 PDF: "Một quan hệ truy hồi tuyến tính thuần nhất
    bậc k là một..."). The displayed form $$a_n = c_1 a_{n-1} + \cdots + c_k a_{n-k}$$ is exactly Rosen''s
    linear HOMOGENEOUS constant-coefficient recurrence of degree $$k$$ (Rosen §8.2), so the definiendum
    now carries the qualifier "thuần nhất" to match the displayed formula and the attested source definitions
    (previously the title omitted "thuần nhất" while showing the homogeneous-only form, a name/scope mismatch
    flagged by the correctness panel). The general linear constant-coefficient recurrence adds an inhomogeneous
    term $$F(n)$$ ($$a_n = c_1 a_{n-1} + \cdots + c_k a_{n-k} + F(n)$$, with $$F(n) \equiv 0$$ giving
    this homogeneous case); bib-nguyenhoangthach-2020 covers both the homogeneous (§3.2.1, tr. 40 PDF)
    and non-homogeneous (§3.2.2 "không thuần nhất", tr. 44 PDF) cases. Two attested variants of the homogeneous
    form: "hệ thức truy hồi tuyến tính" (bib-nguyenhuudien-2019, Định nghĩa 3.13: "Một hệ thức truy hồi
    tuyến tính thuần nhất bậc k với hệ số hằng số là") and "công thức truy hồi tuyến tính" (bib-nguyenducnghia-2006,
    "Xét công thức truy hồi tuyến tính thuần nhất hệ số hằng bậc"). The OCR graph-theory sources bib-leanhvinh-2020
    and bib-hoangchithanh-2007 returned no hits in either normal or --loose mode (they do not cover recurrence
    relations), so no OCR-variant terms were found there. The condition $$c_k \neq 0$$ ensures the recurrence
    genuinely has degree $$k$$.'
- id: logical-equivalence
  letter: L
  headword_en: logical equivalence
  notation: p \equiv q
  rosen_ref: Rosen §1.3
  definition_vi: Hai mệnh đề phức hợp $$p$$ và $$q$$ được gọi là tương đương logic nếu chúng có cùng chân
    trị trong mọi cách gán chân trị cho các biến mệnh đề của chúng, ký hiệu $$p \equiv q$$.
  example_vi: Hai mệnh đề $$\neg(p \wedge q)$$ và $$\neg p \vee \neg q$$ là tương đương logic, vì chúng
    nhận cùng chân trị với mọi cách gán chân trị cho $$p$$ và $$q$$.
