- id: language
  letter: L
  headword_en: language
  notation: L \subseteq \Sigma^*
  rosen_ref: Rosen §13.1
  definition_vi: Ngôn ngữ trên một bảng chữ cái $$\Sigma$$ là một tập con của tập tất cả các xâu ký tự
    lập từ $$\Sigma$$. Nếu ký hiệu $$\Sigma^*$$ là tập tất cả các xâu trên $$\Sigma$$ thì một ngôn ngữ
    $$L$$ thỏa mãn $$L \subseteq \Sigma^*$$.
  example_vi: Trên bảng chữ cái $$\Sigma = \{0, 1\}$$, tập các xâu bit có độ dài chẵn là một ngôn ngữ;
    tập $$\{0, 01, 011, 0111, \ldots\}$$ gồm các xâu bắt đầu bằng $$0$$ và theo sau là một số (có thể
    bằng $$0$$) chữ số $$1$$ cũng là một ngôn ngữ trên $$\Sigma$$.
