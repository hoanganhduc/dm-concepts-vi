- id: lattice
  letter: L
  headword_en: lattice
  notation: (L, \preceq)
  rosen_ref: Rosen §9.6
  definition_vi: Một \emph{dàn} là một tập hợp có thứ tự bộ phận $$(L, \preceq)$$ trong đó mọi cặp phần
    tử $$a, b \in L$$ đều có cận trên đúng, gọi là hợp và ký hiệu $$a \vee b$$, và cận dưới đúng, gọi
    là gặp và ký hiệu $$a \wedge b$$.
  example_vi: 'Với một tập hợp $$E$$, tập các tập con $$(\mathcal{P}(E), \subseteq)$$ là một dàn: với
    mọi $$A, B \in \mathcal{P}(E)$$ ta có $$A \vee B = A \cup B$$ và $$A \wedge B = A \cap B$$.'
  vi_terms:
  - term: dàn
    source_id: bib-nguyenhuudien-2019
    page: tr. 123 (PDF)
    recommended: true
    verified: true
    pdf_page: 123
    snippet: Định nghĩa 4.19 Cho ( L, ≤) là một tập hợp có thứ tự. Ta nói ( L, ≤ 4) là một dàn nếu và
  - term: dàn (lattice)
    source_id: bib-nguyenhuudien-2019
    page: tr. 123 (PDF)
    recommended: false
    verified: true
    pdf_page: 123
    snippet: 4.6. Dàn (lattice - tập bị chặn)
  see_also:
  - partially-ordered-set
  - poset
  - hasse-diagram
  - least-upper-bound
  - greatest-lower-bound
  status: panel-approved
  notes: 'Nguồn duy nhất trong kho ngữ liệu định nghĩa khái niệm dàn theo nghĩa lý thuyết thứ tự (tập
    hợp có thứ tự bộ phận trong đó mỗi cặp phần tử đều có cận trên đúng/hợp $$\vee$$ và cận dưới đúng/gặp
    $$\wedge$$) là bib-nguyenhuudien-2019 (2019), Mục 4.6 "Dàn (lattice - tập bị chặn)", Định nghĩa 4.19.
    Nguồn này cũng nêu khái niệm liên quan "dàn con" (tr. 124-125) và "đồng cấu dàn" (tr. 124-126). Thuật
    ngữ tiếng Anh "lattice" trong toàn kho chỉ xuất hiện ở nguồn này, đi kèm với "dàn", xác nhận đây là
    thuật ngữ chuẩn. Hai nguồn 2020 (bib-leanhvinh-2020, bib-nguyenhoangthach-2020) là sách lý thuyết
    đồ thị/tổ hợp, không trình bày dàn theo nghĩa lý thuyết thứ tự, nên thuật ngữ chuẩn được chứng thực
    ở nguồn 2019. CẢNH BÁO trùng từ: "mạng" và "lưới" trong kho chỉ "mạng vận tải" (transport network)
    và "mạng kiểu lưới" (mesh/lưới bộ xử lý) chứ KHÔNG phải dàn lý thuyết thứ tự; mọi lần khớp "dàn" trong
    bib-leanhvinh-2020 và bib-nguyenhoangthach-2020 đều là nhiễu từ thông dụng ("dễ dàng", "dành", "tăng
    dần"). Do đó "mạng" và "lưới" không được ghi nhận là biến thể của khái niệm này.'
- id: leaf
  letter: L
  headword_en: leaf
  notation: \deg(v) = 1
  rosen_ref: Rosen §11.1
  definition_vi: Lá của một cây $$T$$ không gốc là một đỉnh $$v$$ có bậc bằng một, tức là $$\deg_T(v)
    = 1$$. Trong cây có gốc, lá là đỉnh không có con; đỉnh gốc có bậc một không được coi là lá.
  example_vi: Trong đường đi $$P_3$$ với các đỉnh $$a, b, c$$ và các cạnh $$ab, bc$$, hai đỉnh đầu mút
    $$a$$ và $$c$$ là lá vì $$\deg(a) = \deg(c) = 1$$, còn $$b$$ không phải là lá vì $$\deg(b) = 2$$.
