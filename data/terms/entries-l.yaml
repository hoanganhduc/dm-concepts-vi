    đã được sắp thứ tự; trong trường hợp xấu nhất nó cần $$n$$ phép so sánh, cho độ phức tạp $$O(n)$$,
    nên kém hiệu quả hơn thuật toán tìm kiếm nhị phân. Nguồn bib-nguyenhuudien-2019 (mục 5.2.2) ghi nhận
