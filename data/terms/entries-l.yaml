  rosen_ref: Rosen §13.3
  definition_vi: Ngôn ngữ được đoán nhận (hay được thừa nhận) bởi một ôtômat là tập hợp các xâu vào mà
    ôtômat đó chấp nhận. Với một ôtômat $$M$$, ngôn ngữ này thường được ký hiệu là $$L(M)$$.
  example_vi: Nếu $$M$$ là một ôtômat hữu hạn trên bảng chữ cái $$\Sigma = \{0, 1\}$$ mà chấp nhận đúng
    những xâu kết thúc bằng $$1$$, thì $$L(M)$$ là tập tất cả các xâu bit có ký tự cuối bằng $$1$$, chẳng
    hạn $$1$$, $$01$$ và $$101$$ thuộc $$L(M)$$, còn $$10$$ thì không.
