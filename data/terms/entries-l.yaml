- id: lexicographic-order
  letter: L
  headword_en: lexicographic order
  notation: \prec
  rosen_ref: Rosen §6.6
  definition_vi: Thứ tự từ điển là cách sắp thứ tự các xâu (hoặc các bộ, hoán vị, tổ hợp) dựa trên thứ
    tự của tập các phần tử cơ sở, mô phỏng cách sắp xếp các từ trong từ điển. Với hai xâu $$a_1 a_2 \ldots
    a_n$$ và $$b_1 b_2 \ldots b_n$$ trên một tập đã được sắp thứ tự, ta nói $$a_1 a_2 \ldots a_n$$ đi
    trước $$b_1 b_2 \ldots b_n$$ theo thứ tự từ điển (ký hiệu $$a_1 a_2 \ldots a_n \prec b_1 b_2 \ldots
    b_n$$) nếu tại vị trí đầu tiên mà hai xâu khác nhau, phần tử của xâu thứ nhất nhỏ hơn phần tử tương
    ứng của xâu thứ hai.
  example_vi: Trên tập $$\{1,2,3\}$$ với thứ tự thông thường, các hoán vị được liệt kê theo thứ tự từ
    điển là $$123, 132, 213, 231, 312, 321$$. Chẳng hạn $$231 \prec 312$$ vì tại vị trí đầu tiên ta có
    $$2 \leq 3$$ và $$2 \neq 3$$.
