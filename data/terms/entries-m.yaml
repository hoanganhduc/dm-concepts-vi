  notes: 'Candidate "cặp ghép lớn nhất" (recommended) is the dominant attested term, appearing in the
    2020 source bib-leanhvinh-2020 (p76) as well as bib-nguyenhuudien-2019 (p218), bib-hoangchithanh-2007
    (p65), and bib-nguyenducnghia-2006 (p263). It matches Rosen''s "largest possible number of edges"
    (lớn nhất = largest). The variant "cặp ghép cực đại" is the formal definitional term in bib-leanhvinh-2020
    p67: "Cặp ghép cực đại của G là cặp ghép với nhiều cạnh nhất của G" — i.e. the matching with the MOST
    edges (maximum), NOT inclusion-maximal. CONCEPT-HAZARD FLAG: "cực đại" literally calques to "maximal",
    but here it denotes the most-edges (maximum) matching, as the snippet "cặp ghép với nhiều cạnh nhất"
    confirms; this is preserved so a future maximal-matching cross-link does not misread the citation.
    Candidates "bộ ghép lớn nhất", "ghép cặp cực đại", "bộ ghép cực đại", and "đối sánh cực đại" returned
    0 hits in any source (normal and --loose) and are dropped. Note: $$G$$ is rendered as OCR-mangled
    "G/Ơ/Š" in several leanhvinh-2020 snippets (OCR noise), but the term phrasing "cặp ghép cực đại"/"cặp
    ghép lớn nhất" is clear. Per book convention, bipartite graphs are written "đồ thị hai phần"; the
    verbatim "đồ thị hai phía" in the nguyenducnghia-2006 snippet is raw citation text. EDITOR (chapter
    M final): vi_terms reordered newest-first (2020 leanhvinh ×2, 2019 nguyenhuudien, 2007 hoangchithanh,
    2006 nguyenducnghia); the redundant "tức là không có cặp ghép nào... lớn hơn" gloss was removed from
    definition_vi, keeping the single "số cạnh nhiều nhất" formulation. see_also: matching is a same-chapter
    (M) entry in this batch; perfect-matching and maximal-matching are same-chapter (M) forward references
    not yet authored.'
- id: matrix
  letter: M
  headword_en: matrix
  notation: A = [a_{ij}]
  rosen_ref: Rosen §2.6
  definition_vi: Một \emph{ma trận} là một bảng chữ nhật gồm các số được sắp xếp thành các dòng và cột.
    Ma trận $$A$$ gồm $$m$$ dòng và $$n$$ cột được gọi là ma trận cấp $$m \times n$$, ký hiệu $$A = [a_{ij}]$$,
    trong đó $$a_{ij}$$ là phần tử nằm ở dòng $$i$$ và cột $$j$$ với $$1 \leq i \leq m$$ và $$1 \leq j
    \leq n$$. Khi $$m = n$$, ta nói $$A$$ là ma trận vuông cấp $$n$$.
  example_vi: Ma trận $$A = \begin{bmatrix} 1 & 0 & 4 \\ 2 & 5 & 3 \end{bmatrix}$$ là một ma trận cấp
    $$2 \times 3$$, trong đó phần tử ở dòng $$1$$ và cột $$3$$ là $$a_{13} = 4$$, còn phần tử ở dòng $$2$$
    và cột $$2$$ là $$a_{22} = 5$$.
  vi_terms:
  - term: ma trận
    source_id: bib-nguyenhuudien-2019
    page: tr. 107 (PDF)
    recommended: true
    verified: true
    pdf_page: 107
    snippet: Một ma trận M gồm m dòng, n cột sẽ được gọi là một ma trận có cấp m × n. Nếu m = n thì ta
      nói M là một ma trận vuông cấp n.
  - term: ma trận
    source_id: bib-rosen-2003-vi
    page: tr. 130 (PDF, bản dịch Rosen)
    recommended: false
    verified: true
    pdf_page: 130
    snippet: TOÁN, CÁC SỐ NGUYÊN VÀ MA TRẬN
  see_also:
  - zero-one-matrix
  - adjacency-matrix
  - incidence-matrix
  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "ma trận" is the standard Vietnamese rendering of "matrix" (a rectangular array
    of numbers, Rosen §2.6) and is attested with the cấp $$m \times n$$ / ma trận vuông cấp $$n$$ phrasing
    in the 2019 source bib-nguyenhuudien-2019 (tr. 107). EDITOR (chapter M final): applied the panel''s
    structural-completeness fixes — added the missing rosen_ref "Rosen §2.6" (Matrices), populated the
    previously empty notation field with bare LaTeX "A = [a_{ij}]", added a self-contained example_vi
    (a concrete $$2 \times 3$$ matrix exhibiting $$a_{ij}$$ at row $$i$$, column $$j$$ using only the
    cấp and $$a_{ij}$$ notions the definition introduces), and added cross-chapter see_also forward references
    (zero-one-matrix, adjacency-matrix, incidence-matrix). First-concept emphasis converted from markdown
    "*ma trận*" to LaTeX "\emph{ma trận}" to match multigraph and the .tex convention. SYMBOL NOTE: the
    source snippet names the matrix $$M$$ while the entry uses $$A$$; the citation symbol need not match
    the definition symbol, so the row is kept as-is. The source uses "các số" (numbers) for entries, consistent
    with Rosen''s "rectangular array of numbers"; the entry keeps the minimal definition without restricting
    entries to a specific number system.'
- id: maximal-element
  letter: M
  headword_en: maximal element
  notation: ''
  rosen_ref: Rosen §9.6
  definition_vi: \emph{Phần tử tối đại} của một tập sắp thứ tự bộ phận $$(A, \preceq)$$ là một phần tử
    $$a \in A$$ sao cho không tồn tại phần tử $$x \in A$$ với $$x \neq a$$ và $$a \preceq x$$; nói cách
    khác, không có phần tử nào của $$A$$ đứng thực sự trên $$a$$.
  example_vi: Xét tập sắp thứ tự bộ phận $$X = \{1, 2, 3\}$$ với quan hệ thứ tự $$\rho = \{(1,1), (2,2),
    (3,3), (1,2), (3,2)\}$$. Khi đó $$2$$ là phần tử tối đại duy nhất, vì không có phần tử nào của $$X$$
    đứng thực sự trên $$2$$.
  vi_terms:
  - term: phần tử tối đại
    source_id: bib-nguyenhuudien-2019
    page: tr. 119 (PDF)
    recommended: true
    verified: true
    pdf_page: 119
    snippet: Định nghĩa 4.14 Ta gọi một phần tử a ∈ A là một phần tử tối đại của tập hợp A nếu và chỉ
      nếu không tồn
  - term: phần tử cực đại
    source_id: bib-ngodactan-2004
    page: tr. 164 (PDF)
    recommended: false
    verified: true
    pdf_page: 164
    snippet: phần tử cực đại trong X\ trong X không có phần tử lớn nhất.
  see_also:
  - minimal-element
  status: panel-approved
  see_ref: ''
  notes: 'Hai biến thể đều được chứng thực: "phần tử tối đại" (bib-nguyenhuudien-2019, 2019) và "phần
    tử cực đại" (bib-ngodactan-2004, 2004). Chọn "phần tử tối đại" làm thuật ngữ khuyến nghị vì đây là
    biến thể duy nhất có trong nguồn 2019-2020 và có định nghĩa rõ ràng trong bib-nguyenhuudien-2019 (Định
    nghĩa 4.14, tr. 119), nơi cùng định nghĩa cả "phần tử tối tiểu" (xem minimal-element). Các nguồn OCR
    (bib-leanhvinh-2020, bib-hoangchithanh-2007) và các nguồn còn lại (bib-nguyenhoangthach-2020, bib-nguyenducnghia-2006)
    không chứng thực thuật ngữ nào (đã chạy cả tìm thường lẫn --loose cho nguồn OCR). Nguồn không đưa
    ký hiệu riêng cho phần tử tối đại nên trường notation để trống. Ví dụ lấy từ Ví dụ 4.18 của bib-nguyenhuudien-2019
    (đã điều chỉnh để tự chứa). EDITOR (chapter M final): poset phrasing unified to "tập sắp thứ tự bộ
    phận" (matching the sibling minimal-element entry and the partially-ordered-set id, replacing the
    earlier "tập hợp có thứ tự (bộ phận)"); the relation symbol $$\preceq$$ is used for the partial order;
    the "Định nghĩa 4.14" anchor was added to the recommended snippet for parity with minimal-element,
    confirming both maximal and minimal are defined together on tr. 119. First-concept emphasis marked
    with \emph{...}.'
- id: minimal-element
  letter: M
