    pdf_page: 263
    snippet: '8. Bài toán ghép cặp trên đồ thị hai phía: Cho đồ thị hai phía Ơ = (XY, E). Một tập con'
  - term: ghép cặp
    source_id: bib-ngodactan-2004
    page: tr. 270 (PDF)
    recommended: false
    verified: true
    pdf_page: 270
    snippet: thì ta nói rằng G có một ghép cặp đầy đủ từ Vị tới V2 nếu
