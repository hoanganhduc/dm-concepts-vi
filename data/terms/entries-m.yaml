- id: master-theorem
  letter: M
  headword_en: Master Theorem
  notation: T(n) = aT(n/b) + cn^d
  rosen_ref: Rosen §8.3
  definition_vi: Định lý thợ là một định lý cho công thức nghiệm tiệm cận của hệ thức truy hồi chia để
    trị dạng $$T(n) = aT(n/b) + cn^d$$, trong đó $$a \geq 1$$, $$b > 1$$ là các hằng số nguyên và $$c,
    d$$ là các hằng số dương. Cận tăng của $$T(n)$$ được xác định theo việc so sánh $$a$$ với $$b^d$$,
    cụ thể $$T(n)$$ là $$O(n^d)$$ khi $$a < b^d$$, là $$O(n^d \log n)$$ khi $$a = b^d$$, và là $$O(n^{\log_b
    a})$$ khi $$a > b^d$$.
  example_vi: Với hệ thức truy hồi $$T(n) = 2T(n/2) + n$$ của thuật toán sắp xếp trộn, ta có $$a = b^d$$
    (do $$2 = 2^1$$), nên theo định lý thợ $$T(n)$$ là $$O(n \log n)$$.
