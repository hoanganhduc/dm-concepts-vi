- id: mersenne-prime
  letter: M
  headword_en: Mersenne Prime
  notation: 2^p - 1
  rosen_ref: Rosen §3.5
  definition_vi: Số nguyên tố Mersenne là một số nguyên tố có dạng $$2^p - 1$$, trong đó $$p$$ là một
    số nguyên tố.
  example_vi: Với $$p = 2, 3, 5, 7$$ ta được các số nguyên tố Mersenne $$2^2 - 1 = 3$$, $$2^3 - 1 = 7$$,
    $$2^5 - 1 = 31$$ và $$2^7 - 1 = 127$$; tuy nhiên $$2^{11} - 1 = 2047 = 23 \cdot 89$$ không phải là
    số nguyên tố mặc dù $$11$$ là số nguyên tố.
