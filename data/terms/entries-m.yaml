- id: mutually-independent-events
  letter: M
  headword_en: Mutually Independent Events
  notation: p\!\left(\bigcap_{i \in I} E_i\right) = \prod_{i \in I} p(E_i)
  rosen_ref: Rosen §7.2
  definition_vi: Các biến cố $$E_1, E_2, \ldots, E_n$$ được gọi là độc lập tương hỗ nếu với mọi tập con
    $$I \subseteq \{1, 2, \ldots, n\}$$, xác suất của giao của các biến cố trong tập con đó bằng tích
    các xác suất của chúng, tức là $$p\!\left(\bigcap_{i \in I} E_i\right) = \prod_{i \in I} p(E_i)$$.
  example_vi: Khi gieo một đồng xu cân đối ba lần, gọi $$E_i$$ là biến cố "lần gieo thứ $$i$$ ra mặt ngửa".
    Khi đó $$E_1, E_2, E_3$$ là độc lập tương hỗ, vì xác suất của giao của mọi tập con các biến cố này
    bằng tích các xác suất tương ứng, chẳng hạn $$p(E_1 \cap E_2 \cap E_3) = \tfrac{1}{8} = p(E_1)\,p(E_2)\,p(E_3)$$.
