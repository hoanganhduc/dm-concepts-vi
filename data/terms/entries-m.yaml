- id: multinomial-coefficient
  letter: M
  headword_en: multinomial coefficient
  notation: \binom{n}{n_1, n_2, \ldots, n_k}
  rosen_ref: Rosen §6.4
  definition_vi: \emph{Hệ số đa thức} của các số nguyên không âm $$n_1, n_2, \ldots, n_k$$ với $$n_1 +
    n_2 + \cdots + n_k = n$$, ký hiệu $$\binom{n}{n_1, n_2, \ldots, n_k}$$, là số cách phân hoạch một
    tập gồm $$n$$ phần tử thành $$k$$ nhóm có kích thước lần lượt là $$n_1, n_2, \ldots, n_k$$, và được
    tính bởi $$\binom{n}{n_1, n_2, \ldots, n_k} = \dfrac{n!}{n_1!\, n_2! \cdots n_k!}$$. Đây cũng là hệ
    số của $$x_1^{n_1} x_2^{n_2} \cdots x_k^{n_k}$$ trong khai triển của $$(x_1 + x_2 + \cdots + x_k)^n$$.
  example_vi: Hệ số của $$x_1^2 x_2 x_3$$ trong khai triển của $$(x_1 + x_2 + x_3)^4$$ là $$\binom{4}{2,
    1, 1} = \dfrac{4!}{2!\, 1!\, 1!} = 12$$.
