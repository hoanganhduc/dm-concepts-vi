- id: minmax-strategy
  letter: M
  headword_en: Minmax Strategy
  notation: ''
  rosen_ref: Rosen §11.5
  definition_vi: Chiến lược minmax là chiến lược trong đó mỗi người chơi chọn các nước đi sao cho tối
    ưu hóa thu hoạch trong trường hợp xấu nhất. Nói cách khác, mỗi người chơi chọn nước đi làm cực đại
    giá trị thu hoạch nhỏ nhất mà mình có thể nhận được, bất kể đối thủ chơi thế nào.
  example_vi: Trong một trò chơi hai người có tổng bằng không, người chơi áp dụng chiến lược minmax sẽ
    chọn nước đi sao cho thu hoạch nhỏ nhất có thể của mình là lớn nhất; chẳng hạn, nếu mỗi nước đi của
    người chơi thứ nhất dẫn tới các thu hoạch tệ nhất là $$-3$$, $$-1$$ và $$-5$$ tùy theo phản ứng của
    đối thủ, thì nước đi cho thu hoạch tệ nhất $$-1$$ được chọn vì $$-1 \geq -3$$ và $$-1 \geq -5$$.
  vi_terms:
