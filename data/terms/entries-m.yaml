- id: modular-arithmetic
  letter: M
  headword_en: modular arithmetic
  notation: a \equiv b \pmod{m}
  rosen_ref: Rosen §4.1
  definition_vi: \emph{Số học modulo $$m$$} là phép tính số học thực hiện trên các lớp đồng dư modulo
    $$m$$ (trên $$\mathbb{Z}_m$$), được xây dựng từ quan hệ đồng dư. Hai số nguyên $$a$$ và $$b$$ được
    gọi là đồng dư theo modulo $$m$$, với $$m$$ là một số nguyên dương cố định, ký hiệu $$a \equiv b \pmod{m}$$,
    nếu $$m \mid (a - b)$$; khi đó các số nguyên đồng dư với nhau theo modulo $$m$$ được xem là tương
    đương trong các phép tính số học thực hiện theo modulo $$m$$.
  example_vi: Ta có $$17 \equiv 5 \pmod{6}$$ vì $$6 \mid (17 - 5)$$, và $$-4 \equiv 2 \pmod{6}$$ vì $$6
    \mid (-4 - 2)$$.
