  status: panel-approved
  see_ref: ''
  notes: '"cặp ghép" is the dominant noun for the matching set itself and is the recommended term; it
    is defined explicitly as the concept in bib-leanhvinh-2020 (tr. 67, PDF): a set of edges $$S \subseteq
    E(G)$$ no two of which share an endpoint, and is also attested as a noun in bib-hoangchithanh-2007
    (tr. 59). The variant "ghép cặp" is attested as a noun mainly inside problem/qualified forms: "bài
    toán ghép cặp" = matching problem (bib-nguyenhoangthach-2020, bib-nguyenducnghia-2006) and "ghép cặp
    đầy đủ" = complete matching (bib-ngodactan-2004, a distinct headword with its own see_also target
    complete-matching); in bib-leanhvinh-2020 the same form "được ghép cặp bởi M" is the verb "matched
    by M". Thus the standalone-noun usage of "ghép cặp" for the set $$M$$ is attested only as a problem/qualified
    form, which is why "cặp ghép" (a clean defining noun in two sources) is recommended. Candidate terms
    "bộ ghép" and "đối sánh" returned 0 hits in both normal and --loose searches across the whole corpus
    and are not attested. OCR sources (bib-leanhvinh-2020, bib-hoangchithanh-2007) were searched both
    normally and with --loose; all cited snippets came through cleanly. EDITOR (chapter M final): vi_terms
    reordered newest-first per the locked convention (2020 leanhvinh, 2020 nguyenhoangthach, 2007 hoangchithanh,
    2006 nguyenducnghia, 2004 ngodactan); the redundant trailing "; ký hiệu $$M$$" was dropped from definition_vi
    since $$M$$ is introduced inline and lives in the notation field. see_also targets perfect-matching
    and complete-matching are same-chapter (M) forward references not yet authored in this batch; bipartite-graph
    is a cross-chapter (B) forward reference.'
