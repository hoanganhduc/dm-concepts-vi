- id: matching
  letter: M
  headword_en: matching
  notation: M \subseteq E(G)
  rosen_ref: Rosen §10.7
  definition_vi: Một \emph{cặp ghép} của đồ thị $$G$$ là một tập cạnh $$M \subseteq E(G)$$ sao cho không
    có hai cạnh nào trong $$M$$ có chung một đỉnh đầu mút.
  example_vi: Trong đồ thị $$K_4$$ với tập đỉnh $$\{a, b, c, d\}$$, tập $$M = \{ab, cd\}$$ là một cặp
    ghép vì hai cạnh $$ab$$ và $$cd$$ không có chung đỉnh đầu mút nào.
  vi_terms:
  - term: cặp ghép
    source_id: bib-leanhvinh-2020
    page: tr. 67 (PDF)
    recommended: true
    verified: true
    pdf_page: 67
    snippet: Tập cạnh S C E(G) được gọi là một cặp ghép của G nếu các cạnh của Š đôi một rời nhau.
  - term: ghép cặp
