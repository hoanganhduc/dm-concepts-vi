- id: minterm
  letter: M
  headword_en: Minterm
  notation: x_1 \wedge x_2 \wedge \cdots \wedge x_n
  rosen_ref: Rosen §12.4
  definition_vi: Tiểu hạng (hội sơ cấp đầy đủ) của $$n$$ biến mệnh đề $$x_1, x_2, \ldots, x_n$$ là một
    hội (tích lôgic) trong đó mỗi biến xuất hiện đúng một lần, dưới dạng chính nó $$x_i$$ hoặc dưới dạng
    phủ định $$\overline{x_i}$$. Như vậy mỗi tiểu hạng là một hội sơ cấp có hạng $$n$$, nhận giá trị $$1$$
    tại đúng một bộ giá trị của các biến.
  example_vi: Với $$3$$ biến $$x, y, z$$, biểu thức $$x \wedge \overline{y} \wedge z$$ là một tiểu hạng;
    nó chỉ bằng $$1$$ khi $$x = 1$$, $$y = 0$$, $$z = 1$$.
