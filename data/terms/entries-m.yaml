    vô hướng: thay vì hai cạnh vô hướng cùng nối một cặp đỉnh, ở đây là các cạnh có hướng phân biệt cùng
    nối một cặp đỉnh có thứ tự $$(u, v)$$ theo cùng một hướng. Số cạnh có hướng từ $$u$$ đến $$v$$ là
    bội của cặp $$(u, v)$$. Khái niệm này là cơ sở để định nghĩa đa đồ thị có hướng (directed multigraph).
    Thuật ngữ tiếng Việt khuyến nghị "cạnh có hướng bội" là bản dịch chuẩn ghép từ "cạnh có hướng" và
