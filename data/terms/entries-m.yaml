  notes: 'Khái niệm độc lập tương hỗ mạnh hơn độc lập đôi một: các biến cố độc lập đôi một (mỗi cặp $$E_i,
    E_j$$ thỏa $$p(E_i \cap E_j) = p(E_i)\,p(E_j)$$) chưa chắc đã độc lập tương hỗ, vì điều kiện độc lập
    tương hỗ đòi hỏi đẳng thức tích phải đúng cho mọi tập con, không chỉ cho các cặp. Cần phân biệt "biến
    cố độc lập" trong xác suất với "tập độc lập" trong lý thuyết đồ thị.'
