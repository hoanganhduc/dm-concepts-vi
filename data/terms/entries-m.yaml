  notes: 'Chiến lược minmax (đôi khi gọi là chiến lược tối thiểu hóa tối đa hoặc minimax) gắn với lý thuyết
    trò chơi: mỗi người chơi tối ưu hóa thu hoạch trong tình huống xấu nhất, tức cực đại hóa thu hoạch
    nhỏ nhất mà mình bảo đảm được. Thuật ngữ tiếng Việt "chiến lược minmax" giữ nguyên phần "minmax" theo
    gốc tiếng Anh; chưa tìm thấy nguồn tiếng Việt nào sử dụng đúng cụm từ đầy đủ này trong các tài liệu
    đã số hóa.'
- id: multiple-directed-edges
  letter: M
  headword_en: Multiple Directed Edges
  notation: (u, v)
  rosen_ref: Rosen §10.1
  definition_vi: Các cạnh có hướng bội là những cạnh có hướng phân biệt nhưng cùng tương ứng với một cặp
    đỉnh có thứ tự $$(u, v)$$. Nói cách khác, đó là nhiều cạnh có hướng cùng đi từ đỉnh $$u$$ đến đỉnh
    $$v$$ trong một đa đồ thị có hướng.
  example_vi: Trong một đa đồ thị có hướng $$G = (V, E)$$ với $$V = \{a, b\}$$, nếu có hai cạnh có hướng
    phân biệt cùng đi từ $$a$$ đến $$b$$, thì hai cạnh này là các cạnh có hướng bội ứng với cặp có thứ
    tự $$(a, b)$$. Số cạnh có hướng từ $$a$$ đến $$b$$ được gọi là bội của cặp $$(a, b)$$.
