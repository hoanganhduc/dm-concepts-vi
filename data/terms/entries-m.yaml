  notes: 'Số nguyên tố Mersenne là số nguyên tố có dạng $$2^p - 1$$ với $$p$$ là số nguyên tố. Điều kiện
    $$p$$ là số nguyên tố là cần để $$2^p - 1$$ có thể là số nguyên tố: nếu $$p$$ hợp số thì $$2^p - 1$$
    cũng là hợp số. Tuy nhiên điều kiện đó chưa đủ, chẳng hạn $$2^{11} - 1 = 2047 = 23 \cdot 89$$ là hợp
    số. Thuật ngữ "số nguyên tố Mersenne" được dẫn chứng trong bản dịch tiếng Việt của Rosen (tr. 206
    PDF); các nguồn dịch chính khác trong ngữ liệu chưa có dẫn chứng trực tiếp cho khái niệm này.'
