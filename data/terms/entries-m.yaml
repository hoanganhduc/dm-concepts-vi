- id: multiple
  letter: M
  headword_en: Multiple
  notation: b = ac
  rosen_ref: Rosen §3.4
  definition_vi: Bội của một số nguyên $$a$$ là một số nguyên $$b$$ sao cho $$b = ac$$ với một số nguyên
    $$c$$ nào đó; khi đó $$a$$ chia hết $$b$$, ký hiệu $$a \mid b$$, và $$b$$ được gọi là một bội của
    $$a$$. Nói cách khác, $$b$$ là bội của $$a$$ khi và chỉ khi $$a$$ là một ước số của $$b$$.
  example_vi: Các bội của $$7$$ là các số nguyên có dạng $$7c$$ với $$c$$ nguyên, chẳng hạn $$\ldots,
    -14, -7, 0, 7, 14, 21, \ldots$$ Số $$21$$ là một bội của $$7$$ vì $$21 = 7 \cdot 3$$, nhưng $$20$$
    không là bội của $$7$$.
