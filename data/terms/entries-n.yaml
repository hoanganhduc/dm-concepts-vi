  notes: 'Theo Rosen, máy Turing không tất định khác máy Turing tất định ở chỗ với mỗi cặp gồm trạng thái
    và ký hiệu có thể có một số phép chuyển khả dĩ thay vì duy nhất một; một xâu được chấp nhận nếu có
    ít nhất một dãy phép chuyển dẫn tới trạng thái chấp nhận. THUẬT NGỮ: "không tất định" cho "nondeterministic"
    được dùng nhất quán với mục "nondeterministic finite automaton" (ôtômat hữu hạn không tất định) đã
    có trong sách; biến thể "máy Turing không đơn định" (dùng "đơn định" thay cho "tất định") được ghi
    lại nhưng không phải dạng khuyến nghị. DẪN CHỨNG: cụm đầy đủ "máy Turing không tất định" không có
    trong kho ngữ liệu tiếng Việt hiện có, nên thuật ngữ khuyến nghị để verified=false (source_id='''',
    pdf_page=0, page='''', snippet=''''); thành phần "máy Turing" được chứng thực trong bib-nguyenducnghia-2006
    (PDF tr. 77, in tr. 70), nơi khái niệm thuật toán được mô tả là định nghĩa hình thức qua máy Turing,
    ghi lại như một dòng corroborating verified=true/recommended=false. Giáo trình này không định nghĩa
    chính xác máy Turing ("trong giáo trình này chúng ta chưa cần đến định nghĩa chính xác này"), nên
    chỉ dùng làm dẫn chứng cho thuật ngữ chứ không cho định nghĩa.'
