    on tr. 106): "Tổng quát hơn, ta có thể định nghĩa một quan hệ giữa các tập hợp A1, A2, ..., An là
    một tập hợp con của A1 × A2 × ... × An ... bộ n (a1, a2, ..., an) với ai ∈ Ai." This matches the English
    ground truth exactly; the source names it descriptively and at the element level uses "bộ n" (n-tuple),
    but does NOT attach the arity name "quan hệ n ngôi". definition_vi adopts the source''s Cartesian-product
    formulation and "bộ $$n$$" wording; the second sentence was tightened to name the elements once without
    re-deriving the subset relation. Every Vietnamese source names only the binary special case using
    the arity word "ngôi": "quan hệ hai ngôi" (bib-nguyenhoangthach-2020 tr.74, bib-nguyenducnghia-2006
    tr.14, bib-ngodactan-2004 tr.163) and "quan hệ 2 ngôi" (bib-nguyenhuudien-2019, Định nghĩa 4.1, tr.106).
