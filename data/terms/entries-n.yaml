- id: nearest-neighbor-algorithm
  letter: N
  headword_en: nearest-neighbor algorithm
  notation: ''
  rosen_ref: Rosen §10.6
  definition_vi: Thuật toán láng giềng gần nhất là một thuật toán heuristic cho bài toán người du lịch
    trên một đồ thị có trọng số. Xuất phát từ một đỉnh ban đầu, thuật toán lặp lại việc di chuyển từ đỉnh
    hiện tại tới đỉnh chưa thăm gần nhất (đỉnh nối với đỉnh hiện tại bởi cạnh có trọng số nhỏ nhất), cho
    đến khi mọi đỉnh đều được thăm rồi quay trở về đỉnh xuất phát để tạo thành một chu trình.
  example_vi: Xét đồ thị có trọng số với các đỉnh $$a$$, $$b$$, $$c$$, $$d$$ và các trọng số cạnh $$ab
    = 1$$, $$ac = 4$$, $$ad = 3$$, $$bc = 2$$, $$bd = 5$$, $$cd = 6$$. Bắt đầu tại $$a$$, đỉnh chưa thăm
    gần nhất là $$b$$ (vì $$ab = 1$$ nhỏ nhất); từ $$b$$, đỉnh chưa thăm gần nhất là $$c$$ (vì $$bc =
    2$$); từ $$c$$, đỉnh chưa thăm còn lại là $$d$$; cuối cùng quay về $$a$$, cho chu trình $$a, b, c,
    d, a$$.
  vi_terms:
  - term: thuật toán láng giềng gần nhất
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  - term: thuật toán người láng giềng gần nhất
    source_id: ''
    page: ''
    recommended: false
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - traveling-salesperson-problem
  - hamilton-circuit
  - weighted-graph
  status: panel-approved
  see_ref: ''
  notes: 'No source in the Vietnamese corpus attests a term denoting THIS concept — Rosen''s nearest-neighbor
    heuristic for the traveling-salesperson problem (build a circuit by always moving to the closest not-yet-visited
    vertex, then return to the start). HOMONYM COLLISION (important): the phrase "phương pháp lân cận
    gần nhất" (nearest-neighbor method) IS attested in the corpus, but in every source it names PRIM''s
    minimum-spanning-tree algorithm, not the TSP heuristic — bib-nguyenhuudien-2019 tr. 250 ("Thuật toán
    Prim được gọi là phương pháp lân cận gần nhất"), bib-nguyenducnghia-2006 tr. 215, bib-hoangchithanh-2007
    tr. 135. Because these denote Prim''s algorithm and NOT Rosen''s TSP heuristic, they are NOT recorded
    as verified hits for this entry. The "láng giềng" hits in bib-ngodactan-2004 (tr. 230, 267, 271, 297,
    310) all mean graph neighborhood, unrelated to the algorithm. Candidate "thuật toán láng giềng gần
    nhất" returned 0 hits in all sources (normal and --loose). The TSP context exists in the corpus ("bài
    toán người du lịch", e.g. bib-nguyenducnghia-2006 §5.3), but no source presents the nearest-neighbor
    heuristic for it under a distinct Vietnamese name. The recommended term is kept verified=false/page=""
    per the no-attestation rule: "thuật toán láng giềng gần nhất" is the standard literal rendering, chosen
    over "(phương pháp) lân cận gần nhất" precisely to avoid the Prim collision. definition_vi makes the
    TSP setting explicit to disambiguate; example_vi is self-contained, giving all edge weights up front
    and reporting only the constructed circuit $$a, b, c, d, a$$ without a derived total weight. see_also
    entries (traveling-salesperson-problem, hamilton-circuit, weighted-graph) are cross-chapter forward
    references retained per the linking convention; no same-chapter N id is related.'
