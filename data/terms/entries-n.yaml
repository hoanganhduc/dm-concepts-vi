    and bib-ngodactan-2004. The shorter predicate form "không phẳng" ("is nonplanar") is widely attested
    as the adjective/predicate used after "đồ thị ... là" or "nó ...", including in the OCR sources bib-hoangchithanh-2007
    and bib-leanhvinh-2020 and in bib-nguyenhoangthach-2020 (Kuratowski's theorem); it is recorded as
    a variant. Per book convention, "đồ thị hai phần" is the standard rendering of bipartite (relevant
    to the complete bipartite example $$K_{3,3}$$); some sources use "đồ thị phân đôi đầy đủ" for $$K_{3,3}$$
    (e.g. bib-nguyenhuudien-2019, Định lý 9.11, tr. 233), recorded here as a deferred source variant,
    not adopted. The circular restatement "nonplanar iff not planar" was removed from definition_vi for
    economy; nonplanarity is characterized by a $$K_5$$ or $$K_{3,3}$$ subdivision (Kuratowski), and $$K_5$$
    is attested as a nonplanar graph in bib-nguyenhuudien-2019 (Định lý 9.12, tr. 233). In bib-ngodactan-2004
    the OCR renders the term as "đồ thị không phằng" (phằng) at PDF tr. 206; the term field is normalized
    to the corrected spelling "đồ thị không phẳng" with the raw OCR "phằng" kept only in the snippet,
    so ngodactan corroborates the recommended term rather than forming a spurious separate variant. rosen_ref
    §10.7 (Planar Graphs) is correct for this entry.
