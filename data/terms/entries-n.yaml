    and bib-nguyenhuudien-2019, and "nước láng giềng" (neighboring countries, map coloring) in bib-nguyenducnghia-2006
    p.56. see_also "degree-of-a-vertex" is the canonical D-chapter forward reference for the degree entry.'
- id: network-flow
  letter: N
  headword_en: network flow
  notation: 'f: E \to \mathbb{R}^{+} \cup \{0\}'
  rosen_ref: Rosen — network flow not covered; anchored to nguyenhuudien-2019 §6 (luồng vận tải), with
    codomain $$\mathbb{R}^{+} \cup \{0\}$$ from ngodactan-2004 / nguyenducnghia-2006
  definition_vi: 'Một \emph{luồng vận tải} của một mạng vận tải là một hàm $$f$$ gán cho mỗi cung có hướng
    $$e \in E$$ một giá trị không âm $$f(e)$$ không vượt quá khả năng thông qua $$c(e)$$ của cung đó,
    ký hiệu $$f: E \to \mathbb{R}^{+} \cup \{0\}$$. Tại mỗi đỉnh trung gian $$v$$, tổng luồng đi vào $$v$$
    bằng tổng luồng đi ra khỏi $$v$$ (điều kiện bảo toàn luồng).'
  example_vi: Xét mạng vận tải với nguồn $$s$$, đích $$t$$ và một đỉnh trung gian $$v$$, trong đó các
    cung $$sv$$, $$vt$$ đều có khả năng thông qua bằng $$3$$. Gán $$f(sv) = f(vt) = 2$$ thì tổng luồng
    vào $$v$$ bằng tổng luồng ra khỏi $$v$$ và mỗi giá trị không vượt quá khả năng thông qua, nên $$f$$
    là một luồng vận tải của mạng.
