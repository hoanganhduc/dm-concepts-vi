- id: nonconstructive-existence-proof
  letter: N
  headword_en: Nonconstructive Existence Proof
  notation: ''
  rosen_ref: Rosen §1.7
  definition_vi: Chứng minh tồn tại không kiến thiết là một chứng minh khẳng định rằng tồn tại một phần
    tử có tính chất mong muốn mà không trưng ra một phần tử cụ thể nào. Nói cách khác, để chứng minh mệnh
    đề $$\exists x P(x)$$, ta chỉ ra rằng có phần tử thỏa mãn $$P(x)$$ nhưng không tìm được tường minh
    một phần tử $$a$$ nào với $$P(a)$$ đúng.
  example_vi: 'Để chứng minh tồn tại các số vô tỉ $$x$$ và $$y$$ sao cho $$x^{y}$$ là số hữu tỉ, ta xét
    số $$\sqrt{2}^{\sqrt{2}}$$: nếu nó hữu tỉ thì $$x = y = \sqrt{2}$$ là cặp cần tìm; nếu nó vô tỉ thì
    $$x = \sqrt{2}^{\sqrt{2}}$$ và $$y = \sqrt{2}$$ thỏa mãn $$x^{y} = 2$$. Ta khẳng định cặp số tồn tại
    mà không biết cụ thể trường hợp nào xảy ra, nên đây là một chứng minh tồn tại không kiến thiết.'
