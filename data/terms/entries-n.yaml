  notes: 'Recommended term "lân cận" is attested with an exact $$N(v)$$ definition in the 2020 source
    bib-nguyenhoangthach-2020 (p.63): "Lân cận N(v) của một đỉnh v là tập hợp tất cả các đỉnh kề với nó."
    The descriptive form "tập các đỉnh kề" is attested as the formal $$N(v)$$ definition in bib-leanhvinh-2020
    (p.224) and bib-hoangchithanh-2007 (p.62), and is the literal rendering of "set of adjacent vertices."
    The variant "tập đỉnh kề" appears in bib-leanhvinh-2020 (p.68). "Láng giềng" denotes the neighborhood
    of a set/vertex in bib-ngodactan-2004 ($$N(A)$$, $$N_G(S)$$). Excluded as a different concept: the
    topological "lân cận của một điểm" (neighborhood of a point in analysis) in bib-nguyenducnghia-2006
    and bib-nguyenhuudien-2019, and "nước láng giềng" (neighboring countries, map coloring) in bib-nguyenducnghia-2006
    p.56. see_also "degree-of-a-vertex" is the canonical D-chapter forward reference for the degree entry.'
