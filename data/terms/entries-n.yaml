- id: naive-set-theory
  letter: N
  headword_en: Naive Set Theory
  notation: ''
  rosen_ref: Rosen §2.1
  definition_vi: Lý thuyết tập hợp ngây thơ là cách xây dựng lý thuyết tập hợp của Cantor, trong đó tập
    hợp được hiểu một cách trực giác như một bộ sưu tập không sắp thứ tự các đối tượng và bất kỳ tính
    chất nào cũng xác định một tập hợp gồm mọi đối tượng thỏa mãn tính chất đó. Cách tiếp cận này không
    dựa trên một hệ tiên đề hình thức nên có thể dẫn tới nghịch lý, chẳng hạn nghịch lý Russell với $$S
    = \{x \mid x \notin x\}$$.
  example_vi: 'Nghịch lý Russell: xét $$S = \{x \mid x \notin x\}$$. Khi đó câu hỏi $$S \in S$$ hay $$S
    \notin S$$ đều dẫn tới mâu thuẫn, cho thấy giới hạn của lý thuyết tập hợp ngây thơ.'
