    nghĩa là $$p$$ không thể đúng nếu $$q$$ không đúng. Ta cũng đọc phát biểu này là "$$p$$ chỉ nếu $$q$$".
  example_vi: 'Xét mệnh đề "nếu $$n$$ chia hết cho $$4$$ thì $$n$$ chia hết cho $$2$$", có dạng $$p \to
    q$$ với $$p$$ là "$$n$$ chia hết cho $$4$$" và $$q$$ là "$$n$$ chia hết cho $$2$$". Khi đó $$q$$ là
    điều kiện cần cho $$p$$: nếu $$n$$ không chia hết cho $$2$$ thì $$n$$ cũng không thể chia hết cho
    $$4$$.'
