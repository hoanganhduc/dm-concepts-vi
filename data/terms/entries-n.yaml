    economy; nonplanarity is characterized by a $$K_5$$ or $$K_{3,3}$$ subdivision (Kuratowski), and $$K_5$$
    is attested as a nonplanar graph in bib-nguyenhuudien-2019 (Định lý 9.12, tr. 233). In bib-ngodactan-2004
