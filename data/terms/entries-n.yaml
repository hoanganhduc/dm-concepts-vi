  definition_vi: Một bài toán quyết định thuộc lớp $$\mathsf{NP}$$ được gọi là \emph{bài toán NP-đầy đủ}
    nếu mọi bài toán trong $$\mathsf{NP}$$ đều quy dẫn được về nó trong thời gian đa thức. Nói cách khác,
    $$L$$ là bài toán NP-đầy đủ khi $$L \in \mathsf{NP}$$ và với mọi $$L' \in \mathsf{NP}$$ tồn tại một
    phép quy dẫn thời gian đa thức từ $$L'$$ về $$L$$.
