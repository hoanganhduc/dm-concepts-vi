- id: number-theory
  letter: N
  headword_en: Number Theory
  notation: ''
  rosen_ref: Rosen §3.4
  definition_vi: Lý thuyết số là ngành của toán học nghiên cứu tập số nguyên $$\mathbb{Z}$$ và các tính
    chất của chúng, đặc biệt là quan hệ chia hết, số nguyên tố, ước chung lớn nhất và đồng dư. Nhiều khái
    niệm cơ bản của lĩnh vực này, chẳng hạn số nguyên tố $$p$$ và phép đồng dư $$a \equiv b \pmod{m}$$,
    là nền tảng cho mật mã học và các thuật toán trên số nguyên.
  example_vi: 'Một kết quả cơ bản của lý thuyết số là Định lý cơ bản của số học: mỗi số nguyên $$n \geq
    2$$ đều phân tích được duy nhất (sai khác thứ tự) thành tích các số nguyên tố, ví dụ $$120 = 2^3 \cdot
    3 \cdot 5$$.'
