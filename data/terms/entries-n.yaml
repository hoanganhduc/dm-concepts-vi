- id: normal-form
  letter: N
  headword_en: normal form
  notation: ''
  rosen_ref: Rosen §1.3
  definition_vi: Dạng chuẩn tắc của một công thức mệnh đề là cách viết chuẩn hóa công thức đó dưới dạng
    tuyển của các hội các literal (dạng chuẩn tắc tuyển) hoặc dưới dạng hội của các tuyển các literal
    (dạng chuẩn tắc hội). Một literal là một biến mệnh đề $$p$$ hoặc phủ định của nó $$\neg p$$.
