    kiện cần cho p", which directly states that in $$p \to q$$ the proposition $$q$$ is a necessary condition
    for $$p$$. The same page also lists the equivalent reading "p chỉ nếu q" for $$p \to q$$, which the
    definition reuses (the redundant trailing restatement of the notation $$p \to q$$ was removed for
    economy since the opening conditional already states it). The term is abundantly attested in the 2020
    sources (bib-leanhvinh-2020, and via "điều kiện cần và đủ" in bib-nguyenhoangthach-2020) and all older
    sources, so it is stable across the corpus. The candidate "điều kiện cần và đủ" (necessary and sufficient
    condition) is recorded as a variant but is NOT recommended for this entry: it denotes the biconditional
    $$p \leftrightarrow q$$ rather than the bare necessary condition of $$p \to q$$; it belongs more properly
    to a biconditional entry and is listed here only because it embeds the phrase "điều kiện cần". OCR
    sources: bib-leanhvinh-2020 searched normally and with --loose (loose adds OCR variant "điều kiện
    cản"). bib-hoangchithanh-2007 only attests the longer "điều kiện cần và đủ" (tr. 77, 79 PDF), not
    the bare form. see_also targets are cross-chapter (S/B/C) forward references.'
- id: nondeterministic-finite-automaton
  letter: N
  headword_en: nondeterministic finite automaton
  notation: M = (S, I, f, s_0, F)
  rosen_ref: Rosen §13.3
  definition_vi: Một \emph{ôtômat hữu hạn không tất định} là một máy hữu hạn trạng thái $$M = (S, I, f,
    s_0, F)$$ gồm tập trạng thái $$S$$, bộ chữ cái đầu vào $$I$$, hàm chuyển $$f$$ gán cho mỗi cặp gồm
    trạng thái và đầu vào một tập các trạng thái kế tiếp, trạng thái xuất phát $$s_0 \in S$$ và tập con
    $$F \subseteq S$$ gồm các trạng thái kết thúc. Điểm khác biệt so với ôtômat hữu hạn tất định là với
    mỗi cặp gồm trạng thái và giá trị đầu vào có thể có một số trạng thái kế tiếp khả dĩ thay vì duy nhất
    một.
  example_vi: 'Xét $$M = (S, I, f, s_0, F)$$ với $$S = \{s_0, s_1\}$$, $$I = \{0, 1\}$$, $$F = \{s_1\}$$,
    trong đó $$f(s_0, 0) = \{s_0, s_1\}$$, $$f(s_0, 1) = \{s_1\}$$, còn $$f(s_1, 0) = f(s_1, 1) = \emptyset$$.
    Vì $$f(s_0, 0)$$ chứa hai trạng thái nên $$M$$ là ôtômat hữu hạn không tất định: từ $$s_0$$ với đầu
    vào $$0$$, máy có thể chuyển tới $$s_0$$ hoặc tới $$s_1$$.'
