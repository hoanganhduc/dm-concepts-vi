  notes: 'Concept = normal form of a propositional formula (disjunctive/conjunctive normal form, DNF/CNF).
    Two book traditions for the word order. (1) nguyenhuudien-2019 (discrete math, NEWEST) uses the generic
    "dạng chuẩn tắc" (section 1.5 "Các dạng chuẩn tắc") with "dạng chuẩn tắc tuyển" = DNF and "dạng chuẩn
    tắc hội" = CNF, applied directly to propositional formulas $$E(p_1, \ldots, p_n)$$ — this matches
    Rosen exactly. The same source also lists "dạng chính tắc" (chính tắc tuyển / chính tắc hội) as a
    parenthetical synonym on tr. 25-26 (PDF). (2) nguyenducnghia-2006 uses the swapped order "dạng tuyển
    chuẩn tắc" = DNF and "dạng hội chuẩn tắc" = CNF (plus generic "dạng chuẩn tắc") for Boolean functions.
    Recommended generic term: "dạng chuẩn tắc", attested in the 2019 source. OCR graph sources bib-leanhvinh-2020
    and bib-hoangchithanh-2007 do not attest this propositional-logic concept (loose search returned 0
    hits) — expected, since they cover graph theory/algorithms, not Boolean logic. "literal" is kept untranslated
    in the definition as the book uses the standard term (no Vietnamese term for "literal" attested in
    the 2019 source); the inline clause defining a literal is a short, harmless clarification, not a synonym
    gloss. The example is self-contained, illustrating both DNF and CNF directly. see_also targets are
    cross-chapter (P/N→negation is same-chapter) forward references; "negation" is the same-chapter N
    link, the rest are forward references.'
- id: n-ary-relation
