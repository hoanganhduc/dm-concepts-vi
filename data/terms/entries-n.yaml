  see_also:
  - flow
  - transportation-network
  - max-flow
  - min-cut
  - directed-graph
  - capacity
  status: panel-approved
  notes: 'Concept: an assignment $$f$$ of a nonnegative value to each directed edge of a transportation
    network, not exceeding its capacity (khả năng thông qua; the variant "sức chứa" is recorded here,
    not in the definition), with the total flow into each intermediate vertex equal to the total flow
    out (flow conservation / Kirchhoff). REFERENCE: Rosen "Discrete Mathematics and Its Applications"
    does NOT cover network flow as a numbered graph-chapter section (§10.7 is "Planar Graphs", used by
    the nonplanar-graph entry); the rosen_ref was corrected to anchor the concept to the Vietnamese sources
    that actually define it, matching the chapter-M maximum-flow/minimum-cut precedent. The recommended
    term "luồng vận tải" is the formal definitional term attested in the newest source nguyenhuudien-2019
    (p. 210: "Hàm φ ... được gọi là luồng vận tải của mạng"); that source defines the function as integer-valued
    ("nhận giá trị nguyên"), while the entry adopts Rosen''s real nonnegative codomain $$\mathbb{R}^{+}
    \cup \{0\}$$ as attested by ngodactan-2004 and nguyenducnghia-2006. The bare term "luồng" is the most
    common shorthand and denotes the flow itself across all sources. ngodactan-2004 (p. 255/257/259) and
    nguyenducnghia-2006 (p. 242) phrase it as "luồng trong mạng (vận tải)" with the explicit codomain
    "Hàm $$f: E \to \mathbb{R}^{+} \cup \{0\}$$", matching Rosen''s notation; ngodactan-2004 p. 255 is
    specifically the "mạng vận tải đỉnh" (vertex network) variant, with the plain form at p. 257. "luồng
    qua mạng" (nguyenhuudien-2019 p. 210; hoangchithanh-2007 p. 104) more often denotes the value/intensity
    of the flow but is also used loosely for the flow itself. The 2020 sources (leanhvinh-2020, nguyenhoangthach-2020)
    do not attest this concept; leanhvinh "luồng" hits are OCR noise from "lực lượng". The bib-hoangchithanh-2007
    p.4 "luồng vận tải" hit is a front-matter/table-of-contents listing, not an in-body definitional use;
    the recommended term is independently strong via nguyenhuudien-2019 p.210. This entry near-duplicates
    the chapter-F "flow" entry (same headword notation and recommended term); "flow" is listed in see_also
    as a cross-chapter forward reference.'
- id: node
  letter: N
