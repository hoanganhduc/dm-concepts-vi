  notation: v \in V(G)
  rosen_ref: Rosen §10.1
  definition_vi: Đỉnh của một đồ thị $$G = (V, E)$$ là một phần tử của tập đỉnh $$V$$, tức một trong những
    điểm cơ bản của đồ thị. Các cạnh của đồ thị nối các cặp đỉnh, nhưng một đỉnh không nhất thiết phải
    là mút của một cạnh nào (đỉnh cô lập). Một đỉnh thường được ký hiệu là $$v \in V(G)$$.
  example_vi: Xét đồ thị $$G = (V, E)$$ với $$V = \{a, b, c\}$$ và $$E = \{ab, bc\}$$. Khi đó $$a$$, $$b$$,
    $$c$$ là ba đỉnh của $$G$$, trong đó cạnh $$ab$$ nối hai đỉnh $$a$$ và $$b$$.
