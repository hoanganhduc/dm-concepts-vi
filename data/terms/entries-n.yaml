    tích Descartes $$A_1 \times A_2 \times \cdots \times A_n$$, ký hiệu $$R \subseteq A_1 \times A_2 \times
    \cdots \times A_n$$. Mỗi phần tử của $$R$$ là một bộ $$n$$ phần tử $$(a_1, a_2, \ldots, a_n)$$ với
    $$a_i \in A_i$$.
