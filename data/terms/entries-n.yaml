    hits; bare "NP" (35 hits) is OCR/subscript noise, not the complexity class. "độ phức tạp tính toán"
    hits (21) denote big-O time/space complexity of algorithms (e.g. bib-nguyenducnghia-2006 §4.2, bib-ngodactan-2004
    tr.251), not the NP-complete class; "bài toán khó" (6) and "thoả mãn được" (1) are ordinary usages.
    These are graph-theory / discrete-math textbooks that do not develop computational complexity theory
    to the NP-complete level. "bài toán NP-đầy đủ" is adopted as the standard literal rendering in Vietnamese
    complexity literature; other Vietnamese variants encountered elsewhere are "bài toán NP-đủ" and "NP-hoàn
    chỉnh" (neither attested in this corpus). The definition was tightened from "mọi bài toán khác trong
    $$\mathsf{NP}$$" to "mọi bài toán trong $$\mathsf{NP}$$" to match the formal restatement and Rosen''s
    all-of-NP quantification. see_also: dangling same-chapter id "np-problem" (undefined corpus-wide)
    was dropped; polynomial-time-reduction (P) and decision-problem (D) are legitimate cross-chapter forward
    references.'
