    một đỉnh chỉ là một phần tử của tập đỉnh $$V$$ và không nhất thiết là mút của một cạnh nào (đỉnh cô
    lập bậc $$0$$ vẫn là một đỉnh); definition_vi được viết lại để thừa nhận điều này và đã bỏ cụm chú
    thích tiếng Anh trong thân định nghĩa (chỉ giữ ở notes), theo quy ước không chú giải đồng nghĩa trong
    định nghĩa. Ví dụ dùng ký hiệu cạnh vô hướng $$ab$$ (không phải cặp có thứ tự $$(a,b)$$) cho khớp
    quy ước của chương (mục neighborhood). "nút" là một biến thể, thường xuất hiện trong ngữ cảnh tính
    toán (nút của cây tìm kiếm) hoặc điểm lưới (xem bib-nguyenducnghia-2006, tr. 25 (PDF)); lưu ý rằng
    trong bib-hoangchithanh-2007 cụm "đỉnh nút" lại chỉ một loại đỉnh đặc biệt, không phải nghĩa "node"
    tổng quát, nên không tính là chứng cứ cho biến thể "nút". "nút mạng" không xuất hiện trong bất kỳ
    nguồn nào (0 kết quả) nên bị loại. see_also: dangling same-chapter ids "node-of-graph" (redundant
    alias of this entry) and "non-adjacent" (undefined corpus-wide) were dropped; "vertex" and "edge"
    are cross-chapter forward references.'
