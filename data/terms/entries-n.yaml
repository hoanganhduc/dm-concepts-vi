- id: natural-logarithm
  letter: N
  headword_en: Natural Logarithm
  notation: \ln x
  rosen_ref: Rosen Appendix 2
  definition_vi: Lôgarit tự nhiên của một số dương $$x$$, ký hiệu $$\ln x$$, là lôgarit cơ số $$e$$ của
    $$x$$, tức là số mũ $$y$$ thỏa mãn $$e^{y} = x$$, trong đó $$e \approx 2.71828$$ là cơ số của lôgarit
    tự nhiên. Tương đương, $$\ln x = \log_{e} x$$ với mọi $$x > 0$$.
  example_vi: Vì $$e^{0} = 1$$ nên $$\ln 1 = 0$$, và vì $$e^{1} = e$$ nên $$\ln e = 1$$.
  vi_terms:
  - term: Lôgarit tự nhiên
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
    pdf_page: 0
    snippet: ''
  see_also: []
  status: panel-approved
  notes: Cơ số là $$e$$. Phân biệt với lôgarit cơ số $$2$$ (ký hiệu $$\log n$$ hoặc $$\lg n$$) thường
    gặp trong phân tích độ phức tạp thuật toán.
- id: nonseparable-graph
  letter: N
  headword_en: Nonseparable Graph
  notation: ''
  rosen_ref: Rosen §10.4
  definition_vi: Đồ thị không thể tách rời là đồ thị liên thông $$G$$ không có đỉnh khớp, tức là không
    tồn tại đỉnh $$v \in V(G)$$ mà $$G - v$$ có nhiều thành phần liên thông hơn $$G$$. Một cách tương
    đương, đồ thị liên thông với ít nhất ba đỉnh là không thể tách rời khi và chỉ khi nó là đồ thị song
    liên thông ($$2$$-liên thông).
  example_vi: Chu trình $$C_n$$ với $$n \geq 3$$ là đồ thị không thể tách rời, vì việc bỏ đi bất kỳ đỉnh
    nào vẫn để lại một đường đi liên thông. Ngược lại, đồ thị gồm hai tam giác chung một đỉnh là có thể
    tách rời, vì đỉnh chung đó là đỉnh khớp.
