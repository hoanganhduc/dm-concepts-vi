    đúng với một cách gán giá trị chân lý nào đó cho các biến hay không, là một bài toán NP-đầy đủ: nó
    thuộc $$\mathsf{NP}$$ và mọi bài toán trong $$\mathsf{NP}$$ đều quy dẫn được về nó trong thời gian
    đa thức.'
