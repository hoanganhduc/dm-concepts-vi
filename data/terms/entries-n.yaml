- id: nondeterministic-turing-machine
  letter: N
  headword_en: Nondeterministic Turing Machine
  notation: T = (S, I, f, s_0)
  rosen_ref: Rosen §13.5
  definition_vi: Một \emph{máy Turing không tất định} là một máy Turing mà với một trạng thái và một ký
    hiệu đã cho có thể có nhiều phép chuyển khả dĩ. Nói cách khác, hàm chuyển $$f$$ có thể gán cho cùng
    một cặp gồm trạng thái và ký hiệu trên băng nhiều bộ năm thành phần khác nhau, nên ở mỗi bước máy
    có thể chọn một trong nhiều phép chuyển thay vì duy nhất một như ở máy Turing tất định.
  example_vi: 'Giả sử ở trạng thái $$s_0$$ khi đọc ký hiệu $$0$$, hàm chuyển cho phép hai phép chuyển:
    một phép viết lại $$1$$ rồi chuyển sang trạng thái $$s_1$$ và dịch sang phải, một phép giữ nguyên
    $$0$$ rồi chuyển sang trạng thái $$s_2$$ và dịch sang trái. Vì có nhiều hơn một phép chuyển cho cặp
    $$(s_0, 0)$$ nên đây là một máy Turing không tất định: tại bước đó máy có thể đi theo một trong hai
    nhánh tính toán.'
