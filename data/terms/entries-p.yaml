- id: pairwise-independent-events
  letter: P
  headword_en: Pairwise Independent Events
  notation: p(E_i \cap E_j) = p(E_i)p(E_j)
  rosen_ref: Rosen §7.2
  definition_vi: Các biến cố được gọi là độc lập đôi một nếu mọi cặp trong số chúng là độc lập. Nói cách
    khác, một họ biến cố $$E_1, E_2, \ldots, E_n$$ là độc lập đôi một nếu với mọi cặp chỉ số $$i \neq
    j$$ ta có $$p(E_i \cap E_j) = p(E_i)p(E_j)$$.
  example_vi: Khi gieo một đồng xu cân đối hai lần, gọi $$E_1$$ là biến cố "lần gieo đầu ra mặt ngửa",
    $$E_2$$ là biến cố "lần gieo thứ hai ra mặt ngửa", và $$E_3$$ là biến cố "hai lần gieo cho kết quả
    giống nhau". Mỗi cặp trong ba biến cố này thỏa $$p(E_i \cap E_j) = \frac{1}{4} = \frac{1}{2} \cdot
    \frac{1}{2} = p(E_i)p(E_j)$$, nên chúng độc lập đôi một (mặc dù không độc lập tương hỗ).
