- id: planar-representation
  letter: P
  headword_en: Planar Representation
  notation: ''
  rosen_ref: Rosen §10.7
  definition_vi: Biểu diễn phẳng của một đồ thị phẳng $$G$$ là một cách vẽ $$G$$ trên mặt phẳng sao cho
    không có hai cạnh nào cắt nhau (trừ tại các đỉnh chung). Một biểu diễn phẳng của $$G$$ chia mặt phẳng
    thành các miền, kể cả một miền vô hạn (không bị chặn).
  example_vi: Đồ thị $$K_4$$ thường được vẽ với hai cạnh cắt nhau, nhưng nó có một biểu diễn phẳng trong
    đó không cạnh nào cắt nhau, nên $$K_4$$ là đồ thị phẳng.
