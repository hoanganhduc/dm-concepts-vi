- id: permutation
  letter: P
  headword_en: Permutation
  notation: P(n,r)
  rosen_ref: Rosen §6.3
  definition_vi: Một chỉnh hợp chập $$r$$ của một tập hợp gồm $$n$$ phần tử phân biệt là một cách sắp
    xếp có thứ tự của $$r$$ trong số $$n$$ phần tử đó, trong đó $$0 \leq r \leq n$$. Số các chỉnh hợp
    chập $$r$$ của $$n$$ phần tử được ký hiệu là $$P(n,r)$$; trường hợp $$r = n$$ là một cách sắp xếp
    có thứ tự của toàn bộ $$n$$ phần tử và được gọi là một hoán vị của tập hợp đó.
  example_vi: Với tập hợp $$\{a, b, c\}$$, các chỉnh hợp chập $$2$$ là $$ab$$, $$ba$$, $$ac$$, $$ca$$,
    $$bc$$, $$cb$$, nên $$P(3,2) = 6$$; các hoán vị (chỉnh hợp chập $$3$$) là $$abc$$, $$acb$$, $$bac$$,
    $$bca$$, $$cab$$, $$cba$$, nên $$P(3,3) = 6$$.
