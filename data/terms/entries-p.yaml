- id: prime-implicant
  letter: P
  headword_en: Prime Implicant
  notation: ''
  rosen_ref: Rosen §12.4
  definition_vi: Một nguyên nhân (implicant) của một hàm Boole là một hội sơ cấp (tích các literal) sao
    cho mỗi khi hội đó nhận giá trị $$1$$ thì hàm cũng nhận giá trị $$1$$. Một nguyên nhân nguyên tố của
    hàm là một nguyên nhân không bị kéo theo bởi bất kỳ nguyên nhân nào khác của hàm đó; nói cách khác,
    không thể bỏ đi literal nào của nó mà vẫn còn là một nguyên nhân của hàm.
  example_vi: Xét hàm Boole $$x + y$$ (tức $$x \vee y$$). Các hội $$x$$ và $$y$$ đều là nguyên nhân nguyên
    tố của hàm này, vì mỗi khi $$x = 1$$ hoặc mỗi khi $$y = 1$$ thì $$x + y = 1$$, và không thể bỏ bớt
    literal nào. Trái lại, hội $$x \wedge y$$ tuy là một nguyên nhân nhưng không phải nguyên nhân nguyên
    tố, vì nó bị kéo theo bởi nguyên nhân $$x$$ (và bởi $$y$$).
