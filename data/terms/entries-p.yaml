- id: path
  letter: P
  headword_en: Path
  notation: u = v_0, v_1, \ldots, v_n = v
  rosen_ref: Rosen §10.4
  definition_vi: Một đường đi độ dài $$n$$ từ đỉnh $$u$$ tới đỉnh $$v$$ trong đồ thị $$G$$ là một dãy
    gồm $$n$$ cạnh nối tiếp một dãy đỉnh $$u = v_0, v_1, \ldots, v_n = v$$, trong đó mỗi cạnh nối hai
    đỉnh liên tiếp $$v_{i-1}$$ và $$v_i$$ của dãy với mọi $$1 \leq i \leq n$$. Số $$n$$ được gọi là độ
    dài của đường đi.
  example_vi: Trong đồ thị với các cạnh $$\{a,b\}$$, $$\{b,c\}$$, $$\{c,d\}$$, dãy đỉnh $$a, b, c, d$$
    là một đường đi độ dài $$3$$ từ $$a$$ tới $$d$$, vì mỗi cặp đỉnh liên tiếp được nối bởi một cạnh.
