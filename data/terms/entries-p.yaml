- id: power-law
  letter: P
  headword_en: Power Law
  notation: ''
  rosen_ref: Rosen §10.4
  definition_vi: Luật lũy thừa là quy luật mô tả phân bố bậc của nhiều mạng lớn trong thực tế, theo đó
    tỷ lệ các đỉnh có bậc $$k$$ tỉ lệ với $$k^{-r}$$ với một hằng số $$r > 0$$ nào đó. Đồ thị có phân
    bố bậc tuân theo luật lũy thừa được gọi là đồ thị không tỷ lệ (scale-free), trong đó có một số ít
    đỉnh bậc rất lớn và rất nhiều đỉnh bậc nhỏ.
  example_vi: Trong nhiều mạng thực tế như mạng World Wide Web hay mạng xã hội, số đỉnh có bậc $$k$$ xấp
    xỉ tỉ lệ với $$k^{-r}$$, nên số trang web có rất nhiều liên kết là rất ít, trong khi số trang web
    có ít liên kết là rất nhiều.
