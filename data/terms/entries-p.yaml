    as variants. This verified=false-recommended + attested-old-spelling pattern matches the chapter-O
    ordered-tree precedent.'
- id: predicate
  letter: P
  headword_en: Predicate
  notation: P(x)
  rosen_ref: Rosen §1.4
  definition_vi: Một vị từ, ký hiệu $$P(x)$$, là một phát biểu phụ thuộc vào các biến lấy giá trị trên
    các miền xác định cho trước, sao cho khi mỗi biến được gán một giá trị cụ thể thuộc miền của nó thì
    $$P(x)$$ trở thành một mệnh đề có giá trị chân lý xác định.
  example_vi: Xét vị từ $$P(x)$$ là phát biểu "$$x > 3$$" với biến $$x$$ lấy giá trị trên tập số nguyên.
    Khi gán $$x = 4$$, ta được mệnh đề $$P(4)$$ là "$$4 > 3$$", có giá trị chân lý đúng; khi gán $$x =
    2$$, ta được mệnh đề $$P(2)$$ là "$$2 > 3$$", có giá trị chân lý sai.
  vi_terms:
  - term: vị từ
    source_id: bib-nguyenhuudien-2019
