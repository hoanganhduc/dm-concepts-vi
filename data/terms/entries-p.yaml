- id: public-key-cryptography
  letter: P
  headword_en: Public Key Cryptography
  notation: ''
  rosen_ref: Rosen §4.6
  definition_vi: 'Mật mã khóa công khai là hệ mật mã trong đó mỗi người dùng có một cặp khóa: khóa công
    khai (ký hiệu $$(n, e)$$) dùng để mã hóa và được công bố cho mọi người, và khóa bí mật (ký hiệu $$d$$)
    dùng để giải mã và được giữ kín. Biết khóa công khai vẫn không dễ suy ra khóa bí mật, chẳng hạn trong
    hệ RSA độ an toàn dựa trên việc phân tích số nguyên lớn $$n = pq$$ thành thừa số nguyên tố là bài
    toán khó về mặt tính toán.'
  example_vi: Trong hệ RSA, người nhận chọn hai số nguyên tố lớn $$p$$ và $$q$$, đặt $$n = pq$$ và chọn
    số mũ mã hóa $$e$$ nguyên tố cùng nhau với $$(p-1)(q-1)$$. Khóa công khai $$(n, e)$$ được công bố;
    bản rõ $$M$$ được mã hóa thành $$C \equiv M^{e} \pmod{n}$$, và chỉ người nắm khóa bí mật $$d$$ với
    $$ed \equiv 1 \pmod{(p-1)(q-1)}$$ mới khôi phục được $$M \equiv C^{d} \pmod{n}$$.
