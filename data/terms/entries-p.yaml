    lập đôi một chỉ đòi hỏi đẳng thức $$p(E_i \cap E_j) = p(E_i)p(E_j)$$ đúng cho mọi cặp $$i \neq j$$,
    trong khi độc lập tương hỗ đòi hỏi $$p\!\left(\bigcap_{i \in I} E_i\right) = \prod_{i \in I} p(E_i)$$
    đúng cho mọi tập con $$I$$. Do đó độc lập tương hỗ kéo theo độc lập đôi một, nhưng điều ngược lại
    nói chung không đúng. Cụm "biến cố độc lập đôi một" là bản dịch chuẩn được khuyến nghị; bản dịch Rosen
    tiếng Việt (tr. 337) định nghĩa độc lập cho từng cặp biến cố. Cần phân biệt "biến cố độc lập" trong
    xác suất với "tập độc lập" (independent set) trong lý thuyết đồ thị.
