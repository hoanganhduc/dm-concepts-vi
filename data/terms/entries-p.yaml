    cục thuộc $$E$$, tức $$p(E) = \sum_{s \in E} p(s)$$. Khi tất cả các kết cục đồng khả năng trong không
    gian mẫu gồm $$n$$ kết cục, công thức rút gọn thành $$p(E) = \frac{|E|}{n}$$, là số kết cục thuận
    lợi chia cho tổng số kết cục. Thuật ngữ "xác suất của một biến cố" có dẫn chứng trực tiếp trong bản
    dịch Rosen; "biến cố" cũng được dùng trong ngữ liệu mới (Lê Anh Vinh, 2020). Cần phân biệt với "không
    gian mẫu" (tập tất cả các kết cục) và "kết cục" (một phần tử của không gian mẫu).
