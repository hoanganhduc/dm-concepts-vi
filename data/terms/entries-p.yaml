- id: pivot
  letter: P
  headword_en: Pivot
  notation: ''
  rosen_ref: Rosen §5.4
  definition_vi: Chốt là phần tử được chọn trong một danh sách để phân hoạch danh sách đó trong thuật
    toán sắp xếp nhanh (quicksort). Cho một danh sách $$a_1, a_2, \ldots, a_n$$, ta chọn một phần tử làm
    chốt rồi chia danh sách thành phần gồm các phần tử nhỏ hơn chốt và phần gồm các phần tử lớn hơn chốt,
    sau đó sắp xếp đệ quy hai phần này.
  example_vi: Trong thuật toán sắp xếp nhanh trên danh sách $$3, 5, 1, 4, 2$$, nếu chọn chốt là phần tử
    đầu tiên $$3$$ thì danh sách được tách thành phần $$1, 2$$ gồm các phần tử nhỏ hơn $$3$$ và phần $$5,
    4$$ gồm các phần tử lớn hơn $$3$$.
