  notation: ''
  rosen_ref: Rosen §10.1
  definition_vi: Một \emph{giả đồ thị} là một đồ thị vô hướng $$G$$ trong đó cho phép có nhiều cạnh nối
    cùng một cặp đỉnh, đồng thời cho phép có khuyên, tức là cạnh nối một đỉnh với chính nó. Đây là loại
    đồ thị vô hướng tổng quát nhất, vì nó có thể chứa cả cạnh bội lẫn khuyên.
  example_vi: Xét đồ thị vô hướng trên tập đỉnh $$\{a, b, c\}$$ gồm hai cạnh nối $$a$$ với $$b$$, một
    cạnh nối $$b$$ với $$c$$, và một khuyên tại $$c$$. Vì có cặp đỉnh được nối bởi hai cạnh và có một
    cạnh nối $$c$$ với chính nó, đồ thị này là một giả đồ thị.
