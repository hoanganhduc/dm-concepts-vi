- id: proof-by-contradiction
  letter: P
  headword_en: Proof By Contradiction
  notation: ''
  rosen_ref: Rosen §1.6
  definition_vi: 'Chứng minh phản chứng là phương pháp chứng minh gián tiếp một mệnh đề $$p$$: ta giả
    sử $$\neg p$$ đúng rồi suy ra một mâu thuẫn, tức một mệnh đề có dạng $$r \wedge \neg r$$. Vì $$\neg
    p \rightarrow (r \wedge \neg r)$$ luôn dẫn tới điều vô lý nên $$\neg p$$ phải sai, do đó $$p$$ đúng.'
  example_vi: Để chứng minh $$\sqrt{2}$$ là số vô tỉ, ta giả sử phản chứng rằng $$\sqrt{2}$$ hữu tỉ, tức
    $$\sqrt{2} = a/b$$ với $$a, b$$ nguyên, $$b \neq 0$$ và phân số tối giản. Khi đó $$a^2 = 2b^2$$, suy
    ra cả $$a$$ và $$b$$ đều chẵn, mâu thuẫn với giả thiết tối giản.
