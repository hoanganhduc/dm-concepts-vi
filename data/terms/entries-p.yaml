    do đó nó có thể không xác định tại một số phần tử của $$A$$. Khái niệm này khác với hàm (hàm số) thông
    thường trong Rosen, vốn là hàm toàn phần xác định tại mọi phần tử của miền. Thuật ngữ "hàm bộ phận"
