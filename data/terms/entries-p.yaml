- id: partial-function
  letter: P
  headword_en: Partial Function
  notation: 'f : A \rightharpoonup B'
  rosen_ref: Rosen §1.8
  definition_vi: Hàm bộ phận $$f$$ từ tập $$A$$ đến tập $$B$$ là phép gán cho mỗi phần tử $$a$$ thuộc
    một tập con của $$A$$, gọi là miền xác định của $$f$$, nhiều nhất một phần tử $$b$$ thuộc $$B$$. Nói
    cách khác, mỗi phần tử của $$A$$ được gán không quá một phần tử của $$B$$, nên $$f$$ có thể không
    xác định tại một số phần tử của $$A$$.
  example_vi: 'Cho $$f : \mathbb{Z} \rightharpoonup \mathbb{R}$$ với $$f(n) = \sqrt{n}$$. Đây là một hàm
    bộ phận từ $$\mathbb{Z}$$ đến $$\mathbb{R}$$ vì $$f$$ không xác định khi $$n < 0$$; miền xác định
    của nó là tập các số nguyên không âm. Một hàm bộ phận xác định tại mọi phần tử của $$A$$ được gọi
    là hàm toàn phần.'
