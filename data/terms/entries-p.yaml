- id: proof-by-cases
  letter: P
  headword_en: Proof by Cases
  notation: ''
  rosen_ref: Rosen §1.6
  definition_vi: Chứng minh bằng cách chia trường hợp là phương pháp chứng minh một mệnh đề điều kiện
    có giả thiết dạng tuyển $$p_1 \lor p_2 \lor \cdots \lor p_n$$ bằng cách chứng minh riêng từng kéo
    theo $$p_i \to q$$ với mọi $$i$$. Vì các trường hợp $$p_1, p_2, \ldots, p_n$$ vét cạn mọi khả năng
    nên khi mỗi kéo theo đều đúng thì $$(p_1 \lor \cdots \lor p_n) \to q$$ cũng đúng.
  example_vi: Để chứng minh rằng với mọi số nguyên $$n$$, ta có $$n^2 \geq n$$, ta chia thành ba trường
    hợp $$n = 0$$, $$n \geq 1$$ và $$n \leq -1$$, rồi kiểm tra bất đẳng thức trong từng trường hợp.
