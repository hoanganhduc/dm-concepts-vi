  notes: 'Recommended term "mệnh đề" is the standard Vietnamese term for THIS concept (a declarative statement
    that is either true or false, but not both), defined explicitly in bib-nguyenhuudien-2019 p.14 ("một
    mệnh đề là nó đúng hoặc sai, và không thể vừa đúng vừa sai"). The chapter heading there is "Lôgic
    mệnh đề" (propositional logic). Variant "mệnh đề toán học" (mathematical proposition) is attested
    on the same page and explicitly equated with "mệnh đề". The candidate "mệnh đề logic" returned 0 hits
    in any source and is dropped. Many corpus hits of the form "Mệnh đề 2.2" / "Mệnh đề 1" in bib-nguyenducnghia-2006
    (and similarly in bib-nguyenhoangthach-2020, bib-ngodactan-2004) use "Mệnh đề" as a theorem-type label
    (English "Proposition" as a numbered statement), NOT this propositional-logic concept; those are excluded.
    The bib-nguyenducnghia-2006 p.13 hit IS this concept (proposition algebra: "Các mệnh đề, cùng với
    các phép toán trên nó, lập nên một đại số, gọi là đại số mệnh đề"). The 2020 graph theory source bib-leanhvinh-2020
    has no propositional-logic coverage. The newest source actually defining the concept is the 2019 discrete-math
    text, so the recommended term is attested in 2019. The term "chân trị" (truth value) used in definition_vi
    and example_vi is drawn from the same defining snippet (bib-nguyenhuudien-2019 p.14: "Giá trị đúng
    hoặc sai của một mệnh đề được gọi là chân trị của mệnh đề"). EMPHASIS/NOTATION edits (per panel terminology
    MED + LOW): first-concept emphasis $$\textit{mệnh đề}$$ / $$\textit{chân trị}$$ (prose words in math
    italics) normalized to \emph{mệnh đề} / \emph{chân trị}; the genuine symbols $$T$$, $$F$$ stay math-wrapped.
