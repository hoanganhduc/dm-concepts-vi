  status: panel-approved
  notes: 'Recommended term "đường đi" (general path) is the base concept matching Rosen §10.4 and is attested
    in both 2020 sources: bib-nguyenhoangthach-2020 p73 (Định nghĩa 5.25: "Một đường đi độ dài ` từ đỉnh
    u tới đỉnh v là một dãy ...") and bib-leanhvinh-2020 p15-16, plus bib-nguyenhuudien-2019 p168 (Định
    nghĩa 6.18), bib-hoangchithanh-2007 p7. Vi_terms ordered newest-source first.


    definition_vi follows the recommended term and the wording of the recommended source (bib-nguyenhoangthach-2020
    Định nghĩa 5.25), expressing Rosen''s general path: a length-$$n$$ path is a sequence of $$n$$ edges
    successively connecting a vertex sequence from $$u$$ to $$v$$. The notation field gives the vertex
    sequence $$u = v_0, v_1, \ldots, v_n = v$$ as in the source (stored as bare LaTeX; the renderer adds
    the math wrapping). The example is self-contained: it introduces only edges and the resulting path/length,
    no derived quantity beyond what the definition states.


    CONCEPT BOUNDARY (per panel terminology HIGH finding): two stricter refinements of the path concept
    appear in the corpus but denote notions narrower than Rosen''s general "đường đi", so they are NOT
    listed as vi_terms of this entry. Following the chapter-C precedent (id=circuit, whose vi_terms hold
    only synonyms of the "...đơn" refinement, while the general "chu trình" lives under id=cycle), each
    refinement belongs to its own headword. They are recorded here as forward references for the simple-path
    entry (and an elementary-path entry if treated separately):

    - "đường đi đơn" = simple path: bib-nguyenhoangthach-2020 p73 ("Một đường đi đơn (tương tự, chu trình
    đơn) là một đường đi ..."), bib-nguyenhuudien-2019 p168 ("Đường đi hoặc chu trình gọi là đơn nếu nó
    không chứa cùng một cạnh ... quá"), bib-nguyenducnghia-2006 p156, bib-hoangchithanh-2007 p7 ("Đường
    đi đơn là đường đi mà các đỉnh trên nó khác nhau từng đôi."). The Vietnamese "đơn" usage is the no-repeated-edge
    sense in nguyenhuudien-2019/nguyenducnghia-2006, aligning with Rosen''s "simple path" (no repeated
    edge), but the vertex/edge convention varies by book.

    - "đường đi sơ cấp" = elementary path (distinct vertices): bib-nguyenhuudien-2019 p168-169 ("... được
    gọi là đường đi hoặc chu trình sơ cấp"); the hierarchy is explicit there (an elementary path is a
    simple path).


    bib-leanhvinh-2020 (OCR) and bib-hoangchithanh-2007 (OCR) were searched in BOTH normal and --loose
    modes; both attest "đường đi" cleanly. bib-ngodactan-2004 also uses "đường đi" (bib id present in
