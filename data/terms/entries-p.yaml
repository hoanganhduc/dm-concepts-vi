- id: probability-distribution
  letter: P
  headword_en: Probability Distribution
  notation: 'p : S \to [0,1]'
  rosen_ref: Rosen §7.2
  definition_vi: Phân phối xác suất trên một không gian mẫu $$S$$ là một hàm $$p$$ gán cho mỗi kết cục
    (phần tử) $$s \in S$$ một xác suất $$p(s)$$. Hàm này thỏa mãn $$0 \leq p(s) \leq 1$$ với mọi $$s \in
    S$$ và $$\sum_{s \in S} p(s) = 1$$.
  example_vi: Khi tung một con xúc xắc cân đối, không gian mẫu là $$S = \{1, 2, 3, 4, 5, 6\}$$ và phân
    phối xác suất gán $$p(s) = 1/6$$ cho mỗi kết cục $$s \in S$$; đây là phân phối đều. Nếu con xúc xắc
    không cân đối sao cho mặt $$1$$ xuất hiện với xác suất gấp đôi mỗi mặt còn lại, thì $$p(1) = 2/7$$
    và $$p(s) = 1/7$$ với mỗi $$s \in \{2, 3, 4, 5, 6\}$$.
