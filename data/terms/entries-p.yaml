- id: propositional-function
  letter: P
  headword_en: Propositional Function
  notation: P(x)
  rosen_ref: Rosen §1.3
  definition_vi: Hàm mệnh đề (vị từ) là một phát biểu $$P(x_1, x_2, \ldots, x_n)$$ phụ thuộc vào các biến
    $$x_1, x_2, \ldots, x_n$$ lấy giá trị trong những miền xác định cho trước. Khi gán mỗi biến một giá
    trị cụ thể thuộc miền của nó, ta thu được một mệnh đề có giá trị chân lý xác định là đúng hoặc sai.
  example_vi: Cho $$P(x)$$ là hàm mệnh đề "$$x + 1 > x$$" trên tập số nguyên. Khi đó $$P(3)$$ là mệnh
    đề "$$3 + 1 > 3$$", có giá trị chân lý là đúng; tổng quát $$P(x)$$ đúng với mọi $$x$$.
