    phận $$\preceq$$", matching the explicit-partial wording adopted in the partial-order entry''s definition_vi
    so the two P-chapter entries describe the same underlying relation consistently; the recommended Vietnamese
    term in partial-order remains the attested "quan hệ thứ tự". First-concept emphasis was normalized
    from Markdown "*...*" to \emph{tập hợp có thứ tự}.


