- id: partial-order
  letter: P
  headword_en: Partial order
  notation: \preceq
  rosen_ref: Rosen §9.6
  definition_vi: 'Một quan hệ hai ngôi $$R$$ trên tập $$S$$ được gọi là một quan hệ thứ tự bộ phận (partial
    order; thường gọi vắn tắt là quan hệ thứ tự) nếu nó đồng thời có ba tính chất: phản xạ, phản đối xứng
    và bắc cầu. Quan hệ thứ tự bộ phận thường được ký hiệu là $$\preceq$$, và ta viết $$a \preceq b$$
    thay cho $$(a, b) \in R$$.'
  example_vi: 'Xét tập $$S = \{1, 2, 3\}$$ và quan hệ "chia hết" $$\preceq$$ trên $$S$$, trong đó $$a
    \preceq b$$ khi và chỉ khi $$a$$ chia hết $$b$$. Quan hệ này là một quan hệ thứ tự bộ phận: nó phản
    xạ vì mỗi số chia hết chính nó, phản đối xứng vì $$a \mid b$$ và $$b \mid a$$ kéo theo $$a = b$$ với
    $$a, b$$ nguyên dương, và bắc cầu vì $$a \mid b$$ cùng $$b \mid c$$ kéo theo $$a \mid c$$.'
