- id: power
  letter: P
  headword_en: Power
  notation: a^n,\ R^n,\ A^n
  rosen_ref: Rosen §9.1
  definition_vi: Lũy thừa bậc $$n$$ của một phần tử $$a$$ (số, ma trận, hay quan hệ) đối với một phép
    toán kết hợp là kết quả của việc áp dụng phép toán đó cho $$n$$ bản sao của $$a$$, ký hiệu $$a^n$$.
    Chẳng hạn với một số thực $$a$$ và số nguyên dương $$n$$, ta có $$a^n = a \cdot a \cdots a$$ ($$n$$
    thừa số), với quy ước $$a^0 = 1$$ khi $$a \neq 0$$.
  example_vi: Lũy thừa của một quan hệ $$R$$ trên tập $$A$$ được định nghĩa đệ quy bởi $$R^1 = R$$ và
    $$R^{n+1} = R^n \circ R$$. Ví dụ, với $$R = \{(1,1), (2,1), (3,2), (4,3)\}$$ ta có $$R^2 = R \circ
    R = \{(1,1), (2,1), (3,1), (4,2)\}$$.
