- id: paradox
  letter: P
  headword_en: Paradox
  notation: ''
  rosen_ref: Rosen §2.1
  definition_vi: Nghịch lý là một mệnh đề hoặc lập luận tự dẫn đến mâu thuẫn logic, tức là vừa đúng vừa
    sai. Một ví dụ kinh điển là nghịch lý Russell, xét tập hợp $$S = \{x \mid x \notin x\}$$ gồm mọi tập
    hợp không là phần tử của chính nó; khi đó câu hỏi liệu $$S \in S$$ hay $$S \notin S$$ đều dẫn đến
    mâu thuẫn.
  example_vi: 'Nghịch lý Russell: với $$S = \{x \mid x \notin x\}$$, nếu $$S \in S$$ thì theo định nghĩa
    $$S \notin S$$, còn nếu $$S \notin S$$ thì $$S$$ thỏa điều kiện của $$S$$ nên $$S \in S$$. Cả hai
    trường hợp đều mâu thuẫn.'
  vi_terms:
