  status: draft
  see_ref: ''
  notes: Số giả nguyên tố là hợp số "giả dạng" số nguyên tố vì nó vượt qua một phép kiểm tra tính nguyên
    tố ứng với một cơ sở $$b$$ cố định; chẳng hạn $$n$$ là số giả nguyên tố cơ sở $$b$$ nếu $$b^{n-1}
    \equiv 1 \pmod{n}$$ nhưng $$n$$ là hợp số. Một hợp số là số giả nguyên tố với mọi cơ sở $$b$$ nguyên
    tố cùng nhau với nó được gọi là số Carmichael.
