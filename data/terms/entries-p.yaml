- id: pascals-triangle
  letter: P
  headword_en: Pascal's triangle
  notation: \binom{n}{k}
  rosen_ref: Rosen §6.4
  definition_vi: Tam giác Pascal là bảng số tam giác của các hệ số nhị thức, trong đó phần tử ở hàng $$n$$
    và vị trí $$k$$ là hệ số nhị thức $$\binom{n}{k}$$ với $$0 \leq k \leq n$$. Mỗi phần tử bên trong
    bằng tổng của hai phần tử nằm ngay phía trên nó, tức $$\binom{n}{k} = \binom{n-1}{k-1} + \binom{n-1}{k}$$.
  example_vi: Hàng $$n = 4$$ của tam giác Pascal gồm các phần tử $$\binom{4}{0}, \binom{4}{1}, \binom{4}{2},
    \binom{4}{3}, \binom{4}{4}$$, tức $$1, 4, 6, 4, 1$$; chẳng hạn phần tử bên trong $$\binom{4}{2} =
    6$$ bằng tổng $$\binom{3}{1} + \binom{3}{2} = 3 + 3$$ của hai phần tử ngay phía trên nó.
  vi_terms:
