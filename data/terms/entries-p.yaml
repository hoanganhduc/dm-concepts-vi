  notation: P_{i_1, i_2, \ldots, i_m}
  rosen_ref: Rosen §11.4
  definition_vi: Phép chiếu là một thao tác tạo ra các quan hệ có bậc nhỏ hơn bằng cách xóa bỏ một số
    trường của một quan hệ $$n$$ ngôi. Phép chiếu $$P_{i_1, i_2, \ldots, i_m}$$ ánh xạ mỗi bộ $$n$$ phần
    tử $$(a_1, a_2, \ldots, a_n)$$ thành bộ $$m$$ phần tử $$(a_{i_1}, a_{i_2}, \ldots, a_{i_m})$$, trong
    đó $$m \leq n$$.
