- id: private-key-cryptography
  letter: P
  headword_en: Private Key Cryptography
  notation: ''
  rosen_ref: Rosen §4.6
  definition_vi: Mật mã khóa bí mật là hệ mật mã trong đó cùng một khóa bí mật $$k$$ được dùng cho cả
    việc mã hóa và giải mã, nên khóa này phải được giữ kín và chia sẻ trước giữa người gửi và người nhận.
    Với hàm mã hóa $$E_k$$ và hàm giải mã $$D_k$$, ta có $$D_k(E_k(m)) = m$$ với mọi bản rõ $$m$$, trong
    đó $$D_k$$ là hàm ngược của $$E_k$$.
  example_vi: 'Mật mã Caesar là một ví dụ của mật mã khóa bí mật: khóa là độ dịch chuyển $$k$$, mã hóa
    theo $$f(p) = (p + k) \bmod 26$$ và giải mã theo $$f^{-1}(p) = (p - k) \bmod 26$$, trong đó cùng một
    giá trị $$k$$ được giữ bí mật và dùng cho cả hai chiều.'
