- id: poset
  letter: P
  headword_en: Poset (partially ordered set)
  notation: (S, \preceq)
  rosen_ref: Rosen §9.6
  definition_vi: Một \emph{tập hợp có thứ tự} (poset) là một tập hợp $$S$$ cùng với một quan hệ thứ tự
    bộ phận $$\preceq$$ trên $$S$$, tức là quan hệ có tính phản xạ, phản đối xứng và bắc cầu. Tập hợp
    có thứ tự này được ký hiệu là $$(S, \preceq)$$.
  example_vi: Tập hợp các số nguyên dương $$S = \{1, 2, 3, \dots\}$$ cùng với quan hệ chia hết $$\preceq$$,
    trong đó $$a \preceq b$$ khi và chỉ khi $$a$$ chia hết $$b$$, là một tập hợp có thứ tự $$(S, \preceq)$$.
