  - antisymmetric-relation
  - transitive-relation
  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "quan hệ thứ tự" is attested in the newest available source bib-nguyenhuudien-2019
    (2019, tr. 118 PDF), where a binary relation that is reflexive (phản xạ), antisymmetric (phản đối
    xứng), and transitive (bắc cầu) is called a "quan hệ thứ tự (hay vắn tắt, là một thứ tự)" — exactly
    Rosen''s partial order. That source reserves "quan hệ thứ tự toàn phần" (tr. 118 PDF) for total order,
    so the bare "quan hệ thứ tự" denotes the partial (general) order relation. Per the panel correctness
    finding, definition_vi now states the explicit partial qualifier "quan hệ thứ tự bộ phận (partial
    order)", parenthetically noting the recommended short form "quan hệ thứ tự", so the partial-order
    meaning is unambiguous and consistent with the poset entry. The three defining properties are rendered
    with the book-standard terms phản xạ / phản đối xứng / bắc cầu, matching the bib-nguyenhuudien-2019
    snippet on tr. 118 PDF.


    Cross-reference (per panel terminology HIGH finding): the chapter-O entry id=order-relation (also
    Rosen §9.6) recommends the IDENTICAL term "quan hệ thứ tự" with the IDENTICAL citation (bib-nguyenhuudien-2019
    p118). This duplication is intentional and disclosed: the 2019 corpus collapses Rosen''s generic "order
    relation" and the §9.6 "partial ordering" under the single Vietnamese term "quan hệ thứ tự". The explicit-partial
    form "thứ tự bộ phận" (the literal "partial order") is attested only in the older bib-ngodactan-2004
    (2004, tr. 163 PDF) and is recorded as the variant. see_also is made reciprocal with order-relation,
    and "partially-ordered-set" was repointed to the actual in-chapter id "poset".


    The candidate "quan hệ thứ tự bộ phận" as a verbatim phrase returned 0 hits across all sources (normal
    and --loose); it is used in definition_vi only as the explicit-partial composition of the attested
    "quan hệ thứ tự" + "bộ phận", not claimed as an attested surface form. No partial-order term appears
    in the graph-theory sources bib-leanhvinh-2020 or bib-hoangchithanh-2007 (OCR, both normal and --loose
    searched), nor in bib-nguyenhoangthach-2020 or bib-nguyenducnghia-2006: those sources use "thứ tự"
    only in sorting/ordering contexts. Other plausible variants ("thứ tự riêng phần", "thứ tự từng phần")
    returned 0 hits.'
