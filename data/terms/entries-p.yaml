- id: preimage
  letter: P
  headword_en: Preimage
  notation: f^{-1}(S)
  rosen_ref: Rosen §2.3
  definition_vi: 'Nghịch ảnh của một tập con $$S \subseteq B$$ qua ánh xạ $$f : A \to B$$, ký hiệu $$f^{-1}(S)$$,
    là tập tất cả các phần tử của $$A$$ có ảnh nằm trong $$S$$, tức là $$f^{-1}(S) = \{ a \in A : f(a)
    \in S \}$$. Khi $$S = \{b\}$$ chỉ gồm một phần tử, ta viết $$f^{-1}(b)$$ để chỉ nghịch ảnh của phần
    tử $$b$$.'
  example_vi: 'Với ánh xạ $$f : \mathbb{Z} \to \mathbb{Z}$$ cho bởi $$f(x) = x^2$$, ta có $$f^{-1}(\{4\})
    = \{-2, 2\}$$ và $$f^{-1}(\{3\}) = \emptyset$$.'
