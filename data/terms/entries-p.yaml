  status: panel-approved
  notes: 'Concept: a poset is a set $$S$$ together with a partial order $$\preceq$$ (reflexive, antisymmetric,
    transitive), written $$(S, \preceq)$$ (Rosen §9.6).


    Recommended term "tập hợp có thứ tự" is taken from the newest attested order-theory source, bib-nguyenhuudien-2019
    (2019), which gives the formal Định nghĩa 4.13 "Cho $$(X, \le)$$ là một tập hợp có thứ tự" with the
    partial-order axioms (phản xạ, phản đối xứng, bắc cầu) and develops Hasse diagrams and lattices from
    it (pdf pages 119-125). In this source the "bộ phận"/"partial" qualifier is left implicit (a "thứ
    tự" satisfying the three axioms), so "tập hợp có thứ tự" is the surface form actually attested in
    2019.


    Variant "tập được sắp bộ phận" is the explicit "partially ordered set" form from bib-ngodactan-2004
    (2004, pdf pages 163-165), where "thứ tự bộ phận" (partial order) is defined and the poset is denoted
    $$\langle X, \preceq \rangle$$ with Hasse-diagram development. The qualifier "thứ tự bộ phận" appears
    ONLY in bib-ngodactan-2004 across the whole corpus.


    Consistency with the partial-order entry (per panel finding): definition_vi uses "quan hệ thứ tự bộ
    phận $$\preceq$$", matching the explicit-partial wording adopted in the partial-order entry''s definition_vi
    so the two P-chapter entries describe the same underlying relation consistently; the recommended Vietnamese
    term in partial-order remains the attested "quan hệ thứ tự". First-concept emphasis was normalized
    from Markdown "*...*" to \emph{tập hợp có thứ tự}.


    Candidate terms "tập sắp thứ tự bộ phận" and the full literal "tập hợp có thứ tự bộ phận" returned
    0 hits in every source (normal and --loose) and are therefore not recorded as verified terms.


    The OCR graph sources bib-leanhvinh-2020 (2020) and bib-hoangchithanh-2007 (2007), and the combinatorics
    source bib-nguyenhoangthach-2020 (2020), do not cover posets; their only "sắp thứ tự"/"tập được sắp"
    hits refer to ordered pairs/directed edges or to exercises "sắp xếp" (arranged) by difficulty, not
    to the partial-order concept. Both OCR sources were searched with --loose as well, with no poset attestation.'
