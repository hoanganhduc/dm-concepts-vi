- id: phrase-structure-grammar
  letter: P
  headword_en: Phrase-Structure Grammar
  notation: G = (V, T, S, P)
  rosen_ref: Rosen §11.4
  definition_vi: Một văn phạm cấu trúc câu mô tả một ngôn ngữ thông qua một bộ từ vựng, các ký hiệu kết
    thúc, một ký hiệu xuất phát và các quy tắc sản xuất. Cụ thể, một văn phạm cấu trúc câu $$G = (V, T,
    S, P)$$ gồm một từ vựng $$V$$, một tập con $$T \subseteq V$$ các ký hiệu kết thúc, một ký hiệu xuất
    phát $$S \in V$$ và một tập hợp $$P$$ các quy tắc sản xuất.
  example_vi: Văn phạm $$G = (V, T, S, P)$$ với từ vựng $$V = \{S, A, a, b\}$$, các ký hiệu kết thúc $$T
    = \{a, b\}$$, ký hiệu xuất phát $$S$$ và các quy tắc sản xuất $$P = \{S \to aA,\ A \to b\}$$ sinh
    ra ngôn ngữ $$L(G) = \{ab\}$$.
