    Đây là khái niệm đối ngẫu với khai triển tổng các tích. Các tài liệu Việt khác trong kho chỉ bàn dạng
    chuẩn tắc hội cho công thức mệnh đề, không dùng đúng cụm thuật ngữ này cho hàm Boole.
- id: product
  letter: P
  headword_en: Product
  notation: A \times B
  rosen_ref: Rosen §2.1
  definition_vi: Tích (tích Đề các) của hai tập hợp $$A$$ và $$B$$, ký hiệu $$A \times B$$, là tập hợp
    tất cả các cặp có thứ tự $$(a, b)$$ với $$a \in A$$ và $$b \in B$$. Tổng quát, tích Đề các của $$n$$
    tập hợp $$A_1, A_2, \ldots, A_n$$ là tập hợp các bộ có thứ tự $$(a_1, a_2, \ldots, a_n)$$ với $$a_i
    \in A_i$$ với mọi $$i$$.
  example_vi: Với $$A = \{1, 2\}$$ và $$B = \{x, y\}$$, ta có $$A \times B = \{(1, x), (1, y), (2, x),
    (2, y)\}$$. Nói chung $$A \times B \neq B \times A$$.
