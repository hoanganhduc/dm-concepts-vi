- id: primitive-root
  letter: P
  headword_en: Primitive Root
  notation: ''
  rosen_ref: Rosen §3.7
  definition_vi: Một căn nguyên thủy modulo một số nguyên tố $$p$$ là một số nguyên $$r$$ mà các lũy thừa
    của nó sinh ra tất cả các thặng dư khác $$0$$ modulo $$p$$.
  example_vi: Số $$3$$ là một căn nguyên thủy modulo $$7$$, vì các lũy thừa $$3^1 = 3$$, $$3^2 = 2$$,
    $$3^3 = 6$$, $$3^4 = 4$$, $$3^5 = 5$$, $$3^6 = 1$$ (mọi phép tính lấy modulo $$7$$) sinh ra tất cả
    các thặng dư khác $$0$$ là $$1, 2, 3, 4, 5, 6$$ modulo $$7$$.
