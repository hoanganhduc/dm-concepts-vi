  rosen_ref: Rosen §2.1
  definition_vi: 'Tập số thực dương, ký hiệu $$\mathbb{R}^{+}$$, là tập hợp tất cả các số thực lớn hơn
    $$0$$, tức là $$\mathbb{R}^{+} = \{ x \in \mathbb{R} : x > 0 \}$$. Một số thực $$x$$ được gọi là số
    thực dương nếu $$x > 0$$.'
