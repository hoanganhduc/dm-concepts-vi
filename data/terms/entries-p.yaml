  notation: ''
  rosen_ref: Rosen §4.4
  definition_vi: Một số giả nguyên tố cơ sở $$b$$ là một hợp số $$n$$ vượt qua được một phép kiểm tra
    tính nguyên tố ứng với cơ sở $$b$$ cho trước, tức là $$n$$ thỏa mãn điều kiện mà mọi số nguyên tố
    đều thỏa mãn (chẳng hạn $$b^{n-1} \equiv 1 \pmod{n}$$ theo định lý nhỏ Fermat) nhưng bản thân $$n$$
    lại không phải là số nguyên tố.
