- id: postorder-traversal
  letter: P
  headword_en: Postorder Traversal
  notation: ''
  rosen_ref: Rosen §10.3
  definition_vi: 'Duyệt theo hậu thứ tự là phép duyệt một cây có gốc, có thứ tự $$T$$ với gốc $$r$$ được
    định nghĩa đệ quy như sau: nếu $$T$$ chỉ gồm $$r$$ thì danh sách duyệt là $$r$$; trái lại, nếu $$r$$
    có các cây con $$T_1, T_2, \ldots, T_n$$ (theo thứ tự từ trái sang phải), thì lần lượt duyệt $$T_1,
    T_2, \ldots, T_n$$ theo hậu thứ tự, rồi cuối cùng mới viếng thăm gốc $$r$$.'
  example_vi: Khi áp dụng cho cây biểu thức của một biểu thức số học, phép duyệt theo hậu thứ tự cho ra
