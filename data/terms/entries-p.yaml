  headword_en: Planar graph
  notation: ''
  rosen_ref: Rosen §10.7
  definition_vi: Đồ thị $$G$$ được gọi là đồ thị phẳng nếu nó có thể được vẽ trên mặt phẳng sao cho không
    có hai cạnh nào của nó cắt nhau, nghĩa là các cạnh chỉ gặp nhau tại đầu mút chung của chúng. Một cách
    vẽ như vậy được gọi là một biểu diễn phẳng của $$G$$.
  example_vi: Đồ thị $$K_4$$ là đồ thị phẳng, vì nó có thể được vẽ trên mặt phẳng với một đỉnh nằm bên
    trong tam giác tạo bởi ba đỉnh còn lại sao cho không có hai cạnh nào cắt nhau.
