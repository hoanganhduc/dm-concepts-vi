  example_vi: Đồ thị $$K_4$$ là đồ thị phẳng, vì nó có thể được vẽ trên mặt phẳng với một đỉnh nằm bên
    trong tam giác tạo bởi ba đỉnh còn lại sao cho không có hai cạnh nào cắt nhau.
