- id: proof
  letter: P
  headword_en: Proof
  notation: ''
  rosen_ref: Rosen §1.6
  definition_vi: Chứng minh của một mệnh đề toán học là một lập luận đúng đắn, gồm một dãy hữu hạn các
    khẳng định, mỗi khẳng định là tiên đề, giả thiết, hoặc được suy ra từ các khẳng định trước đó bằng
    các quy tắc suy diễn, nhằm thiết lập rằng mệnh đề đó là đúng. Một định lý đã được chứng minh là đúng
    được gọi là một định lý, và lập luận thiết lập tính đúng đắn của nó được gọi là chứng minh.
  example_vi: 'Để chứng minh mệnh đề "nếu $$n$$ là số nguyên lẻ thì $$n^2$$ là số nguyên lẻ", ta dùng
    chứng minh trực tiếp: giả sử $$n = 2k+1$$ với $$k$$ nguyên, khi đó $$n^2 = 4k^2 + 4k + 1 = 2(2k^2+2k)+1$$
    là số nguyên lẻ.'
