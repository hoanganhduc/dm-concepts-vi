    in bib-ngodactan-2004 (2004) p. 164, 165, 179, where $$P(X)$$ is defined as the set of all subsets
    of $$X$$, with Example 5.5 (p. 165) using $$X=\{1,2,3\}$$. The modern "tập lũy thừa" returns 0 hits,
    so the recommended entry is marked verified=false (kept as the single standard recommended term so
    vi_terms is non-empty, per the citation-hygiene exception) and the attested 2004 spelling "tập luỹ
    thừa" is recorded separately with full citation. No 2019-2020 source in the corpus attests the power
    set concept under any spelling; the newer sources (nguyenhuudien-2019, nguyenhoangthach-2020, leanhvinh-2020)
    discuss subsets and the count $$2^n$$ but use no fixed "power set" term. Descriptive paraphrases such
    as "tập tất cả các tập con của X" / "tập các tập con của X" appear (e.g. bib-ngodactan-2004 p. 89,
