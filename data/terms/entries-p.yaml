  notes: Phân phối xác suất là hàm $$p$$ gán xác suất cho từng kết cục của không gian mẫu $$S$$, với điều
    kiện $$0 \leq p(s) \leq 1$$ và $$\sum_{s \in S} p(s) = 1$$. Trường hợp $$p(s) = 1/|S|$$ với mọi $$s$$
    cho ta phân phối đều (uniform distribution). Cần phân biệt "phân phối xác suất" (hàm xác suất trên
    không gian mẫu $$S$$) với "phân phối của biến ngẫu nhiên" (tập các cặp $$(r, p(X = r))$$ ứng với các
    giá trị của một biến ngẫu nhiên $$X$$). Trong kho ngữ liệu hiện có chưa thấy cụm "phân phối xác suất"
    được dùng trực tiếp, nên thuật ngữ khuyến nghị là bản dịch chuẩn.
- id: probability-of-an-event
  letter: P
  headword_en: Probability Of An Event
  notation: p(E)
  rosen_ref: Rosen §7.2
  definition_vi: Xác suất của một biến cố là tổng các xác suất của các kết cục nằm trong biến cố đó. Nói
    cách khác, nếu biến cố $$E$$ là một tập con của không gian mẫu thì $$p(E) = \sum_{s \in E} p(s)$$,
    trong đó $$p(s)$$ là xác suất của kết cục $$s$$.
  example_vi: Khi tung một con súc sắc cân đối, mỗi trong sáu kết cục có xác suất $$\frac{1}{6}$$; biến
    cố "số chấm là số chẵn" gồm các kết cục $$2$$, $$4$$, $$6$$, nên xác suất của nó là $$\frac{1}{6}
    + \frac{1}{6} + \frac{1}{6} = \frac{1}{2}$$.
