- id: proposition
  letter: P
  headword_en: Proposition
  notation: p, q, r, \ldots (truth values T, F)
  rosen_ref: Rosen §1.1
  definition_vi: Một \emph{mệnh đề} là một câu khẳng định nhận đúng một trong hai giá trị đúng hoặc sai,
    không thể đồng thời vừa đúng vừa sai. Giá trị đúng hoặc sai của một mệnh đề được gọi là \emph{chân
    trị} của nó, thường ký hiệu $$T$$ (true) cho đúng và $$F$$ (false) cho sai.
  example_vi: Câu "$$1 + 1 = 2$$" là một mệnh đề có chân trị $$T$$, còn câu "$$2$$ là số lẻ" là một mệnh
    đề có chân trị $$F$$. Ngược lại, câu "$$x + 1 = 2$$" không phải là mệnh đề vì chân trị của nó phụ
    thuộc vào giá trị của $$x$$.
