    của các đại hạng, trong đó mỗi đại hạng là một tổng (phép tuyển) chứa đúng một lần mỗi biến hoặc phủ
    định của nó. Đại hạng tương ứng với một bộ giá trị nhận giá trị $$0$$ tại đúng bộ đó và bằng $$1$$
    tại mọi bộ còn lại, nên tích các đại hạng ứng với những bộ làm hàm bằng $$0$$ cho lại chính hàm đã
    cho.
