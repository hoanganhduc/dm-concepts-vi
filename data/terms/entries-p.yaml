  see_ref: ''
  notes: Căn nguyên thủy modulo số nguyên tố $$p$$ là số nguyên $$r$$ sao cho các lũy thừa $$r^1, r^2,
    \ldots, r^{p-1}$$ chạy qua tất cả $$p-1$$ thặng dư khác $$0$$ modulo $$p$$; nói cách khác, $$r$$ có
    bậc bằng $$p-1$$ modulo $$p$$. Mỗi số nguyên tố đều có căn nguyên thủy. Thuật ngữ "căn nguyên thủy"
