  notes: 'Concept: a poset is a set $$S$$ together with a partial order $$\preceq$$ (reflexive, antisymmetric,
    transitive), written $$(S, \preceq)$$ (Rosen §9.6).


    Recommended term "tập hợp có thứ tự" is taken from the newest attested order-theory source, bib-nguyenhuudien-2019
    (2019), which gives the formal Định nghĩa 4.13 "Cho $$(X, \le)$$ là một tập hợp có thứ tự" with the
    partial-order axioms (phản xạ, phản đối xứng, bắc cầu) and develops Hasse diagrams and lattices from
    it (pdf pages 119-125). In this source the "bộ phận"/"partial" qualifier is left implicit (a "thứ
    tự" satisfying the three axioms), so "tập hợp có thứ tự" is the surface form actually attested in
    2019.


