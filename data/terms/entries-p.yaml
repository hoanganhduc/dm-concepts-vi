  - karnaugh-map
  - boolean-expression
  status: draft
  see_ref: ''
  notes: Khái niệm nguyên nhân nguyên tố là cốt lõi của việc tối thiểu hóa biểu thức Boole (bản đồ Karnaugh,
    phương pháp Quine–McCluskey). Một "nguyên nhân" (implicant) là một hội sơ cấp kéo theo hàm; nó là
    "nguyên tố" nếu không thể bỏ literal nào mà vẫn còn là nguyên nhân, tức không bị nguyên nhân nào khác
    kéo theo. Nguyễn Đức Nghĩa (2006, tr. 274) dùng "nguyên nhân" cho implicant và "nguyên nhân nguyên
    tố" cho prime implicant; tuyển của tất cả các nguyên nhân nguyên tố cho dạng tuyển chuẩn tắc thu gọn
    của hàm.
