    $$x, y, \ldots$$ lấy giá trị trên các miền xác định $$A, B, \ldots$$ nào đó" — an exact match for
    the Rosen concept (a statement that becomes a proposition once each variable is assigned a value from
    its domain). The same source uses "vị từ" consistently as the chapter title "Lôgic vị từ" (predicate
    logic) and throughout §2.1. The candidate variant "hàm mệnh đề" (propositional function) was NOT attested
    in any corpus source: 0 hits in both normal and --loose mode across all six books, so it is not retained
    as a vi_term (dropped per citation hygiene) but recorded here as a known variant. The two OCR sources
    (bib-leanhvinh-2020, bib-hoangchithanh-2007) returned 0 hits for "vị từ" in both normal and --loose
    mode (these are graph-theory/algorithm texts that do not cover predicate logic). The "vị từ" hits
    in bib-nguyenducnghia-2006 (pdf_page 97) are false positives from the substring "hoán vị từ ... phần
    tử" (permutations of elements), not the predicate concept, so 2006 is not cited. No 2020 source attests
    this concept; the newest valid attestation is the 2019 source.'
