- id: partial-fraction-decomposition
  letter: P
  headword_en: Partial Fraction Decomposition
  notation: ''
  rosen_ref: Rosen §8.4
  definition_vi: Phân tích thành phân số riêng là cách biểu diễn một phân thức hữu tỉ thành tổng của các
    phân thức đơn giản hơn có mẫu số là lũy thừa của các đa thức bất khả quy. Trong tổ hợp, kỹ thuật này
    được dùng để khai triển hàm sinh $$\dfrac{p(x)}{q(x)}$$ thành tổng các phân thức dạng $$\dfrac{A}{(1
    - \alpha x)^k}$$ nhằm tìm hệ số của chuỗi lũy thừa.
  example_vi: Để tìm hệ số trong khai triển của $$\dfrac{1}{(1 - x)(1 - 2x)}$$, ta phân tích thành phân
    số riêng $$\dfrac{1}{(1 - x)(1 - 2x)} = \dfrac{-1}{1 - x} + \dfrac{2}{1 - 2x}$$, từ đó hệ số của $$x^n$$
    bằng $$2^{n+1} - 1$$.
