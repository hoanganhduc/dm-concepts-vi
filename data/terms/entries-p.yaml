- id: preorder-traversal
  letter: P
  headword_en: Preorder Traversal
  notation: ''
  rosen_ref: Rosen §10.3
  definition_vi: 'Duyệt tiền thứ tự (ký hiệu duyệt theo thứ tự trước) là cách duyệt một cây có gốc $$T$$,
    được định nghĩa đệ quy: trước hết liệt kê gốc $$r$$, sau đó lần lượt duyệt tiền thứ tự các cây con
    $$T_1, T_2, \ldots, T_k$$ của $$r$$ theo thứ tự từ trái sang phải. Nếu $$T$$ chỉ gồm một đỉnh $$r$$
    thì cách duyệt tiền thứ tự của $$T$$ chỉ là $$r$$.'
  example_vi: Với cây có gốc $$a$$ và các cây con lần lượt có gốc $$b, c, d$$ (trong đó cây con gốc $$b$$
    có thêm các đỉnh $$e, f, g$$), duyệt tiền thứ tự cho danh sách bắt đầu bằng gốc $$a$$, tiếp đến là
    duyệt tiền thứ tự cây con gốc $$b$$, rồi cây con gốc $$c$$, rồi cây con gốc $$d$$.
