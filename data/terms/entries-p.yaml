  see_also:
  - combination
  - r-combination
  - product-rule
  status: panel-approved
  notes: 'Rosen §6.3 covers two related notions under one heading: a permutation of $$n$$ distinct objects
    (an ordered arrangement of all of them) and an $$r$$-permutation (an ordered arrangement of $$r$$
    of them, counted by $$P(n,r)$$). The Vietnamese tradition splits these into two distinct terms: "chỉnh
    hợp" denotes the $$r$$-permutation (arrangement of $$r$$ of $$n$$ elements) and matches Rosen''s notation
    $$P(n,r)$$ directly, while "hoán vị" denotes the full permutation of all $$n$$ elements (the case
    $$r=n$$). Because the headword notation is $$P(n,r)$$ (the $$r$$-permutation), the recommended term
    is "chỉnh hợp", attested in the newest source bib-nguyenhoangthach-2020 (tr. 20 PDF), which writes
    "Một chỉnh hợp chập k, hay còn gọi là một k-hoán vị" and gives the notation $$P(n,k)$$. The variant
    "k-hoán vị" (calque of $$k$$-permutation) appears as an explicit synonym there. The full formal names
    "chỉnh hợp không lặp" and "hoán vị không lặp" (no-repetition variants) are recorded from bib-nguyenducnghia-2006
    and bib-ngodactan-2004, which note these are usually shortened to "chỉnh hợp" and "hoán vị" respectively.
    The term "hoán vị" is retained because the $$r=n$$ permutation is central to the same Rosen concept;
    it is the recommended Vietnamese term for the full-permutation sense even though the headword notation
    $$P(n,r)$$ targets the $$r$$-permutation "chỉnh hợp". Sources bib-nguyenhuudien-2019, bib-leanhvinh-2020,
    and bib-hoangchithanh-2007 do not attest these counting terms ("hoán vị" appears in bib-leanhvinh-2020
    only in the graph-coloring sense of "permuting colours", not the counting concept). Note (snippet-vs-notation):
    the recommended source uses the index $$k$$ where this entry uses $$r$$; the snippet is faithful to
    the source and no citation change is needed.'
