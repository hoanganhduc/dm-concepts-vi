  notes: 'Boolean-function minimization concept (Rosen §12.4). Attested ONLY in bib-nguyenducnghia-2006
    (2006, discrete math), in its chapter on logic functions (pp. 280–290); none of the 2019–2020 graph-theory
    sources cover Boolean minimization, so no candidate is attested in a 2019–2020 source. The recommended
    term "thuật toán Quine–McCluskey" is the book''s explicit name for the combined method: "Thuật toán
    Quine cùng với sự cải tiến của McCluskey gọi chung là thuật toán Quine–McCluskey" (p. 283, confirmed
    via find-term ''gọi chung''). The recorded vi_term snippet for this term is the usage on p. 290; the
    strongest (definitional) backing is the naming sentence on p. 283 documented here. Note the source
    prints the name with a hyphen ("Quine-McCluskey"), while the headword uses the publisher en-dash convention
    — page and snippet are faithful to the source. The source consistently uses "thuật toán" (algorithm)
    rather than "phương pháp" (method) for the combined named procedure, so "phương pháp Quine–McCluskey"
    from the candidate list is NOT attested (0 hits, normal and --loose). The source distinguishes "thuật
    toán Quine" (the base combining algorithm, pp. 281–283) from "thủ tục McCluskey" (McCluskey''s tabular
    procedure refinement, pp. 282–283); the two together form the Quine–McCluskey algorithm. "phương pháp
    Quine" appears once (p. 284) as an alternate phrasing of the base algorithm. The Vietnamese terminology
    uses Boolean notions: "hội sơ cấp" (minterm / elementary conjunction; the English equivalent is recorded
    here in notes, not glossed inline in the definition), "phép dán" (the combining/gluing of adjacent
    representations differing in one position), "nguyên nhân nguyên tố" (prime implicant), "dạng tuyển
    chuẩn tắc hoàn toàn" (complete/canonical DNF, the algorithm''s input), "dạng tuyển chuẩn tắc thu gọn"
    (reduced / prime-implicant DNF, = the union of all prime implicants), and "dạng tuyển chuẩn tắc tối
    thiểu" (minimal DNF) as the objects the method computes. The book states the algorithm "cho phép tìm
    dạng tuyển chuẩn tắc thu gọn từ dạng tuyển chuẩn tắc hoàn toàn" (finds the reduced DNF from the complete
    DNF, p. 283). Per Rosen §12.4 the prime-implicant tabulation finds ALL prime implicants and the reduced
    DNF, while selecting a genuinely minimum cover is a separate covering step (NP-hard in general) handled
    via a prime-implicant chart and need not be unique; the definition now states this explicitly. see_also
    empty: the related Boolean concepts (prime implicant, DNF, Boolean function minimization) live in
    the logic-functions chapter, not chapter Q, so they are cross-chapter forward references rather than
    same-chapter links.'
