  notes: 'Khái niệm "Quantifier" chỉ được đặt tên trong nguồn toán rời rạc bib-nguyenhuudien-2019 (§2.1
    "Vị từ và lượng từ"), một nguồn 2019-2020 đạt yêu cầu. Thuật ngữ chuẩn "lượng từ" được chọn làm thuật
    ngữ khuyến nghị. Các nguồn lý thuyết đồ thị và tổ hợp (bib-leanhvinh-2020, bib-nguyenhoangthach-2020,
    bib-hoangchithanh-2007, bib-nguyenducnghia-2006, bib-ngodactan-2004) không đặt tên khái niệm lượng
