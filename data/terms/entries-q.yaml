    dụ $$\forall v \in V$$), không phải như toán tử logic được đặt tên, nên không được tính là chứng thực
    cho khái niệm này. Hai lượng từ cụ thể: lượng từ với mọi (lượng từ phổ dụng) $$\forall$$ và lượng
