- id: queue
  letter: Q
  headword_en: Queue
  notation: Q
  rosen_ref: Rosen §10.4
  definition_vi: Hàng đợi $$Q$$ là cấu trúc dữ liệu dạng danh sách trong đó phần tử được thêm vào ở một
    đầu và được lấy ra ở đầu kia, nên các phần tử được xử lý theo thứ tự vào trước ra trước (first-in
    first-out, FIFO). Trong tìm kiếm theo chiều rộng, hàng đợi $$Q$$ điều khiển thứ tự thăm các đỉnh của
    đồ thị $$G$$.
  example_vi: Khi nạp lần lượt các đỉnh $$a$$, $$b$$, $$c$$ vào hàng đợi $$Q$$ rỗng, thao tác lấy ra đầu
    tiên trả về $$a$$, rồi đến $$b$$, rồi đến $$c$$, đúng theo thứ tự vào trước ra trước.
