- id: quotient
  letter: Q
  headword_en: Quotient
  notation: q = a \;\mathrm{div}\; d
  rosen_ref: Rosen §4.1
  definition_vi: Thương số của phép chia số nguyên $$a$$ cho số nguyên dương $$d$$ là số nguyên $$q$$
    trong biểu diễn duy nhất $$a = dq + r$$ với $$0 \leq r < d$$ cho bởi thuật toán chia, ký hiệu $$q
    = a \;\mathrm{div}\; d$$.
  example_vi: Với $$a = 17$$ và $$d = 5$$, ta có $$17 = 5 \cdot 3 + 2$$ với $$0 \leq 2 < 5$$, nên thương
    số là $$q = 17 \;\mathrm{div}\; 5 = 3$$.
