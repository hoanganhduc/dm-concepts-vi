  notes: 'Khái niệm "thương" (quotient) trong $$q = a \;\mathrm{div}\; d$$: theo thuật toán chia, với
    số nguyên $$a$$ và số nguyên dương $$d$$ tồn tại duy nhất các số nguyên $$q$$ và $$r$$ với $$0 \leq
    r < d$$ sao cho $$a = dq + r$$, khi đó $$q = a \;\mathrm{div}\; d$$.


    Thuật ngữ tiếng Việt được kiểm chứng trong corpus:

    - "thương số": dạng chuẩn, đầy đủ; được chứng thực trong bib-nguyenhuudien-2019 (2019) ở tr. 142 ("$$q$$
    được gọi là thương số") và tr. 65 ("phép toán div (chia lấy thương số)"). Đây là thuật ngữ khuyến
    nghị (recommended), có nguồn 2019.

    - "thương": dạng rút gọn của cùng khái niệm, dùng song song trong cùng mục về thuật toán chia của
    bib-nguyenhuudien-2019, tr. 143 ("chia $$n$$ cho $$b$$ để được thương và số dư"). Đây là biến thể
    hợp lệ; biến thể này được ghi trong vi_terms/notes, không lặp lại như chú thích trong định nghĩa.


    Thuật ngữ KHÔNG được chứng thực:

    - "phần thương": không có nguồn nào chứng thực cho khái niệm này. Lần tìm duy nhất (bib-hoangchithanh-2007,
    tr. 61, chế độ --loose) là nhiễu OCR của cụm "đồ thị hai phần thường", không liên quan đến quotient;
    do đó bị loại.


    Các nguồn lý thuyết đồ thị (bib-leanhvinh-2020, bib-nguyenhoangthach-2020, bib-hoangchithanh-2007,
    bib-nguyenducnghia-2006, bib-ngodactan-2004) không định nghĩa khái niệm thương của phép chia số nguyên;
    mọi lần khớp "thương" trong các nguồn OCR đều là "thường", "thương gia", "thương mại" (false positive).
    Khái niệm này chỉ xuất hiện trong nguồn toán rời rạc bib-nguyenhuudien-2019.'
- id: quotient-set
  letter: Q
  headword_en: Quotient set
  notation: A/R
  rosen_ref: Rosen §9.5
  definition_vi: 'Tập hợp thương của một tập hợp $$A$$ theo một quan hệ tương đương $$R$$ trên $$A$$,
    ký hiệu $$A/R$$, là tập hợp gồm tất cả các lớp tương đương của các phần tử của $$A$$ theo $$R$$, tức
    là $$A/R = \{[a]_R : a \in A\}$$. Các lớp tương đương này tạo thành một phân hoạch của $$A$$.'
  example_vi: Xét tập hợp $$A = \{0, 1, 2, 3, 4, 5\}$$ với quan hệ tương đương $$R$$ xác định bởi $$a
    \mathrel{R} b$$ khi và chỉ khi $$a \equiv b \pmod{3}$$. Khi đó các lớp tương đương là $$[0]_R = \{0,
    3\}$$, $$[1]_R = \{1, 4\}$$ và $$[2]_R = \{2, 5\}$$, nên tập hợp thương là $$A/R = \{\{0, 3\}, \{1,
    4\}, \{2, 5\}\}$$.
  vi_terms:
  - term: tập hợp thương
    source_id: bib-nguyenhuudien-2019
    page: tr. 116 (PDF)
    recommended: true
    verified: true
    pdf_page: 116
    snippet: (là một tập con của P( A)) được gọi là tập hợp thương (của quan hệ tương đương R trên A).
  - term: tập hợp các lớp tương đương
    source_id: bib-nguyenhuudien-2019
    page: tr. 116 (PDF)
    recommended: false
    verified: true
    pdf_page: 116
    snippet: Định nghĩa 4.10 Tập hợp các lớp tương đương của quan hệ tương đương R trên A này
  see_also:
  - equivalence-class
  - equivalence-relation
  - partition-of-a-set
  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "tập hợp thương" is attested in the newest available source bib-nguyenhuudien-2019
    (2019, discrete math), p.116, Định nghĩa 4.10, where it is explicitly named as the quotient set of
    A by the equivalence relation R. The descriptive variant "tập hợp các lớp tương đương" (set of equivalence
    classes) appears in the same definition statement on the same page; it names the concept but functions
    as a descriptive phrase rather than a fixed coined term. Candidates "tập thương" and "tập hợp thương
    của quan hệ tương đương" returned zero hits in both normal and --loose searches across all sources.
    The OCR graph-theory sources (bib-leanhvinh-2020, bib-hoangchithanh-2007) and the other corpora (bib-nguyenhoangthach-2020,
    bib-nguyenducnghia-2006, bib-ngodactan-2004) attest "lớp tương đương" (equivalence class) and equivalence-relation
    partitions but do NOT attest any quotient-set term; loose matches on "thương" were overwhelmingly
    the unrelated word "thường" (usually) or commercial uses ("thương gia", "Thương mại"), none denoting
    A/R. Note the book convention $$A/R$$ for the notation; the equivalence classes form a partition $$\{[a]_R
    : a \in A\}$$ of $$A$$ (distinct classes are disjoint and their union is $$A$$), the standard content
    of "phân hoạch" cross-referenced via partition-of-a-set in see_also.'
- id: quine-mccluskey-method
  letter: Q
  headword_en: Quine–McCluskey method
  notation: ''
  rosen_ref: Rosen §12.4
  definition_vi: Thuật toán Quine–McCluskey là một thủ tục dạng bảng để tối thiểu hóa một hàm đại số lôgic
    $$f$$, nhận đầu vào là dạng tuyển chuẩn tắc hoàn toàn của $$f$$. Thuật toán tiến hành bằng cách lần
    lượt dán các hội sơ cấp chỉ khác nhau ở một biến để tìm tất cả các nguyên nhân nguyên tố của $$f$$,
    rồi từ bảng các nguyên nhân nguyên tố chọn một họ phủ $$f$$ với số nguyên nhân nguyên tố ít nhất,
    có thể không duy nhất. Họ đầy đủ tất cả các nguyên nhân nguyên tố cho dạng tuyển chuẩn tắc thu gọn
    của $$f$$, còn việc chọn họ ít nhất phủ $$f$$ cho dạng tuyển chuẩn tắc tối thiểu.
  example_vi: Với $$f$$ cho ở dạng tuyển chuẩn tắc hoàn toàn, ta xếp các hội sơ cấp thành các nhóm theo
    số biến không phủ định, rồi dán các biểu diễn trong hai nhóm kề nhau chỉ sai khác ở một vị trí; mỗi
    biểu diễn tham gia ít nhất một phép dán được đánh dấu $$*$$, và sau khi không còn dán được nữa, các
    biểu diễn không có dấu $$*$$ cho tất cả các nguyên nhân nguyên tố của $$f$$.
