- id: quadratic-residue
  letter: Q
  headword_en: Quadratic residue
  notation: x^2 \equiv a \pmod{p}
  rosen_ref: Rosen §4.4
  definition_vi: Cho số nguyên tố $$p$$ và số nguyên $$a$$ không chia hết cho $$p$$. Khi đó $$a$$ được
    gọi là một thặng dư bậc hai modulo $$p$$ nếu đồng dư thức $$x^2 \equiv a \pmod{p}$$ có nghiệm, tức
    là nếu $$a$$ đồng dư modulo $$p$$ với bình phương của một số nguyên không chia hết cho $$p$$; ngược
    lại, $$a$$ được gọi là một phi thặng dư bậc hai modulo $$p$$.
  example_vi: Với $$p = 7$$, ta có $$2 \equiv 3^2 \pmod{7}$$ nên $$2$$ là thặng dư bậc hai modulo $$7$$;
    trong khi $$x^2 \equiv 3 \pmod{7}$$ không có nghiệm nên $$3$$ là một phi thặng dư bậc hai modulo $$7$$.
  vi_terms:
  - term: thặng dư bậc hai
    source_id: bib-leanhvinh-2020
    page: tr. 217 (PDF)
    recommended: true
    verified: true
    pdf_page: 217
    snippet: là đặc trưng thang dư bậc hai của F,, có nghĩa là
  - term: số chính phương modulo
    source_id: bib-leanhvinh-2020
    page: tr. 179 (PDF)
    recommended: false
    verified: true
    pdf_page: 179
    snippet: và chỉ khi ax + by = 1. Nếu —1 là số chính phương modulo p thi ta có
  see_also: []
  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "thặng dư bậc hai" is the standard book term for this concept and is taken
    from the 2020 source bib-leanhvinh-2020 (graph theory, OCR). Honesty caveat (per panel terminology
    HIGH): the corpus contains NO clean standalone attestation of "thặng dư bậc hai" applied to an element
    ($$a$$ is a quadratic residue mod $$p$$). A re-mine of bib-leanhvinh-2020, bib-nguyenhuudien-2019,
    and the Rosen Vietnamese corpus found the term only at bib-leanhvinh-2020 PDF p.217, and only as an
    adjectival modifier inside the compound "đặc trưng thang dư bậc hai của F" ($$=$$ "quadratic residue
    character of $$\mathbb{F}_q$$", the Paley-graph / Legendre-character context), in OCR-degraded form:
    the source prints "thang dư bậc hai" (missing the diacritic on "thặng"). The recorded snippet is faithful
    to that OCR surface form; verified=true is retained because the term token is present in the snippet,
    but readers should treat the attestation as adjectival-only and OCR-degraded, not as a naming of the
    standalone residue concept. Variant "số chính phương modulo" (literally "perfect square modulo $$p$$")
    is attested in the same 2020 source at PDF p.179 ("Nếu $$-1$$ là số chính phương modulo $$p$$") and
    matches Rosen''s characterization that $$a$$ is a quadratic residue iff $$a$$ is congruent to the
    square of an integer not divisible by $$p$$; the same book also writes "số chính phương trong $$\mathbb{F}_q$$"
    (square in the field) at PDF pp. 216-217 in the same context. Candidate "thặng dư toàn phương" returned
    0 hits (normal and --loose) in every source and is dropped (verified=false, no page). No quadratic-nonresidue
    term ("phi thặng dư" / "không chính phương modulo") is attested in the corpus; the nonresidue phrasing
    "phi thặng dư bậc hai" used in the definition/example is a descriptive complement of the recommended
    term (the conventional Vietnamese/Rosen rendering, preferred over the non-standard word order "thặng
    dư không bậc hai"), not a separately attested vi_term. The notation $$x^2 \equiv a \pmod{p}$$ is the
    standard congruence from Rosen §4.4. see_also is empty: no other Q-chapter entries on quadratic residues
    / Legendre symbol / Paley graphs are available to link; those concepts are cross-chapter forward references.'
- id: quantifier
  letter: Q
  headword_en: Quantifier
  notation: \forall x\, P(x),\ \exists x\, P(x)
  rosen_ref: Rosen §1.4
  definition_vi: Lượng từ là một toán tử logic tác động lên một vị từ để diễn đạt mức độ đúng của vị từ
    đó trên các phần tử của một miền xác định. Lượng từ với mọi $$\forall x\, P(x)$$ khẳng định rằng $$P(x)$$
    đúng với mọi $$x$$ trong miền xác định, còn lượng từ tồn tại $$\exists x\, P(x)$$ khẳng định rằng
    $$P(x)$$ đúng với ít nhất một $$x$$ trong miền xác định.
  example_vi: Với miền xác định là tập các số nguyên dương và vị từ $$P(x)$$ là "$$x \geq 1$$", mệnh đề
    $$\forall x\, P(x)$$ là đúng vì mọi số nguyên dương đều lớn hơn hoặc bằng $$1$$, trong khi $$\exists
    x\, P(x)$$ cũng đúng vì có ít nhất một số nguyên dương thỏa mãn, chẳng hạn $$x = 1$$.
