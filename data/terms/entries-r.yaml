  status: panel-approved
  notes: 'Cả ba thuật ngữ "quan hệ truy hồi", "hệ thức truy hồi", "công thức truy hồi" đều được dùng cho
    khái niệm này trong các nguồn tiếng Việt. Nguồn mới nhất (Nguyễn Hoàng Thạch 2020) dùng "quan hệ truy
    hồi" làm tiêu đề chương và thuật ngữ định nghĩa, sát với "recurrence relation" của Rosen, nên chọn
    làm thuật ngữ khuyến nghị. Nguyễn Hữu Điển (2019) định nghĩa thuật ngữ là "hệ thức truy hồi (hay công
    thức truy hồi)", coi hai cách gọi này là tương đương. Hai nguồn lý thuyết đồ thị OCR (bib-leanhvinh-2020,
    bib-hoangchithanh-2007) không có thuật ngữ này (đã chạy cả chế độ thường và --loose, đều 0 kết quả)
    vì đây là chủ đề tổ hợp/toán rời rạc, không thuộc lý thuyết đồ thị. see_also: recursive-definition
    cùng chương R (có trong đợt biên soạn này) được liên kết theo quy ước cùng chương; các khái niệm liên
    quan còn lại (linear-recurrence-relation, homogeneous-recurrence-relation, fibonacci-sequence, generating-function)
    thuộc các chương khác (L, H, F, G), là tham chiếu liên chương nên giữ làm tham chiếu chuyển tiếp.'
- id: recursion
  letter: R
  headword_en: Recursion
  notation: a_0;\ a_{n+1} = f(a_0,\ldots,a_n)
  rosen_ref: Rosen §5.3
  definition_vi: Đệ quy là kỹ thuật định nghĩa một đối tượng, hàm hay quá trình thông qua chính nó, bằng
    cách chỉ rõ một hoặc nhiều trường hợp cơ sở và các quy tắc xây dựng những trường hợp sau từ những
    trường hợp đã có trước đó. Chẳng hạn, một định nghĩa đệ quy của dãy $$\{a_n\}$$ ấn định giá trị cơ
    sở $$a_0$$ và một quy tắc xác định $$a_{n+1}$$ từ các số hạng $$a_0, a_1, \ldots, a_n$$ đứng trước.
  example_vi: 'Định nghĩa đệ quy của lũy thừa $$a^n$$ với $$a \neq 0$$ và $$n \geq 0$$: trường hợp cơ
    sở $$a^0 = 1$$, và bước đệ quy $$a^{n+1} = a \cdot a^n$$ với mọi $$n \geq 0$$.'
