    là "phần thứ hai của định nghĩa đệ quy" (tr. 252 PDF) thay vì đặt tên là một bước riêng; thuật ngữ
    "bước đệ quy" không xuất hiện thành cụm cố định trong các nguồn corpus.
- id: region
