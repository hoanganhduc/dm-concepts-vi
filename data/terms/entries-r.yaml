- id: recursion-tree
  letter: R
  headword_en: Recursion Tree
  notation: ''
  rosen_ref: Rosen §8.3
  definition_vi: 'Cây đệ quy là một cây có gốc dùng để mô hình hóa và phân tích một thuật toán đệ quy
    hay một hệ thức truy hồi: gốc biểu diễn bài toán ban đầu, mỗi nút biểu diễn một lời gọi đệ quy con
    với chi phí gắn kèm, và các nút con của một nút ứng với các bài toán con phát sinh từ lời gọi đó.
    Tổng chi phí của tất cả các nút trên cây cho ta chi phí toàn phần của thuật toán; chẳng hạn với hệ
    thức $$T(n) = aT(n/b) + f(n)$$ thì độ cao của cây là $$\log_b n$$.'
  example_vi: Với hệ thức truy hồi của thuật toán chia để trị $$T(n) = 2T(n/2) + n$$, cây đệ quy có $$\log_2
    n$$ mức, mỗi mức có tổng chi phí bằng $$n$$, nên $$T(n)$$ thuộc $$O(n \log n)$$.
  vi_terms:
  - term: Cây đệ quy
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
    pdf_page: 0
