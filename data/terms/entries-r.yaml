    dương $$m$$, sao cho $$a \equiv r \pmod{m}$$. Được chứng thực rõ nhất trong bib-nguyenhuudien-2019
    tr.142 ("r được gọi là số dư") và trong các nguồn 2020/2006 qua cụm "có cùng số dư khi chia cho $$n$$".
    Khái niệm liên quan "đồng dư" chỉ quan hệ đồng dư $$a \equiv b \pmod{m}$$ (congruence), KHÔNG phải
    bản thân số dư $$r$$; nó là một khái niệm kề cận (có mục riêng congruence-modulo-m) nên không ghi
    làm vi_term cho mục này mà chỉ liên kết qua see_also, giống cách mục ramsey-number xử lý "định lý
    Ramsey". "Thặng dư" chỉ xuất hiện trong cụm "thặng dư bậc hai" (quadratic residue) ở bib-leanhvinh-2020
    tr.217 (OCR, --loose) — một khái niệm số học khác, không dùng cho số dư cơ bản này; do đó không ghi
    làm vi_term cho mục này. "Thặng dư modulo" không có chứng thực (0 hits). Hai nguồn OCR (bib-leanhvinh-2020,
    bib-hoangchithanh-2007) không chứng thực khái niệm này: các kết quả "số dư" ở đó đều là dương tính
    giả ("số đường đi", "số dương", "trọng số ... dưới", "chỉ số dưới").'
- id: regular-expression
  letter: R
  headword_en: Regular expression
  notation: (ab)^{*} \cup b
  rosen_ref: Rosen §13.4
  definition_vi: '*Biểu thức chính quy* trên một bảng chữ cái $$I$$ là một xâu được xây dựng đệ quy từ
    các ký hiệu của $$I$$, các ký hiệu $$\emptyset$$ (tập rỗng) và $$\lambda$$ (xâu rỗng), cùng các phép
    ghép, hợp và bao đóng Kleene. Cụ thể, $$\emptyset$$ và $$\lambda$$ là các biểu thức chính quy, ký
    hiệu $$x$$ là một biểu thức chính quy với mọi $$x \in I$$, và nếu $$A$$, $$B$$ là các biểu thức chính
    quy thì $$(AB)$$, $$(A \cup B)$$ và $$A^{*}$$ cũng là các biểu thức chính quy; mỗi biểu thức chính
    quy mô tả một ngôn ngữ chính quy.'
  example_vi: Trên bảng chữ cái $$I = \{a, b\}$$, xâu $$(ab)^{*} \cup b$$ là một biểu thức chính quy,
    trong khi xâu ký hiệu $$\cup a^{*} b$$ không phải là biểu thức chính quy vì không tuân theo quy tắc
    xây dựng đệ quy.
