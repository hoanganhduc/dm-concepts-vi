    chỉ khái niệm "đệ quy" (recursion) được dùng phổ biến (ví dụ Nguyễn Hữu Điển 2019, mục 5.5). Cây đệ
    quy là công cụ trực quan để phân tích hệ thức truy hồi của thuật toán chia để trị.
