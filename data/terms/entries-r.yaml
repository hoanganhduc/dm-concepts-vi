    The recommended term "thu hẹp" is attested as the restriction verb in bib-nguyenhuudien-2019 p. 119,
    where the restriction of an order relation $$R$$ to a subset $$A \subset X$$ is written "quan hệ thứ
    tự $$R$$ thu hẹp trên $$A$$" — the same set-theoretic restriction operation applied to a relation,
    confirming "thu hẹp" as the standard Vietnamese term for this concept in a 2019 discrete-math source.
    The full noun-phrase forms "thu hẹp của hàm $$f$$" and "hàm thu hẹp" are standard idiomatic usage
    built on this attested verb but are not found verbatim, so they are recorded as unverified variants.
    "Hạn chế của hàm" is a calque from the English/French "restriction"; all "hạn chế" hits in the corpus
    mean "limited/restricted" in the ordinary sense, not the restriction operation, so it is unverified
    for this concept. Note: "thu gọn của hàm" hits in bib-nguyenducnghia-2006 refer to the reduced normal
    form of a Boolean function (a distinct concept) and were excluded. Verifier note: the bib-nguyenducnghia-2006
    p. 105 and bib-nguyenhuudien-2019 p. 135 hits for "thu hẹp" mean "narrow down" in the ordinary sense
    and were correctly excluded; OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 returned zero
    hits in both normal and loose modes. see_also: the original ids "domain-of-a-function" and "codomain-of-a-function"
    do not exist in the entry namespace; the canonical existing ids are "domain" (def-domain) and "function"
    (def-function), both confirmed present. No "codomain" or "range" entry exists yet, so they are omitted;
    "function-composition" (def-function-composition) and "inverse-function" (def-inverse-function) are
    linked as related function operations and confirmed present. All four are cross-chapter forward references
    (chapters D, F, I) relative to this R entry.'
