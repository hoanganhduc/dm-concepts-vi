  rosen_ref: Rosen §5.4
  definition_vi: Thủ tục đệ quy là một thủ tục giải bài toán bằng cách tự gọi lại chính nó trên những
    trường hợp đầu vào nhỏ hơn. Một thuật toán được gọi là đệ quy nếu nó giải bài toán bằng cách quy về
    cùng bài toán đó với dữ liệu vào nhỏ hơn, cho tới khi đạt tới trường hợp cơ sở.
  example_vi: 'Thủ tục đệ quy tính $$n!$$ với $$n$$ nguyên dương: nếu $$n = 0$$ thì trả về $$1$$, ngược
