  status: panel-approved
  notes: 'Recommended term "đồ thị đều bậc k" (equivalently "đồ thị đều bậc d") is the primary form in
    the newest source bib-leanhvinh-2020 (tr. 10, PDF), whose definition reads: "ta gọi $$G$$ là đồ thị
    đều bậc d (hay còn được gọi là đồ thị d chính quy)". The variant "đồ thị k chính quy" / "đồ thị d
    chính quy" is also attested there (tr. 214). The bare candidate "đồ thị chính quy" is NOT recommended:
    in bib-leanhvinh-2020 the unqualified form "đồ thị chính quy mạnh" denotes a strongly regular graph
    (a different concept, Định nghĩa 8.14, tr. 214), so the qualifier k/d must be kept. Older sources
    use the spelling "qui": bib-ngodactan-2004 "đồ thị chính qui bậc k" with the explicit short form "k-chính
    qui" on the same line (tr. 191) and bib-nguyenducnghia-2006 "chính qui bậc X" (tr. 164). Note: "đồ
    thị đều" appearing alone in bib-hoangchithanh-2007 (tr. 13, 37, 47, 49), bib-nguyenducnghia-2006 (tr.
    154, 162, ...), and bib-ngodactan-2004 (tr. 211) is the adverb "đều" meaning "all/every" (e.g. "Mọi
    đồ thị đều có lõi"), NOT the regular-graph term, so those hits are excluded. Example sourced from
    bib-leanhvinh-2020 (tr. 10, PDF): "Đồ thị K_n là đồ thị đều bậc n − 1." The see_also ids degree-of-a-vertex,
    complete-graph, and bipartite-graph are cross-chapter forward references (chapters D, C, B); no other
    same-chapter R entries are related to this concept.'
- id: relation
  letter: R
  headword_en: Relation
  notation: R \subseteq A \times B
  rosen_ref: Rosen §9.1
  definition_vi: Một *quan hệ hai ngôi* từ tập $$A$$ đến tập $$B$$ là một tập con của tích Đề-các $$A
    \times B$$, tức là một tập các cặp có thứ tự $$(a, b)$$ với $$a \in A$$ và $$b \in B$$; ký hiệu $$R
    \subseteq A \times B$$. Khi $$A = B$$, ta gọi $$R$$ là một quan hệ hai ngôi trên $$A$$.
  example_vi: 'Trên tập $$A = \{1, 2, 3\}$$, quan hệ $$R = \{(a, b) : a < b\}$$ là tập con $$\{(1, 2),
    (1, 3), (2, 3)\}$$ của $$A \times A$$.'
