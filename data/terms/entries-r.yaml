    they are now linked (and recursive-definition reciprocally links back to recursive-algorithm). Cross-chapter
    relatives (algorithm [A], euclidean-algorithm [E], linear-recurrence-relation [L]) are forward references
    documented here and not linked.'
- id: reachability
  letter: R
  headword_en: Reachability
  notation: u \rightsquigarrow v
  rosen_ref: Rosen §10.4
  definition_vi: Trong một đồ thị hoặc đồ thị có hướng $$G$$, một đỉnh $$v$$ được gọi là *đến được từ*
    một đỉnh $$u$$ nếu tồn tại một đường đi (đường đi có hướng nếu $$G$$ là đồ thị có hướng) từ $$u$$
    đến $$v$$, ký hiệu $$u \rightsquigarrow v$$. Theo quy ước, mỗi đỉnh luôn đến được từ chính nó qua
    đường đi tầm thường độ dài $$0$$; do đó tính đến được là một tiền thứ tự trên tập đỉnh, có tính phản
    xạ và bắc cầu.
  example_vi: Trong đồ thị có hướng với tập đỉnh $$\{a, b, c\}$$ và tập cung $$\{(a, b), (b, c)\}$$, đỉnh
    $$c$$ đến được từ đỉnh $$a$$ vì tồn tại đường đi có hướng $$a \rightarrow b \rightarrow c$$; ngược
    lại, $$a$$ không đến được từ $$c$$ vì không có đường đi có hướng nào từ $$c$$ về $$a$$.
