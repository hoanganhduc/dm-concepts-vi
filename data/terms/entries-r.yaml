- id: recursive-algorithm
  letter: R
  headword_en: Recursive algorithm
  notation: ''
  rosen_ref: Rosen §5.4
  definition_vi: Một thuật toán được gọi là *thuật toán đệ quy* nếu nó giải một bài toán bằng cách rút
    gọn liên tiếp bài toán ban đầu về một hoặc nhiều bài toán cùng dạng nhưng có dữ liệu đầu vào nhỏ hơn,
    cho tới khi đạt tới *trường hợp cơ sở* được giải trực tiếp. Chẳng hạn, để tính $$\gcd(a,b)$$ với $$b
    > 0$$, ta rút gọn về $$\gcd(b, a \bmod b)$$, lặp lại cho tới khi đối số thứ hai bằng $$0$$, khi đó
    $$\gcd(a, 0) = a$$.
  example_vi: 'Thủ tục đệ quy tính giai thừa $$n!$$ với $$n$$ là số nguyên dương: nếu $$n = 0$$ thì trả
    về $$1$$ (trường hợp cơ sở), ngược lại trả về $$n \cdot (n-1)!$$, rút gọn dần về các giá trị nhỏ hơn
    cho tới khi gặp $$n = 0$$.'
