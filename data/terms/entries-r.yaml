    ("trường hợp cơ sở được giải trực tiếp") is the ground-truth concept''s base case; the source phrases
    this as reducing to a directly solvable case (p. 147). The gcd illustration follows Ví dụ 5.13 (p.
    147): the source pseudocode computes UCLN(a mod b, b) with base case "if b = 0 then UCLN(a,b) := a";
    the definition_vi states the standard textbook Euclidean recursion gcd(b, a mod b) which terminates
    when the SECOND argument (the remainder) reaches 0, where gcd(a,0)=a, and drops the unnecessary ''a
    > b'' precondition (the identity gcd(a,b)=gcd(b, a mod b) holds for all a,b with b>0). The factorial
    example follows Ví dụ 5.16 (p. 148). The two other supplied candidates were NOT attested in any corpus
    source: "giải thuật đệ quy" returned 0 hits (normal and --loose), and "thuật toán đệ quy chia đôi"
