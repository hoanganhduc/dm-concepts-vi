- id: recursive-function
  letter: R
  headword_en: Recursive Function
  notation: f(n)
  rosen_ref: Rosen §5.3
  definition_vi: 'Hàm định nghĩa bằng đệ quy là hàm có miền xác định là tập các số nguyên không âm, được
    xác định qua hai bước: cho trước giá trị của hàm tại $$0$$ (bước cơ sở) và cho quy tắc tính giá trị
    $$f(n)$$ theo các giá trị của hàm tại các số nguyên nhỏ hơn (bước đệ quy). Khi đó giá trị $$f(n)$$
    với mọi $$n \geq 0$$ được xác định một cách duy nhất.'
