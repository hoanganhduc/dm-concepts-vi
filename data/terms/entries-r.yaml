  notation: ''
  rosen_ref: Rosen §10.7
  definition_vi: Miền của một đồ thị phẳng liên thông $$G$$ là một phần liên thông của mặt phẳng được
    tạo ra khi một biểu diễn phẳng của $$G$$ chia mặt phẳng thành các phần rời nhau, mỗi phần được giới
    hạn bởi các cạnh trên biên của nó. Trong đó luôn có đúng một miền không bị chặn, gọi là miền vô hạn;
    nếu $$G$$ có $$v$$ đỉnh, $$e$$ cạnh và $$r$$ miền thì công thức Euler cho $$$$v - e + r = 2$$$$.
  example_vi: 'Biểu diễn phẳng của đồ thị đầy đủ $$K_4$$ chia mặt phẳng thành $$4$$ miền: $$3$$ miền hữu
    hạn và $$1$$ miền vô hạn, phù hợp với công thức Euler $$4 - 6 + 4 = 2$$.'
