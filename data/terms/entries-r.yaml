  headword_en: Ramsey number
  notation: R(s,t)
  rosen_ref: Rosen §6.2
  definition_vi: Số Ramsey của hai số nguyên dương $$s$$ và $$t$$, ký hiệu $$R(s,t)$$, là số nguyên dương
