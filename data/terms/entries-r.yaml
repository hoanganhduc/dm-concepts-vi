- id: remainder
  letter: R
  headword_en: Remainder
  notation: a \bmod m
  rosen_ref: Rosen §4.1
  definition_vi: 'Số dư là số nguyên $$r$$ thu được khi thực hiện thuật toán chia một số nguyên $$a$$
    cho một số nguyên dương $$m$$: theo thuật toán chia, tồn tại duy nhất cặp số nguyên $$q$$ (thương)
    và $$r$$ thỏa $$a = mq + r$$ với $$0 \leq r < m$$, trong đó $$r$$ được gọi là số dư. Số dư này được
    ký hiệu là $$a \bmod m$$.'
  example_vi: Khi chia $$101$$ cho $$11$$ ta được thương $$q = 9$$ và số dư $$r = 2$$, vì $$101 = 11 \cdot
    9 + 2$$ với $$0 \leq 2 < 11$$; do đó $$101 \bmod 11 = 2$$.
