- id: recursive-step
  letter: R
  headword_en: Recursive Step
  notation: ''
  rosen_ref: Rosen §5.3
  definition_vi: Bước đệ quy là phần thứ hai của một định nghĩa đệ quy (hay định nghĩa quy nạp), trong
    đó ta đưa ra quy tắc xác định các phần tử, số hạng, hoặc giá trị mới từ những phần tử đã được xác
    định trước đó. Cùng với bước cơ sở, bước đệ quy xác định trọn vẹn một dãy số, một hàm số, hay một
    tập hợp; chẳng hạn với hàm $$f$$ trên tập số nguyên không âm, bước đệ quy cho công thức tính $$f(n+1)$$
    theo $$f(n)$$.
  example_vi: Trong định nghĩa đệ quy của hàm giai thừa, bước cơ sở đặt $$f(0) = 1$$, còn bước đệ quy
    đặt $$f(n+1) = (n+1) \cdot f(n)$$ với mọi $$n \geq 0$$.
  vi_terms:
  - term: Bước đệ quy
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
    pdf_page: 0
    snippet: ''
