- id: recurrence-relation
  letter: R
  headword_en: Recurrence relation
  notation: a_n = c_1 a_{n-1} + \cdots + c_k a_{n-k}
  rosen_ref: Rosen §8.1
  definition_vi: Một *quan hệ truy hồi* đối với dãy số $$\{a_n\}$$ là một phương trình biểu diễn mỗi số
    hạng $$a_n$$, với mọi $$n$$ lớn hơn hoặc bằng một chỉ số cố định nào đó, qua một hay nhiều số hạng
    đi trước $$a_0, a_1, \ldots, a_{n-1}$$ của dãy.
  example_vi: Phương trình $$a_n = 2a_{n-1}$$ với mọi $$n \geq 1$$ là một quan hệ truy hồi đối với dãy
    số $$\{a_n\}$$, biểu diễn số hạng $$a_n$$ qua số hạng liền trước $$a_{n-1}$$.
  vi_terms:
