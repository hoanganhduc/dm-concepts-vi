  status: panel-approved
  notes: 'Thuật ngữ chuẩn được khuyến nghị là "đệ quy", có trong nguồn 2019 (bib-nguyenhuudien-2019, tr.
    97): "dễ dàng định nghĩa đối tượng này qua chính nó. Kỹ thuật này được gọi là đệ quy" — đúng khái
    niệm Rosen. Cùng nguồn còn mô tả định nghĩa đệ quy của một dãy số bằng cách "định rõ giá trị của một
    hay nhiều hơn các số hạng đầu tiên và quy tắc xác định các số hạng tiếp theo từ các số hạng đi trước",
    khớp với mô tả Rosen §5.3; ví dụ lũy thừa $$a^{n+1} = a \cdot a^n$$ lấy từ Ví dụ 5.12 cùng nguồn (tr.
    147). Biến thể chính tả "đệ qui" (viết "i" thay vì "y") xuất hiện trong các nguồn cũ hơn bib-ngodactan-2004
    (định nghĩa đệ qui một tập, tr. 247) và bib-nguyenducnghia-2006 (thủ tục đệ qui, tr. 99); đây cùng
    một khái niệm, chỉ khác cách viết. Lưu ý: trong bib-nguyenducnghia-2006 thuật ngữ còn xuất hiện trong
    cụm "công thức (đệ) qui/quy" (tr. 21, tr. 31) nhưng cụm đó chỉ khái niệm công thức truy hồi (recurrence
    relation), được tách riêng; các trích dẫn ở đây dùng ngữ cảnh đệ quy thuần (thủ tục/lời gọi đệ quy).
    Hai ứng viên "phép đệ quy" và "sự đệ quy" không có trong bất kỳ nguồn nào (0 hit) nên bị loại. Hai
    nguồn 2020 (bib-leanhvinh-2020, bib-nguyenhoangthach-2020) không nhắc tới khái niệm này, kể cả khi
    chạy --loose cho nguồn OCR. Khái niệm liên quan "công thức truy hồi"/"công thức đệ quy" (recurrence
    relation) là một khái niệm khác, được tách riêng.'
- id: reflexive-relation
  letter: R
  headword_en: Reflexive relation
  notation: \forall a \in A,\ (a,a) \in R
  rosen_ref: Rosen §9.1
  definition_vi: Một quan hệ hai ngôi $$R$$ trên tập $$A$$ có *tính phản xạ* nếu $$(a,a) \in R$$ với mọi
    $$a \in A$$. Nói cách khác, mỗi phần tử của $$A$$ đều có quan hệ với chính nó, tức là $$a\,R\,a$$
    với mọi $$a \in A$$.
  example_vi: Trên tập $$A = \{1, 2, 3\}$$, quan hệ $$R = \{(1,1), (2,2), (3,3), (1,2)\}$$ có tính phản
    xạ vì chứa $$(1,1)$$, $$(2,2)$$ và $$(3,3)$$. Quan hệ $$S = \{(1,1), (2,2), (1,3)\}$$ không có tính
    phản xạ vì $$(3,3) \notin S$$.
