- id: ring
  letter: R
  headword_en: Ring
  notation: (R, +, \cdot)
  rosen_ref: Rosen §4.6
  definition_vi: Vành là một tập hợp $$R$$ được trang bị hai phép toán hai ngôi, phép cộng $$+$$ và phép
    nhân $$\cdot$$, ký hiệu $$(R, +, \cdot)$$, sao cho $$R$$ là một nhóm abel đối với phép cộng, phép
    nhân có tính kết hợp, và phép nhân phân phối đối với phép cộng. Nghĩa là, với mọi $$a, b, c \in R$$
    ta có $$a \cdot (b + c) = a \cdot b + a \cdot c$$ và $$(a + b) \cdot c = a \cdot c + b \cdot c$$.
    Nguồn tiếng Việt duy nhất chứng thực khái niệm này (bib-ngodactan-2004) trình bày trường hợp vành
    giao hoán có đơn vị, đúng với ví dụ $$\mathbb{Z}$$ bên dưới.
  example_vi: Tập hợp các số nguyên $$\mathbb{Z}$$ cùng với phép cộng và phép nhân thông thường tạo thành
