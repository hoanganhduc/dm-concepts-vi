  status: panel-approved
  notes: 'Đây là khái niệm về tính phản xạ của một quan hệ hai ngôi $$R$$ trên tập $$A$$: $$R$$ phản xạ
    nếu $$(a,a) \in R$$ với mọi $$a \in A$$.


    Thuật ngữ khuyến nghị "tính phản xạ" được chứng thực ở nguồn 2019 (bib-nguyenhuudien-2019, tr. 109
    PDF) ngay tại định nghĩa: "Ta nói quan hệ R có tính phản xạ (reflexive) nếu và chỉ nếu xRx với mọi
    x ∈ X.", có kèm chú thích tiếng Anh "(reflexive)".


    Biến thể "tính chất phản xạ" được chứng thực ở nguồn mới nhất 2020 (bib-leanhvinh-2020, tr. 12 PDF)
    trong ngữ cảnh quan hệ tương đương (đẳng cấu), cũng như ở bib-nguyenhuudien-2019 và bib-nguyenducnghia-2006.


    Dạng rút gọn "phản xạ" (chỉ tính chất của quan hệ) được chứng thực ở bib-ngodactan-2004 (tr. 163 PDF,
    định nghĩa quan hệ thứ tự: "(i) phàn xạ nếu với mọi X..." — bản OCR sai dấu) và bib-nguyenducnghia-2006
    (tr. 14 PDF: "* phản xạ (mọi phần tử có quan hệ với chính nó)").


    Lưu ý loại trừ: trong bib-ngodactan-2004, phần lớn lần xuất hiện của "phản xạ" (tr. 140–160) là "phép
    phản xạ" theo nghĩa hình học (phép đối xứng/biến hình trong nhóm nhị diện), KHÔNG phải tính phản xạ
    của quan hệ, nên không tính vào khái niệm này.


    Ứng viên "quan hệ phản xạ" (cụm danh từ) không xuất hiện ở bất kỳ nguồn nào (0 hits cả thường lẫn
    --loose); các nguồn diễn đạt khái niệm này như một tính chất ("tính phản xạ" / "tính chất phản xạ")
    chứ không gọi tên trực tiếp "quan hệ phản xạ".'
- id: regular-graph
  letter: R
  headword_en: Regular graph
  notation: \deg_G(v) = k\ \forall v \in V(G)
  rosen_ref: Rosen §10.2
  definition_vi: Một đơn đồ thị $$G$$ được gọi là *đồ thị đều bậc $$k$$* nếu mọi đỉnh của nó đều có cùng
    bậc $$k$$, tức là $$\deg_G(v) = k$$ với mọi $$v \in V(G)$$. Số $$k$$ này được gọi là bậc của đồ thị
    đều.
  example_vi: Đồ thị đầy đủ $$K_n$$ là đồ thị đều bậc $$n-1$$, vì mỗi đỉnh kề với tất cả $$n-1$$ đỉnh
    còn lại, do đó $$\deg_{K_n}(v) = n-1$$ với mọi $$v \in V(K_n)$$.
  vi_terms:
