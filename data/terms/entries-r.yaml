- id: resolution
  letter: R
  headword_en: Resolution
  notation: ((p \lor q) \land (\neg p \lor r)) \rightarrow (q \lor r)
  rosen_ref: Rosen §1.6
  definition_vi: Hợp giải là một quy tắc suy diễn trong logic mệnh đề, dựa trên hằng đúng $$((p \lor q)
    \land (\neg p \lor r)) \rightarrow (q \lor r)$$. Quy tắc này cho phép từ hai tuyển $$p \lor q$$ và
    $$\neg p \lor r$$ suy ra tuyển $$q \lor r$$, trong đó $$q \lor r$$ được gọi là hợp giải thức của hai
    tuyển ban đầu.
  example_vi: 'Từ hai mệnh đề $$p \lor q$$ và $$\neg p \lor r$$, áp dụng hợp giải ta suy ra $$q \lor r$$.
    Khi $$r$$ là mệnh đề rỗng, quy tắc trở thành tam đoạn luận rời: từ $$p \lor q$$ và $$\neg p$$ suy
    ra $$q$$.'
  vi_terms:
  - term: Hợp giải
    source_id: bib-mat3500
    page: giáo trình MAT3500
    recommended: true
    verified: true
    pdf_page: 0
    snippet: ''
  see_also: []
  status: panel-approved
  notes: Thuật ngữ chuẩn của giáo trình MAT3500 là "hợp giải". Trong các tài liệu tiếng Việt khác, khái
    niệm này còn được gọi là "phân giải". Không có nguồn nào trong kho ngữ liệu chứng thực thuật ngữ này
    cho đúng khái niệm quy tắc hợp giải trong logic mệnh đề; các lần xuất hiện của "phân giải" trong bản
    dịch Rosen lại thuộc về khái niệm khác (phân giải hệ thức truy hồi).
