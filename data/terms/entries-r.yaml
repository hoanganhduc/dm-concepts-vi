    sources in traversal contexts and is recorded as a variant grounded in bib-leanhvinh-2020 (tr. 75).
    Variant "tới được" (reach/reachable) appears in bib-nguyenhuudien-2019 (tr. 217) and bib-hoangchithanh-2007
    (tr. 110): "đi tới được đỉnh phát x0" = reach the source vertex. Candidate "đạt tới" was searched
    but its hits denote reaching a row/value/flow/output (đạt tới hàng, đạt tới luồng, đạt tới lối ra)
    rather than vertex-to-vertex reachability, so it is excluded; likewise "đạt được" (attain/achieve
    a value) does not denote this concept and is excluded. OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007
    were mined in both normal and --loose modes (identical hits). For digraphs, "đến được từ" corresponds
    to reachability via a directed path ($$u \rightsquigarrow v$$). The squiggle arrow $$\rightsquigarrow$$
    is an editorial notation, not a source-derived symbol (the sources phrase reachability prosaically);
    definition_vi makes the reflexive boundary case (a vertex reaches itself via the trivial path) explicit,
    per Rosen''s convention.'
- id: restriction-of-a-function
  letter: R
  headword_en: Restriction of a function
  notation: 'f|_S : S \to B'
  rosen_ref: Rosen §2.3
  definition_vi: 'Thu hẹp của một hàm $$f$$ từ $$A$$ đến $$B$$ trên một tập con $$S \subseteq A$$, ký
    hiệu $$f|_S$$, là hàm $$f|_S : S \to B$$ xác định bởi $$f|_S(x) = f(x)$$ với mọi $$x \in S$$.'
  example_vi: 'Cho hàm $$f : \mathbb{Z} \to \mathbb{Z}$$ với $$f(x) = x^2$$ và tập con $$S = \{0, 1, 2\}$$.
    Khi đó thu hẹp $$f|_S : S \to \mathbb{Z}$$ thỏa mãn $$f|_S(0) = 0$$, $$f|_S(1) = 1$$ và $$f|_S(2)
    = 4$$.'
