- id: recursive-set
  letter: R
  headword_en: Recursive Set
  notation: ''
  rosen_ref: Rosen §5.3
  definition_vi: 'Tập hợp định nghĩa bằng đệ quy là tập hợp $$S$$ được xác định qua hai bước: bước cơ
    sở chỉ rõ một số phần tử ban đầu thuộc $$S$$, và bước đệ quy cho quy tắc tạo ra phần tử mới của $$S$$
    từ các phần tử đã có. Tập $$S$$ gồm đúng những phần tử sinh được sau hữu hạn lần áp dụng hai bước
    trên, ngầm hiểu kèm theo điều kiện loại trừ rằng không còn phần tử nào khác.'
  example_vi: 'Tập con $$S$$ của tập số nguyên định nghĩa bằng đệ quy: bước cơ sở $$3 \in S$$; bước đệ
    quy nếu $$x \in S$$ và $$y \in S$$ thì $$x+y \in S$$. Khi đó $$S$$ chính là tập các số nguyên dương
    chia hết cho $$3$$.'
