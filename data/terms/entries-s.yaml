- id: strongly-connected-component
  letter: S
  headword_en: strongly connected component
  notation: ''
  rosen_ref: Rosen §10.4
  definition_vi: Thành phần liên thông mạnh của một đồ thị có hướng $$G = (V, E)$$ là một đồ thị con liên
    thông mạnh cực đại của $$G$$, tức là một đồ thị con liên thông mạnh mà không nằm trong bất kỳ đồ thị
    con liên thông mạnh nào lớn hơn của $$G$$. Đồ thị con $$H$$ được gọi là liên thông mạnh nếu với mọi
    cặp đỉnh $$u, v$$ của $$H$$ luôn tồn tại đường đi có hướng từ $$u$$ tới $$v$$ và từ $$v$$ tới $$u$$.
  example_vi: Mỗi đỉnh của $$G$$ thuộc đúng một thành phần liên thông mạnh; hai đỉnh $$u$$ và $$v$$ cùng
    một thành phần khi và chỉ khi có đường đi có hướng từ $$u$$ tới $$v$$ và từ $$v$$ tới $$u$$.
