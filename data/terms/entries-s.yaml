    2020/2019 text sources are cited first. "dãy số nguyên" (integer sequence) and "dãy số nguyên dương"
    (positive integer sequence) appear as domain-restricted instances, not separate terms. Lưu ý thuật
    ngữ-tiêu đề: tiêu đề tiếng Anh là "Sequence" với miền giá trị là một tập $$S$$ tổng quát (Rosen §2.4),
    trong khi thuật ngữ tiếng Việt được chứng thực là "dãy số" (theo nghĩa hẹp dãy các số); định nghĩa
    giữ nguyên dạng tổng quát "vào một tập $$S$$" còn "dãy số" là thuật ngữ chuẩn được kho ngữ liệu chứng
    thực.'
- id: series
  letter: S
  headword_en: Series
  notation: \sum_{j=m}^{n} a_j
  rosen_ref: Rosen §2.4
  definition_vi: Tổng của một dãy là kết quả của việc cộng các số hạng của dãy đó. Với dãy $$a_m, a_{m+1},
    \ldots, a_n$$, tổng các số hạng từ chỉ số $$m$$ đến chỉ số $$n$$ được ký hiệu bằng ký hiệu sigma là
    $$\sum_{j=m}^{n} a_j = a_m + a_{m+1} + \cdots + a_n$$, trong đó $$j$$ là chỉ số chạy, $$m$$ là cận
    dưới và $$n$$ là cận trên.
  example_vi: Tổng của bốn số hạng đầu của dãy $$a_j = j^2$$ với $$j$$ chạy từ $$1$$ đến $$4$$ là $$\sum_{j=1}^{4}
    j^2 = 1 + 4 + 9 + 16 = 30$$.
  vi_terms:
  - term: tổng
    source_id: bib-nguyenhuudien-2019
    page: tr. 65 (PDF)
    recommended: true
    verified: true
    pdf_page: 65
    snippet: Ví dụ 2.26. Tính tổng của n số tự nhiên lẻ đầu tiên T (n) = 1 + 3 + 5 + · · · + (2n − 1).
  - term: chuỗi
    source_id: bib-ngodactan-2004
    page: tr. 59 (PDF)
    recommended: false
    verified: true
    pdf_page: 59
    snippet: pháp này là chuỗi luỹ thừa hình thức. Bằng các phép toán được định
  see_also:
  - sequence
  - summation
  - geometric-series
  - arithmetic-progression
  status: panel-approved
  notes: 'Khái niệm "chuỗi" theo nghĩa Rosen §2.4 (tổng các số hạng của một dãy, viết bằng ký hiệu sigma
    $$\sum_{j=m}^{n} a_j$$) không được định nghĩa thành một mục riêng trong các nguồn rời rạc/đồ thị tiếng
    Việt được khảo sát; không nguồn nào trong kho ngữ liệu định nghĩa "series" như một thuật ngữ-tiêu
    đề độc lập. Từ chuẩn cho phép lấy tổng các số hạng của một dãy là "tổng", được chứng thực trong nguồn
    mới nhất bib-nguyenhuudien-2019 (tr. 65 PDF): Ví dụ 2.26 "Tính tổng của n số tự nhiên lẻ đầu tiên
    $$T(n) = 1 + 3 + 5 + \cdots + (2n-1)$$" và Ví dụ 2.27 "Tính tổng" — đúng nghĩa tổng các số hạng của
    một dãy. Vì vậy chọn "tổng" làm thuật ngữ khuyến nghị (có chứng thực 2019-2020): ở đây "tổng" chỉ
    phép lấy tổng theo Rosen §2.4, là một biểu diễn thực dụng cho nghĩa tổng-hữu-hạn chứ không phải bản
    dịch trực tiếp của "series". Biến thể "chuỗi" là thuật ngữ giải tích chuẩn cho series tổng quát; trong
    các nguồn này nó chỉ xuất hiện ở nghĩa lân cận "chuỗi luỹ thừa (hình thức)" (power series) tại bib-ngodactan-2004
    (tr. 59-61 PDF), còn ở các nguồn khác "chuỗi" mang nghĩa khác (chuỗi bit, chuỗi ký tự, chuỗi mã) nên
    không chứng thực trực tiếp nghĩa series tổng quát; do đó "series" (chuỗi) và "sum" (tổng) KHÔNG đồng
    nghĩa hoán đổi ngoài ngữ cảnh tổng-hữu-hạn này. Khái niệm liên quan "khả tổng" (summable) và $$\sum
    a_k$$ xuất hiện tại bib-ngodactan-2004 (tr. 66-70 PDF). Biến thể "tổng vô hạn" (infinite series) không
    có chứng thực trong bất kỳ nguồn nào (0 hits), nên không ghi nhận thành dòng vi_term; chỉ lưu lại
    ở đây.'
- id: surjection
  letter: S
  headword_en: Surjection
  notation: 'f: A \twoheadrightarrow B'
  rosen_ref: Rosen §2.3
  definition_vi: 'Một hàm $$f$$ từ tập $$A$$ đến tập $$B$$ được gọi là một *toàn ánh* nếu với mỗi phần
    tử $$b \in B$$ đều tồn tại một phần tử $$a \in A$$ sao cho $$f(a) = b$$. Khi đó ta ký hiệu $$f: A
    \twoheadrightarrow B$$.'
  example_vi: 'Xét hàm $$f: \mathbb{Z} \to \mathbb{Z}$$ cho bởi $$f(n) = n + 1$$. Với mỗi $$b \in \mathbb{Z}$$,
    chọn $$a = b - 1 \in \mathbb{Z}$$ thì $$f(a) = b$$, nên $$f$$ là một toàn ánh.'
