- id: symmetric-difference
  letter: S
  headword_en: symmetric difference
  notation: A \oplus B
  rosen_ref: Rosen §2.2
  definition_vi: Hiệu đối xứng của hai tập hợp $$A$$ và $$B$$, ký hiệu $$A \oplus B$$, là tập hợp gồm
    các phần tử thuộc đúng một trong hai tập $$A$$ và $$B$$, tức là $$A \oplus B = (A \cup B) \setminus
    (A \cap B)$$.
  example_vi: Với $$A = \{1, 3, 5\}$$ và $$B = \{1, 2, 3\}$$ ta có $$A \oplus B = \{2, 5\}$$.
