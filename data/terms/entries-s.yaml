  notation: ''
  rosen_ref: Rosen §6.5
  definition_vi: Hệ phương trình tuyến tính là một tập hợp gồm hữu hạn phương trình tuyến tính trên cùng
    một bộ ẩn $$x_1, x_2, \ldots, x_n$$, trong đó mỗi phương trình có dạng $$a_1 x_1 + a_2 x_2 + \cdots
    + a_n x_n = b$$ với các hệ số $$a_i$$ và vế phải $$b$$ cho trước. Một nghiệm của hệ là bộ giá trị
    của $$x_1, \ldots, x_n$$ thỏa mãn đồng thời mọi phương trình của hệ.
  example_vi: Hệ $$\{\, 2x_1 + x_2 = 5,\ x_1 - x_2 = 1 \,\}$$ có nghiệm duy nhất $$x_1 = 2$$, $$x_2 =
    1$$.
