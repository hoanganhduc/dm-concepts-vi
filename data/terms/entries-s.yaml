- id: set-difference
  letter: S
  headword_en: set difference
  notation: A - B
  rosen_ref: Rosen §2.2
  definition_vi: 'Hiệu của hai tập hợp $$A$$ và $$B$$, ký hiệu $$A - B$$ (hoặc $$A \setminus B$$), là
    tập hợp gồm các phần tử thuộc $$A$$ nhưng không thuộc $$B$$; nghĩa là $$A - B = \{x : x \in A \wedge
    x \notin B\}$$.'
  example_vi: Với $$A = \{1, 2, 3, 5\}$$ và $$B = \{2, 4, 5\}$$ thì $$A - B = \{1, 3\}$$ và $$B - A =
    \{4\}$$. Nói chung $$A - B \neq B - A$$.
