  rosen_ref: Rosen §10.4
  definition_vi: Một đường đi trong đồ thị $$G$$ được gọi là đường đi đơn nếu nó không chứa cùng một cạnh
    quá một lần. Như vậy, một đường đi $$v_0, v_1, \ldots, v_n$$ là đơn khi mọi cạnh xuất hiện trên nó
    đều phân biệt.
  example_vi: Trong đồ thị có các cạnh $$ab$$, $$bc$$, $$cd$$, đường đi $$a, b, c, d$$ là đường đi đơn
    vì ba cạnh $$ab$$, $$bc$$, $$cd$$ đều khác nhau; còn đường đi $$a, b, c, b$$ không phải là đường đi
    đơn vì cạnh $$bc$$ được dùng hai lần.
  vi_terms:
  - term: đường đi đơn
    source_id: bib-nguyenhoangthach-2020
    page: tr. 73 (PDF)
    recommended: true
    verified: true
    pdf_page: 73
    snippet: Một đường đi đơn (tương tự, chu trình đơn) là một đường đi (chu trình) không đi qua cạnh
      nào quá một lần.
  - term: đường đi đơn
    source_id: bib-nguyenhuudien-2019
    page: tr. 168 (PDF)
    recommended: false
    verified: true
    pdf_page: 168
    snippet: Đường đi hoặc chu trình gọi là đơn nếu nó không chứa cùng một cạnh (hoặc cung) quá [một lần].
  - term: đường đi đơn
    source_id: bib-nguyenducnghia-2006
    page: tr. 156 (PDF)
    recommended: false
    verified: true
    pdf_page: 156
    snippet: Đường đi a, b, e, d, a, b có độ dài là 5 không phải là đường đi đơn, do cạnh (a, b) có mặt
      trong nó hai lần.
  see_also:
  - path
  - simple-circuit
  - euler-path
  status: panel-approved
  notes: 'Rosen định nghĩa một đường đi là đơn (simple) nếu nó không chứa cùng một cạnh quá một lần. Thuật
    ngữ chuẩn tiếng Việt cho khái niệm này là "đường đi đơn", được định nghĩa minh thị trong nguồn 2020
    mới nhất (bib-nguyenhoangthach-2020, tr. 73: "Một đường đi đơn ... là một đường đi (chu trình) không
    đi qua cạnh nào quá một lần") và trong bib-nguyenhuudien-2019 (tr. 168: "Đường đi hoặc chu trình gọi
    là đơn nếu nó không chứa cùng một cạnh (hoặc cung) quá [một lần]"). bib-nguyenducnghia-2006 (tr. 156)
    khẳng định cùng điều kiện qua phản ví dụ: đường đi $$a, b, e, d, a, b$$ "không phải là đường đi đơn,
    do cạnh $$(a,b)$$ có mặt trong nó hai lần".


    CẢNH BÁO trùng tên khác nghĩa: thuật ngữ "đường đi đơn" cũng xuất hiện trong bib-hoangchithanh-2007
    (tr. 7: "Đường đi đơn là đường đi mà các đỉnh trên nó khác nhau từng đôi") nhưng ở đó nó chỉ khái
    niệm KHÔNG LẶP ĐỈNH (tương ứng "path"/"đường đi sơ cấp" của Rosen), KHÔNG phải khái niệm này; do đó
    không trích dẫn nguồn hoangchithanh-2007 cho mục này.


    Biến thể ứng viên "đường đi sơ cấp" KHÔNG khớp khái niệm này: trong bib-nguyenhuudien-2019 (tr. 168)
    nó chỉ đường đi không lặp ĐỈNH và được phân biệt rõ với đường đi đơn ("là đường đi đơn (không sơ cấp)").
    Vì "đường đi sơ cấp" không chứng thực cho khái niệm no-repeated-edge và không có trang chứng thực
    hợp lệ, dòng vi_term tương ứng (verified=false, page rỗng) bị loại theo quy tắc vệ sinh trích dẫn;
    phân tích phân biệt được giữ lại tại đây.


    bib-leanhvinh-2020 không có kết quả cho riêng thuật ngữ "đường đi đơn" / khái niệm no-repeated-edge
    này (đã chạy cả thường lẫn --loose); nguồn này có dùng các thuật ngữ về đường đi nói chung nhưng không
    phủ thuật ngữ "đường đi đơn" theo nghĩa của mục này.'
