- id: strong-mathematical-induction
  letter: S
  headword_en: strong mathematical induction
  notation: ''
  rosen_ref: Rosen §5.2
  definition_vi: Quy nạp toán học mạnh là một dạng của nguyên lý quy nạp dùng để chứng minh rằng vị từ
    $$P(n)$$ đúng với mọi số nguyên $$n \geq n_0$$. Trong bước quy nạp, từ giả thiết $$P(n_0) \wedge P(n_0
    + 1) \wedge \ldots \wedge P(k)$$ đúng (thay vì chỉ giả sử $$P(k)$$ như ở dạng yếu), ta chứng minh
    $$P(k+1)$$ đúng.
  example_vi: 'Để chứng minh mọi số nguyên $$n \geq 2$$ đều viết được thành tích các số nguyên tố, ta
    dùng quy nạp toán học mạnh: giả sử mọi số nguyên từ $$2$$ đến $$k$$ đều có phân tích như vậy, rồi
    suy ra điều đó cho $$k+1$$ bằng cách tách $$k+1$$ thành tích hai thừa số nhỏ hơn nếu $$k+1$$ là hợp
    số.'
