    p.33 titles its section "1.4. Đường đi ngắn nhất"), and consistently across 2019 (nguyenhuudien),
    2007 (hoangchithanh), and 2006 (nguyenducnghia). OCR sources (leanhvinh-2020, hoangchithanh-2007)
    were re-run with --loose; loose passes confirmed the same spelling with no additional distinct variant.
    Variant "đường ngắn nhất" (path without "đi") also occurs: in bib-nguyenhoangthach-2020 (p.91, used
