- id: set
  letter: S
  headword_en: set
  notation: \{a_1, a_2, \ldots, a_n\}
  rosen_ref: Rosen §2.1
  definition_vi: Tập hợp là một bộ sưu tập không có thứ tự gồm các đối tượng phân biệt, mỗi đối tượng
    được gọi là một phần tử của tập hợp đó. Một tập hợp hữu hạn thường được ký hiệu bằng cách liệt kê
    các phần tử trong cặp dấu ngoặc nhọn, ký hiệu $$\{a_1, a_2, \ldots, a_n\}$$.
  example_vi: Tập hợp $$\{2, 3, 5, 7\}$$ gồm bốn phần tử phân biệt là các số nguyên tố nhỏ hơn $$10$$.
    Vì tập hợp không có thứ tự nên $$\{2, 3, 5, 7\} = \{7, 5, 3, 2\}$$, và vì các phần tử là phân biệt
    nên việc lặp lại một phần tử không tạo ra tập hợp mới.
