- id: stable-matching
  letter: S
  headword_en: stable matching
  notation: ''
  rosen_ref: Rosen §10.2
  definition_vi: Ghép cặp ổn định là một phép ghép cặp (matching) hoàn hảo giữa hai tập đối tượng, trong
    đó mỗi đối tượng có một danh sách thứ tự ưu tiên các đối tượng của tập kia, sao cho không tồn tại
    một cặp $$(x, y)$$ chưa được ghép với nhau mà cả $$x$$ lẫn $$y$$ đều thích đối tác hiện tại của mình
    kém hơn so với khi ghép với nhau. Một cặp như vậy, nếu tồn tại, được gọi là cặp gây mất ổn định; phép
    ghép cặp được gọi là ổn định khi không có cặp gây mất ổn định nào.
  example_vi: 'Xét hai nhóm, mỗi nhóm gồm $$n$$ người, cùng với danh sách ưu tiên của từng người. Thuật
    toán Gale–Shapley luôn tìm được một phép ghép cặp ổn định: trong mỗi vòng, mỗi người chưa được ghép
    sẽ ngỏ lời với người đứng đầu danh sách ưu tiên còn lại của mình, và mỗi người nhận lời giữ lại đối
    tác mà mình thích nhất trong số những người đã ngỏ lời.'
