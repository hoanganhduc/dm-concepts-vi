  notes: Trong Rosen §4.3, quy nạp theo cấu trúc gắn liền với các tập hợp được định nghĩa đệ quy và có
    thể chứng minh tương đương với quy nạp toán học mạnh. Thuật ngữ "quy nạp theo cấu trúc" không xuất
    hiện trong các nguồn tiếng Việt được khảo sát; các nguồn này chỉ trình bày định nghĩa đệ quy và đệ
    quy mà không nêu riêng phương pháp chứng minh này.
- id: subdivision
  letter: S
  headword_en: subdivision
  notation: ''
  rosen_ref: Rosen §10.7
  definition_vi: Phép phân chia (sơ cấp) một cạnh của đồ thị là phép toán xoá một cạnh $$uv$$ của đồ thị
    $$G$$, thêm một đỉnh mới $$w$$, rồi thêm hai cạnh $$uw$$ và $$wv$$. Đồ thị nhận được từ $$G$$ bằng
    một dãy các phép phân chia như vậy được gọi là một phân chia của $$G$$, và hai đồ thị cùng nhận được
    từ một đồ thị nào đó nhờ các phép phân chia thì được gọi là đồng phôi với nhau.
  example_vi: Phân chia cạnh $$uv$$ của một tam giác $$K_3$$ (chèn một đỉnh $$w$$ vào giữa $$u$$ và $$v$$)
    cho ta chu trình $$C_4$$. Vì $$K_3$$ và $$C_4$$ cùng nhận được từ $$K_3$$ bằng các phép phân chia
    nên chúng đồng phôi với nhau.
