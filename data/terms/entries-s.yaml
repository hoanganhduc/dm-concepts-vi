- id: self-complementary
  letter: S
  headword_en: self-complementary
  notation: G \cong \overline{G}
  rosen_ref: Rosen §10.2
  definition_vi: Đồ thị tự bù là đồ thị đơn $$G$$ đẳng cấu với phần bù $$\overline{G}$$ của nó, ký hiệu
    $$G \cong \overline{G}$$. Nếu $$G$$ là đồ thị tự bù với $$n$$ đỉnh thì $$G$$ có đúng $$\binom{n}{2}/2$$
    cạnh, và do đó $$n \equiv 0$$ hoặc $$n \equiv 1 \pmod 4$$.
  example_vi: Đồ thị đường đi $$P_4$$ và chu trình $$C_5$$ là các đồ thị tự bù.
