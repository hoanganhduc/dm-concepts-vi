- id: space-complexity
  letter: S
  headword_en: space complexity
  notation: ''
  rosen_ref: Rosen §3.3
  definition_vi: Độ phức tạp theo không gian của một thuật toán là số đo lượng bộ nhớ (không gian lưu
    trữ) mà thuật toán cần dùng để giải một bài toán, thường được biểu diễn theo kích thước $$n$$ của
    dữ liệu vào. Phép phân tích này cho biết bộ nhớ đòi hỏi tăng nhanh như thế nào khi $$n$$ tăng và gắn
    liền với các cấu trúc dữ liệu được dùng để cài đặt thuật toán.
  example_vi: Một thuật toán chỉ dùng một số hữu hạn biến phụ ngoài mảng dữ liệu vào kích thước $$n$$
    có độ phức tạp theo không gian $$O(1)$$ (không kể chỗ chứa dữ liệu vào), trong khi một thuật toán
    tạo thêm một bản sao của mảng có độ phức tạp theo không gian $$O(n)$$.
