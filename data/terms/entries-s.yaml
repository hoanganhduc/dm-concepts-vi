- id: stable-matching-algorithm
  letter: S
  headword_en: stable matching algorithm
  notation: ''
  rosen_ref: Rosen §3.1
  definition_vi: Thuật toán ghép cặp ổn định là thuật toán tìm một phép ghép cặp ổn định giữa hai tập
    có cùng số phần tử, trong đó mỗi phần tử của tập này có một thứ tự ưa thích trên các phần tử của tập
    kia. Một phép ghép $$M$$ được gọi là ổn định nếu không tồn tại cặp $$(a, b)$$ chưa được ghép với nhau
    mà cả $$a$$ lẫn $$b$$ đều thích đối tác mới này hơn đối tác hiện tại của mình; thuật toán Gale–Shapley
    (kiểu "hoãn chấp nhận") luôn cho ra một phép ghép ổn định.
  example_vi: Xét hai tập gồm $$n$$ ứng viên và $$n$$ vị trí, mỗi bên xếp hạng ưa thích trên bên kia.
    Thuật toán Gale–Shapley cho mỗi ứng viên lần lượt "cầu hôn" vị trí mà mình thích nhất trong số chưa
    bị từ chối, còn mỗi vị trí giữ lại đề nghị tốt nhất hiện có và từ chối những đề nghị kém hơn; quá
    trình kết thúc với một phép ghép ổn định.
