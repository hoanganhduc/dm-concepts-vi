    tr. 77 viết "bài toán trên là không giải được", đúng theo nghĩa tính giải được trong lý thuyết tính
    toán, được ghi thành dòng verified=true, recommended=false. bib-rosen-2003-vi tr. 147 (bản dịch tham
    chiếu của chính Rosen) dùng cụm "không thể giải được" cho các bài toán trước đây xem là chưa giải
    được, là chứng thực bổ trợ verified=true, recommended=false; theo chính sách nguồn dẫn đầu, bib-rosen-2003-vi
    có role=reference nên không bao giờ làm thuật ngữ khuyến nghị. OCR của các nguồn này làm sai một số
    dấu; snippet giữ nguyên văn từ kho ngữ liệu.'
