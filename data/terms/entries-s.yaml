- id: structural-induction
  letter: S
  headword_en: structural induction
  notation: ''
  rosen_ref: Rosen §4.3
  definition_vi: 'Quy nạp theo cấu trúc là một phương pháp chứng minh dùng để chứng minh một tính chất
    $$P$$ đúng với mọi phần tử của một tập hợp được định nghĩa đệ quy. Phương pháp này gồm hai bước: bước
    cơ sở chứng minh $$P$$ đúng cho mọi phần tử cơ sở của định nghĩa đệ quy, và bước đệ quy chứng minh
    rằng nếu $$P$$ đúng với các phần tử đã dùng để tạo ra một phần tử mới theo bước đệ quy, thì $$P$$
    cũng đúng với phần tử mới đó.'
  example_vi: 'Xét tập hợp các chuỗi trên bảng chữ cái $$\Sigma$$ được định nghĩa đệ quy với chuỗi rỗng
    $$\lambda$$ làm cơ sở và phép nối thêm một ký tự làm bước đệ quy. Để chứng minh $$\ell(xy) = \ell(x)
    + \ell(y)$$ với mọi chuỗi $$x$$, $$y$$ (trong đó $$\ell$$ là độ dài chuỗi), ta dùng quy nạp theo cấu
    trúc trên $$y$$: bước cơ sở xét $$y = \lambda$$, và bước đệ quy xét $$y = wa$$ với $$a \in \Sigma$$.'
  vi_terms:
