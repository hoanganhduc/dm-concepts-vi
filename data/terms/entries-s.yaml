  notes: 'Recommended term "dãy số" (number sequence) is attested in both 2020 sources and the 2019 source.
    The $$\{a_n\}$$ notation appears verbatim with "dãy số" in nguyenhuudien-2019 (p. 97, "đối với dãy
    số { an }") and nguyenducnghia-2006 (p. 34, "dãy số {a„}"); nguyenhoangthach-2020 (p. 37) uses the
    equivalent "(an)" notation, all denoting THIS concept (a function indexed by integers). The bare variant
    "dãy" (sequence) is used as a short back-reference to "dãy số" (e.g. nguyenhoangthach-2020 p. 37 "một
    dãy như vậy") and in compounds ("dãy các đỉnh", "dãy Fibonacci"); recorded from nguyenducnghia-2006
    p. 38 where "dãy số ... dãy này" makes the synonymy explicit. OCR sources: leanhvinh-2020 (p. 51 "Từ
    dãy số thành cây.") and hoangchithanh-2007 (p. 141, --loose, Catalan sequence) attest "dãy số" but
    only in applied contexts (degree sequences, Catalan numbers), not as a general definition, so the
    2020/2019 text sources are cited first. "dãy số nguyên" (integer sequence) and "dãy số nguyên dương"
    (positive integer sequence) appear as domain-restricted instances, not separate terms. Lưu ý thuật
    ngữ-tiêu đề: tiêu đề tiếng Anh là "Sequence" với miền giá trị là một tập $$S$$ tổng quát (Rosen §2.4),
    trong khi thuật ngữ tiếng Việt được chứng thực là "dãy số" (theo nghĩa hẹp dãy các số); định nghĩa
    giữ nguyên dạng tổng quát "vào một tập $$S$$" còn "dãy số" là thuật ngữ chuẩn được kho ngữ liệu chứng
    thực.'
- id: series
  letter: S
  headword_en: series
  notation: \sum_{j=m}^{n} a_j
  rosen_ref: Rosen §2.4
  definition_vi: Tổng của một dãy là kết quả của việc cộng các số hạng của dãy đó. Với dãy $$a_m, a_{m+1},
    \ldots, a_n$$, tổng các số hạng từ chỉ số $$m$$ đến chỉ số $$n$$ được ký hiệu bằng ký hiệu sigma là
    $$\sum_{j=m}^{n} a_j = a_m + a_{m+1} + \cdots + a_n$$, trong đó $$j$$ là chỉ số chạy, $$m$$ là cận
    dưới và $$n$$ là cận trên.
  example_vi: Tổng của bốn số hạng đầu của dãy $$a_j = j^2$$ với $$j$$ chạy từ $$1$$ đến $$4$$ là $$\sum_{j=1}^{4}
    j^2 = 1 + 4 + 9 + 16 = 30$$.
