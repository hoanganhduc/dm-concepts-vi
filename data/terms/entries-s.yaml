- id: symmetric-relation
  letter: S
  headword_en: Symmetric relation
  notation: (a,b)\in R \Rightarrow (b,a)\in R
  rosen_ref: Rosen §9.1
  definition_vi: Một quan hệ $$R$$ trên tập $$A$$ được gọi là có tính đối xứng nếu $$(b,a)\in R$$ với
    mọi $$(a,b)\in R$$, tức là với mọi $$a,b\in A$$, hễ $$(a,b)\in R$$ thì $$(b,a)\in R$$ (ký hiệu $$(a,b)\in
    R \Rightarrow (b,a)\in R$$).
  example_vi: Xét tập $$A=\{1,2,3\}$$ và quan hệ $$R=\{(1,2),(2,1),(3,3)\}$$ trên $$A$$. Quan hệ $$R$$
