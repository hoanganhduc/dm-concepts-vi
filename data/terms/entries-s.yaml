- id: sign-magnitude-format
  letter: S
  headword_en: sign-magnitude format
  notation: ''
  rosen_ref: Rosen §4.2
  definition_vi: Định dạng dấu-lượng là cách biểu diễn một số nguyên có dấu bằng một xâu $$n$$ bit, trong
    đó bit ngoài cùng bên trái là bit dấu (ký hiệu $$0$$ cho số không âm và $$1$$ cho số âm), còn $$n-1$$
    bit còn lại biểu diễn độ lớn (giá trị tuyệt đối) của số đó trong hệ nhị phân. Khi đó một xâu $$n$$
    bit biểu diễn được các số nguyên từ $$-(2^{n-1}-1)$$ đến $$2^{n-1}-1$$.
  example_vi: Với $$n=4$$ bit, xâu $$0101$$ biểu diễn số $$+5$$, còn xâu $$1101$$ biểu diễn số $$-5$$;
    cả hai cùng độ lớn $$101_2 = 5$$ nhưng khác bit dấu.
