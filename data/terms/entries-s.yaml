  notation: T(v)
  rosen_ref: Rosen §10.1
  definition_vi: Cây con của một cây có gốc $$T$$ ứng với một đỉnh $$v$$, ký hiệu $$T(v)$$, là đồ thị
    con của $$T$$ gồm đỉnh $$v$$ làm gốc, mọi đỉnh là hậu duệ của $$v$$, cùng tất cả các cạnh nối với
    các hậu duệ đó. Như vậy $$T(v)$$ tự nó cũng là một cây có gốc tại $$v$$.
  example_vi: 'Trong một cây nhị phân, mỗi đỉnh trong có nhiều nhất hai cây con: cây con bên trái và cây
    con bên phải, lần lượt có gốc là con bên trái và con bên phải của đỉnh đó.'
