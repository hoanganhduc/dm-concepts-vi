- id: square-root
  letter: S
  headword_en: square root
  notation: \sqrt{n}
  rosen_ref: Rosen §4.3
  definition_vi: 'Căn bậc hai của một số thực không âm $$n$$, ký hiệu $$\sqrt{n}$$, là số thực không âm
    $$x$$ thỏa mãn $$x^2 = n$$. Trong lý thuyết số, $$\sqrt{n}$$ xuất hiện ở phép thử tính nguyên tố:
    nếu $$n$$ là hợp số thì $$n$$ có ước nguyên tố không vượt quá $$\sqrt{n}$$.'
  example_vi: Để kiểm tra $$101$$ có nguyên tố hay không, ta chỉ cần thử các số nguyên tố không vượt quá
    $$\sqrt{101} \approx 10$$, tức là $$2, 3, 5, 7$$; vì không số nào chia hết $$101$$ nên $$101$$ là
    số nguyên tố.
