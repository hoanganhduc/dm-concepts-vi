  notation: G = (V, E)
  rosen_ref: Rosen §9.1
  definition_vi: Một đồ thị có hướng đơn là một đồ thị có hướng không có khuyên và không có cạnh có hướng
    bội. Nói cách khác, mỗi cặp đỉnh $$(u, v)$$ với $$u \neq v$$ được nối bởi nhiều nhất một cạnh có hướng
    đi từ $$u$$ tới $$v$$, và không có cạnh có hướng nào nối một đỉnh với chính nó.
  example_vi: Đồ thị có hướng trên tập đỉnh $$V = \{a, b, c\}$$ với tập cạnh có hướng $$E = \{(a, b),
    (b, c), (a, c)\}$$ là một đồ thị có hướng đơn, vì không có khuyên (không có cạnh dạng $$(v, v)$$)
    và mỗi cặp đỉnh có thứ tự được nối bởi nhiều nhất một cạnh. Nếu ta thêm cạnh $$(a, a)$$ hoặc một cạnh
    $$(a, b)$$ thứ hai thì đồ thị thu được không còn là đồ thị có hướng đơn.
