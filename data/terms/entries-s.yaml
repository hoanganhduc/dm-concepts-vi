  status: draft
  see_ref: ''
  notes: 'Theo Rosen §6.2 ("N-ary Relations and Their Applications"), toán tử chọn (selection operator)
    $$s_C$$ gắn với một điều kiện $$C$$ và ánh xạ một quan hệ $$n$$ ngôi $$R$$ thành tập các bộ $$n$$
    thành phần của $$R$$ thoả mãn $$C$$; đây là một trong các phép toán cơ bản của đại số quan hệ, bên
    cạnh phép chiếu (projection) và phép hợp/kết nối (join). THUẬT NGỮ KHUYẾN NGHỊ: "toán tử chọn" là
    cách dịch chuẩn trong tài liệu cơ sở dữ liệu quan hệ tiếng Việt cho selection operator; biến thể "phép
    chọn" cũng thường gặp với cùng nghĩa. KHÔNG có chứng thực trong kho ngữ liệu: tìm bằng find-term.py
    cho "phép chọn", "toán tử chọn", "toán tử lựa chọn" và "phép lựa chọn" trên mọi nguồn 2004–2020 đều
    trả về 0 hit (cả thường lẫn --loose) theo nghĩa đại số quan hệ; các hit "phép chọn"/"lựa chọn" lác
    đác chỉ mang nghĩa "chọn/lựa chọn" tổ hợp thông thường, không phải toán tử chọn. Ngay cả bản dịch
    tham chiếu bib-rosen-2003-vi (role=reference) cũng KHÔNG bao trùm toán tử chọn: tiểu mục các phép
    toán trên quan hệ ở tr. 441–442 (PDF) chỉ trình bày phép chiếu ($$P_{i_1\ldots i_m}$$, ĐỊNH NGHĨA
    2, tr. 442) và toán tử hợp/kết nối ($$J_p$$, tr. 444), nên không có snippet nào chứng thực được toán
    tử chọn. Do không có chứng thực kho ngữ liệu, thuật ngữ lead "toán tử chọn" giữ verified=false với
    trích dẫn rỗng theo đúng quy ước, và không thêm dòng verified=true nào vì không có nguồn thật để dẫn
    (không bịa trích dẫn). Các see_also dẫn tới n-ary-relation, relation và k-tuple là các khái niệm nền:
    toán tử chọn tác động trên một quan hệ $$n$$ ngôi (tập các bộ $$n$$ thành phần) và trả về một quan
    hệ con cùng kiểu.'
- id: set-builder-notation
  letter: S
  headword_en: set builder notation
  notation: \{x \mid P(x)\}
  rosen_ref: Rosen, Discrete Mathematics and Its Applications, §2.1 (Sets)
  definition_vi: '*Ký hiệu xây dựng tập hợp* là một ký hiệu mô tả một tập hợp bằng cách nêu rõ tính chất
    mà các phần tử của nó thỏa mãn. Cụ thể, tập hợp gồm tất cả các phần tử $$x$$ có tính chất $$P$$ được
