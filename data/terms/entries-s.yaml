  notes: 'Concept: Rosen §10.6 defines the shortest-path problem as the problem of determining a path
    of least total weight between two vertices in a weighted graph. This is distinct from the existing
    ''shortest-path'' entry (the path object, recommended VI ''đường đi ngắn nhất'') and from ''dijkstra-algorithm''
    (the solution procedure); the book treats it as a separate headword, and both ''dijkstra-algorithm''
    and ''distance'' already cross-reference id ''shortest-path-problem'' in their see_also. Recommended
    term ''bài toán tìm đường đi ngắn nhất'' is the standard problem name, attested verbatim (strict search,
    not only --loose) in the newest source bib-leanhvinh-2020 (tr. 33, section heading-style "bài toán
    tìm đường đi ngắn nhất"), and corroborated in bib-nguyenhuudien-2019 (tr. 202, subsection 8.1.2) and
    bib-nguyenducnghia-2006 (tr. 222). The variant ''bài toán đường đi ngắn nhất'' (without ''tìm'') is
    the chapter/section title form in bib-nguyenhuudien-2019 (Ch. 8.1), bib-nguyenducnghia-2006 (Chương
    6), and bib-hoangchithanh-2007 (tr. 93, OCR); recorded as a non-standard descriptive variant. bib-leanhvinh-2020
    and bib-hoangchithanh-2007 are OCR sources; both strict and --loose searches return the same clean
    hits for these phrases, so the attestation is reliable. The newest source bib-nguyenhoangthach-2020
    states the problem at tr. 91 ("Ta muốn tìm một đường đi ngắn nhất p từ s tới t") but not as the exact
    noun phrase, so it is not cited here. Rosen-VI citation (bib-rosen-2003-vi tr. 131) records the descriptive
    phrasing of the same problem. definition_vi faithfully translates Rosen''s definition (problem of
    determining a least-total-weight path between two vertices); example_vi is self-contained, reusing
    the small weighted graph convention to show a, b, c (weight 2) beats direct a, c (weight 3). Exactly
    one recommended=true.'
