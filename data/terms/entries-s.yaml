- id: sum
  letter: S
  headword_en: sum
  notation: \sum_{j=m}^{n} a_j
  rosen_ref: Rosen §2.4
  definition_vi: Tổng của một dãy hữu hạn các số hạng $$a_m, a_{m+1}, \ldots, a_n$$ là kết quả của phép
    cộng tất cả các số hạng đó, ký hiệu là $$\sum_{j=m}^{n} a_j$$. Trong ký hiệu này, $$j$$ là chỉ số
    lấy tổng, $$m$$ là cận dưới và $$n$$ là cận trên của phép lấy tổng.
  example_vi: Tổng của $$100$$ số hạng đầu tiên của dãy $$a_j = j^2$$ với $$j$$ chạy từ $$1$$ đến $$100$$
    được viết là $$\sum_{j=1}^{100} j^2$$.
