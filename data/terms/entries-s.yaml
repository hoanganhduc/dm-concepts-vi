    the formal Definition 1.8 at tr. 13 ("Giả sử $$G_1 = (V_1, E_1)$$ là đồ thị con của $$G = (V, E)$$"),
    while the recommended citation at tr. 12 ("Tiếp theo, ta có định nghĩa về đồ thị con của một đồ thị.")
    is the definitional lead-in on the facing page. The definition follows nguyenhoangthach-2020''s formulation,
    which matches Rosen''s $$H = (W, F)$$ with $$W \subseteq V$$ and $$F \subseteq E$$; the explicit endpoint
    condition (mọi cạnh trong $$F$$ có hai đầu mút thuộc $$W$$) is added so that $$H$$ is a valid graph,
    since this requirement is inherited from $$H$$ being a graph and is otherwise left implicit by the
    bare $$W \subseteq V$$, $$F \subseteq E$$ statement.'
