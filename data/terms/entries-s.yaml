  notation: f(x) < f(y) \text{ khi } x < y
  rosen_ref: Rosen §2.3
  definition_vi: Một hàm $$f$$ từ tập các số thực vào tập các số thực được gọi là thực sự tăng nếu $$f(x)
    < f(y)$$ với mọi $$x$$, $$y$$ thuộc miền xác định thỏa mãn $$x < y$$. Một dãy $$a_1, a_2, \ldots,
    a_n$$ được gọi là thực sự tăng nếu mỗi số hạng đều lớn hơn số hạng đứng ngay trước nó, tức là $$a_i
    < a_{i+1}$$ với mọi $$i$$.
  example_vi: Hàm $$f(x) = 2x + 1$$ là thực sự tăng, vì nếu $$x < y$$ thì $$2x + 1 < 2y + 1$$. Dãy $$1,
    4, 6, 12$$ là một dãy con thực sự tăng.
