- id: support-of-an-itemset
  letter: S
  headword_en: support of an itemset
  notation: \operatorname{supp}(I)
  rosen_ref: ''
  definition_vi: Độ hỗ trợ của một tập mục $$I$$ là tỉ lệ các giao dịch có chứa tập mục $$I$$. Nói cách
    khác, nếu có $$n$$ giao dịch và đúng $$k$$ giao dịch trong số đó chứa toàn bộ các mục của $$I$$ thì
    độ hỗ trợ của $$I$$ bằng $$k/n$$.
  example_vi: Trong phân tích giỏ hàng, giả sử có $$100$$ giao dịch và tập mục $$I = \{\text{bánh mì},
    \text{bơ}\}$$ xuất hiện trong $$20$$ giao dịch; khi đó độ hỗ trợ của $$I$$ là $$\operatorname{supp}(I)
    = 20/100 = 0.2$$.
  vi_terms:
  - term: độ hỗ trợ
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  - term: mức hỗ trợ
    source_id: ''
    page: ''
    recommended: false
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - association-rule
  status: draft
  see_ref: ''
  notes: Khái niệm trong khai phá dữ liệu (data mining). Tập mục $$I$$ là một tập con của tập các mục
    cho trước, và một giao dịch là một tập mục. Độ hỗ trợ $$\operatorname{supp}(I)$$ nhận giá trị trong
    khoảng $$[0, 1]$$ và đo mức độ thường xuyên xuất hiện của $$I$$ trong dữ liệu giao dịch; nó được dùng
    để định nghĩa độ tin cậy (confidence) của một luật kết hợp $$I \to J$$. Cụm từ "độ hỗ trợ" theo nghĩa
    khai phá dữ liệu chưa có dẫn chứng trong các nguồn tiếng Việt khảo sát (các kết quả "hỗ trợ" tìm được
    chỉ là động từ thông thường); do đó thuật ngữ tiếng Việt được đề xuất theo bản dịch chuẩn.
- id: symmetric-matrix
