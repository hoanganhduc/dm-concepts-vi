- id: spanning-subgraph
  letter: S
  headword_en: spanning subgraph
  notation: ''
  rosen_ref: Rosen §10.1
  definition_vi: Đồ thị con bao trùm của một đồ thị $$G = (V, E)$$ là đồ thị con $$H = (V', E')$$ chứa
    toàn bộ tập đỉnh của $$G$$, nghĩa là $$V' = V(G)$$ và $$E' \subseteq E(G)$$. Nói cách khác, đồ thị
    con bao trùm thu được từ $$G$$ bằng cách giữ nguyên tất cả các đỉnh và chỉ bỏ đi một số cạnh.
  example_vi: Với đồ thị đầy đủ $$K_4$$ trên tập đỉnh $$\{v_1, v_2, v_3, v_4\}$$, mọi chu trình $$C_4$$
    đi qua cả bốn đỉnh đều là một đồ thị con bao trùm của $$K_4$$, vì nó giữ lại tất cả các đỉnh và chỉ
    bỏ bớt một số cạnh.
