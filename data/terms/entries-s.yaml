  see_ref: ''
  notes: 'Recommended term "đối xứng" (often as the property-noun phrase "tính đối xứng" / "có tính đối
    xứng") is the standard Vietnamese term for the relation property and is attested in 2020 sources.
    The recommended attestation leanhvinh-2020 p.17 occurs in an equivalence-relation context (the connectivity
    relation "quan hệ liên thông" is shown to be reflexive, symmetric, transitive), i.e. it lists đối
    xứng as a property rather than giving the standalone definition. The precise definitional attestation
    matching Rosen is nguyenhuudien-2019 p.109: "Ta nói quan hệ R có tính đối xứng (symmetric) nếu và
    chỉ nếu xRy ⇒ yRx với mọi". Other 2020 attestations appear as the second of the three equivalence-relation
    properties (phản xạ, đối xứng, bắc cầu): nguyenhoangthach-2020 p.54 ("tính đối xứng của quan hệ ''quen
    nhau''"). The full noun phrase "quan hệ đối xứng" returns 0 hits in every source (normal and --loose);
    Vietnamese sources express the concept via the property word đối xứng / tính đối xứng applied to a
    relation, not via a fixed noun phrase. DISTINCT NEARBY TERM, NOT the symmetric relation: "phản đối
    xứng" (antisymmetric) at ngodactan-2004 p.163 defines a partial order and is a different concept;
    ngodactan-2004 attests no symmetric relation property (its standalone "đối xứng" occurrences denote
    symmetric groups, geometric symmetry, or symmetric matrices), so it contributes no vi_term here. Likewise
    leanhvinh-2020 p.196 "tính đối xứng" is a Ramsey ''by symmetry'' extremal argument, not the relation
    property, and is excluded.'
