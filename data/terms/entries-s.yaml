    sources is bib-ngodactan-2004 (2004, p. 215), which defines the concept as "đồ thị vô hướng $$G =
    (V,E)$$ được gọi là đồ thị tự bù nếu $$G \cong \overline{G}$$" and notes the order constraint $$|V|
    \equiv 0$$ or $$1 \pmod 4$$. The recommended term "đồ thị tự bù" is therefore attested from a 2004
    source rather than a 2019-2020 one; it remains the standard term and is kept verified=true. The bare
    adjectival form "tự bù" appears in the same passage and is recorded as a variant. The OCR-detected
    loose hits on pp. 230/237/251 are false positives from "từ Bước" (algorithm-step references) and do
    not denote this concept.
- id: scale-free-network
  letter: S
  headword_en: scale-free network
  notation: ''
  rosen_ref: Rosen §10.4
  definition_vi: Mạng lưới không tỷ lệ là một mạng lưới (đồ thị) trong đó phân bố bậc của các đỉnh tuân
    theo luật lũy thừa, nghĩa là tỷ lệ các đỉnh có bậc $$k$$ xấp xỉ $$P(k) \sim k^{-\gamma}$$ với hằng
    số $$\gamma > 0$$. Một số ít đỉnh có bậc rất lớn (các đỉnh trung tâm), trong khi phần lớn các đỉnh
    còn lại có bậc nhỏ.
  example_vi: 'Đồ thị Web, trong đó mỗi trang là một đỉnh và mỗi liên kết là một cạnh, là một mạng lưới
    không tỷ lệ: hầu hết các trang có rất ít liên kết, còn một số ít trang (như các cổng thông tin lớn)
    có số liên kết rất lớn.'
