  notes: 'Concept: số Stirling loại hai $$S(n, j)$$ là số cách phân hoạch một tập hợp $$n$$ phần tử thành
    đúng $$j$$ khối (tập con) không rỗng, đôi một rời nhau. Recommended term "số Stirling loại hai" is
    attested in a 2020 source (bib-nguyenhoangthach-2020, Định nghĩa 2.23, tr. 32 PDF: "Giả sử n là một
    số nguyên không âm ... thành k khối không rỗng được gọi là số Stirling loại hai", confirming both
    the concept and the nonnegative-integer condition) and confirmed in bib-ngodactan-2004 (tr. 35 PDF,
    with notation S(n, k)); citations ordered newest-source first. The bare variant "số Stirling" appears
    only as a sectional/index shorthand or in the general phrase "các số Stirling" that covers both kinds
    (e.g. bib-ngodactan-2004 tr. 119, tr. 339 index); it is not specific to the second kind, so it is
    recorded as a non-recommended variant. The contrasting "số Stirling loại một" (Stirling number of
    the first kind, s(n, k)) also occurs in bib-ngodactan-2004 (tr. 57, tr. 123) but denotes a DIFFERENT
    concept and is intentionally not recorded as a variant of this entry. OCR sources bib-leanhvinh-2020
    and bib-hoangchithanh-2007, and text sources bib-nguyenhuudien-2019 and bib-nguyenducnghia-2006, do
    not treat the Stirling-number concept: the only "Stirling" hits are to "công thức Stirling" (Stirling''s
    approximation formula for n!, e.g. bib-leanhvinh-2020 tr. 150, bib-nguyenducnghia-2006 tr. 46), which
    is unrelated. Notation S(n, j) follows Rosen; both Vietnamese sources use S(n, k). The nonnegative-integer
    range stated in the definition is mathematically sound for all $$n, j \geq 0$$ (e.g. $$S(n, j) = 0$$
    when $$j > n$$); Rosen §8.6 typically restricts to $$1 \leq j \leq n$$, but the count is well-defined
    either way. The example uses $$S(3, 2) = 3$$, computed directly from the partition count the definition
    introduces, so it is self-contained.'
