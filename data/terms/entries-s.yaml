- id: sum-of-products-expansion
  letter: S
  headword_en: sum-of-products expansion
  notation: ''
  rosen_ref: Rosen §12.2
  definition_vi: Khai triển tổng các tích của một hàm Boole $$F$$ là biểu diễn của $$F$$ dưới dạng tổng
    (phép hoặc Boole) của các tiểu hạng, trong đó mỗi tiểu hạng là một tích Boole $$y_1 y_2 \cdots y_n$$
    với mỗi $$y_i$$ là biến $$x_i$$ hoặc phần bù $$\overline{x_i}$$. Khai triển này gồm đúng các tiểu
    hạng ứng với những bộ giá trị làm cho $$F = 1$$, nên nó tồn tại và là duy nhất với mỗi hàm Boole khác
    hằng số $$0$$.
  example_vi: Với hàm $$F(x, y, z)$$ chỉ bằng $$1$$ khi $$(x, y, z) = (1, 0, 0)$$ hoặc $$(0, 1, 1)$$,
    khai triển tổng các tích là $$F = x\,\overline{y}\,\overline{z} + \overline{x}\,y\,z$$, mỗi số hạng
    là tiểu hạng ứng với một bộ giá trị làm cho $$F = 1$$.
