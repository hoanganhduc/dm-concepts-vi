  rosen_ref: Rosen §2.6
  definition_vi: Ma trận đối xứng là một ma trận bằng với ma trận chuyển vị của chính nó, tức là ma trận
    vuông $$\mathbf{A} = [a_{ij}]$$ thỏa mãn $$\mathbf{A} = \mathbf{A}^t$$. Nói cách khác, $$\mathbf{A}$$
    đối xứng khi và chỉ khi $$a_{ij} = a_{ji}$$ với mọi $$i$$ và $$j$$.
  example_vi: Ma trận vuông cấp $$3$$ với các phần tử $$a_{ij} = a_{ji}$$, chẳng hạn ma trận có hàng thứ
    nhất $$(1, 2, 3)$$, hàng thứ hai $$(2, 4, 5)$$ và hàng thứ ba $$(3, 5, 6)$$, là một ma trận đối xứng.
    Ma trận kề của một đồ thị vô hướng luôn là ma trận đối xứng.
