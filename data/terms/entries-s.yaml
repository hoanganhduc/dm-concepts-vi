- id: strongly-connected-graph
  letter: S
  headword_en: Strongly connected graph
  notation: ''
  rosen_ref: Rosen §10.4
  definition_vi: Một đồ thị có hướng $$G$$ được gọi là *liên thông mạnh* nếu với mọi cặp đỉnh $$a$$ và
    $$b$$ của $$G$$, tồn tại một đường đi có hướng từ $$a$$ đến $$b$$ và một đường đi có hướng từ $$b$$
    đến $$a$$.
  example_vi: Đồ thị có hướng trên tập đỉnh $$\{a, b, c\}$$ với các cung $$a \to b$$, $$b \to c$$ và $$c
    \to a$$ là liên thông mạnh, vì từ mỗi đỉnh đều có một đường đi có hướng đến hai đỉnh còn lại.
