- id: shift-cipher
  letter: S
  headword_en: shift cipher
  notation: f(p) = (p + k) \bmod 26
  rosen_ref: Rosen §4.6
  definition_vi: Mật mã dịch là một loại mật mã mã hóa mỗi chữ cái của bản rõ bằng cách dịch chữ cái đó
    đi một lượng cố định trong bảng chữ cái. Nếu mỗi chữ cái được biểu diễn bởi một số nguyên $$p$$ với
    $$0 \leq p \leq 25$$, thì việc mã hóa được cho bởi hàm $$f(p) = (p + k) \bmod 26$$, trong đó $$k$$
    là độ dịch chuyển cố định.
  example_vi: Với độ dịch $$k = 3$$ (mật mã Caesar), chữ cái $$\texttt{A}$$ ($$p = 0$$) được mã hóa thành
    $$(0 + 3) \bmod 26 = 3$$, tức chữ $$\texttt{D}$$; việc giải mã dùng hàm ngược $$f^{-1}(p) = (p - k)
    \bmod 26$$.
