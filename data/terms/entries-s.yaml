  definition_vi: Ký hiệu tổng là cách biểu diễn gọn tổng các số hạng của một dãy. Tổng các số hạng $$a_m,
    a_{m+1}, \ldots, a_n$$ của dãy $$\{a_j\}$$ được ký hiệu là $$\sum_{j=m}^{n} a_j$$, trong đó $$j$$
    là chỉ số lấy tổng chạy từ giới hạn dưới $$m$$ đến giới hạn trên $$n$$.
  example_vi: Tổng $$100$$ số hạng đầu tiên của dãy $$\{a_n\}$$ với $$a_n = \dfrac{1}{n}$$ được viết là
    $$\sum_{j=1}^{100} \dfrac{1}{j}$$. Tổng quát hơn, có thể lấy tổng trên một tập chỉ số $$S$$ bằng cách
    viết $$\sum_{s \in S} f(s)$$.
