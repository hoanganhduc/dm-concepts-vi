  status: panel-approved
  see_ref: ''
  notes: 'The two mined candidates "đồ thị con" and "đồ thị con của" are the same lexical noun phrase
    "đồ thị con"; "của" is the genitive marker introducing the parent graph ("đồ thị con của $$G$$" =
    "subgraph of $$G$$"). The bare noun phrase "đồ thị con" is recommended as the headword; "đồ thị con
    của" is recorded as its phrasal (genitive) usage. The term is uniformly attested across all six corpus
    sources (2004-2020), so terminology is stable. nguyenhoangthach-2020 (tr. 70) gives the cleanest match
    to Rosen''s notation: "Một đồ thị con của $$G$$ là một đồ thị $$H = (W, F)$$ sao cho...". The variant
    "đồ thị bộ phận" (subgraph) returned 0 hits (normal and loose) and is not attested in this corpus.
    OCR sources confirmed in both normal and loose modes; loose mode on leanhvinh-2020 additionally surfaced
    the formal Definition 1.8 at tr. 13 ("Giả sử $$G_1 = (V_1, E_1)$$ là đồ thị con của $$G = (V, E)$$"),
    while the recommended citation at tr. 12 ("Tiếp theo, ta có định nghĩa về đồ thị con của một đồ thị.")
    is the definitional lead-in on the facing page. The definition follows nguyenhoangthach-2020''s formulation,
    which matches Rosen''s $$H = (W, F)$$ with $$W \subseteq V$$ and $$F \subseteq E$$; the explicit endpoint
    condition (mọi cạnh trong $$F$$ có hai đầu mút thuộc $$W$$) is added so that $$H$$ is a valid graph,
    since this requirement is inherited from $$H$$ being a graph and is otherwise left implicit by the
    bare $$W \subseteq V$$, $$F \subseteq E$$ statement.'
- id: simple-path
  letter: S
  headword_en: simple path
  notation: v_0, v_1, \ldots, v_n
  rosen_ref: Rosen §10.4
  definition_vi: Một đường đi trong đồ thị $$G$$ được gọi là đường đi đơn nếu nó không chứa cùng một cạnh
    quá một lần. Như vậy, một đường đi $$v_0, v_1, \ldots, v_n$$ là đơn khi mọi cạnh xuất hiện trên nó
    đều phân biệt.
  example_vi: Trong đồ thị có các cạnh $$ab$$, $$bc$$, $$cd$$, đường đi $$a, b, c, d$$ là đường đi đơn
    vì ba cạnh $$ab$$, $$bc$$, $$cd$$ đều khác nhau; còn đường đi $$a, b, c, b$$ không phải là đường đi
    đơn vì cạnh $$bc$$ được dùng hai lần.
