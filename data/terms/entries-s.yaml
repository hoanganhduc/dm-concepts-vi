  notation: \{a_n\}
  rosen_ref: Rosen §2.4
  definition_vi: Một dãy số là một hàm từ một tập con của tập các số nguyên (thường là tập các số nguyên
    không âm hoặc tập các số nguyên dương) vào một tập $$S$$; giá trị của hàm tại số nguyên $$n$$, ký
    hiệu $$a_n$$, được gọi là số hạng thứ $$n$$ của dãy, và dãy được ký hiệu là $$\{a_n\}$$.
  example_vi: Xét hàm $$a_n = \frac{1}{n}$$ xác định trên tập các số nguyên dương; dãy số $$\{a_n\}$$
    tương ứng có các số hạng là $$a_1 = 1$$, $$a_2 = \frac{1}{2}$$, $$a_3 = \frac{1}{3}$$, $$\ldots$$
