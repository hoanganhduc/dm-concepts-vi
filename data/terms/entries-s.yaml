- id: selection-operator
  letter: S
  headword_en: selection operator
  notation: s_C
  rosen_ref: Rosen §6.2
  definition_vi: '*Toán tử chọn* $$s_C$$ là một phép toán trên một quan hệ $$n$$ ngôi $$R$$, được xác
    định bởi một điều kiện $$C$$ mà mỗi bộ $$n$$ thành phần có thể thoả mãn hoặc không. Toán tử này ánh
    xạ quan hệ $$R$$ thành tập gồm tất cả các bộ $$n$$ thành phần của $$R$$ thoả mãn điều kiện $$C$$.'
  example_vi: Cho quan hệ $$R$$ gồm các bộ ghi thông tin sinh viên với các trường (tên, ngành học, điểm
    bình quân) và điều kiện $$C$$ là "điểm bình quân $$\geq 3{,}5$$". Khi đó toán tử chọn $$s_C$$ ánh
    xạ $$R$$ thành tập con gồm đúng những bộ ghi của các sinh viên có điểm bình quân không nhỏ hơn $$3{,}5$$,
    còn các bộ ghi không thoả mãn điều kiện $$C$$ bị loại bỏ.
