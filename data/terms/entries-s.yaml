    Edmonds-Karp shortest-augmenting-path context), and bib-ngodactan-2004 (p.216, 285, in the formal
    definition of distance d(u,v) as the length of a shortest path). Both terms denote this exact concept
    (verified via snippets showing path of minimum length/weight between two vertices). No OCR-mangled
    distinct variant found.'
- id: self-complementary-graph
  letter: S
  headword_en: Self-complementary graph
  notation: G \cong \overline{G}
  rosen_ref: Rosen §10.2
  definition_vi: Một đồ thị đơn $$G$$ được gọi là *đồ thị tự bù* nếu nó đẳng cấu với phần bù của chính
    nó, ký hiệu $$G \cong \overline{G}$$, trong đó $$\overline{G}$$ là đồ thị có cùng tập đỉnh với $$G$$
    và hai đỉnh kề nhau trong $$\overline{G}$$ khi và chỉ khi chúng không kề nhau trong $$G$$.
  example_vi: Đường đi $$P_4$$ trên bốn đỉnh là một đồ thị tự bù, vì $$P_4 \cong \overline{P_4}$$. Tương
    tự, chu trình $$C_5$$ trên năm đỉnh thỏa mãn $$C_5 \cong \overline{C_5}$$, nên $$C_5$$ cũng là đồ
    thị tự bù.
  vi_terms:
  - term: đồ thị tự bù
    source_id: bib-ngodactan-2004
    page: tr. 215 (PDF)
    recommended: true
    verified: true
    pdf_page: 215
    snippet: 6.7 (*) Đồ thị vô hướng G — (y,E ) được gọi là đồ thị tự bù nếu G
  - term: tự bù
    source_id: bib-ngodactan-2004
    page: tr. 215 (PDF)
    recommended: false
    verified: true
    pdf_page: 215
    snippet: thị tự bù, thì ỊVỊ = 0 hoặc |VỊ = 1 (mod 4).
  see_also:
  - complement-of-a-graph
  - graph-isomorphism
  - simple-graph
  status: panel-approved
  notes: No 2019-2020 source in the corpus attests this concept. The only attestation across all six Vietnamese
    sources is bib-ngodactan-2004 (2004, p. 215), which defines the concept as "đồ thị vô hướng $$G =
    (V,E)$$ được gọi là đồ thị tự bù nếu $$G \cong \overline{G}$$" and notes the order constraint $$|V|
    \equiv 0$$ or $$1 \pmod 4$$. The recommended term "đồ thị tự bù" is therefore attested from a 2004
    source rather than a 2019-2020 one; it remains the standard term and is kept verified=true. The bare
    adjectival form "tự bù" appears in the same passage and is recorded as a variant. The OCR-detected
    loose hits on pp. 230/237/251 are false positives from "từ Bước" (algorithm-step references) and do
    not denote this concept.
