    but denotes a distinct concept (component, not whole-graph property), so it is not listed as a variant
    here.'
- id: shortest-path
  letter: S
  headword_en: Shortest path
  notation: ''
  rosen_ref: Rosen §10.6
  definition_vi: Cho đồ thị có trọng số $$G$$ và hai đỉnh $$u, v$$ của $$G$$. Đường đi ngắn nhất từ $$u$$
    tới $$v$$ là một đường đi nối $$u$$ với $$v$$ có tổng trọng số các cạnh nhỏ nhất trong số mọi đường
    đi nối hai đỉnh này.
  example_vi: Trong $$G$$ với các đỉnh $$a, b, c$$ và các cạnh $$ab, bc, ac$$ có trọng số lần lượt là
    $$1, 1, 3$$, đường đi $$a, b, c$$ có tổng trọng số $$2$$ nhỏ hơn tổng trọng số $$3$$ của đường đi
    $$a, c$$, nên $$a, b, c$$ là đường đi ngắn nhất từ $$a$$ tới $$c$$.
