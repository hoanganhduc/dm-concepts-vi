  status: panel-approved
  notes: 'Hai ứng viên đều được chứng thực trong toàn bộ kho ngữ liệu. "tập hợp" là thuật ngữ chuẩn đầy
    đủ; "tập" là dạng viết tắt tương đương, xuất hiện chủ yếu trong các từ ghép như "tập đỉnh" (vertex
    set), "tập con" (subset), "tập đại diện" (representative set), và trong định nghĩa đồ thị của bib-leanhvinh-2020
    (Định nghĩa 1.1, tr. 8 PDF: "gồm hai tập hữu hạn, tập đỉnh..."). Khi tìm "tập" đơn lẻ, nhiều kết quả
    là chuỗi con của "tập hợp", "bài tập" (bài tập về nhà) hoặc "học tập" (việc học), nên trích dẫn cho
    "tập" dùng ngữ cảnh từ ghép chỉ tập đỉnh để xác nhận nghĩa. Thuật ngữ khuyến nghị "tập hợp" được chứng
    thực trong nguồn 2020 mới nhất (bib-leanhvinh-2020, bib-nguyenhoangthach-2020); lưu ý trích dẫn khuyến
    nghị tại bib-leanhvinh-2020 tr. 8 attest "tập hợp" trong từ ghép "tập hợp đỉnh / tập hợp cạnh", còn
    attest độc lập rõ hơn nằm ở bib-nguyenhoangthach-2020 tr. 13 ("các tập hợp hữu hạn"), được ghi nhận
    làm biến thể.'
- id: subset
  letter: S
  headword_en: Subset
  notation: A \subseteq B
  rosen_ref: Rosen §2.1
  definition_vi: Tập hợp $$A$$ được gọi là một tập con của tập hợp $$B$$, ký hiệu $$A \subseteq B$$, nếu
    mọi phần tử của $$A$$ đều là phần tử của $$B$$.
  example_vi: Với $$A = \{1, 2\}$$ và $$B = \{1, 2, 3\}$$, ta có $$A \subseteq B$$ vì mỗi phần tử của
    $$A$$ đều thuộc $$B$$. Ngược lại, $$\{1, 4\}$$ không phải là tập con của $$B$$ vì $$4 \notin B$$.
