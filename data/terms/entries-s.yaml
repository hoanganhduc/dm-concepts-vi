  status: panel-approved
  see_ref: ''
  notes: 'Concept: $$A \subseteq B$$ iff every element of $$A$$ is also an element of $$B$$. Two Vietnamese
    terms denote this concept: "tập con" (more frequent; the standard short form) and "tập hợp con" (the
    full form). Recommended term is "tập con": it is the most widely attested across all six sources (old
    and new) and carries the explicit subset-relation definition in bib-nguyenducnghia-2006 (p.12: "ta
    nói A là tập con của ..."); it is also attested in the 2020 source bib-leanhvinh-2020, satisfying
    the 2019-2020 recommendation requirement. The variant "tập hợp con" is attested in the newest combinatorics
    source bib-nguyenhoangthach-2020 (2020) and in bib-nguyenhuudien-2019 (2019, p.74), where the subset
    relation $$A \subset B$$ is defined verbatim: "Khi $$A \subset B$$ ta nói $$A$$ là một tập hợp con
    của tập hợp $$B$$." Note that bib-nguyenhuudien-2019 uses BOTH forms ("tập con" on p.69, "tập hợp
    con" on p.74), so both are recorded for that source. bib-ngodactan-2004 and bib-nguyenducnghia-2006
    use only "tập con". OCR sources (bib-leanhvinh-2020, bib-hoangchithanh-2007) were mined with both
    normal and --loose passes; --loose added no new term variants for this concept. Related: "tập con
    thực sự" (proper subset, $$A \subsetneq B$$) appears in bib-hoangchithanh-2007 p.18 but is a distinct
    concept and not recorded here.'
- id: sequence
