- id: transpose-of-a-matrix
  letter: T
  headword_en: Transpose of a matrix
  notation: A^{t}
  rosen_ref: Rosen §2.6
  definition_vi: Ma trận chuyển vị của một ma trận $$A$$ cỡ $$m \times n$$ là ma trận cỡ $$n \times m$$
    thu được bằng cách đổi chỗ các hàng và các cột của $$A$$, ký hiệu $$A^{t}$$. Nói cách khác, phần tử
    ở vị trí $$(i,j)$$ của $$A^{t}$$ bằng phần tử ở vị trí $$(j,i)$$ của $$A$$ với mọi $$i$$ và $$j$$.
  example_vi: 'Với ma trận $$A$$ cỡ $$2 \times 3$$ cho bởi

    ```math

    A = \begin{pmatrix} 1 & 2 & 3 \\ 4 & 5 & 6 \end{pmatrix},

    ```

    ma trận chuyển vị $$A^{t}$$ là ma trận cỡ $$3 \times 2$$

    ```math

    A^{t} = \begin{pmatrix} 1 & 4 \\ 2 & 5 \\ 3 & 6 \end{pmatrix}.

    ```

    Chẳng hạn, phần tử ở vị trí $$(3,1)$$ của $$A^{t}$$ bằng $$3$$, đúng bằng phần tử ở vị trí $$(1,3)$$
    của $$A$$.'
