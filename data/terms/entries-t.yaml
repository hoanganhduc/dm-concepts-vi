  letter: T
  headword_en: The Bijection Rule
  notation: '|A| = |B|'
  rosen_ref: Rosen §6.1
  definition_vi: Quy tắc song ánh là một quy tắc đếm cơ bản phát biểu rằng nếu tồn tại một song ánh giữa
    hai tập hữu hạn $$A$$ và $$B$$ thì hai tập đó có cùng số phần tử, tức là $$|A| = |B|$$. Do đó, để
    đếm số phần tử của một tập hữu hạn, ta có thể thiết lập một song ánh từ tập đó tới một tập đã biết
    số phần tử.
  example_vi: Số tập con của một tập $$n$$ phần tử bằng số xâu nhị phân độ dài $$n$$, vì phép gán mỗi
    tập con với xâu đặc trưng của nó là một song ánh; do đó cả hai đều có $$2^n$$ phần tử.
