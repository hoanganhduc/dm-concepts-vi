- id: the-first-principle-of-mathematical-induction
  letter: T
  headword_en: The First Principle of Mathematical Induction
  notation: ''
  rosen_ref: Rosen §4.1
  definition_vi: Nguyên lý thứ nhất của quy nạp toán học khẳng định rằng nếu $$P(n)$$ là một hàm mệnh
    đề xác định trên tập các số nguyên dương, $$P(1)$$ đúng (bước cơ sở), và với mọi số nguyên dương $$k$$
    mệnh đề kéo theo $$P(k) \rightarrow P(k+1)$$ đúng (bước quy nạp), thì $$P(n)$$ đúng với mọi số nguyên
    dương $$n$$.
  example_vi: Để chứng minh $$1 + 2 + \cdots + n = \frac{n(n+1)}{2}$$ với mọi số nguyên dương $$n$$, ta
    kiểm tra $$P(1)$$ đúng vì $$1 = \frac{1 \cdot 2}{2}$$, rồi giả sử $$P(k)$$ đúng và suy ra $$P(k+1)$$
    bằng cách cộng $$k+1$$ vào hai vế.
