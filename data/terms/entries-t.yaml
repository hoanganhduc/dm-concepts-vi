- id: the-second-principle-of-mathematical-induction
  letter: T
  headword_en: The Second Principle Of Mathematical Induction
  notation: ''
  rosen_ref: Rosen §4.1
  definition_vi: 'Nguyên lý thứ hai của quy nạp toán học (còn gọi là quy nạp mạnh) là một phương pháp
    chứng minh khẳng định $$P(n)$$ đúng với mọi số nguyên dương $$n$$, gồm hai bước: bước cơ sở chứng
    tỏ $$P(1)$$ đúng, và bước quy nạp chứng tỏ rằng nếu $$P(1), P(2), \ldots, P(k)$$ đều đúng thì $$P(k+1)$$
    cũng đúng. Điểm khác biệt so với nguyên lý quy nạp thông thường là ở bước quy nạp ta được giả sử $$P(j)$$
    đúng với mọi $$j$$ thỏa $$1 \leq j \leq k$$, chứ không chỉ riêng $$P(k)$$.'
  example_vi: 'Để chứng minh mọi số nguyên $$n \geq 2$$ đều viết được thành tích các số nguyên tố, ta
    dùng nguyên lý thứ hai của quy nạp: nếu $$n$$ là số nguyên tố thì khẳng định hiển nhiên đúng; nếu
    $$n = ab$$ với $$2 \leq a, b < n$$ thì theo giả thiết quy nạp cả $$a$$ và $$b$$ đều viết được thành
    tích các số nguyên tố, do đó $$n$$ cũng vậy.'
