    trong các nguồn ngữ liệu (các giáo trình toán rời rạc và đồ thị không bàn về biểu diễn số trên máy
    tính). Bản dịch Rosen có khái niệm gần kề là "biểu diễn bù đối với một" (one's complement, tr. 182
    PDF), nhưng đây là khái niệm khác nên không được dùng làm dẫn chứng cho phần bù hai.
