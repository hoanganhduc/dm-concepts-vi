- id: the-chinese-remainder-theorem
  letter: T
  headword_en: The Chinese Remainder Theorem
  notation: x \equiv a_i \pmod{m_i}
  rosen_ref: Rosen §4.3
  definition_vi: Định lý phần dư Trung Hoa khẳng định rằng nếu $$m_1, m_2, \ldots, m_n$$ là các số nguyên
    dương đôi một nguyên tố cùng nhau, thì hệ phương trình đồng dư $$x \equiv a_i \pmod{m_i}$$ với $$1
    \leq i \leq n$$ có nghiệm duy nhất theo modun $$m = m_1 m_2 \cdots m_n$$. Nghĩa là tồn tại đúng một
    số nguyên $$x$$ với $$0 \leq x < m$$ thỏa mãn đồng thời tất cả các đồng dư đã cho.
  example_vi: Hệ $$x \equiv 2 \pmod{3}$$, $$x \equiv 3 \pmod{5}$$, $$x \equiv 2 \pmod{7}$$ có nghiệm duy
    nhất $$x \equiv 23 \pmod{105}$$ vì các modun $$3$$, $$5$$, $$7$$ đôi một nguyên tố cùng nhau.
