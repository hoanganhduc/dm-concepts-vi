- id: tree-diagram
  letter: T
  headword_en: Tree diagram
  notation: ''
  rosen_ref: Rosen §6.1
  definition_vi: Cây liệt kê là một cây có gốc dùng trong phép đếm, trong đó mỗi nhánh biểu diễn một lựa
    chọn có thể có và mỗi lá biểu diễn một kết cục có thể có của một dãy các lựa chọn liên tiếp.
  example_vi: Để đếm số xâu nhị phân độ dài $$3$$, ta vẽ cây liệt kê có gốc tương ứng với xâu rỗng; tại
    mỗi mức ta rẽ thành hai nhánh ứng với việc chọn bit $$0$$ hoặc bit $$1$$, và sau $$3$$ mức cây có
    $$2^3 = 8$$ lá, mỗi lá ứng với một xâu nhị phân khác nhau.
