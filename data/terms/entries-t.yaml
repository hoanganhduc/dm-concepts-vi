    snippet: Định nghĩa 10.1 Giả sử T = (V, E) là đồ thị vô hướng. Ta nói rằng đồ thị T là một cây
  - term: cây
    source_id: bib-hoangchithanh-2007
    page: tr. 123 (PDF)
    recommended: false
    verified: true
    pdf_page: 123
    snippet: rằng đồ thị 7 là một cây nếu nó liên thóng và không có chu trình.
  - term: cây
    source_id: bib-nguyenducnghia-2006
    page: tr. 200 (PDF)
    recommended: false
    verified: true
    pdf_page: 200
    snippet: Định nghĩa 1. 7a gọi cây là đồ thị vô hướng liên thông không có chu trình.
  - term: cây
    source_id: bib-ngodactan-2004
    page: tr. 197 (PDF)
    recommended: false
    verified: true
    pdf_page: 197
    snippet: Một đồ thị vô hướng liên thông không có khuyên và không có chu trình [...] được gọi là cây.
  see_also:
  - forest
  - spanning-tree
  - rooted-tree
  - binary-tree
  - simple-circuit
  status: panel-approved
  notes: 'Standard standalone term across the entire corpus is "cây", attested with a formal definition
    in all six sources (connected undirected graph with no cycle). The definition follows Rosen §11.1
    exactly: a tree is a connected undirected graph with no simple circuits; the redundant restatement
    "nói cách khác, ... không có chu trình" (which paired the simple-circuit condition with a non-equivalent
    acyclic paraphrase) was removed so Rosen''s single condition "không chứa chu trình đơn" stands alone.
    The corpus sources state the equivalent "không có chu trình" (acyclic), which coincides with the no-simple-circuit
    condition for a graph but is not presented here as a separate characterization. Recommended term "cây"
    is attested in two 2019-2020 sources: nguyenhoangthach-2020 (Định nghĩa 6.1, p.83: "Một cây là một
    đồ thị vô hướng, liên thông, không có chu[ trình]") and leanhvinh-2020 (Ch. 2 "Cây", p.38). The variant
    "đồ thị cây" appears in nguyenhoangthach-2020 p.85 only in the qualified form "đồ thị cây có gốc"
    (rooted tree graph) describing a drawing; it denotes the same concept but is NOT a standalone definitional
    term, so it is recorded as a non-recommended variant whose attested context is rooted-tree drawing
    only. Compound terms found in the corpus but NOT denoting this bare concept (excluded): "cây bao trùm"/"cây
    khung" (spanning tree), "cây có gốc" (rooted tree), "cây nhị phân" (binary tree), "cây cầu" (bridge,
    unrelated). Note nguyenducnghia-2006 and ngodactan-2004 use "cây khung"/"cây" with "khuyên" (loop)
    excluded explicitly in ngodactan: "đồ thị vô hướng liên thông không có khuyên và không có chu trình".'
- id: total-order
  letter: T
  headword_en: Total order
  notation: \preceq
  rosen_ref: Rosen §9.6
  definition_vi: Một thứ tự toàn phần (ký hiệu $$\preceq$$) trên tập $$S$$ là một thứ tự bộ phận trong
    đó hai phần tử bất kỳ đều so sánh được, tức là với mọi $$a, b \in S$$ ta có $$a \preceq b$$ hoặc $$b
    \preceq a$$.
  example_vi: Quan hệ $$\leq$$ thông thường trên tập số thực $$\mathbb{R}$$ là một thứ tự toàn phần, vì
    với mọi $$a, b \in \mathbb{R}$$ ta luôn có $$a \leq b$$ hoặc $$b \leq a$$.
  vi_terms:
  - term: thứ tự toàn phần
    source_id: bib-nguyenhuudien-2019
    page: tr. 121 (PDF)
    recommended: true
    verified: true
    pdf_page: 121
    snippet: Việc xây dựng thứ tự toàn phần tương thích với một thứ tự cho trước được gọi là sắp xếp topo.
  - term: quan hệ thứ tự toàn phần
    source_id: bib-nguyenhuudien-2019
    page: tr. 118 (PDF)
    recommended: false
    verified: true
    pdf_page: 118
    snippet: mọi x, y ∈ X ta có xRy hay yRx thì ta nói R là một quan hệ thứ tự toàn phần trên X.
  - term: thứ tự tuyến tính
    source_id: bib-ngodactan-2004
    page: tr. 164 (PDF)
    recommended: false
    verified: true
    pdf_page: 164
    snippet: thứ tự tuyến tính, còn thứ tự bộ phận ở Ví dụ 5.2 và Ví dụ 5.3 không
  - term: tập được sắp tuyến tính
    source_id: bib-ngodactan-2004
    page: tr. 164 (PDF)
    recommended: false
    verified: true
    pdf_page: 164
    snippet: mệt tập được sắp tuyến tính, thì A cũng được gọi là một xích của X .
  see_also:
  - partial-order
  - comparable
  - totally-ordered-set
  status: panel-approved
  notes: 'Recommended term "thứ tự toàn phần" is the standard term, attested in the newest available source
    for this concept, nguyenhuudien-2019 (2019, discrete math), where a total order is defined as a partial
    order in which every two elements are comparable (tr. 118: "mọi x, y ∈ X ta có xRy hay yRx thì ta
    nói R là một quan hệ thứ tự toàn phần trên X"). The recommended row cites a distinct standalone occurrence
    of the bare head-noun "thứ tự toàn phần" from the topological-sort discussion (tr. 121: "Việc xây
    dựng thứ tự toàn phần tương thích với một thứ tự cho trước được gọi là sắp xếp topo"), so its snippet
    differs from the "quan hệ thứ tự toàn phần" variant which carries the tr. 118 definitional snippet.
    The same source gives $$\leq$$ on $$\mathbb{R}$$ as an example (tr. 118) and uses the term throughout
    tr. 121-123.


    The OCR graph-theory sources bib-leanhvinh-2020 (2020) and bib-hoangchithanh-2007 (2007) yielded 0
    hits under both normal and --loose matching for every candidate; these books are graph-algorithm focused
    and do not develop order theory, so no 2020-source attestation exists for this concept. Likewise bib-nguyenhoangthach-2020
    and bib-nguyenducnghia-2006 returned 0 hits for the order-theoretic candidates.


    Variant "thứ tự tuyến tính" (linear order) is the older (2004) synonym from ngodactan-2004, where
    a total order is introduced as a partial order whose every two elements are comparable (so sánh được,
    tr. 164); a set carrying such an order is a "tập được sắp tuyến tính" (= xích / chain).


    Excluded as not denoting this concept: the phrase "sắp thứ tự toàn bộ các cạnh" in nguyenducnghia-2006
    (tr. 210) means "sort all the edges" (an algorithmic sorting step), not the order-theoretic total
    order.


    The example uses only the relation $$\leq$$ on $$\mathbb{R}$$ introduced as a standard instance in
    the recommended source; it introduces no derived quantity beyond the definition. The see_also id "totally-ordered-set"
    (the chain / tập được sắp tuyến tính concept) is a forward reference; if not authored in chapter T
    it remains a forward reference.'
- id: transitive-closure
  letter: T
  headword_en: Transitive closure
  notation: R^{*}
  rosen_ref: Rosen §9.4
  definition_vi: Bao đóng bắc cầu của một quan hệ $$R$$ trên tập $$A$$, ký hiệu $$R^{*}$$, là quan hệ
    bắc cầu nhỏ nhất trên $$A$$ chứa $$R$$.
  example_vi: Với quan hệ $$R = \{(1,2),(2,3)\}$$ trên tập $$A = \{1,2,3\}$$, bao đóng bắc cầu $$R^{*}$$
    thu được bằng cách thêm cặp $$(1,3)$$, tức là $$R^{*} = \{(1,2),(2,3),(1,3)\}$$.
  vi_terms:
  - term: bao đóng bắc cầu
    source_id: bib-hoangchithanh-2007
    page: tr. 12 (PDF)
    recommended: true
    verified: true
    pdf_page: 12
    snippet: dùng thuật toán Warshall sau đây để tính ma trận bao đóng bắc cầu
  see_also:
  - transitive-relation
  - binary-relation
  - closure-of-a-relation
  status: panel-approved
  notes: 'Recommended term "bao đóng bắc cầu" is the standard modern Vietnamese term for transitive closure.
    The ONLY corpus attestation is in the 2007 source bib-hoangchithanh-2007 (tr. 12 PDF), and there it
    occurs inside the phrase "ma trận bao đóng bắc cầu" (transitive closure MATRIX, computed via thuật
    toán Warshall): the corpus attests the matrix-closure construct, NOT the relation-level definition
    "bao đóng bắc cầu của một quan hệ" stated in definition_vi. No source states the relation-level minimal-transitive-relation
    definition verbatim, and no 2019-2020 source names the closure concept itself — the newer sources
    (bib-nguyenhuudien-2019, bib-leanhvinh-2020) discuss only the transitivity property "tính bắc cầu",
    not "bao đóng bắc cầu". Because the matrix and relation closures are the same operation and "bao đóng
    bắc cầu" remains the standard modern term with no newer attestation, it is kept as recommended despite
    the older, matrix-context-only citation. The candidate "bao đóng truyền ứng" has 0 hits anywhere (dropped):
    the 2006 source bib-nguyenducnghia-2006 uses "truyền ứng" (tr. 14 PDF) only for the transitivity property,
    never combined with "bao đóng". The bare term "bao đóng" appears only as a substring of "bao đóng
    bắc cầu" in the 2007 source, so it is not listed as an independent variant. The example closes in
    one step ($$(1,3)$$ added); a general transitive closure may require iterating over longer paths.'
- id: transitive-relation
  letter: T
  headword_en: Transitive relation
  notation: (a,b)\in R \wedge (b,c)\in R \Rightarrow (a,c)\in R
  rosen_ref: Rosen §9.1
