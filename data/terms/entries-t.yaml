  notes: 'Văn phạm loại 1 (type 1 grammar), còn gọi là văn phạm cảm ngữ cảnh (context-sensitive grammar),
    là một lớp trong phân loại Chomsky về văn phạm cấu trúc cụm từ. Theo Rosen §12.1, văn phạm loại 1
    là văn phạm cấu trúc cụm từ mà mọi sản xuất đều không co rút (noncontracting), nghĩa là với mỗi sản
    xuất $$w_1 \to w_2$$ ta có $$|w_2| \geq |w_1|$$; nhờ điều kiện này, không có sản xuất nào làm độ dài
    xâu bị giảm trong quá trình dẫn xuất. Lớp văn phạm loại 1 nằm giữa loại 0 (không hạn chế) và loại
    2 (phi ngữ cảnh) trong phân cấp: mọi văn phạm loại 2 đều là loại 1 và mọi văn phạm loại 1 đều là loại
    0. Thuật ngữ "văn phạm loại 1" được chứng thực trong kho ngữ liệu CHỈ bởi bib-rosen-2003-vi (bản dịch
    OCR năm 2003 của Rosen, bao trùm chương về mô hình tính toán): tr. 773 nêu trực tiếp dạng các sản
    xuất được phép của một văn phạm loại 1 và phát biểu quan hệ bao hàm "mọi văn phạm loại 2 đều là loại
    1 và mọi văn phạm loại 1 đều là loại 0". Tìm trên mọi nguồn 2004–2020 (bib-leanhvinh-2020, bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019, bib-hoangchithanh-2007, bib-nguyenducnghia-2006, bib-ngodactan-2004) trả về
    0 hit cho "văn phạm loại 1" và các biến thể "ngữ pháp loại 1", "cảm ngữ cảnh", "văn phạm cảm ngữ cảnh",
    cả thường lẫn --loose; khái niệm này nằm ngoài phạm vi các giáo trình tổ hợp và đồ thị tiếng Việt
    hiện có. Theo tiền lệ của entry type-0-grammar (cùng chương T), do Rosen-VI là nguồn tiếng Việt DUY
    NHẤT có chứng thực và "văn phạm loại 1" là thuật ngữ chuẩn duy nhất, dòng tr. 773 được giữ làm thuật
    ngữ recommended=true, verified=true, còn dòng quan hệ bao hàm trên tr. 773 là chứng thực bổ trợ recommended=false.
    OCR đã làm sai một số dấu và ký hiệu; snippet được chuẩn hóa minh bạch (ví dụ "van phạm" → "văn phạm",
    và dạng sản xuất bị méo "w) > u2" được phục hồi thành $$w_1 \to w_2$$). Một số tài liệu dùng tên gọi
    tương đương "văn phạm cảm ngữ cảnh"; thuật ngữ này không xuất hiện trong kho ngữ liệu nên không được
    liệt kê làm dòng chứng thực.'
- id: type-2-grammar
  letter: T
  headword_en: Type 2 Grammar
  notation: ''
  rosen_ref: Rosen §13.1
  definition_vi: Văn phạm loại 2 là một văn phạm cấu trúc cụm từ trong đó vế trái của mọi sản xuất chỉ
    gồm một ký hiệu không kết thúc duy nhất. Các văn phạm loại 2 còn được gọi là văn phạm phi ngữ cảnh.
  example_vi: 'Văn phạm với tập sản xuất $$\{S \to aSb, \; S \to ab\}$$ là một văn phạm loại 2, vì vế
    trái của mỗi sản xuất chỉ là một ký hiệu không kết thúc $$S$$; văn phạm này sinh ra ngôn ngữ $$\{a^{n}b^{n}
    : n \geq 1\}$$.'
  vi_terms:
  - term: văn phạm phi ngữ cảnh
    source_id: bib-rosen-2003-vi
    page: tr. 773 (PDF)
    recommended: true
    verified: true
    pdf_page: 773
    snippet: 0. Các văn phạm loại 2 được gọi là văn phạm phi ngữ cảnh, vì một
  - term: văn phạm loại 2
    source_id: bib-rosen-2003-vi
    page: tr. 773 (PDF)
    recommended: false
    verified: true
    pdf_page: 773
    snippet: mọi văn phạm loại 2 đều là loại 1 và mọi văn phạm loại 1 đều là loại
  see_also:
  - regular-expression
  - nondeterministic-finite-automaton
  - string
  - word
  status: draft
  see_ref: ''
  notes: Văn phạm loại 2 (type 2 grammar) là một cấp trong phân loại Chomsky của các văn phạm cấu trúc
    cụm từ; ràng buộc của nó là vế trái của mỗi sản xuất chỉ gồm đúng một ký hiệu không kết thúc. Vì ràng
    buộc này không phụ thuộc vào các ký hiệu xung quanh, văn phạm loại 2 còn được gọi là văn phạm phi
    ngữ cảnh (context-free grammar), và ngôn ngữ do nó sinh ra gọi là ngôn ngữ phi ngữ cảnh. Bản dịch
    Rosen (2003) dùng cả hai tên gọi "văn phạm loại 2" và "văn phạm phi ngữ cảnh" (tr. 773 PDF); cụm "văn
    phạm phi ngữ cảnh" là thuật ngữ chuẩn được khuyến nghị.
- id: type-3-grammar
  letter: T
  headword_en: Type 3 Grammar
  notation: ''
  rosen_ref: Rosen §13.1
  definition_vi: Văn phạm loại 3 là một văn phạm cấu trúc cụm từ trong đó mọi sản xuất bị hạn chế ở dạng
    chính quy. Các văn phạm loại 3 còn được gọi là văn phạm chính quy, và ngôn ngữ do chúng sinh ra được
    gọi là ngôn ngữ chính quy.
  example_vi: 'Văn phạm với tập sản xuất $$\{S \to aS, \; S \to b\}$$ là một văn phạm loại 3, vì mỗi sản
    xuất có vế trái là một ký hiệu không kết thúc và vế phải có dạng chính quy; văn phạm này sinh ra ngôn
    ngữ chính quy $$\{a^{n}b : n \geq 0\}$$.'
  vi_terms:
  - term: văn phạm chính quy
    source_id: bib-rosen-2003-vi
    page: tr. 774 (PDF)
    recommended: true
    verified: true
    pdf_page: 774
    snippet: sinh ra bởi một văn phạm chính quy được gọi là ngôn ngữ chính quy.
  - term: văn phạm loại 3
    source_id: bib-rosen-2003-vi
    page: tr. 815 (PDF)
    recommended: false
    verified: true
    pdf_page: 815
    snippet: quy hay văn phạm loại 3, là văn phạm có dạng G = (V, T, S, P) với mỗi
  see_also:
  - type-2-grammar
  - regular-expression
  - nondeterministic-finite-automaton
  - language
  status: draft
  see_ref: ''
  notes: Văn phạm loại 3 (type 3 grammar) là cấp thấp nhất trong phân loại Chomsky của các văn phạm cấu
    trúc cụm từ; ràng buộc của nó là mọi sản xuất có dạng chính quy, tức vế phải gồm một ký hiệu kết thúc
    có thể kèm theo một ký hiệu không kết thúc duy nhất. Vì ràng buộc này, văn phạm loại 3 còn được gọi
    là văn phạm chính quy (regular grammar), và ngôn ngữ do nó sinh ra gọi là ngôn ngữ chính quy. Mọi
    văn phạm loại 3 đều là văn phạm loại 2. Bản dịch Rosen (2003) dùng cả hai tên gọi "văn phạm chính
    quy" (tr. 774 PDF) và "văn phạm loại 3" (tr. 815 PDF); cụm "văn phạm chính quy" là thuật ngữ chuẩn
    được khuyến nghị.
