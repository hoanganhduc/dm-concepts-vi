  - directed-graph
  - hamiltonian-path
  status: panel-approved
  notes: 'Recommended term "đồ thị có hướng đầy đủ" is attested in the 2019 target-era source nguyenhuudien-2019
    (p. 189), where it is defined as a complete graph in which each pair of vertices $$u,v$$ is joined
    by exactly one of the arcs $$(u,v)$$ or $$(v,u)$$, and Rédei''s theorem is stated for it (p. 190)
    — this matches the Rosen tournament concept exactly. DISAMBIGUATION: the literal phrase "đồ thị có
    hướng đầy đủ" reads as "complete directed graph" and in other Vietnamese usage can denote the complete
    SYMMETRIC digraph (a digraph with arcs in BOTH directions $$(u,v)$$ and $$(v,u)$$ between every pair),
    which is NOT a tournament; the p.189 source text restricts each pair to EXACTLY ONE of $$(u,v)$$/$$(v,u)$$,
    so the source''s usage matches the tournament concept, and the unambiguous alternative "đồ thị đấu
    loại" is recorded as a variant. The variant "đồ thị đấu loại" (with the short form "đấu loại") appears
    in nguyenducnghia-2006 (p. 196), defined as a directed graph in which any two vertices are joined
    by exactly one arc; the source explains the name "đấu loại" (knock-out/competition) arises because
    such a graph models the outcome of a round-robin tournament. The candidate "giải đấu" (found in nguyenhoangthach-2020,
    p. 18) denotes a sports competition in a counting word problem ("how many matches in the tournament"),
    NOT the directed-graph object, so it is excluded. No tournament term is attested in the OCR sources
    leanhvinh-2020 and hoangchithanh-2007 (searched normal and --loose: 0 loose hits for "đồ thị có hướng
    đầy đủ" in both); the "đầy đủ" hits there refer to the complete UNDIRECTED graph "đồ thị đầy đủ" $$K_n$$
    (e.g. leanhvinh-2020 p. 14), not a tournament. No tournament term is attested in ngodactan-2004. The
    Markdown asterisk emphasis on the term and the inline gloss "(tournament)" were removed from definition_vi
    per the chapter''s plain-prose emphasis and no-in-definition-gloss conventions. vi_terms ordered newest-source
    first.'
