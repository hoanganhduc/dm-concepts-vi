  see_also:
  - binary-relation
  - transitive-relation
  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "bao đóng bắc cầu" is the standard modern Vietnamese term for transitive closure.
    The ONLY corpus attestation is in the 2007 source bib-hoangchithanh-2007 (tr. 12 PDF), and there it
    occurs inside the phrase "ma trận bao đóng bắc cầu" (transitive closure MATRIX, computed via thuật
    toán Warshall): the corpus attests the matrix-closure construct, NOT the relation-level definition
    "bao đóng bắc cầu của một quan hệ" stated in definition_vi. No source states the relation-level minimal-transitive-relation
    definition verbatim, and no 2019-2020 source names the closure concept itself — the newer sources
    (bib-nguyenhuudien-2019, bib-leanhvinh-2020) discuss only the transitivity property "tính bắc cầu",
    not "bao đóng bắc cầu". Because the matrix and relation closures are the same operation and "bao đóng
    bắc cầu" remains the standard modern term with no newer attestation, it is kept as recommended despite
    the older, matrix-context-only citation. The candidate "bao đóng truyền ứng" has 0 hits anywhere (dropped):
    the 2006 source bib-nguyenducnghia-2006 uses "truyền ứng" (tr. 14 PDF) only for the transitivity property,
    never combined with "bao đóng". The bare term "bao đóng" appears only as a substring of "bao đóng
    bắc cầu" in the 2007 source, so it is not listed as an independent variant. The example closes in
    one step ($$(1,3)$$ added); a general transitive closure may require iterating over longer paths.'
