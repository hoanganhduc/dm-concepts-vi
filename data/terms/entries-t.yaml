  notes: Giá trị chân trị là giá trị đúng (true, $$T$$) hoặc sai (false, $$F$$) gán cho một mệnh đề, và
    là cơ sở để lập bảng chân trị (truth table) của các mệnh đề phức hợp. Bản dịch Rosen (2003) dùng cụm
    "giá trị chân lý" (tr. 7); cụm "giá trị chân trị" theo nguồn mới hơn (Nguyễn Hữu Điển, 2019) là bản
    dịch được khuyến nghị, thống nhất với mục "bảng chân trị" (truth table) đã có trong sách.
- id: type-0-grammar
  letter: T
  headword_en: Type 0 Grammar
  notation: ''
  rosen_ref: Rosen §12.1
  definition_vi: Một *văn phạm loại 0* là một văn phạm cấu trúc cụm từ bất kỳ mà không có hạn chế nào
    đối với các sản xuất (quy tắc sinh) của nó. Nói cách khác, mỗi sản xuất của văn phạm loại 0 có dạng
    $$w_1 \to w_2$$, trong đó $$w_1$$ là một xâu khác rỗng và $$w_2$$ là một xâu tùy ý trên bảng chữ cái
    gồm các ký hiệu kết thúc và không kết thúc.
  example_vi: Văn phạm với tập sản xuất $$\{S \to aSb, \; S \to \lambda\}$$ sinh ra ngôn ngữ $$\{a^{n}b^{n}
    \mid n \geq 0\}$$; do không áp đặt hạn chế nào lên các sản xuất nên đây là một văn phạm loại 0. Lớp
    các văn phạm loại 0 là lớp tổng quát nhất trong phân loại Chomsky và sinh ra đúng các ngôn ngữ được
    nhận biết bởi máy Turing.
  vi_terms:
  - term: văn phạm loại 0
    source_id: bib-rosen-2003-vi
    page: tr. 773 (PDF)
    recommended: true
    verified: true
    pdf_page: 773
    snippet: Một văn phạm loại 0 không có các hạn chế đối với các sản xuất của
  - term: văn phạm loại 0
    source_id: bib-rosen-2003-vi
    page: tr. 832 (PDF)
    recommended: false
    verified: true
    pdf_page: 832
    snippet: máy Turing nếu và chỉ nếu nó được sinh bởi một văn phạm loại 0 hay
  - term: văn phạm không hạn chế
    source_id: ''
    page: ''
    recommended: false
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - alphabet
  - language
  - phrase-structure-grammar
  - regular-set
  status: draft
  see_ref: ''
  notes: 'Văn phạm loại 0 (type 0 grammar), còn gọi là văn phạm không hạn chế (unrestricted grammar),
    là lớp tổng quát nhất trong phân loại Chomsky về văn phạm cấu trúc cụm từ: các loại 1 (cảm ngữ cảnh),
    2 (phi ngữ cảnh) và 3 (chính quy) đều thu được bằng cách áp thêm hạn chế lên các sản xuất, còn loại
    0 không có hạn chế nào. Theo định lý cơ bản của lý thuyết ngôn ngữ hình thức, một ngôn ngữ được sinh
    bởi một văn phạm loại 0 khi và chỉ khi nó được nhận biết bởi một máy Turing, tức lớp ngôn ngữ loại
    0 trùng với lớp các ngôn ngữ đệ quy đếm được (Rosen §12.1, §12.4). Thuật ngữ "văn phạm loại 0" được
    chứng thực trong kho ngữ liệu CHỈ bởi bib-rosen-2003-vi (bản dịch OCR năm 2003 của Rosen, bao trùm
    chương về mô hình tính toán): tr. 773 nêu trực tiếp "Một văn phạm loại 0 không có các hạn chế đối
    với các sản xuất", đúng định nghĩa của Rosen, và tr. 832 phát biểu sự tương đương với máy Turing.
    Tìm trên mọi nguồn 2004–2020 (bib-leanhvinh-2020, bib-nguyenhoangthach-2020, bib-nguyenhuudien-2019,
    bib-hoangchithanh-2007, bib-nguyenducnghia-2006, bib-ngodactan-2004) trả về 0 hit cho "văn phạm loại
    0" và các biến thể "ngữ pháp", "văn phạm không hạn chế", "cấu trúc cụm từ", cả thường lẫn --loose;
    khái niệm này nằm ngoài phạm vi các giáo trình tổ hợp và đồ thị tiếng Việt hiện có. Khác với chính
    sách thông thường (bib-rosen-2003-vi có role=reference và bị find-term.py giữ trong EXCLUDE_DEFAULT
    nên thường không được làm thuật ngữ lead), ở đây Rosen-VI là nguồn tiếng Việt DUY NHẤT có chứng thực
    và "văn phạm loại 0" là thuật ngữ chuẩn duy nhất; do đó dòng tr. 773 được giữ làm thuật ngữ recommended=true,
    verified=true, còn dòng tr. 832 là chứng thực bổ trợ recommended=false. OCR đã làm sai một số dấu;
    snippet được chuẩn hóa minh bạch (ví dụ "van phạm" → "văn phạm"). Một số nguồn dùng tên gọi tương
    đương "văn phạm không hạn chế"; thuật ngữ này không xuất hiện trong kho ngữ liệu nên không được liệt
    kê làm dòng chứng thực.'
- id: type-1-grammar
  letter: T
  headword_en: Type 1 Grammar
  notation: ''
  rosen_ref: Rosen §12.1
  definition_vi: Một *văn phạm loại 1* là một văn phạm cấu trúc cụm từ trong đó mọi sản xuất (quy tắc
    sinh) đều không co rút. Nói cách khác, mỗi sản xuất có dạng $$w_1 \to w_2$$, trong đó độ dài của $$w_2$$
    không nhỏ hơn độ dài của $$w_1$$, tức là $$|w_2| \geq |w_1|$$.
  example_vi: Văn phạm với tập sản xuất $$\{S \to aSBC,\; S \to aBC,\; CB \to BC,\; aB \to ab,\; bB \to
    bb,\; bC \to bc,\; cC \to cc\}$$ sinh ra ngôn ngữ $$\{a^{n}b^{n}c^{n} \mid n \geq 1\}$$; vì mỗi sản
    xuất đều có vế phải dài không ngắn hơn vế trái nên đây là một văn phạm loại 1. Mọi văn phạm loại 2
    (phi ngữ cảnh) đều là văn phạm loại 1, nên lớp các ngôn ngữ loại 1 chứa lớp các ngôn ngữ loại 2.
