- id: truth-value
  letter: T
  headword_en: Truth Value
  notation: T, F
  rosen_ref: Rosen §1.1
  definition_vi: Giá trị chân trị của một mệnh đề là giá trị đúng hoặc sai được gán cho mệnh đề đó. Giá
    trị đúng được ký hiệu là $$T$$ và giá trị sai được ký hiệu là $$F$$.
  example_vi: Mệnh đề "Thủ đô của Việt Nam là Hà Nội" có giá trị chân trị là đúng ($$T$$), còn mệnh đề
    "$$1 + 1 = 3$$" có giá trị chân trị là sai ($$F$$).
  vi_terms:
  - term: giá trị chân trị
    source_id: bib-nguyenhuudien-2019
    page: tr. 14 (PDF)
    recommended: true
    verified: true
    pdf_page: 14
    snippet: của một mệnh đề được gọi là chân trị của mệnh đề.
  - term: giá trị chân lý
    source_id: bib-rosen-2003-vi
    page: tr. 7 (PDF)
    recommended: false
    verified: true
    pdf_page: 7
    snippet: r, s.. Giá trị chân lý của một mệnh dé là đúng và sẽ được ký hiệu
  see_also:
  - truth-table
  - atomic-proposition
  - tautology
  status: draft
