  notes: 'Trong thuật ngữ của Rosen, khái niệm này được gọi là "simple path" (đường đi đơn): một đường
    đi không dùng lại cùng một cạnh quá một lần (các đỉnh vẫn có thể lặp lại). Thuật ngữ tiếng Anh hiện
    đại của headword là "Trail". Cách hiểu khuyến nghị ở đây là không-lặp-cạnh (no repeated edge), và
    ví dụ cố ý lặp lại đỉnh $$v_2$$ để phân biệt trail với path. Thuật ngữ Việt chuẩn là "đường đi đơn",
    được định nghĩa bằng điều kiện không lặp cạnh trong ba nguồn: nguyenhoangthach-2020 (Định nghĩa 5.25,
    tr. 73 PDF: "không đi qua cạnh nào quá một lần"), nguyenhuudien-2019 (Định nghĩa 6.18, tr. 168 PDF:
    "không chứa cùng một cạnh ... quá một lần") và nguyenducnghia-2006 (Định nghĩa 1, tr. 155 PDF: "đơn
    nếu như không có cạnh nào bị lặp lại"). Cần phân biệt với "đường đi sơ cấp" (no repeated vertex, tức
    là path); nguyenhuudien-2019 nêu rõ mọi đường đi sơ cấp đều là đường đi đơn nhưng không ngược lại.


    Cảnh báo đồng âm khác nghĩa (false friend): cụm "đường đi đơn" trong hoangchithanh-2007 (Định nghĩa
    1.6, tr. 7 PDF: "đường đi mà các đỉnh trên nó khác nhau từng đôi") lại chỉ khái niệm path (không lặp
    đỉnh), KHÔNG phải trail; do đó nguồn này không được dẫn cho mục này. Tương tự, "đường đi" trong leanhvinh-2020
    (Định nghĩa 1.13, tr. 16 PDF) nghĩa là path (đỉnh phân biệt), còn walk được gọi là "hành trình"; leanhvinh-2020
    không có thuật ngữ riêng cho trail nên không được dẫn. ngodactan-2004 không có lần xuất hiện nào của
    "đường đi đơn". Gloss "(trail)" đã được lược bỏ khỏi definition_vi theo quy ước không chèn chú giải
    thuật ngữ trong thân định nghĩa.'
