- id: tournament
  letter: T
  headword_en: Tournament
  notation: ''
  rosen_ref: Rosen §10.2
  definition_vi: Một đồ thị có hướng đầy đủ là đồ thị có hướng nhận được bằng cách định hướng cho mỗi
    cạnh của một đồ thị đầy đủ $$K_n$$, sao cho mỗi cặp đỉnh $$u, v$$ được nối với nhau bởi đúng một trong
    hai cung $$(u,v)$$ hoặc $$(v,u)$$.
  example_vi: Với ba đỉnh $$a, b, c$$, định hướng ba cạnh của $$K_3$$ thành các cung $$(a,b)$$, $$(b,c)$$,
    $$(c,a)$$ cho ta một đồ thị có hướng đầy đủ trên ba đỉnh.
