  status: panel-approved
  notes: 'Recommended term "bắc cầu" is the standard term for transitivity, attested in the newest 2020
    graph-theory source (bib-leanhvinh-2020, p.17, where an equivalence relation is described as having
    three properties: phản xạ, đối xứng, bắc cầu) and consistently across all corpus eras. The recommended
    bare-adjective form "bắc cầu" and the definitional property-noun phrasing "tính bắc cầu" denote the
    same concept in adjectival vs nominal form; the property-noun variant "tính bắc cầu" appears in bib-nguyenhuudien-2019
    (p.111, 113, 115). "tính truyền" (bib-nguyenhuudien-2019, p.24, 110) and "truyền ứng" (bib-nguyenducnghia-2006,
    p.14) are older/regional variants; bib-nguyenhuudien-2019 explicitly equates them ("R có tính truyền
    hay bắc cầu (transitive)"). Note: bib-hoangchithanh-2007 attests "bắc cầu" only inside "bao đóng bắc
    cầu" (transitive closure, p.12), which denotes the closure operation rather than the relation property
    itself, so it is not recorded as a definitional attestation of this concept. bib-nguyenhoangthach-2020
    returned no hits for any candidate.'
- id: truth-table
  letter: T
  headword_en: Truth table
  notation: 0, 1; 2^{n}
  rosen_ref: Rosen §1.1
  definition_vi: Bảng chân trị của một mệnh đề phức hợp là bảng liệt kê chân trị của mệnh đề đó ứng với
    mỗi tổ hợp chân trị có thể có của các mệnh đề sơ cấp cấu thành nó. Mỗi mệnh đề sơ cấp nhận một trong
    hai chân trị, đúng (ký hiệu $$1$$) hoặc sai (ký hiệu $$0$$); với $$n$$ mệnh đề sơ cấp, bảng có $$2^{n}$$
    dòng.
  example_vi: 'Bảng chân trị của phép phủ định $$\neg p$$ có hai dòng: khi $$p$$ nhận chân trị $$0$$ thì
    $$\neg p$$ nhận chân trị $$1$$, và khi $$p$$ nhận chân trị $$1$$ thì $$\neg p$$ nhận chân trị $$0$$.'
  vi_terms:
  - term: bảng chân trị
    source_id: bib-nguyenhuudien-2019
    page: tr. 15 (PDF)
    recommended: true
    verified: true
    pdf_page: 15
    snippet: Các phép toán logic được định nghĩa bằng bảng chân trị (truth table). Bảng chân trị chỉ
  - term: bảng giá trị
    source_id: bib-nguyenducnghia-2006
    page: tr. 266 (PDF)
    recommended: false
    verified: true
    pdf_page: 266
    snippet: Một hàm đại số lôgïc thường được xác định bằng bảng giá trị của nó, nghĩa là trong
  see_also: []
  status: panel-approved
  notes: 'Recommended term "bảng chân trị" is attested in the 2019 source bib-nguyenhuudien-2019 (truth
    table for compound propositions / logical operators), glossed in-text as "(truth table)". Verified
    against the PDF: page 15 reads "Các phép toán logic được định nghĩa bằng bảng chân trị (truth table).
    Bảng chân trị chỉ..." and page 16 expands the definition ("Trong cột thứ nhất của bảng chân trị, ta
    liệt kê đầy đủ các trường hợp chân trị có thể có"), matching the ground-truth definition. The candidate
    variants "bảng chân lý" and "bảng giá trị chân lý" returned zero hits in every corpus source (normal
    and --loose); they are recorded here as unattested variants only and are NOT carried as vi_terms (citation
    hygiene: verified=false + empty-page rows are dropped because a verified recommended term already
    exists). The 2006 source bib-nguyenducnghia-2006 (pdf pages 266, 268) uses "bảng giá trị" for the
    value table of a Boolean/logic function ("hàm đại số lôgïc"); this is the same tabular construct but
    used in the Boolean-algebra chapter rather than as the truth table of compound propositions, so it
    is listed as a related variant (recommended=false) with the concept distinction flagged here. The
    graph-theory sources (bib-leanhvinh-2020, bib-nguyenhoangthach-2020, bib-hoangchithanh-2007, bib-ngodactan-2004)
    do not attest this logic concept. The example uses only negation, which the definition''s "tổ hợp
    chân trị" framework already covers, so no quantity outside the definition is introduced. see_also
    is empty: no other T-letter entries cover the propositional-logic dependencies, and cross-chapter
    terms (compound proposition, logical connective) are not linked per the same-chapter rule.'
- id: tautology
  letter: T
  headword_en: Tautology
  notation: ''
  rosen_ref: Rosen §1.3
  definition_vi: Một mệnh đề phức hợp được gọi là hằng đúng nếu nó nhận giá trị chân lý đúng với mọi cách
    gán giá trị chân lý cho các biến mệnh đề của nó.
  example_vi: Mệnh đề $$((p \rightarrow q) \wedge p) \rightarrow q$$ là hằng đúng, vì bảng chân trị cho
    thấy nó nhận giá trị đúng với mọi cách gán giá trị chân lý cho $$p$$ và $$q$$.
  vi_terms:
  - term: hằng đúng
    source_id: bib-nguyenhuudien-2019
    page: tr. 24 (PDF)
    recommended: true
    verified: true
    pdf_page: 24
    snippet: Ví dụ 1.20. Chứng minh rằng biểu thức p → p → q là một mệnh đề hằng đúng.
  - term: biểu thức hằng đúng
    source_id: bib-nguyenhuudien-2019
    page: tr. 29 (PDF)
    recommended: false
    verified: true
    pdf_page: 29
    snippet: 1. Cách 1. Biểu thức hằng đúng
  - term: mệnh đề hằng đúng
    source_id: bib-nguyenhuudien-2019
    page: tr. 24 (PDF)
    recommended: false
    verified: true
    pdf_page: 24
    snippet: Ví dụ 1.20. Chứng minh rằng biểu thức p → p → q là một mệnh đề hằng đúng.
  see_also:
  - contradiction
  - logical-equivalence
  - compound-proposition
  - propositional-variable
  - truth-table
  status: panel-approved
  notes: 'Recommended term "hằng đúng" is attested in the 2019 discrete-math source bib-nguyenhuudien-2019,
    where a "hằng đúng" is a logical expression/proposition that is true under every truth assignment
    to its propositional variables — exactly the tautology concept. The inline illustration "Chẳng hạn,
    $$p \vee \neg p$$ là một mệnh đề hằng đúng" was removed from definition_vi per the book convention
    that examples are self-contained and not embedded inside the definition; the example_vi field carries
    the modus-ponens instance instead. The candidate "công thức hằng đúng" returned 0 hits (normal and
    --loose) in any source and is dropped. The candidate "luôn đúng" is not attested as the term for this
    concept: its loose hit in bib-leanhvinh-2020 (tr. 206) means "always true" inside a graph-theory negation
    ("khẳng định ngược lại không phải luôn luôn đúng" = "the converse is not always true"), and the bib-nguyenhuudien-2019
    hit (tr. 18) "p ∨ ¬p luôn luôn đúng" is descriptive prose, not the named term; dropped. The compound
    variants "biểu thức hằng đúng" (tr. 29) and "mệnh đề hằng đúng" (tr. 24) co-occur with the head noun
    "hằng đúng" in the same 2019 source. No older source (2004/2006 combinatorics/graph texts) or OCR
    graph source (leanhvinh-2020, hoangchithanh-2007) attests a propositional-logic tautology term; the
    leanhvinh-2020 loose hit "khang đúng" (tr. 36) is an OCR artifact of a graph-distance induction proof
    ("giả sử khẳng định đúng với..."), not this concept.'
- id: topological-sort
  letter: T
  headword_en: Topological sort
  notation: ''
  rosen_ref: Rosen §9.6
  definition_vi: Sắp xếp topo của một tập sắp thứ tự bộ phận hữu hạn $$(S, \preceq)$$ là một thứ tự toàn
    phần $$\leq$$ trên $$S$$ tương thích với $$\preceq$$, nghĩa là một cách sắp xếp tuyến tính các phần
    tử của $$S$$ sao cho $$a \leq b$$ mỗi khi $$a \preceq b$$.
  example_vi: Với tập $$S = \{1, 2, 3, 6\}$$ sắp thứ tự bộ phận bởi quan hệ chia hết, trong đó $$a \preceq
    b$$ khi $$a$$ chia hết $$b$$, một sắp xếp topo cho ta thứ tự tuyến tính $$1 \leq 2 \leq 3 \leq 6$$,
