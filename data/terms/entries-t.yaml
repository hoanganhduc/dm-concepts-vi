- id: time-complexity
  letter: T
  headword_en: Time Complexity
  notation: O(f(n))
  rosen_ref: Rosen §3.3
  definition_vi: Độ phức tạp theo thời gian của một thuật toán là lượng thời gian mà thuật toán cần để
    giải bài toán có dữ liệu vào kích thước $$n$$, thường được đo bằng số phép toán cơ bản mà thuật toán
    thực hiện. Độ phức tạp theo thời gian thường được mô tả bằng ký hiệu tiệm cận, chẳng hạn $$O(f(n))$$,
    để cho biết tốc độ tăng của số phép toán khi $$n$$ tăng lớn.
  example_vi: Thuật toán tìm kiếm tuyến tính trên một dãy có $$n$$ phần tử có độ phức tạp theo thời gian
    là $$O(n)$$ trong trường hợp xấu nhất, trong khi thuật toán tìm kiếm nhị phân trên dãy đã sắp xếp
    chỉ có độ phức tạp theo thời gian là $$O(\log n)$$.
