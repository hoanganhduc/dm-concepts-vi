- id: the-division-rule
  letter: T
  headword_en: The Division Rule
  notation: ''
  rosen_ref: Rosen §6.1
  definition_vi: Quy tắc chia (ký hiệu trong bài toán đếm) phát biểu rằng nếu một công việc có thể được
    thực hiện bằng một thủ tục cho ra $$n$$ cách, và đúng $$d$$ cách trong số đó tương ứng với cùng một
    kết quả, thì số kết quả khác nhau là $$n/d$$. Tổng quát, nếu một tập hữu hạn $$A$$ là hợp của $$n$$
    tập con đôi một rời nhau, mỗi tập có đúng $$d$$ phần tử, thì $$n = |A|/d$$.
  example_vi: Có bao nhiêu cách xếp $$4$$ người vào một bàn tròn, nếu hai cách xếp được coi là như nhau
    khi mỗi người có cùng người ngồi bên trái và bên phải? Có $$4! = 24$$ cách xếp theo hàng; mỗi cách
    xếp vòng tròn ứng với $$d = 4$$ cách xếp hàng (do xoay vòng), nên theo quy tắc chia có $$24/4 = 6$$
    cách.
