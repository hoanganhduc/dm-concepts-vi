- id: tree
  letter: T
  headword_en: Tree
  notation: T = (V, E)
  rosen_ref: Rosen §11.1
  definition_vi: Một cây, ký hiệu $$T = (V, E)$$, là một đồ thị vô hướng liên thông không chứa chu trình
    đơn nào.
  example_vi: Đồ thị $$T = (V, E)$$ với $$V = \{a, b, c, d\}$$ và $$E = \{ab, bc, bd\}$$ là một cây, vì
    nó liên thông và không chứa chu trình đơn nào.
  vi_terms:
  - term: cây
    source_id: bib-nguyenhoangthach-2020
    page: tr. 83 (PDF)
    recommended: true
    verified: true
    pdf_page: 83
    snippet: Định nghĩa 6.1. Một cây là một đồ thị vô hướng, liên thông, không có chu[ trình]
  - term: cây
    source_id: bib-leanhvinh-2020
    page: tr. 38 (PDF)
    recommended: false
