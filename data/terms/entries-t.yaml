    snippet: Trong chương này, ta sẽ tìm hiểu một lớp đồ thị quan trọng, cây hay [...]. Trước hết, ta
      chứng minh dé thị liên thông Ơ là cây khi và chỉ khi
  - term: đồ thị cây
    source_id: bib-nguyenhoangthach-2020
    page: tr. 85 (PDF)
    recommended: false
