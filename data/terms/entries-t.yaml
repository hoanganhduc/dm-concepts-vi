- id: trivial-proof
  letter: T
  headword_en: Trivial Proof
  notation: ''
  rosen_ref: Rosen §1.6
  definition_vi: Chứng minh hiển nhiên là phương pháp chứng minh một mệnh đề kéo theo $$p \to q$$ bằng
    cách chỉ ra rằng kết luận $$q$$ là đúng; khi đó $$p \to q$$ đúng mà không cần xét đến giá trị chân
    lý của giả thiết $$p$$.
  example_vi: 'Xét mệnh đề: nếu $$a \geq b$$ với $$a, b$$ là các số thực dương thì $$a^n \geq b^n$$ khi
    $$n = 0$$. Vì $$a^0 = b^0 = 1$$ nên kết luận $$a^0 \geq b^0$$ luôn đúng; do đó mệnh đề đúng theo cách
    chứng minh hiển nhiên, không phụ thuộc giả thiết $$a \geq b$$.'
  vi_terms:
  - term: chứng minh tầm thường
    source_id: bib-rosen-2003-vi
    page: tr. 215 (PDF)
    recommended: false
    verified: true
    pdf_page: 215
    snippet: chỉ cần chỉ ra q là đúng nếu p đúng ... có thể chỉ ra được q là đúng thì mệnh dé p — q được
      chứng mình. Đó là cách chứng minh tầm thường.
  - term: Chứng minh hiển nhiên
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
