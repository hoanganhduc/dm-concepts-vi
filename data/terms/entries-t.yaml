- id: trail
  letter: T
  headword_en: Trail
  notation: v_0, v_1, \ldots, v_n
  rosen_ref: Rosen §10.4
  definition_vi: Đường đi đơn trong đồ thị $$G$$ là một đường đi không dùng lại cùng một cạnh quá một
    lần; các đỉnh trên đường đi vẫn có thể lặp lại. Một đường đi đơn từ đỉnh $$u$$ đến đỉnh $$v$$ được
    cho bởi dãy đỉnh nó đi qua, ký hiệu $$v_0, v_1, \ldots, v_n$$ với $$v_0 = u$$, $$v_n = v$$, trong
    đó không có cạnh nào được dùng lại, tức mỗi cạnh của đường đi xuất hiện đúng một lần trong dãy.
  example_vi: 'Xét đồ thị với tập đỉnh $$V = \{v_1, v_2, v_3, v_4, v_5\}$$ và tập cạnh $$\{v_3v_2, v_2v_1,
    v_1v_4, v_4v_2, v_2v_5\}$$. Dãy $$v_3, v_2, v_1, v_4, v_2, v_5$$ là một đường đi đơn từ $$v_3$$ đến
    $$v_5$$: đỉnh $$v_2$$ được đi qua hai lần nhưng không có cạnh nào bị dùng lại.'
