    các bội của những số nguyên tố $$p$$ với $$p \leq \sqrt{n}$$. Phân biệt với "công thức sàng" (sàng
    bao hàm - loại trừ) trong tổ hợp, là một khái niệm khác.
- id: the-subtraction-rule
  letter: T
  headword_en: The Subtraction Rule
  notation: '|A_1 \cup A_2| = |A_1| + |A_2| - |A_1 \cap A_2|'
  rosen_ref: Rosen §6.1
  definition_vi: Quy tắc trừ (còn gọi là nguyên lý bù trừ cho hai tập hợp) phát biểu rằng nếu một công
    việc có thể được thực hiện theo cách thứ nhất bằng $$n_1$$ cách hoặc theo cách thứ hai bằng $$n_2$$
    cách, trong đó một số cách thuộc cả hai loại, thì số cách thực hiện công việc bằng $$n_1 + n_2$$ trừ
    đi số cách thuộc cả hai loại. Khi đếm số phần tử của hợp hai tập hữu hạn $$A_1$$ và $$A_2$$, ta có
    $$|A_1 \cup A_2| = |A_1| + |A_2| - |A_1 \cap A_2|$$.
  example_vi: Số xâu nhị phân độ dài $$8$$ bắt đầu bằng bit $$1$$ hoặc kết thúc bằng hai bit $$00$$ bằng
    $$2^7 + 2^6 - 2^5 = 128 + 64 - 32 = 160$$, vì có $$2^5$$ xâu thỏa mãn cả hai điều kiện được đếm hai
    lần.
