- id: the-product-rule
  letter: T
  headword_en: The Product Rule
  notation: ''
  rosen_ref: Rosen §6.1
  definition_vi: Quy tắc nhân là quy tắc đếm phát biểu rằng nếu một công việc được thực hiện qua hai công
    đoạn kế tiếp, trong đó công đoạn thứ nhất có $$n_1$$ cách và ứng với mỗi cách đó công đoạn thứ hai
    có $$n_2$$ cách, thì có tất cả $$n_1 \cdot n_2$$ cách để thực hiện công việc. Tổng quát, nếu công
    việc gồm $$k$$ công đoạn với số cách lần lượt là $$n_1, n_2, \ldots, n_k$$ thì số cách thực hiện công
    việc là $$n_1 \cdot n_2 \cdots n_k$$.
  example_vi: Một bữa ăn được chọn gồm một món đồ uống trong $$4$$ loại và một món chính trong $$6$$ loại.
    Theo quy tắc nhân, có $$4 \cdot 6 = 24$$ cách chọn bữa ăn.
