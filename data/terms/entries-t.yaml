  status: draft
  see_ref: ''
  notes: Trong giáo trình MAT3500 gọi là "chứng minh hiển nhiên"; bản dịch Rosen dùng "cách chứng minh
    tầm thường" cho cùng phương pháp. Khác với chứng minh rỗng (vacuous proof), vốn dựa vào giả thiết
    $$p$$ sai.
- id: twos-complement-notation
  letter: T
  headword_en: Two's Complement Notation
  notation: ''
  rosen_ref: Rosen §4.2
  definition_vi: 'Ký hiệu phần bù hai là cách biểu diễn các số nguyên trên máy tính dùng $$n$$ bit, trong
    đó một số nguyên $$a$$ với $$-2^{n-1} \leq a \leq 2^{n-1}-1$$ được biểu diễn như sau: nếu $$a \geq
    0$$ thì dùng biểu diễn nhị phân $$n$$ bit của $$a$$ với bit dấu (bit ngoài cùng bên trái) bằng $$0$$;
    nếu $$a < 0$$ thì lấy biểu diễn nhị phân $$n$$ bit của số dương $$2^{n-1}+a$$ và đặt bit dấu bằng
    $$1$$. Một cách tương đương, biểu diễn phần bù hai của $$-a$$ nhận được bằng cách lấy phần bù từng
    bit của biểu diễn của $$a$$ rồi cộng thêm $$1$$.'
  example_vi: Với $$n = 6$$ bit, số $$13$$ có biểu diễn phần bù hai là $$001101$$ (bit dấu $$0$$). Để
    biểu diễn $$-13$$, ta lấy phần bù từng bit của $$001101$$ được $$110010$$ rồi cộng $$1$$, thu được
    $$110011$$ (bit dấu $$1$$).
