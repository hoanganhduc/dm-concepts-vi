- id: traveling-salesman-problem
  letter: T
  headword_en: Traveling Salesman Problem
  notation: ''
  rosen_ref: Rosen §10.5
  definition_vi: Bài toán người giao hàng (ký hiệu TSP) là bài toán tìm một chu trình Hamilton có tổng
    trọng số nhỏ nhất trong một đồ thị có trọng số đầy đủ $$K_n$$. Cho $$n$$ thành phố cùng chi phí di
    chuyển giữa mỗi cặp thành phố, ta cần tìm hành trình xuất phát từ một thành phố, đi qua mỗi thành
    phố còn lại đúng một lần rồi quay về thành phố ban đầu sao cho tổng chi phí là nhỏ nhất.
  example_vi: Với $$n$$ thành phố, tổng số hành trình khả dĩ là $$(n-1)!/2$$ nếu không phân biệt chiều
    đi, nên việc duyệt vét cạn nhanh chóng trở nên bất khả thi khi $$n$$ lớn; chẳng hạn với $$n = 6$$
    thành phố ta giải bài toán bằng thuật toán nhánh cận thay vì liệt kê toàn bộ.
