    A$$, hễ $$(a,b) \in R$$ và $$(b,c) \in R$$ thì $$(a,c) \in R$$.
  example_vi: Trên tập $$A = \{1, 2, 3\}$$, quan hệ $$R = \{(1,2), (2,3), (1,3)\}$$ có tính bắc cầu, vì
    $$(1,2) \in R$$ và $$(2,3) \in R$$ kéo theo $$(1,3) \in R$$.
