- id: the-sum-rule
  letter: T
  headword_en: The Sum Rule
  notation: ''
  rosen_ref: Rosen §6.1
  definition_vi: 'Quy tắc cộng phát biểu rằng nếu một công việc có thể được thực hiện bằng $$n_1$$ cách
    hoặc bằng $$n_2$$ cách, trong đó hai tập cách làm này không có cách nào trùng nhau, thì có tất cả
    $$n_1 + n_2$$ cách thực hiện công việc đó. Phát biểu dưới dạng tập hợp: nếu $$A_1, A_2, \dots, A_m$$
    là các tập hữu hạn đôi một rời nhau thì $$|A_1 \cup A_2 \cup \dots \cup A_m| = |A_1| + |A_2| + \dots
    + |A_m|$$.'
  example_vi: Một sinh viên chọn một đề tài từ một trong ba danh sách gồm $$23$$, $$15$$ và $$19$$ đề
    tài, các danh sách không có đề tài nào chung. Theo quy tắc cộng, số đề tài có thể chọn là $$23 + 15
    + 19 = 57$$.
