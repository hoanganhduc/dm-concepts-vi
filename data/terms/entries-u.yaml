    hóa phổ dụng".
- id: universal-instantiation
  letter: U
  headword_en: Universal Instantiation
  notation: \forall x\, P(x) \Rightarrow P(c)
  rosen_ref: Rosen §1.6
  definition_vi: Khởi tạo phổ quát là quy tắc suy luận khẳng định rằng nếu $$\forall x\, P(x)$$ đúng trên
    miền xác định $$D$$, thì có thể kết luận $$P(c)$$ đúng với một phần tử cụ thể $$c \in D$$ tùy ý. Quy
    tắc này cho phép suy ra một trường hợp riêng từ một mệnh đề có lượng từ phổ dụng $$\forall$$.
  example_vi: Từ mệnh đề $$\forall x\,(x \text{ là người} \to x \text{ phải chết})$$ và sự kiện rằng Socrates
    là người, áp dụng khởi tạo phổ quát với $$c = $$ Socrates ta được "Socrates phải chết".
