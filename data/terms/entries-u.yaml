  notes: Both attested terms come from bib-nguyenhuudien-2019 (2019, discrete math), the only corpus source
    that names quantifiers; the graph-theory sources (bib-leanhvinh-2020, bib-hoangchithanh-2007, etc.)
    use "với mọi" only as informal in-proof quantification, never as the named concept. Recommended "lượng
    từ với mọi" is the term used at the definitional introduction of $$\forall$$ on p.47 ("Ký hiệu ∀ ...
    được gọi là lượng từ với mọi"). Variant "lượng từ phổ dụng" (p.51, "universal" calque) names the same
    symbol $$\forall$$ in the inference-rules section. The third candidate "lượng từ tổng quát" has 0
    hits in any source (normal and --loose); the corpus only contains the unrelated rule name "tổng quát
    hóa phổ dụng" (universal generalization), so it is dropped. OCR sources (bib-leanhvinh-2020, bib-hoangchithanh-2007)
    were checked with both normal and --loose matching; neither attests the named concept.
- id: universal-set
  letter: U
  headword_en: Universal set
  notation: U
  rosen_ref: Rosen §2.2
  definition_vi: Tập vũ trụ, ký hiệu $$U$$, là tập hợp chứa tất cả các đối tượng đang được xét trong một
    ngữ cảnh nhất định, sao cho mọi tập hợp được nói đến đều là tập con của $$U$$.
  example_vi: Khi xét các tập số nguyên dương nhỏ hơn $$10$$, ta có thể chọn tập vũ trụ là $$U = \{1,
    2, 3, 4, 5, 6, 7, 8, 9\}$$; khi đó tập $$A = \{2, 4, 6, 8\}$$ là một tập con của $$U$$.
