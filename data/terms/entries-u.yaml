    hợp tập và hợp đồ thị.
- id: universal-address-system
  letter: U
  headword_en: Universal Address System
  notation: ''
  rosen_ref: Rosen §11.3
  definition_vi: 'Hệ thống địa chỉ phổ quát của một cây có gốc và được sắp thứ tự $$T$$ là cách gán nhãn
    cho mỗi đỉnh bằng một dãy số nguyên dương ngăn cách bởi dấu chấm, được xác định đệ quy như sau: gốc
    mang nhãn $$0$$; các con của gốc được sắp từ trái sang phải và mang nhãn $$1, 2, 3, \dots$$; và nếu
    một đỉnh $$v$$ có nhãn $$A$$ thì các con của $$v$$ được sắp từ trái sang phải và mang nhãn $$A.1,
    A.2, A.3, \dots$$. Hệ thống này cho phép sắp thứ tự toàn bộ các đỉnh theo thứ tự từ điển trên các
    nhãn.'
  example_vi: Trong một cây có gốc và được sắp thứ tự, đỉnh có nhãn $$2.3.1$$ là con thứ nhất (tính từ
    trái) của đỉnh có nhãn $$2.3$$, mà đỉnh này lại là con thứ ba của đỉnh có nhãn $$2$$, tức con thứ
    hai của gốc $$0$$.
