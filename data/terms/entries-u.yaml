  status: panel-approved
  notes: 'Recommended term "đồ thị vô hướng" is the book-standard rendering, attested as a formal Definition
    (Định nghĩa 5.1, titled "(Đồ thị vô hướng)") in the 2020 source nguyenhoangthach-2020, with newest
    citations listed first. The term is attested in ALL six corpus sources: nguyenhoangthach-2020 (2020),
    nguyenhuudien-2019 (2019), leanhvinh-2020 (2020, OCR — confirmed only via --loose at tr. 217, where
    OCR mangles "đồ" as "đỏ"), nguyenducnghia-2006, hoangchithanh-2007 (OCR, confirmed via --loose at
    tr. 6), and ngodactan-2004. The variant "đồ thị vô hướng G" (e.g. ngodactan-2004 tr. 186, nguyenhuudien-2019
    tr. 164: "Cho đồ thị vô hướng G = (V, E)") is simply the same term with the variable name $$G$$ attached
    in formal definitions; it is not a distinct concept name. "Đơn đồ thị vô hướng" (simple undirected
    graph) is the no-multiedge/no-loop specialization used by nguyenducnghia-2006 (Định nghĩa 1, tr. 153)
    and nguyenhoangthach-2020 (tr. 63); recorded here because it is the form in which several sources
    state the formal definition. The candidate "đồ thị không định hướng" has 0 hits in the corpus (both
    normal and --loose); the only occurrence of "không định hướng" (nguyenducnghia-2006 tr. 158) is in
    an edge-reorientation context ("không định hướng lại các cạnh"), NOT a name for this concept — so
    this candidate is dropped entirely. Multigraph/loop-allowing variants such as "đa đồ thị vô hướng"
    (multigraph) appear frequently (e.g. nguyenhoangthach-2020 tr. 64, ngodactan-2004 tr. 22) but denote
    multigraphs, not the simple undirected graph concept, so they are excluded. The definition states
    the general undirected graph (Rosen §10.1/10.2: each edge an unordered pair); it intentionally does
    not add the simple-graph restriction $$u \neq v$$, so the see_also links to simple-graph and multigraph
    stay coherent. The same-chapter id "underlying-undirected-graph" is added as a reciprocal forward
    reference.'
- id: unary-operation
  letter: U
  headword_en: Unary operation
  notation: 'f : A \to A'
  rosen_ref: Rosen §2.3
  definition_vi: 'Phép toán một ngôi trên một tập $$A$$ là một hàm từ $$A$$ vào $$A$$, ký hiệu $$f : A
    \to A$$, gán cho mỗi phần tử $$a \in A$$ đúng một phần tử $$f(a) \in A$$.'
  example_vi: 'Với $$A = \mathbb{Z}$$, hàm $$f : \mathbb{Z} \to \mathbb{Z}$$ xác định bởi $$f(a) = -a$$
    là một phép toán một ngôi trên $$\mathbb{Z}$$.'
  vi_terms:
  - term: phép toán một ngôi
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - binary-operation
  - function
  - set
  status: panel-approved
  notes: 'Khái niệm "unary operation" (phép toán một ngôi, $$f : A \to A$$) không được chứng thực ở bất
    kỳ nguồn Việt nào trong kho ngữ liệu. Cả ba ứng viên ("phép toán một ngôi", "phép toán đơn ngôi",
    "phép toán một biến") đều cho 0 kết quả ở chế độ thường lẫn --loose (kể cả với hai nguồn OCR bib-leanhvinh-2020
    và bib-hoangchithanh-2007). Từ "ngôi" chỉ xuất hiện trong "quan hệ hai ngôi" (binary relation) và
    "ngôi sao" (đồ thị sao / star), không phải khái niệm này. Các nguồn cũng không dùng cụm "phép toán
    hai ngôi" cho phép toán nhị nguyên, nên không có quy ước "ngôi" cho bậc của phép toán trong các sách
    rời rạc/đồ thị này. Vì không nguồn nào chứng thực, giữ một thuật ngữ chuẩn "phép toán một ngôi" làm
    khuyến nghị với verified=false, page="" (bắt buộc theo quy ước để vi_terms không rỗng). Biến thể "phép
    toán đơn ngôi" và "phép toán một biến" cũng là chuẩn nhưng không được chứng thực, nên bị loại khỏi
    vi_terms.'
- id: uncountable-set
  letter: U
  headword_en: Uncountable set
  notation: ''
  rosen_ref: Rosen §2.5
  definition_vi: Một tập $$S$$ được gọi là tập không đếm được nếu nó là tập vô hạn và không tồn tại song
    ánh giữa $$S$$ và tập các số nguyên dương $$\mathbb{Z}^+$$.
  example_vi: Tập các số thực $$\mathbb{R}$$ là một tập không đếm được; chẳng hạn, tập các số thực nằm
    trong khoảng giữa $$0$$ và $$1$$ đã là không đếm được.
  vi_terms:
  - term: tập không đếm được
    source_id: bib-rosen-2003-vi
    page: tr. 107 (PDF)
    recommended: true
    verified: true
    pdf_page: 107
    snippet: 23. Chứng minh rằng nếu A là tập không đếm được va A C Ð thì B cũng là tập không đếm được.
  - term: không đếm được
    source_id: bib-rosen-2003-vi
    page: tr. 97 (PDF)
    recommended: false
    verified: true
    pdf_page: 97
    snippet: .cũng như không đếm được.
  see_also:
  - countable-set
  - cardinality
  - one-to-one-correspondence
  status: panel-approved
  notes: 'Source: bib-rosen-2003-vi (Vietnamese translation of Rosen, "Toán học rời rạc - Ứng dụng trong
    tin học", Phạm Văn Thiều & Đặng Hữu Thịnh dịch). This is the canonical source for the entry (rosen_ref
    Rosen §2.5) and attests the concept extensively in §2.5 "Dãy và tổng". The recommended term "tập không
    đếm được" is verified=true: it appears verbatim at PDF p.107 (exercises 21, 23: "Nếu A là tập không
    đếm được...", "...A C B thì B cũng là tập không đếm được"). The bare predicate "không đếm được" is
    verified=true, appearing at PDF p.97 ("...cũng như không đếm được."), p.102 ("một tập không đếm được"),
    and p.103 (Ví dụ 12: "Chứng minh rằng tập các số thực là không đếm được"), and recurring through pp.106-107
    and p.862. The variant "tập vô hạn không đếm được" (mirroring Rosen''s English "infinite and not countable")
    was checked with find-term.py in both normal and --loose modes and returned 0 hits; being unattested
    with an empty page, it was dropped from vi_terms per citation hygiene. The other six corpus sources
    (bib-leanhvinh-2020, bib-nguyenhoangthach-2020, bib-nguyenhuudien-2019, bib-hoangchithanh-2007, bib-nguyenducnghia-2006,
    bib-ngodactan-2004) are graph theory / discrete math / combinatorics and do not treat uncountability;
    in those, the stem "đếm được" appears only as the verb "đếm được" (= "could count") and the lone cardinality
    phrase is "vô hạn đếm được" (= countably infinite, the opposite concept) in bib-ngodactan-2004. No
    2019-2020 source treats this concept, so the recommended term is drawn from the 2003 Rosen-vi source.
    The Markdown-asterisk emphasis on the headword and the appended informal restatement ("Nói cách khác,
    ... không thể liệt kê thành một dãy") were removed from definition_vi: the asterisk emphasis violated
    the single chapter-wide no-emphasis convention, and the restatement merely re-expressed the no-bijection-to-$$\mathbb{Z}^+$$
    condition already stated, which is a synonym gloss forbidden inside a definition. Notation: $$\mathbb{Z}^+$$
    for the positive integers and $$\mathbb{R}$$ for the reals follow standard usage; Rosen-vi defines
    uncountable via the absence of a "song ánh" (bijection / one-to-one correspondence) to $$\mathbb{Z}^+$$.'
