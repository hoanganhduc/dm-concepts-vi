  notes: 'Recommended term "đồ thị vô hướng" is the book-standard rendering, attested as a formal Definition
    (Định nghĩa 5.1, titled "(Đồ thị vô hướng)") in the 2020 source nguyenhoangthach-2020, with newest
    citations listed first. The term is attested in ALL six corpus sources: nguyenhoangthach-2020 (2020),
    nguyenhuudien-2019 (2019), leanhvinh-2020 (2020, OCR — confirmed only via --loose at tr. 217, where
    OCR mangles "đồ" as "đỏ"), nguyenducnghia-2006, hoangchithanh-2007 (OCR, confirmed via --loose at
    tr. 6), and ngodactan-2004. The variant "đồ thị vô hướng G" (e.g. ngodactan-2004 tr. 186, nguyenhuudien-2019
    tr. 164: "Cho đồ thị vô hướng G = (V, E)") is simply the same term with the variable name $$G$$ attached
    in formal definitions; it is not a distinct concept name. "Đơn đồ thị vô hướng" (simple undirected
    graph) is the no-multiedge/no-loop specialization used by nguyenducnghia-2006 (Định nghĩa 1, tr. 153)
    and nguyenhoangthach-2020 (tr. 63); recorded here because it is the form in which several sources
    state the formal definition. The candidate "đồ thị không định hướng" has 0 hits in the corpus (both
    normal and --loose); the only occurrence of "không định hướng" (nguyenducnghia-2006 tr. 158) is in
    an edge-reorientation context ("không định hướng lại các cạnh"), NOT a name for this concept — so
    this candidate is dropped entirely. Multigraph/loop-allowing variants such as "đa đồ thị vô hướng"
    (multigraph) appear frequently (e.g. nguyenhoangthach-2020 tr. 64, ngodactan-2004 tr. 22) but denote
    multigraphs, not the simple undirected graph concept, so they are excluded. The definition states
    the general undirected graph (Rosen §10.1/10.2: each edge an unordered pair); it intentionally does
    not add the simple-graph restriction $$u \neq v$$, so the see_also links to simple-graph and multigraph
    stay coherent. The same-chapter id "underlying-undirected-graph" is added as a reciprocal forward
    reference.'
