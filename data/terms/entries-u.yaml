    chương trình máy tính chỉ là đếm được, nên tồn tại các hàm không tính được; chẳng hạn, có thể chứng
    minh rằng một hàm là không tính được bằng cách chỉ ra rằng nó tăng nhanh hơn mọi hàm tính được.
