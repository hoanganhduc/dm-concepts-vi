  definition_vi: \emph{Hợp} là khái niệm gộp hai đối tượng cùng loại thành một đối tượng chứa mọi thành
    phần của chúng. Khái niệm này xuất hiện trong nhiều ngữ cảnh; mục này chỉ nêu ý niệm chung, các trường
