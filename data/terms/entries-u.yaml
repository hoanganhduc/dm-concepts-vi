  letter: U
  headword_en: Uniqueness Proof
  notation: \exists! x\, P(x)
  rosen_ref: Rosen §1.7
  definition_vi: 'Chứng minh tính duy nhất là một chứng minh khẳng định rằng có đúng một phần tử thỏa
    mãn một tính chất cho trước. Để chứng minh mệnh đề $$\exists! x\, P(x)$$, ta chứng minh hai phần:
    phần tồn tại, chỉ ra có một phần tử $$x$$ với $$P(x)$$ đúng; và phần duy nhất, chỉ ra rằng nếu $$x$$
    và $$y$$ đều thỏa mãn tính chất đó thì $$x = y$$.'
  example_vi: Để chứng minh rằng với mỗi số nguyên $$a$$ và mỗi số nguyên dương $$d$$, tồn tại duy nhất
    một cặp số nguyên $$q$$ và $$r$$ với $$0 \leq r < d$$ sao cho $$a = dq + r$$, ta chứng minh phần tồn
    tại của $$q$$ và $$r$$, rồi chứng minh phần duy nhất bằng cách giả sử có hai cặp như vậy và suy ra
    chúng phải trùng nhau; lập luận hai phần này là một chứng minh tính duy nhất.
