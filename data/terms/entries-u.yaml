  letter: U
  headword_en: Undirected Edge
  notation: \{u, v\}
  rosen_ref: Rosen §10.1
  definition_vi: Cạnh vô hướng là một cạnh nối hai đỉnh $$u$$ và $$v$$ của một đồ thị mà không phân biệt
    thứ tự, tức là một cặp đỉnh không sắp thứ tự $$\{u, v\}$$ (ký hiệu $$\{u, v\}$$). Một đồ thị chỉ chứa
    các cạnh vô hướng được gọi là đồ thị vô hướng.
  example_vi: Trong đồ thị biểu diễn mạng điện thoại, mỗi đường dây nối hai trạm là một cạnh vô hướng
    $$\{u, v\}$$ vì đường dây có thể dùng theo cả hai chiều.
