- id: union-of-graphs
  letter: U
  headword_en: Union of Graphs
  notation: G_1 \cup G_2
  rosen_ref: Rosen §10.2
  definition_vi: Hợp của hai đồ thị đơn $$G_1 = (V_1, E_1)$$ và $$G_2 = (V_2, E_2)$$, ký hiệu $$G_1 \cup
    G_2$$, là đồ thị đơn có tập đỉnh là $$V_1 \cup V_2$$ và tập cạnh là $$E_1 \cup E_2$$. Một cách tổng
    quát, hợp của hai tập $$A$$ và $$B$$, ký hiệu $$A \cup B$$, là tập gồm những phần tử thuộc $$A$$ hoặc
    thuộc $$B$$.
  example_vi: Cho $$G_1$$ với $$V_1 = \{a, b, c\}$$, $$E_1 = \{ab, bc\}$$ và $$G_2$$ với $$V_2 = \{b,
    c, d\}$$, $$E_2 = \{cd\}$$. Khi đó $$G_1 \cup G_2$$ có tập đỉnh $$\{a, b, c, d\}$$ và tập cạnh $$\{ab,
    bc, cd\}$$.
