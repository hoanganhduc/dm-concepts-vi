  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "hợp của hai tập hợp" is now backed by the definitional 2019 attestation bib-nguyenhuudien-2019
    (tr. 74 PDF): "Định nghĩa 3.3 Hợp của 2 tập hợp A và B, ký hiệu bởi A ∪ B, là tập hợp gồm tất cả các...",
    which both defines the operation and fixes the notation $$A \cup B$$. The bare two-set head form "hợp
    của hai tập hợp" is the recommended string; the source spells it "hợp của 2 tập hợp" (digit), recorded
    verbatim in the recommended row''s snippet. The 2020 source bib-nguyenhoangthach-2020 (tr. 54) attests
    "hợp của hai tập hợp" too, but its surrounding context is the rule-of-sum / counting principle ("...tử
    của hợp của hai tập hợp. Trong chương này, chúng ta xét quy tắc tổng quát"), not the set-union definition;
    it is therefore demoted to a non-recommended corroborating variant rather than used as the recommended
    source. The head noun "hợp" is ubiquitous but highly polysemous in the corpus (most "hợp" hits are
    "trường hợp" / "tập hợp" / "kết hợp" and graph union "hợp của hai đồ thị"), and no snippet isolates
    the bare standalone noun as a set-union concept name, so the redundant bare "hợp" variant row was
    dropped per citation hygiene and only the head-noun status is recorded here. The generalized form
    "hợp của các tập" is attested in bib-ngodactan-2004 (tr. 110) and bib-nguyenducnghia-2006 (tr. 275);
    bib-leanhvinh-2020 uses "hợp của k tập" (tr. 72-73) for generalized set union. Candidate "phép hợp"
    / "phép toán hợp" returned zero hits across all sources (normal and OCR --loose). The OCR sources
    (bib-leanhvinh-2020, bib-hoangchithanh-2007) yielded no additional distinct set-union term beyond
    "hợp" / "hợp của" under both normal and --loose searches. The definition_vi and example_vi mirror
    the parallel intersection-of-sets entry, which draws its definition from the same source (bib-nguyenhuudien-2019,
    "Định nghĩa 3.2", tr. 74). All see_also targets (intersection-of-sets, set, cartesian-product) are
    cross-chapter forward references; there are no same-chapter U-entries to link.'
- id: universal-quantifier
  letter: U
  headword_en: Universal quantifier
  notation: \forall x\, P(x)
  rosen_ref: Rosen §1.4
  definition_vi: Lượng từ với mọi của một vị từ $$P(x)$$, ký hiệu $$\forall x\, P(x)$$, là mệnh đề khẳng
    định rằng $$P(x)$$ đúng với mọi phần tử $$x$$ trong miền xác định đang xét.
  example_vi: Nếu miền xác định là tập các số nguyên dương và $$P(x)$$ là phát biểu $$x \geq 1$$, thì
    $$\forall x\, P(x)$$ là một mệnh đề đúng.
