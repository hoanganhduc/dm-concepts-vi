- id: universal-generalization
  letter: U
  headword_en: Universal Generalization
  notation: \forall x\, P(x)
  rosen_ref: Rosen §1.6
  definition_vi: Tổng quát hóa phổ quát là quy tắc suy luận khẳng định rằng nếu $$P(c)$$ đúng với một
    phần tử $$c$$ tùy ý (được chọn bất kỳ, không có tính chất đặc biệt nào) thuộc miền xác định, thì có
    thể kết luận $$\forall x\, P(x)$$. Quy tắc này được dùng để chứng minh các mệnh đề có lượng từ phổ
    dụng $$\forall$$.
  example_vi: Để chứng minh $$\forall x\,(P(x) \to Q(x))$$ trên miền $$D$$, ta lấy một phần tử $$c \in
    D$$ bất kỳ, chứng minh $$P(c) \to Q(c)$$ đúng, rồi áp dụng tổng quát hóa phổ quát để kết luận $$\forall
    x\,(P(x) \to Q(x))$$.
