    "phép toán một biến") đều cho 0 kết quả ở chế độ thường lẫn --loose (kể cả với hai nguồn OCR bib-leanhvinh-2020
    và bib-hoangchithanh-2007). Từ "ngôi" chỉ xuất hiện trong "quan hệ hai ngôi" (binary relation) và
    "ngôi sao" (đồ thị sao / star), không phải khái niệm này. Các nguồn cũng không dùng cụm "phép toán
    hai ngôi" cho phép toán nhị nguyên, nên không có quy ước "ngôi" cho bậc của phép toán trong các sách
    rời rạc/đồ thị này. Vì không nguồn nào chứng thực, giữ một thuật ngữ chuẩn "phép toán một ngôi" làm
    khuyến nghị với verified=false, page="" (bắt buộc theo quy ước để vi_terms không rỗng). Biến thể "phép
    toán đơn ngôi" và "phép toán một biến" cũng là chuẩn nhưng không được chứng thực, nên bị loại khỏi
    vi_terms.'
