  notation: p(s) = 1/|S|
  rosen_ref: Rosen §7.2
  definition_vi: Phân phối đều trên một không gian mẫu $$S$$ là phép gán xác suất bằng nhau cho mọi kết
    cục của $$S$$. Khi đó mỗi kết cục $$s \in S$$ nhận xác suất $$p(s) = 1/|S|$$.
  example_vi: Khi tung một con xúc xắc cân đối với không gian mẫu $$S = \{1, 2, 3, 4, 5, 6\}$$, mỗi kết
    cục đều có xác suất $$p(s) = 1/6$$; đây là một phân phối đều. Tổng quát, nếu $$|S| = n$$ thì phân
    phối đều gán $$p(s) = 1/n$$ cho mỗi $$s \in S$$.
