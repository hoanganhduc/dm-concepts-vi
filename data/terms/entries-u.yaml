    Rosen §2.5) and attests the concept extensively in §2.5 "Dãy và tổng". The recommended term "tập không
    đếm được" is verified=true: it appears verbatim at PDF p.107 (exercises 21, 23: "Nếu A là tập không
    đếm được...", "...A C B thì B cũng là tập không đếm được"). The bare predicate "không đếm được" is
    verified=true, appearing at PDF p.97 ("...cũng như không đếm được."), p.102 ("một tập không đếm được"),
    and p.103 (Ví dụ 12: "Chứng minh rằng tập các số thực là không đếm được"), and recurring through pp.106-107
    and p.862. The variant "tập vô hạn không đếm được" (mirroring Rosen''s English "infinite and not countable")
    was checked with find-term.py in both normal and --loose modes and returned 0 hits; being unattested
    with an empty page, it was dropped from vi_terms per citation hygiene. The other six corpus sources
    (bib-leanhvinh-2020, bib-nguyenhoangthach-2020, bib-nguyenhuudien-2019, bib-hoangchithanh-2007, bib-nguyenducnghia-2006,
    bib-ngodactan-2004) are graph theory / discrete math / combinatorics and do not treat uncountability;
    in those, the stem "đếm được" appears only as the verb "đếm được" (= "could count") and the lone cardinality
    phrase is "vô hạn đếm được" (= countably infinite, the opposite concept) in bib-ngodactan-2004. No
    2019-2020 source treats this concept, so the recommended term is drawn from the 2003 Rosen-vi source.
    The Markdown-asterisk emphasis on the headword and the appended informal restatement ("Nói cách khác,
    ... không thể liệt kê thành một dãy") were removed from definition_vi: the asterisk emphasis violated
    the single chapter-wide no-emphasis convention, and the restatement merely re-expressed the no-bijection-to-$$\mathbb{Z}^+$$
    condition already stated, which is a synonym gloss forbidden inside a definition. Notation: $$\mathbb{Z}^+$$
    for the positive integers and $$\mathbb{R}$$ for the reals follow standard usage; Rosen-vi defines
    uncountable via the absence of a "song ánh" (bijection / one-to-one correspondence) to $$\mathbb{Z}^+$$.'
