  status: panel-approved
  notes: 'Two standard Vietnamese terms denote this concept and both are attested with the exact poset
    definition: "chặn trên" (nguyenhuudien-2019, tr. 120 PDF: "Ta gọi một phần tử $$x \in X$$ là một chặn
    trên của tập hợp $$A$$ nếu và chỉ nếu với mọi $$a \in A$$ ta có: $$a \leq x$$") and "cận trên" (ngodactan-2004,
    tr. 164 PDF, defining sentence). "chặn trên" is recommended because it is attested with the precise
    partial-order definition in the newest text source (2019). Both terms also appear in the numeric/analytic
    sense of an upper bound (branch-and-bound bounds in nguyenducnghia-2006; upper bounds of Ramsey numbers
    in leanhvinh-2020); those uses corroborate the term but the concept-defining hits are the poset-element
    occurrences. "chặn trên" is also attested in the newer 2020 source bib-leanhvinh-2020 (tr. 135) but
    only in the numeric/asymptotic sense, so the poset-definitional 2019 attestation is correctly preferred
    as recommended. The third candidate "giới hạn trên" returned 0 hits in the entire corpus (normal and
    --loose) and is dropped. No hits in OCR source bib-hoangchithanh-2007. see_also entries are cross-chapter
    forward references (chapters L and P); no same-chapter (U) companion entries exist to link.'
- id: undirected-graph
  letter: U
  headword_en: Undirected graph
  notation: G = (V, E)
  rosen_ref: Rosen §10.1
  definition_vi: Một đồ thị vô hướng là một đồ thị $$G = (V, E)$$ trong đó mỗi cạnh là một cặp đỉnh không
    có thứ tự, nên mỗi cạnh không có hướng và nối hai đầu mút của nó một cách đối xứng. Mỗi cạnh nối hai
    đỉnh $$u, v \in V$$ được ký hiệu là $$\{u, v\}$$, và vì cặp không có thứ tự nên $$\{u, v\} = \{v,
    u\}$$.
  example_vi: Xét đồ thị vô hướng $$G = (V, E)$$ với tập đỉnh $$V = \{1, 2, 3\}$$ và tập cạnh $$E = \{\{1,
    2\}, \{2, 3\}\}$$. Cạnh $$\{1, 2\}$$ nối đỉnh $$1$$ với đỉnh $$2$$ một cách đối xứng, nghĩa là $$\{1,
    2\} = \{2, 1\}$$.
