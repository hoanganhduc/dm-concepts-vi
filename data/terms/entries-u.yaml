    có ít nhất một phần tử thỏa mãn $$P$$, và phần duy nhất chỉ ra rằng nếu $$x$$ và $$y$$ cùng thỏa mãn
    $$P$$ thì $$x = y$$. Kho ngữ liệu attests danh ngữ "tính duy nhất" trong các nguồn mới nhất (bib-nguyenhuudien-2019,
    bib-nguyenhoangthach-2020) cho ý uniqueness, và Rosen-VI attests lượng từ $$\exists!$$ qua cụm "tồn
    tại duy nhất một"; cụm đầy đủ "chứng minh tính duy nhất" cho phương pháp chứng minh chưa có dẫn chứng
    trực tiếp nên để recommended với verified=false.'
- id: unsolvable-problem
  letter: U
  headword_en: Unsolvable Problem
  notation: ''
  rosen_ref: Rosen §3.1
  definition_vi: Bài toán không giải được là một bài toán mà không tồn tại thuật toán nào giải được nó.
    Nói cách khác, không có thủ tục hữu hạn nào cho lời giải đúng đối với mọi dữ liệu đầu vào của bài
    toán.
  example_vi: 'Một ví dụ kinh điển là bài toán dừng: không tồn tại thuật toán nào nhận đầu vào là một
    chương trình $$P$$ cùng dữ liệu vào $$I$$ của nó và quyết định được trong mọi trường hợp xem $$P$$
    có dừng khi chạy với $$I$$ hay không. Do đó bài toán dừng là một bài toán không giải được.'
