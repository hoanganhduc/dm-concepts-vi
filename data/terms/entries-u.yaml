- id: union-of-sets
  letter: U
  headword_en: Union of sets
  notation: A \cup B
  rosen_ref: Rosen §2.2
  definition_vi: 'Hợp của hai tập hợp $$A$$ và $$B$$, ký hiệu $$A \cup B$$, là tập hợp gồm tất cả các
    phần tử thuộc $$A$$, thuộc $$B$$, hoặc thuộc cả hai, tức là $$A \cup B = \{x : x \in A \text{ hoặc
    } x \in B\}$$.'
  example_vi: Với $$A = \{1, 2, 3\}$$ và $$B = \{2, 3, 4\}$$, ta có $$A \cup B = \{1, 2, 3, 4\}$$.
  vi_terms:
  - term: hợp của hai tập hợp
    source_id: bib-nguyenhuudien-2019
    page: tr. 74 (PDF)
    recommended: true
    verified: true
    pdf_page: 74
    snippet: Định nghĩa 3.3 Hợp của 2 tập hợp A và B, ký hiệu bởi A ∪ B, là tập hợp gồm tất cả các
