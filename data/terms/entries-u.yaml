  notes: 'Thuật ngữ "không giải được" ở đây mang nghĩa tính toán được (computability): bài toán không
    giải được là bài toán không có thuật toán giải, khác với bài toán "khó" như các bài toán NP-đầy đủ
    vốn vẫn có thuật toán nhưng được cho là không có thuật toán thời gian đa thức. Bản dịch Rosen tiếng
    Việt và các nguồn corpus có dùng cụm "không thể giải được" cho nhiều ngữ cảnh khác nhau (ví dụ bài
    toán bảy cây cầu Königsberg trong bib-hoangchithanh-2007, tr. PDF 77), nên không trích làm dẫn chứng
    cho khái niệm tính toán được này; thuật ngữ chuẩn "bài toán không giải được" được dùng làm thuật ngữ
    khuyến nghị.'
- id: union
