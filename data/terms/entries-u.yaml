- id: unicyclic-graph
  letter: U
  headword_en: Unicyclic graph
  notation: ''
  rosen_ref: Rosen §11.1
  definition_vi: Một đồ thị có đúng một chu trình là một đồ thị vô hướng liên thông $$G$$ chứa đúng một
    chu trình; một cách tương đương, đó là đồ thị liên thông có số cạnh bằng số đỉnh, tức là $$|E(G)|
    = |V(G)|$$.
  example_vi: Lấy một cây $$T$$ có $$n$$ đỉnh và thêm vào đúng một cạnh nối hai đỉnh không kề nhau của
    $$T$$; đồ thị thu được liên thông và chứa đúng một chu trình, nên đó là một đồ thị có đúng một chu
    trình.
  vi_terms:
  - term: đồ thị có đúng một chu trình
    source_id: bib-nguyenhoangthach-2020
    page: tr. 83 (PDF)
    recommended: true
    verified: true
    pdf_page: 83
    snippet: bất kỳ tạo ra một đồ thị có đúng một chu trình đơn.
  see_also:
