  letter: U
  headword_en: Uncomputable Function
  notation: ''
  rosen_ref: Rosen §13.5
  definition_vi: Một hàm không tính được là một hàm mà không có chương trình máy tính nào có thể tìm được
    tất cả các giá trị của nó. Nói cách khác, một hàm được gọi là tính được nếu tồn tại một chương trình
    máy tính tìm được mọi giá trị của hàm đó, và là không tính được trong trường hợp ngược lại.
