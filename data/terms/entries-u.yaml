  notes: 'Mined the full Vietnamese corpus (newest first). The recommended term "tập vũ trụ" is attested
    in the 2019 discrete-math source bib-nguyenhuudien-2019 (pp. 73, 76, 84), where it is explicitly introduced
    as a gloss for the large set $$U$$: "tập hợp lớn U (hay còn gọi là tập vũ trụ)". The full-form variant
    "tập hợp vũ trụ" is attested in the same 2019 source (p. 74, "tập hợp vũ trụ U") and in the 2006 source
    bib-nguyenducnghia-2006 (p. 12, "tập hợp vũ trụ X"). In the 2006 source the term wraps across a line
    break ("...những tập con của một tập / hợp vũ trụ X"), so a multi-word search misses it; the single-token
    search for "vũ trụ" and inspection of the raw corpus confirm the attestation.


    Candidate terms NOT attested anywhere in the corpus: "tập phổ dụng", "tập toàn thể", "tập vũ trụ U".
    The search "phổ dụng" returned hits but all denote "universal" in other senses (the universal quantifier
    $$\forall$$ / "lượng từ phổ dụng", "tổng quát hóa phổ dụng", and "general-purpose" / "có tính phổ
    dụng" describing algorithms), never the universal set, so "tập phổ dụng" is not recorded as a verified
    variant.


    The OCR graph-theory sources (bib-leanhvinh-2020, bib-hoangchithanh-2007) yielded no attestation of
    this concept under either normal or --loose search; the "tập U" hits in bib-leanhvinh-2020 refer to
    a vertex-partition set $$U$$ in bipartite graphs (đồ thị hai phần), not the universal set, and were
    excluded. This basic set-theory concept does not appear in the graph-focused 2004/2007/2020 books,
    so the recommended term could not be sourced from the very newest (2020) corpus; the 2019 source is
    the newest attestation available and is therefore used.'
- id: upper-bound
  letter: U
  headword_en: Upper bound
  notation: a \preceq u
  rosen_ref: Rosen §9.6
  definition_vi: Cho một tập con $$A$$ của một tập sắp thứ tự bộ phận $$(X, \preceq)$$. Một phần tử $$u
    \in X$$ được gọi là một chặn trên của $$A$$ nếu $$a \preceq u$$ với mọi $$a \in A$$.
  example_vi: Xét tập sắp thứ tự bộ phận $$(\mathbb{Z}^{+}, \mid)$$, trong đó $$a \mid b$$ nghĩa là $$a$$
    chia hết $$b$$, và tập con $$A = \{2, 3\}$$. Khi đó $$6$$ là một chặn trên của $$A$$ vì $$2 \mid 6$$
    và $$3 \mid 6$$; số $$12$$ cũng là một chặn trên của $$A$$.
