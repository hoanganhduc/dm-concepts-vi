  - cycle
  - connected-graph
  status: panel-approved
  notes: 'Tiếng Việt không có một thuật ngữ danh từ chuẩn hoá riêng cho "unicyclic graph". Khái niệm thường
    được diễn đạt mô tả là "đồ thị có đúng một chu trình (đơn)" (a connected graph containing exactly
    one cycle). Thuật ngữ khuyến nghị "đồ thị có đúng một chu trình" được kiểm chứng trong nguồn 2020
    (bib-nguyenhoangthach-2020, tr. 83 PDF: "...tạo ra một đồ thị có đúng một chu trình đơn"; cũng tr.
    95: "T + ek+1 có đúng một chu trình đơn"), trùng khớp định nghĩa Rosen (đồ thị liên thông có đúng
    một chu trình, tương đương đồ thị liên thông có số cạnh bằng số đỉnh). Cụm "đúng một chu trình" xuất
    hiện rộng rãi trong các nguồn để mô tả tính chất cây cộng thêm một cạnh tạo đúng một chu trình (bib-leanhvinh-2020
    tr.42, bib-ngodactan-2004 tr.200/232, bib-nguyenducnghia-2006 tr.205, bib-nguyenhuudien-2019 tr.182),
    củng cố cách diễn đạt này. Hai biến thể giả định "đồ thị đơn chu trình" và "đồ thị một chu trình"
    (sao phỏng tiếng Anh "unicyclic") KHÔNG xuất hiện trong bất kỳ nguồn nào (kể cả tìm kiếm --loose trên
    các nguồn OCR), nên đã được loại khỏi vi_terms theo quy ước trích dẫn và chỉ ghi lại ở đây. Không
    tìm thấy "đồ thị nửa khuyên" hay "đồ thị giả cây". Trong nội bộ giáo trình Việt thường chỉ gọi cấu
    trúc này qua tính chất chứ không đặt tên lớp đồ thị. Math wrapping note: the Markdown/math-mode bold
    emphasis on the headword was removed so the central term appears in plain prose, matching the single
    chapter-wide no-emphasis convention.'
- id: unit
  letter: U
  headword_en: Unit
  notation: ''
  rosen_ref: Rosen §4.4
  definition_vi: Trong một vành có đơn vị, một phần tử khả nghịch là một phần tử $$u$$ có phần tử nghịch
    đảo theo phép nhân, tức là tồn tại phần tử $$v$$ sao cho $$uv = vu = 1$$.
  example_vi: Trong vành $$\mathbb{Z}$$, các phần tử khả nghịch là $$1$$ và $$-1$$, vì $$1 \cdot 1 = 1$$
    và $$(-1)(-1) = 1$$.
  vi_terms:
  - term: phần tử khả nghịch
    source_id: bib-ngodactan-2004
    page: tr. 62 (PDF)
    recommended: true
    verified: true
    pdf_page: 62
    snippet: Nếu a(x) là phần tử khả nghịch của C N . thì phần tử nghịch đảo của
  see_also:
  - ring
  - identity-element
  - inverse-element
  - binary-operation
  status: panel-approved
  notes: 'Standard term for "unit" is "phần tử khả nghịch" (invertible element), i.e. an element having
    a multiplicative inverse ("phần tử nghịch đảo"). Attested in bib-ngodactan-2004 at pdf_page 62 and
    167 (also at pdf_page 102 via --loose, OCR "khà"). The full noun phrase is NOT attested in any 2019-2020
    source: the closest 2020 source (bib-nguyenhoangthach-2020, pdf_page 46) uses only the adjective "khả
    nghịch" ("là khả nghịch"), not the noun phrase "phần tử khả nghịch", so the recommended term''s newest
    attestation is 2004. Candidate "phần tử đơn vị" was found (bib-ngodactan-2004, pdf_pages 60, 166)
    but denotes the multiplicative IDENTITY element (the "1"), a different concept, so it is excluded.
    Candidate "ước của đơn vị" returned 0 hits in all sources (normal and --loose) and is dropped. OCR
    sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 had 0 hits for "phần tử khả nghịch" in both
    normal and --loose runs. rosen_ref note: "unit" as an element of a ring is standard algebra terminology
    and is not formally defined in Rosen''s main exposition. The previous rosen_ref "§4.6" was incorrect
    (Rosen §4.6 is about cryptography/RSA); it has been repointed to Rosen §4.4 (Solving Congruences),
    where invertible elements / units modulo $$n$$ — the units of $$\mathbb{Z}_n$$ — are discussed, which
    is the closest Rosen anchor for this concept.'
