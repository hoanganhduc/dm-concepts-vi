  notation: \binom{m+n}{r}=\sum_{k=0}^{r}\binom{m}{r-k}\binom{n}{k}
  rosen_ref: Rosen §5.4
  definition_vi: Đẳng thức Vandermonde là hệ thức tổ hợp khẳng định rằng với các số nguyên không âm $$m$$,
    $$n$$, $$r$$ thỏa $$r\leq m+n$$, ta có $$\binom{m+n}{r}=\sum_{k=0}^{r}\binom{m}{r-k}\binom{n}{k}$$.
  example_vi: Khi $$m=n=r$$, đẳng thức Vandermonde cho $$\binom{2n}{n}=\sum_{k=0}^{n}\binom{n}{k}^{2}$$.
