    chỉ ra rằng giả thiết $$p$$ là sai; khi đó $$p \to q$$ luôn đúng bất kể giá trị chân lý của $$q$$.
  example_vi: Mệnh đề "nếu $$0 > 1$$ thì $$2 = 2$$" đúng theo phép chứng minh rỗng, vì giả thiết $$0 >
    1$$ là sai nên $$p \to q$$ đúng bất kể kết luận.
