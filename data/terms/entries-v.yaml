  notes: 'Recommended term "đỉnh" is the standard, definitional graph-theory term for a vertex; it is
    attested with a definitional snippet in the newest source bib-leanhvinh-2020 (p.8: "V gồm các phần
    tử được gọi là đỉnh của đồ thị") and in every other corpus source. Variant "điểm" (point) denotes
    the same concept in the geometric/drawing representation of $$V(G)$$ — e.g. bib-leanhvinh-2020 p.8
    represents the vertex set $$V$$ by "một tập điểm", and bib-ngodactan-2004 p.17 speaks of "các điểm
    kề nhau" (adjacent points/vertices). Variant "nút" (node) is the applied/informal rendering of the
    same notion: it appears as "nút của cây tìm kiếm" (nodes of a search tree) in bib-nguyenducnghia-2006,
    and as "đỉnh nút" (a self-loop vertex) / "nút giao thông" (traffic node) in bib-hoangchithanh-2007
    and bib-nguyenhuudien-2019. The compound "đỉnh nút" in bib-hoangchithanh-2007 specifically modifies
    "đỉnh" to mean a vertex carrying a loop, not a free-standing synonym for vertex. The recommended row''s
    snippet is kept verbatim as raw OCR evidence ("V gồm các phan tử ... đồ thi va tập cạnh"); the clean
    reading of the same passage is "V gồm các phần tử được gọi là đỉnh của đồ thị và tập cạnh E gồm các".'
- id: vertex-coloring
  letter: V
  headword_en: Vertex coloring
  notation: 'c : V(G) \to \{1,\dots,k\}'
  rosen_ref: Rosen §10.8
  definition_vi: 'Một phép tô màu các đỉnh của đồ thị $$G$$ bằng $$k$$ màu là một ánh xạ $$c : V(G) \to
    \{1,\dots,k\}$$ gán cho mỗi đỉnh một màu sao cho hai đỉnh kề nhau bất kỳ luôn được gán hai màu khác
    nhau, tức là $$c(u) \neq c(v)$$ với mọi cạnh $$uv \in E(G)$$.'
  example_vi: Với đồ thị đầy đủ $$K_n$$, mọi cặp đỉnh đều kề nhau, nên mỗi đỉnh phải nhận một màu riêng;
    do đó một phép tô màu các đỉnh của $$K_n$$ cần đúng $$n$$ màu.
