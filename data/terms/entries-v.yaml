  status: draft
  see_ref: ''
  notes: Cần phân biệt lát cắt đỉnh (vertex cut) là một tập đỉnh với đỉnh cắt (cut vertex / khớp) là một
    đỉnh đơn lẻ; một đỉnh cắt chính là một lát cắt đỉnh gồm một đỉnh. Lát cắt đỉnh là phiên bản theo đỉnh
    của tập cạnh phân tách (separating set of edges); số đỉnh nhỏ nhất của một lát cắt đỉnh là độ liên
    thông đỉnh $$\kappa(G)$$. Bản dịch bib-nguyenhoangthach-2020 (tr. 75) dùng "lát cắt đỉnh" (song song
    với "lát cắt cạnh"), còn bib-leanhvinh-2020 (tr. 129) dùng "tập đỉnh cắt"; cả hai đều chỉ cùng khái
    niệm này.
