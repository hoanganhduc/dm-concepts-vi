  see_ref: ''
  notes: 'Thuật ngữ khuyến nghị "tô màu các đỉnh" được chứng thực trong nguồn 2020 mới nhất (bib-leanhvinh-2020,
    tr. 90) với định nghĩa hình thức khớp với ánh xạ $$c : V(G) \to \{1,\dots,k\}$$. Biến thể "tô màu
    đỉnh" là dạng danh từ ngắn gọn ("vertex coloring"). Biến thể "tô màu đồ thị" KHÔNG được ghi nhận là
    một vi_term của mục này: nó tương ứng với khái niệm rộng hơn "graph coloring" (tiêu đề chương trong
    mọi nguồn từ 2004 đến 2020), tức là chủ đề cha chứ không phải bản dịch của ánh xạ tô màu đỉnh $$c
    : V(G) \to \{1,\dots,k\}$$; do đó nó được hạ cấp khỏi vi_terms và chuyển sang tham chiếu chuyển tiếp
    "graph-coloring" trong see_also. "tô màu đồ thị" được chứng thực rộng rãi (bib-nguyenhoangthach-2020
    tr.81, bib-leanhvinh-2020 tr.90, bib-nguyenhuudien-2019 tr.227, bib-nguyenducnghia-2006 tr.166, bib-hoangchithanh-2007
    tr.51, bib-ngodactan-2004 tr.284) nhưng như là tên của chủ đề cha. Hai nguồn OCR (bib-leanhvinh-2020,
    bib-hoangchithanh-2007) đã được kiểm tra ở cả chế độ thường và --loose; OCR đôi khi đọc "đỉnh" thành
    "đính"/"định" nhưng ngữ cảnh xác nhận đúng khái niệm.'
- id: vertex-connectivity
  letter: V
  headword_en: Vertex connectivity
  notation: \kappa(G)
  rosen_ref: Rosen §10.4
  definition_vi: Độ liên thông đỉnh của một đồ thị $$G$$, ký hiệu $$\kappa(G)$$, là số đỉnh ít nhất cần
    xóa (cùng với các cạnh kề) để làm cho $$G$$ mất liên thông hoặc trở thành đồ thị chỉ có một đỉnh.
    Với $$G$$ có ít nhất hai đỉnh, $$\kappa(G)$$ cũng bằng số nguyên $$k$$ lớn nhất sao cho $$G$$ là $$k$$-liên
    thông đỉnh.
  example_vi: Với đồ thị chu trình $$C_n$$ (trong đó $$n \geq 3$$), ta có $$\kappa(C_n) = 2$$, vì cần
    xóa ít nhất hai đỉnh mới làm cho $$C_n$$ mất liên thông.
  vi_terms:
