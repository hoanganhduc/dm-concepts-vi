    both normally and with --loose; loose mode surfaced extra mangled-diacritic hits but no new distinct
    terms. The definition states the value as the net flow leaving the source equal to net flow entering
    the sink, matching the English ground truth and the source framing of $$\varphi_{v_n}$$ as the quantity
    to maximize; the example is self-contained, introducing only $$s$$, $$t$$, and $$\mathrm{val}(f)$$,
    and states the no-edge-into-source assumption before asserting the source-sink equality.'
