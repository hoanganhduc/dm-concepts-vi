  see_ref: ''
  notes: Three distinct Vietnamese terms denote this concept across the corpus. (1) "độ liên thông đỉnh"
    — recommended standard form, attested in the 2020 source bib-nguyenhoangthach-2020 (tr. 75), where
    the minimum vertex cut size is named $$\kappa(G)$$; it parallels the modern term "độ liên thông cạnh"
    (edge connectivity) used in the same source. (2) "số liên thông đỉnh" — equivalent 2020 form in bib-leanhvinh-2020
    (tr. 225, OCR source; the snippet shows OCR noise rendering $$G$$ as "Ơ" and $$\kappa(G)$$ as "«(G)",
    but the surrounding definition unambiguously denotes vertex connectivity); the term also appears verbatim
    under normal (non-loose) search. (3) "liên thông đỉnh" — older form in bib-ngodactan-2004 (tr. 265),
    where graphs are called "k-liên thông đỉnh" ($$k$$-vertex-connected); the connectivity number itself
    is the least such $$k$$. No source attests the candidate "bậc liên thông" or phrasings like "liên
    thông theo đỉnh"/"tính liên thông đỉnh" (0 hits, normal and loose). The OCR source bib-hoangchithanh-2007
    and the text sources bib-nguyenhuudien-2019 and bib-nguyenducnghia-2006 returned no hits for any "đỉnh"
    connectivity term.
- id: vertex-cover
  letter: V
  headword_en: Vertex cover
  notation: S \subseteq V(G)
  rosen_ref: Rosen §10.2
  definition_vi: Một tập phủ đỉnh của đồ thị $$G$$ là một tập con các đỉnh $$S \subseteq V(G)$$ sao cho
    mỗi cạnh của $$G$$ có ít nhất một đầu mút thuộc $$S$$.
  example_vi: Xét đồ thị đường đi $$P_3$$ với các đỉnh $$a, b, c$$ và các cạnh $$ab$$, $$bc$$. Tập $$\{b\}$$
    là một tập phủ đỉnh vì cả hai cạnh $$ab$$ và $$bc$$ đều có đầu mút $$b$$.
  vi_terms:
