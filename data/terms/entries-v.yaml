  see_ref: ''
  notes: 'Mining result: NO source in the Vietnamese corpus (bib-leanhvinh-2020, bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019, bib-hoangchithanh-2007, bib-nguyenducnghia-2006, bib-ngodactan-2004) attests
    any candidate term for "vacuous proof." All three candidates (chứng minh rỗng, chứng minh tầm thường,
    phép chứng minh rỗng) returned 0 hits in both normal and --loose (OCR) modes; this was independently
    re-verified by the checker. The proof-methods section of the discrete-math source bib-nguyenhuudien-2019
    (§2.3, "Các phương pháp chứng minh cơ bản") names only direct proof (chứng minh trực tiếp, pdf_page
    56), proof by contradiction (chứng minh phản chứng, pdf_page 57-58), proof by cases (chứng minh bằng
    cách chia trường hợp), and counterexample (phản ví dụ); it does NOT name the vacuous proof as a separate
    technique. The component words "rỗng" (118 hits) and "tầm thường" (14 hits) occur only in unrelated
    senses (empty set/tập rỗng; nontrivial graph/đồ thị không tầm thường), never as a proof-method term.
    Per the locked convention, exactly one standard term ("chứng minh rỗng") is kept with verified=false
    and page="" so vi_terms is non-empty; the other two candidates were dropped as verified=false with
    empty pages. Recommended term reflects the standard rendering of Rosen''s "vacuous proof" (a conditional
    $$p \to q$$ shown true because the hypothesis $$p$$ is false). Variant glosses worth noting: "chứng
    minh tầm thường" collides with Rosen''s distinct "trivial proof" (true because $$q$$ is true), so
    "chứng minh rỗng" is preferred to keep the two notions separate.'
