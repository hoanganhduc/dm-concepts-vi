    source_id: bib-nguyenhoangthach-2020
    page: tr. 75 (PDF)
    recommended: true
    verified: true
    pdf_page: 75
    snippet: 'cắt đỉnh bé nhất được gọi là độ liên thông đỉnh của G, ký hiệu là κ(G):'
  - term: số liên thông đỉnh
    source_id: bib-leanhvinh-2020
    page: tr. 225 (PDF)
    recommended: false
    verified: true
    pdf_page: 225
    snippet: Số liên thông đỉnh của Ơ, kí hiệu bởi «(G), là số nhỏ nhất các đỉnh
  - term: liên thông đỉnh
    source_id: bib-ngodactan-2004
    page: tr. 265 (PDF)
    recommended: false
    verified: true
    pdf_page: 265
    snippet: Đồ thị G = (V\ E) được gọi là k-liên thông đỉnh hay gọi tắ t là k-liên
  - term: độ liên thông
