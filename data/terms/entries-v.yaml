- id: variable
  letter: V
  headword_en: Variable
  notation: x, y, z
  rosen_ref: Rosen §1.3
  definition_vi: Biến là một ký hiệu (thường là một chữ cái như $$x$$, $$y$$, $$z$$) thay cho một phần
    tử chưa xác định lấy giá trị trong một miền xác định cho trước. Trong hàm mệnh đề $$P(x)$$, mệnh đề
    chỉ nhận giá trị chân lý sau khi biến $$x$$ được gán một giá trị cụ thể trong miền của nó.
  example_vi: Trong câu "$$x$$ lớn hơn $$3$$", ký hiệu $$x$$ là biến và phần "lớn hơn $$3$$" là vị từ;
    câu này được viết là $$P(x)$$, và chỉ khi gán cho $$x$$ một giá trị, chẳng hạn $$x = 4$$, ta mới thu
    được một mệnh đề có giá trị chân lý xác định.
