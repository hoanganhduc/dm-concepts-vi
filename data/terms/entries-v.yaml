- id: vertex
  letter: V
  headword_en: Vertex
  notation: v \in V(G)
  rosen_ref: Rosen §10.1
  definition_vi: Đỉnh của một đồ thị $$G$$ là một phần tử của tập đỉnh $$V(G)$$, ký hiệu $$v \in V(G)$$;
    mỗi cạnh của $$G$$ nối một cặp đỉnh trong tập này.
  example_vi: Với đồ thị $$G$$ có tập đỉnh $$V(G) = \{a, b, c\}$$, mỗi phần tử $$a$$, $$b$$, $$c$$ là
    một đỉnh của $$G$$.
