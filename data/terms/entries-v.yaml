  status: panel-approved
  see_ref: ''
  notes: 'Three distinct Vietnamese terms denote this concept across the corpus. The recommended term
    "tập phủ đỉnh" is the standard full noun phrase, attested in the newest source (bib-leanhvinh-2020,
    2020) as section heading "3.3. Tập phủ đỉnh" and used throughout its definition/proofs. The shorter
    head noun "phủ đỉnh" is attested and explicitly defined in bib-nguyenducnghia-2006 (2006, p. 263):
    a subset $$S$$ of vertices is a phủ đỉnh if every edge has at least one endpoint in $$S$$. "phủ đỉnh
    nhỏ nhất" (minimum vertex cover) is the optimization-problem variant named in bib-nguyenducnghia-2006
    ("Bài toán phủ đỉnh nhỏ nhất"), recorded as a variant. OCR sources bib-hoangchithanh-2007 and bib-leanhvinh-2020
    were checked with both normal and --loose passes; hoangchithanh-2007 describes the covering property
    on p. 59 ("mỗi cạnh của G đều kề với ít nhất một đỉnh") but does not name the concept with any "phủ"-based
    head noun, so it is not recorded as an attestation. Loose searches for "phủ đỉnh" also surface false
    positives from "phủ định" (negation) in nguyenducnghia-2006; only p. 263 hits denote this concept.
    The notation field stores the bare LaTeX token "S \subseteq V(G)" (the renderer adds $$...$$), normalized
    from a pre-wrapped form to match every sibling notation field.'
- id: valid-argument
  letter: V
  headword_en: Valid argument
  notation: (p_1 \wedge \cdots \wedge p_n) \rightarrow q
  rosen_ref: Rosen §1.6
  definition_vi: Một suy luận trong logic mệnh đề, gồm các tiền đề $$p_1, p_2, \ldots, p_n$$ và kết luận
    $$q$$, được gọi là một suy luận đúng nếu kết luận $$q$$ đúng mỗi khi tất cả các tiền đề $$p_1, p_2,
    \ldots, p_n$$ đều đúng, tức là phép kéo theo $$(p_1 \wedge p_2 \wedge \cdots \wedge p_n) \rightarrow
    q$$ là một hằng đúng.
  example_vi: Suy luận với các tiền đề $$p \rightarrow q$$ và $$p$$, kết luận $$q$$, là một suy luận đúng,
    vì khi cả $$p \rightarrow q$$ và $$p$$ đều đúng thì $$q$$ cũng đúng; do đó $$((p \rightarrow q) \wedge
    p) \rightarrow q$$ là một hằng đúng.
  vi_terms:
  - term: suy luận đúng
    source_id: bib-nguyenhuudien-2019
    page: tr. 30 (PDF)
    recommended: true
    verified: true
    pdf_page: 30
    snippet: phép suy luận trên là suy luận đúng.
  - term: lập luận hợp lệ
    source_id: ''
    page: ''
    recommended: false
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - logical-equivalence
  - logical-rules-of-inference
  - premise
  status: panel-approved
  see_ref: ''
  notes: 'Recommended term "suy luận đúng" is attested in the 2019 discrete-math source bib-nguyenhuudien-2019
    (newest available source covering this propositional-logic concept). It appears repeatedly across
    §1.6 "Quy tắc suy diễn" (Rules of inference): "suy diễn (B) là một suy luận đúng" (tr. 28 PDF), "phép
    suy luận trên là suy luận đúng" (tr. 30 PDF), "Vậy suy luận đúng" (tr. 34 PDF), and as the §1.2 heading
    "Suy luận đúng" (tr. 36 PDF). The source equates a suy luận đúng with one that is "hợp logic" (logically
    valid): "Để kiểm tra một suy luận cụ thể là đúng hay không, tức là có ''hợp logic'' hay không" (tr.
    30 PDF), matching Rosen''s definition that an argument is valid when the conclusion is true whenever
    all premises are true. The source also frames it as "Một bước suy diễn đúng và sai" (tr. 28 PDF).


    The candidate variants "suy luận hợp lệ", "lập luận đúng đắn", and "suy diễn hợp lệ" returned zero
    hits in every source (normal and --loose), so they are dropped from vi_terms and recorded here only
    as plausible synonym variants.


    The graph-theory sources bib-leanhvinh-2020 (tr. 74, 127, 151, 168, 241 PDF) and others use "lập luận"
    only in the generic proof sense ("như ta đã lập luận ở trên", "Lập luận như trong trường hợp..."),
    i.e. an argument/reasoning step within a proof, NOT the named propositional-logic concept of a valid
    argument; OCR sources (bib-leanhvinh-2020, bib-hoangchithanh-2007) yielded no hits for "suy luận đúng"
    under --loose either. Hence no graph-source attestation exists for this concept and the recommendation
    rests on the 2019 discrete-math source.


    Related concept "Rules of inference" appears as "Quy tắc suy diễn" / "luật suy diễn" (bib-nguyenhuudien-2019,
    §1.6), useful for the see_also forward reference.'
- id: venn-diagram
  letter: V
  headword_en: Venn diagram
  notation: U
  rosen_ref: Rosen §2.1
  definition_vi: Sơ đồ Venn của một họ các tập hợp là một hình biểu diễn trong đó tập hợp vũ trụ (ký hiệu
    $$U$$) được vẽ thành một hình chữ nhật, còn mỗi tập hợp được vẽ thành một vùng (thường là hình tròn)
    nằm bên trong hình chữ nhật đó. Sơ đồ Venn được dùng để minh họa quan hệ giữa các tập hợp và các phép
    toán trên tập hợp.
  example_vi: Với hai tập hợp $$A$$ và $$B$$, vùng nằm trong cả hai hình tròn biểu diễn $$A$$ và $$B$$
    chính là giao $$A \cap B$$, còn toàn bộ vùng được phủ bởi hai hình tròn biểu diễn hợp $$A \cup B$$.
  vi_terms:
  - term: sơ đồ Venn
    source_id: bib-nguyenhoangthach-2020
    page: tr. 17 (PDF)
    recommended: true
