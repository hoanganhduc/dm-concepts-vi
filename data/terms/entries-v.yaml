- id: value-of-a-vertex-in-a-game-tree
  letter: V
  headword_en: Value of a Vertex in a Game Tree
  notation: ''
  rosen_ref: Rosen §11.5
  definition_vi: 'Giá trị của một đỉnh trong cây trò chơi được định nghĩa như sau: nếu đỉnh đó là một
    lá thì giá trị của nó là tiền trả cho người chơi thứ nhất khi ván chơi kết thúc tại lá đó; nếu đỉnh
    đó là một đỉnh trong thì giá trị của nó được xác định bởi giá trị của các đỉnh con qua cách chơi của
    hai người, tức là người chơi thứ nhất chọn nước đi tới đỉnh con có giá trị lớn nhất còn người chơi
    thứ hai chọn nước đi tới đỉnh con có giá trị nhỏ nhất.'
  example_vi: Xét một cây trò chơi trong đó mỗi lá được gán tiền trả cho người chơi thứ nhất. Tại một
    đỉnh trong ứng với lượt đi của người chơi thứ nhất, giá trị bằng giá trị lớn nhất trong các đỉnh con;
    tại một đỉnh trong ứng với lượt đi của người chơi thứ hai, giá trị bằng giá trị nhỏ nhất trong các
    đỉnh con. Lan truyền quy tắc này từ các lá lên gốc, giá trị của gốc cho biết tiền trả mà người chơi
    thứ nhất bảo đảm được khi cả hai cùng chơi tối ưu.
  vi_terms:
  - term: giá trị của một đỉnh trong cây trò chơi
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  - term: trò chơi
    source_id: bib-rosen-2003-vi
    page: tr. 630 (PDF)
    recommended: false
    verified: true
    pdf_page: 630
    snippet: Giải Trò chơi gửi thư này có thể biểu diễn bằng cây tứ phân. Các đỉnh
  - term: trò chơi
    source_id: bib-rosen-2003-vi
    page: tr. 710 (PDF)
    recommended: false
    verified: true
    pdf_page: 710
    snippet: trò chơi và tim chiến lược thắng. Hãy giải thích người ta đã nghiên cứu các trò chơi như
      cờ caro, nim, hex, và mot vài trò chơi khác
  see_also:
  - decision-tree
  - rooted-tree
  - leaf
  - internal-vertices
  - tree
  status: draft
  see_ref: ''
  notes: 'Theo Rosen §11.5 (Cây quyết định và cây trò chơi), giá trị của một đỉnh trong cây trò chơi được
    tính đệ quy từ các lá lên gốc theo nguyên lý minimax: giá trị của một lá là tiền trả cho người chơi
    thứ nhất, còn giá trị của một đỉnh trong là giá trị lớn nhất (ở lượt người chơi thứ nhất) hoặc nhỏ
    nhất (ở lượt người chơi thứ hai) trong các giá trị của các đỉnh con. Giá trị của gốc bằng tiền trả
    mà người chơi thứ nhất bảo đảm được khi cả hai chơi tối ưu, và một chiến lược tối ưu chọn ở mỗi đỉnh
    đỉnh con đạt giá trị đó. Thuật ngữ tiếng Việt khuyến nghị "giá trị của một đỉnh trong cây trò chơi"
    là cách dịch chuẩn của "value of a vertex in a game tree"; nó được giữ verified=false (trích dẫn rỗng)
    vì không có nguồn nào trong kho ngữ liệu (các nguồn 2004–2020) chứng thực đúng cụm này, kể cả khi
    tìm với --loose. CHÍNH SÁCH NGUỒN DẪN ĐẦU (terminology_policy): bib-rosen-2003-vi có role=reference
    và bị find-term.py loại khỏi tìm mặc định (EXCLUDE_DEFAULT); chỉ một lượt truy vấn tường minh theo
    id mới trả về kết quả, nên nó không bao giờ được làm thuật ngữ recommended/lead. Hai dòng bib-rosen-2003-vi
    được ghi là verified=true, recommended=false làm chứng thực bổ trợ cho ngữ cảnh trò chơi và cây trò
    chơi trong bản dịch Rosen: tr. 630 biểu diễn một trò chơi bằng cây và nói về các đỉnh, tr. 710 nhắc
    tới việc nghiên cứu các trò chơi (cờ caro, nim, hex) và tìm chiến lược thắng. Mục §11.5 chuyên về
    cây trò chơi của Rosen không cho snippet OCR sạch ứng đúng định nghĩa giá trị của đỉnh, nên không
    có dòng nào được gán làm trích dẫn xác nhận trực tiếp cho cụm khuyến nghị; OCR có sai một số dấu và
    ký tự, snippet được giữ nguyên minh bạch. see_also dẫn tới decision-tree (cùng mục §11.5), rooted-tree,
    leaf, internal-vertices và tree vì giá trị của đỉnh được tính trên một cây có gốc, lan truyền từ lá
    lên qua các đỉnh trong.'
- id: variance-of-a-random-variable
  letter: V
  headword_en: Variance Of A Random Variable
  notation: V(X)
  rosen_ref: Rosen §7.4
  definition_vi: Phương sai của một biến ngẫu nhiên $$X$$ là trung bình có trọng số của các bình phương
    độ lệch của $$X$$ so với giá trị kì vọng $$E(X)$$ của nó. Cụ thể, $$V(X) = \sum_{s \in S} (X(s) -
    E(X))^2\, p(s)$$, trong đó tổng được lấy theo mọi kết cục $$s$$ trong không gian mẫu $$S$$.
  example_vi: Xét phép thử tung một con xúc xắc cân đối và gọi $$X$$ là số chấm xuất hiện. Khi đó $$E(X)
    = 7/2$$ và phương sai là $$V(X) = \sum_{i=1}^{6} \frac{1}{6}\left(i - \frac{7}{2}\right)^2 = \frac{35}{12}$$.
  vi_terms:
  - term: phương sai
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also:
  - expected-value
  status: draft
  see_ref: ''
  notes: Phương sai $$V(X)$$ đo mức độ phân tán của biến ngẫu nhiên $$X$$ quanh giá trị kì vọng $$E(X)$$.
    Công thức tương đương thường dùng là $$V(X) = E(X^2) - E(X)^2$$. Căn bậc hai của phương sai, $$\sigma(X)
    = \sqrt{V(X)}$$, được gọi là độ lệch chuẩn của $$X$$. Thuật ngữ "phương sai" là cách dịch chuẩn của
    "variance"; ngữ liệu hiện có (kể cả các nguồn mới nhất và bản dịch Rosen tham chiếu) không có dẫn
    chứng trực tiếp cho thuật ngữ này.
- id: vertex-cut
  letter: V
  headword_en: Vertex Cut
  notation: ''
  rosen_ref: Rosen §10.4
  definition_vi: Một lát cắt đỉnh của một đồ thị $$G$$ là một tập đỉnh $$W \subseteq V(G)$$ sao cho việc
    xóa các đỉnh trong $$W$$ (cùng với các cạnh kề với chúng) làm cho đồ thị $$G - W$$ thu được không
    liên thông. Nói cách khác, $$W$$ là một lát cắt đỉnh nếu $$G - W$$ không liên thông.
  example_vi: 'Mọi đồ thị liên thông không đầy đủ đều có một lát cắt đỉnh. Số đỉnh nhỏ nhất trong một
    lát cắt đỉnh của $$G$$ chính là độ liên thông đỉnh $$\kappa(G) = \min\{|W| : W \text{ là lát cắt đỉnh
    của } G\}$$.'
