  definition_vi: Công thức hợp thức của một ngôn ngữ hình thức là một dãy hữu hạn các ký hiệu được xây
    dựng theo đúng các quy tắc thành lập cú pháp của ngôn ngữ đó. Các ký hiệu này gồm các biến mệnh đề
    hoặc biến vị từ, các liên từ logic, các lượng từ và các ký hiệu nhóm như cặp dấu ngoặc. Nhờ tuân theo
    các quy tắc thành lập này, một công thức hợp thức biểu diễn một biểu thức logic hợp lệ về mặt ngữ
    pháp và có ý nghĩa xác định.
  example_vi: 'Với các biến mệnh đề $$p$$, $$q$$, $$r$$, dãy ký hiệu $$(p \wedge q) \rightarrow r$$ là
    một công thức hợp thức vì nó được xây dựng đúng theo các quy tắc thành lập: hai công thức được nối
    bằng liên từ và đặt trong cặp dấu ngoặc. Ngược lại, dãy ký hiệu $$p \wedge \rightarrow q$$ không phải
    là công thức hợp thức, vì liên từ $$\rightarrow$$ không có công thức đứng ngay trước nó.'
