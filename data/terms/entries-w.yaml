  notes: Một tập sắp thứ tự tốt vừa là tập sắp thứ tự toàn phần, vừa thỏa thêm điều kiện mọi tập con khác
    rỗng có phần tử nhỏ nhất; vì vậy mọi tập sắp thứ tự tốt đều sắp thứ tự toàn phần, nhưng không phải
    mọi tập sắp thứ tự toàn phần đều sắp thứ tự tốt (chẳng hạn $$\mathbb{Z}$$ với $$\leq$$). Cần phân
    biệt khái niệm này (một tính chất của tập sắp thứ tự) với "nguyên lý thứ tự tốt" (khẳng định rằng
    $$\mathbb{N}$$ được sắp thứ tự tốt).
