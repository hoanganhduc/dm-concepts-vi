- id: witness
  letter: W
  headword_en: witness
  notation: ''
  rosen_ref: Rosen §4.4
  ref_bib: ''
  definition_vi: Một bằng chứng (cho tính hợp số của một số nguyên dương $$n$$) là một số nguyên $$b$$
    với $$1 < b < n$$ sao cho $$n$$ không vượt qua một phép kiểm tra tính nguyên tố ứng với cơ sở $$b$$
    (chẳng hạn kiểm tra Miller), qua đó khẳng định chắc chắn rằng $$n$$ là hợp số. Tổng quát hơn, trong
    lý thuyết tính toán, bằng chứng cho một mệnh đề là một đối tượng cụ thể cho phép kiểm tra nhanh rằng
    mệnh đề đó đúng.
  example_vi: Với $$n = 2047 = 23 \cdot 89$$, số $$b = 23$$ là một bằng chứng cho tính hợp số của $$n$$
    vì $$23 \mid 2047$$, trong khi $$2047$$ lại là số giả nguyên tố Fermat cơ sở $$2$$.
