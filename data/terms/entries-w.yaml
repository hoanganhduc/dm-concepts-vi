  definition_vi: 'Trọng số của một cạnh $$e$$ trong một đồ thị có trọng số là giá trị số ( ký hiệu $$w(e)$$)
    gán cho cạnh đó bởi một hàm trọng số $$w: E(G) \to \mathbb{R}$$. Tổng trọng số các cạnh của một đường
    đi hoặc một đồ thị con được gọi là độ dài (hoặc trọng số) của nó.'
  example_vi: Trong một mạng đường bay được mô hình bằng đồ thị, trọng số $$w(e)$$ gán cho cạnh $$e$$
    nối hai thành phố có thể là khoảng cách, giá vé hay thời gian bay giữa chúng.
