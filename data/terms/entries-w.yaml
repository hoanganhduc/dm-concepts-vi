  definition_vi: Không mất tính tổng quát là một giả thiết được dùng trong chứng minh nhằm giảm số trường
    hợp cần xét nhờ tính đối xứng. Khi các trường hợp còn lại có thể được suy ra từ trường hợp đang xét
    bằng một lập luận tương tự, ta chỉ cần chứng minh cho trường hợp đó mà không làm mất đi tính tổng
    quát của kết quả.
  example_vi: Để chứng minh rằng tích của hai số nguyên khác tính chẵn lẻ là số chẵn, ta có thể giả sử,
    không mất tính tổng quát, rằng số thứ nhất chẵn và số thứ hai lẻ; trường hợp ngược lại được xử lý
    hoàn toàn tương tự bằng cách đổi vai trò của hai số.
