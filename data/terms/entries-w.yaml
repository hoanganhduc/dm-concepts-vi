  status: panel-approved
  notes: 'Thuật ngữ chuẩn được khuyến nghị là "hành trình", có trong nguồn mới nhất bib-leanhvinh-2020
    (2020), Định nghĩa 1.12: một hành trình từ $$v_0$$ đến $$v_n$$ trong đồ thị $$G$$ là một dãy xen kẽ
    các đỉnh và cạnh trong đó đỉnh và cạnh có thể lặp lại. Thuật ngữ này được xác nhận lại trong bib-ngodactan-2004,
    Mục 6.3 ("Hành trình, đường, chu trình, vết và mạch"); cụ thể, định nghĩa hành trình vô hướng tổng
    quát (general/undirected walk) khớp với khái niệm này nằm ở tr. 195 (PDF) ("Giả sử $$G = (V, E)$$
    là một đồ thị vô hướng. Một hành trình ... trong $$G$$ là một dãy các đỉnh"), nên vi_term ngodactan-2004
    được trích từ tr. 195 thay vì tr. 194. Lưu ý: tr. 193-194 của bib-ngodactan-2004 định nghĩa "hành
    trình CÓ HƯỚNG" (directed walk), là trường hợp riêng hẹp hơn, nên không dùng làm chứng cứ cho khái
    niệm Walk tổng quát của Rosen §10.4. Biến thể "dãy các đỉnh" (mô tả walk bằng dãy đỉnh nó đi qua)
    xuất hiện trong nhiều nguồn (nguyenhuudien-2019 Định nghĩa 4.5, leanhvinh-2020, hoangchithanh-2007,
    ngodactan-2004); trong một đồ thị đơn, một hành trình được xác định hoàn toàn bởi dãy đỉnh $$v_0,
    v_1, \ldots, v_n$$ của nó, điều này lý giải vì sao biến thể "dãy các đỉnh" mô tả đúng khái niệm dù
    định nghĩa hình thức ở đây dùng dãy xen kẽ đỉnh-cạnh (cần thiết cho đa đồ thị). Biến thể "đường đi"
    được hoangchithanh-2007 (Định nghĩa 1.6) dùng cho khái niệm này, nhưng trong phần lớn nguồn "đường
    đi" chỉ khái niệm path (không lặp đỉnh), nên chỉ là cách gọi cũ/lỏng. Ứng viên "dây chuyền" KHÔNG
    được xác nhận cho khái niệm này: lần xuất hiện duy nhất (nguyenhuudien-2019 tr.122) nói về dây chuyền
    trong quan hệ thứ tự ($$\leq$$ trên $$X$$), không phải walk trong đồ thị, nên bị loại.'
- id: weighted-graph
  letter: W
  headword_en: Weighted graph
  notation: '(G, w),\ w : E(G) \to \mathbb{R}'
  rosen_ref: Rosen §10.6
  definition_vi: Một đồ thị có trọng số là một cặp $$(G, w)$$ gồm một đồ thị $$G$$ và một hàm trọng số
    $$w$$ gán cho mỗi cạnh $$e \in E(G)$$ một số thực $$w(e)$$, gọi là trọng số của cạnh đó.
  example_vi: Cho đồ thị $$G$$ với tập đỉnh $$V(G) = \{a, b, c\}$$ và tập cạnh $$E(G) = \{ab, bc, ac\}$$.
    Hàm $$w$$ xác định bởi $$w(ab) = 2$$, $$w(bc) = 5$$, $$w(ac) = 3$$ biến $$G$$ thành một đồ thị có
    trọng số $$(G, w)$$.
