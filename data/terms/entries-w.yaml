  notes: 'Concept (Rosen §5.2): the well-ordering principle states that every nonempty set of nonnegative
    integers has a least element; more generally, every nonempty subset of a well-ordered set has a least
    element.


    Attestation: only bib-nguyenhuudien-2019 (2019 discrete math) treats this concept, on pdf p.120 ("Định
    nghĩa 4.17 — Thứ tự tốt"). That source names the PROPERTY ("thứ tự tốt" = well-ordered; "được sắp
    tốt" = well-ordered, alternative phrasing) and gives the defining condition "mọi tập con khác rỗng
    đều có phần tử nhỏ nhất" (every nonempty subset has a least element). It does NOT use the principle-phrase
    "nguyên lý thứ tự tốt".


    Recommended term: "nguyên lý thứ tự tốt" is the standard Vietnamese name for the PRINCIPLE itself.
    No corpus source (normal or --loose, including OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007)
    literally attests this principle-phrase, so it is recorded as verified=false / page="" per the citation-hygiene
    rule that keeps one standard recommended term. It is built directly on the attested property term
    "thứ tự tốt" (verified from the 2019 source). Searches for "nguyên lý thứ tự tốt", "nguyên lý sắp
    tốt", "nguyên lý sắp thứ tự tốt", "sắp thứ tự tốt", "tập sắp thứ tự tốt" all returned 0 hits.


    Exposition note: the second sentence was tightened so the generalization to well-ordered sets $$S$$
    states the nonnegative-integer instance as an example of the general property rather than restating
    the opening principle verbatim; the named principle proper remains exactly the first sentence.


    OCR note: the 2020/2007 OCR sources discuss other principles ("nguyên lý quy nạp" = induction, "Nguyên
    lý Dirichlet" = pigeonhole), none of which denote well-ordering. The 2020 sources do not attest any
    candidate for this concept.


    Notation/definition: the displayed nonnegative-integer set $$\{0, 1, 2, \ldots\}$$ and $$\min A$$
    are introduced in the definition/notation; the example uses only the concept of least element of a
    finite nonempty set, introduced by the definition.


    Verifier: re-ran find-term.py for all three verified=true terms in bib-nguyenhuudien-2019 — all confirm
    on pdf p.120 with snippets denoting the well-ordering property (incl. "Ví dụ 4.21" giving (N, ≤) well-ordered,
    (Z, ≤) not). Re-ran principle-phrase searches (normal + OCR --loose): 0 hits, confirming verified=false
    for the recommended term.'
- id: well-formed-formula
  letter: W
  headword_en: Well-formed formula
  notation: ''
  rosen_ref: Rosen §1.1
  definition_vi: Công thức hợp thức của một ngôn ngữ hình thức là một dãy hữu hạn các ký hiệu được xây
    dựng theo đúng các quy tắc thành lập cú pháp của ngôn ngữ đó. Các ký hiệu này gồm các biến mệnh đề
    hoặc biến vị từ, các liên từ logic, các lượng từ và các ký hiệu nhóm như cặp dấu ngoặc. Nhờ tuân theo
    các quy tắc thành lập này, một công thức hợp thức biểu diễn một biểu thức logic hợp lệ về mặt ngữ
    pháp và có ý nghĩa xác định.
  example_vi: 'Với các biến mệnh đề $$p$$, $$q$$, $$r$$, dãy ký hiệu $$(p \wedge q) \rightarrow r$$ là
    một công thức hợp thức vì nó được xây dựng đúng theo các quy tắc thành lập: hai công thức được nối
    bằng liên từ và đặt trong cặp dấu ngoặc. Ngược lại, dãy ký hiệu $$p \wedge \rightarrow q$$ không phải
    là công thức hợp thức, vì liên từ $$\rightarrow$$ không có công thức đứng ngay trước nó.'
