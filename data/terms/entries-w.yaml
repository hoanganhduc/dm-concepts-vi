  status: panel-approved
  notes: 'Recommended term "trọng số của cạnh" is attested in the newest corpus: bib-nguyenhoangthach-2020
    (2020, tr. 91 PDF, definitional "được gọi là trọng số của cạnh e") and bib-nguyenhuudien-2019 (2019,
    tr. 202 PDF, "gọi là trọng số của cạnh (hoặc cung) e"); also in older sources bib-nguyenducnghia-2006
    (tr. 170 PDF, "gọi là trọng số của cạnh e") and bib-nguyenducnghia-2006 (tr. 224 PDF). The closely
    related plural form "trọng số của các cạnh" (weight of the edges) is attested in the OCR graph-theory
    source bib-leanhvinh-2020 (2020, tr. 33 PDF, "các mạng lưới với trọng số của các cạnh đều dương"),
    in OCR source bib-hoangchithanh-2007 (tr. 131 PDF, "tổng trọng số của các cạnh"), and in bib-nguyenhuudien-2019
    (tr. 248 PDF). OCR sources were searched in BOTH normal and --loose modes: bib-leanhvinh-2020 yields
    the per-edge weight concept via "đồ thị có trọng số" / "trọng số của các cạnh" (no exact "trọng số
    của cạnh"), and bib-hoangchithanh-2007 defines a weighted graph as "trên mỗi cạnh (i,j)" carrying
    a number (tr. 93 PDF) and uses "trọng số của các cạnh" (tr. 131 PDF). Variant "trọng số trên cạnh"
    attested in bib-nguyenducnghia-2006 (tr. 207 PDF); note it appears there only as a substring of the
    longer phrase "đồ thị có trọng số trên cạnh và cây khung nhỏ nhất", so the bare-term boundary is not
    isolated in the source, but it is a legitimate substring attestation. The candidate "trọng lượng"
    was NOT recorded as an edge-weight term: it has 118 hits in bib-ngodactan-2004 (out of 128 global
    hits) and denotes the weight of objects ("vật") in combinatorial / weighted-counting contexts, with
    some occurrences in that book''s weighted-graph chapter (e.g. "ma trận trọng lượng", "cây bao trùm
    có trọng lượng nhỏ nhất"); however neither "trọng lượng của cạnh" nor "trọng lượng của cung" returns
    any hit (0 in normal and --loose), so "trọng lượng" is not attested as the weight assigned to a graph
    edge. Recommended standard term: trọng số của cạnh. see_also note: the originally suggested same-chapter
    target "weight-function" was removed because no weight-function entry exists in chapter W (a same-chapter
    see_also must resolve); only the resolvable same-chapter link "weighted-graph" is kept.'
- id: wheel-graph
  letter: W
  headword_en: Wheel graph
  notation: W_n,\ n \geq 3
  rosen_ref: Rosen §10.2
  definition_vi: Đồ thị bánh xe $$W_n$$, với $$n \geq 3$$, là đồ thị thu được từ chu trình $$C_n$$ bằng
    cách bổ sung một đỉnh mới và nối đỉnh này với mỗi đỉnh trong $$n$$ đỉnh của $$C_n$$ bởi một cạnh.
    Do đó $$W_n$$ có $$n+1$$ đỉnh và $$2n$$ cạnh.
  example_vi: Đồ thị bánh xe $$W_4$$ thu được từ chu trình $$C_4$$ bằng cách thêm một đỉnh mới nối với
    cả $$4$$ đỉnh của $$C_4$$, gồm $$5$$ đỉnh và $$8$$ cạnh.
