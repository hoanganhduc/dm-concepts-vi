- id: walk
  letter: W
  headword_en: walk
  notation: v_0, e_1, v_1, e_2, \dots, e_n, v_n
  rosen_ref: Rosen §10.4
  ref_bib: ''
  definition_vi: Một hành trình độ dài $$n$$ từ đỉnh $$u$$ đến đỉnh $$v$$ trong đồ thị $$G$$ là một dãy
    xen kẽ các đỉnh và cạnh, ký hiệu $$v_0, e_1, v_1, e_2, \dots, e_n, v_n$$, với $$v_0 = u$$ và $$v_n
    = v$$, trong đó mỗi cạnh $$e_i$$ nối hai đỉnh $$v_{i-1}$$ và $$v_i$$. Trong một hành trình, các đỉnh
    và các cạnh có thể được lặp lại.
  example_vi: Trong đồ thị $$G$$ có các đỉnh $$a, b, c$$ và các cạnh $$e_1 = ab$$, $$e_2 = bc$$, $$e_3
    = ca$$, dãy $$a, e_1, b, e_2, c, e_3, a, e_1, b$$ là một hành trình độ dài $$4$$ từ $$a$$ đến $$b$$,
    trong đó cạnh $$e_1$$ và đỉnh $$a$$, $$b$$ đều được lặp lại.
