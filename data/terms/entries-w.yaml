- id: well-formed-formulae
  letter: W
  headword_en: well-formed formulae
  notation: ''
  rosen_ref: Rosen §1.1
  ref_bib: ''
  definition_vi: Một công thức được tạo đúng quy tắc là một biểu thức logic được xây dựng đúng cú pháp
    từ các biến mệnh đề, các phép toán logic ($$\neg$$, $$\wedge$$, $$\vee$$, $$\rightarrow$$, $$\leftrightarrow$$)
    và các dấu ngoặc theo các quy tắc tạo công thức. Cụ thể, mỗi biến mệnh đề là một công thức được tạo
    đúng quy tắc, và nếu $$F$$ và $$G$$ là các công thức được tạo đúng quy tắc thì $$(\neg F)$$, $$(F
    \wedge G)$$, $$(F \vee G)$$, $$(F \rightarrow G)$$ và $$(F \leftrightarrow G)$$ cũng là các công thức
    được tạo đúng quy tắc.
  example_vi: Biểu thức $$(p \wedge q) \rightarrow (\neg r)$$ là một công thức được tạo đúng quy tắc,
    trong khi $$p \wedge \vee q$$ thì không, vì nó vi phạm quy tắc tạo công thức.
