  definition_vi: Đồ thị có hướng $$G$$ được gọi là liên thông yếu nếu đồ thị vô hướng nền của nó (thu
    được bằng cách bỏ hướng của mọi cung) là liên thông, tức là giữa hai đỉnh bất kỳ luôn có đường đi
