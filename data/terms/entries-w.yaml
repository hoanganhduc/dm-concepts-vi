  status: panel-approved
  notes: 'Term mining notes. "Đồ thị có trọng số" is the dominant standard term, attested in all six corpus
    sources including both 2020 books (nguyenhoangthach-2020 tr. 91 with a clean cặp-(đồ thị, hàm trọng
    số) definition; leanhvinh-2020 tr. 33). It is the recommended term. "Mạng lưới" is given by leanhvinh-2020
    (Định nghĩa 1.30, tr. 33) explicitly as a synonym: "Một mạng lưới (hay đồ thị có trọng số) là một
    đồ thị..."; it is recorded as a variant. (Caution: "mạng lưới" also appears at hoangchithanh-2007
    tr. 101 in the informal sense "mạng lưới giao thông"/traffic network, not the formal concept, so that
    hit is not cited.) "Đồ thị trọng số" (without "có") is a shorter variant attested in figure captions
    of nguyenhuudien-2019 (tr. 250) and hoangchithanh-2007 (tr. 135). For the hoangchithanh-2007 row the
    stored snippet is the RAW OCR line of the figure caption ("Hinh 17.10. Đồ thị trong số và một cây
    bao trùm nhỏ nhất"): OCR mangles the figure number and drops the diacritic on "số"; the normalized
    reading is "Hình 11.10. Đồ thị trọng số và một cây bao trùm nhỏ nhất" (Figure 11.10 of chapter 11),
    so the term is genuine and a --loose match confirms it. Correctness caveat (moved out of the formal
    definition): in many applications edge weights are assumed nonnegative (e.g. shortest-path, minimum-spanning-tree
    contexts), but the general definition and the headword notation $$w : E(G) \to \mathbb{R}$$ admit
    all real weights, including negative ones; the ''(thường không âm)'' parenthetical was therefore removed
    from the definition so it does not conflict with its own notation. Notation conventions vary by source:
    leanhvinh-2020 writes $$(G, \omega)$$, while hoangchithanh-2007 and nguyenhuudien-2019 write $$(G,
    c)$$. The definition uses notation $$(G, w)$$ and $$w : E(G) \to \mathbb{R}$$ following the English
    ground truth (Rosen); "ký hiệu" is not used in the definition prose since the headword notation field
    already carries the symbolic form.'
- id: weight-of-an-edge
  letter: W
  headword_en: Weight of an edge
  notation: w(e),\ e \in E(G)
  rosen_ref: Rosen §10.6
  definition_vi: Trọng số của một cạnh $$e$$ trong đồ thị có trọng số là số thực $$w(e)$$ mà hàm trọng
    số gán cho cạnh $$e$$. Giá trị này thường biểu diễn chi phí, độ dài hoặc khả năng thông qua dọc theo
    cạnh đó.
  example_vi: Trong đồ thị có trọng số với cạnh $$e = uv$$, nếu hàm trọng số gán $$w(e) = 5$$ thì trọng
    số của cạnh $$e$$ là $$5$$.
