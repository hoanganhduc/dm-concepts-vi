  status: panel-approved
  notes: 'Concept: a word (string) $$w$$ over an alphabet $$\Sigma$$ is a finite sequence of symbols from
    $$\Sigma$$, including the empty word; the set of all words is $$\Sigma^*$$ (Rosen §13.1). Recommended
    term "từ" (word) is attested with an explicit definition in the newest text source bib-nguyenhoangthach-2020
    (tr. 14): "Một từ nhị phân độ dài $$n$$ ($$n \geq 0$$) là một dãy gồm..." with the empty word "từ
    trống" (a unique word of length 0) — matching the concept over the binary alphabet $$\{0,1\}$$ (the
    special case). The general word-over-alphabet sense appears in bib-ngodactan-2004 (tr. 19) and bib-nguyenducnghia-2006
    (tr. 11): "tính số các từ khác nhau lập từ một bảng chữ cái cho trước" (counting distinct words formed
    from a given alphabet). Variant "xâu ký tự" (character string) is confirmed equivalent in bib-nguyenhuudien-2019
    (tr. 134), which explicitly writes "các từ hay xâu ký tự" (words or character strings); the synonym
    gloss "(xâu ký tự)" was REMOVED from the definition body per the no-synonym-gloss convention, and
    the variant lives here and in vi_terms. Variant "xâu" (string) appears in composites "xâu nhị phân"/"xâu
    bit" (binary/bit string) across bib-nguyenducnghia-2006, bib-nguyenhuudien-2019, bib-ngodactan-2004.
    Composites "từ nhị phân" (binary word) and "từ trống" (empty word) further pin the sense. Candidate
    "chuỗi ký tự" returned 0 hits and is NOT attested; "chuỗi" alone occurs only in the unrelated sense
    "chuỗi luỹ thừa hình thức" (formal power series), so it is excluded. OCR sources bib-leanhvinh-2020
    and bib-hoangchithanh-2007 yielded no attestation for these word/string terms: "xâu" returned 0 hits
    in both normal and --loose modes. Relevant alphabet term "bảng chữ cái" (alphabet) is attested (bib-ngodactan-2004
    tr. 19; bib-nguyenducnghia-2006 tr. 11; bib-nguyenhuudien-2019).'
- id: warshalls-algorithm
  letter: W
  headword_en: Warshall's algorithm
  notation: W_k
  rosen_ref: Rosen §9.4
  definition_vi: Thuật toán Warshall là một thủ tục lặp dùng để tính bao đóng bắc cầu của một quan hệ
    $$R$$ trên tập hữu hạn $$A = \{a_1, a_2, \ldots, a_n\}$$. Bắt đầu từ ma trận không-một $$W_0$$ của
    $$R$$, thuật toán lần lượt tính các ma trận $$W_1, W_2, \ldots, W_n$$, ký hiệu $$W_k = [w_{ij}^{(k)}]$$,
    trong đó $$w_{ij}^{(k)} = 1$$ khi và chỉ khi tồn tại đường đi từ $$a_i$$ đến $$a_j$$ chỉ dùng các
    đỉnh trung gian trong $$\{a_1, \ldots, a_k\}$$; ma trận cuối cùng $$W_n$$ chính là ma trận của bao
    đóng bắc cầu $$R^{*}$$.
  example_vi: Với quan hệ $$R = \{(1,2),(2,3)\}$$ trên tập $$A = \{1,2,3\}$$, thuật toán Warshall xuất
    phát từ ma trận $$W_0$$ ghi nhận hai cặp này; khi cho phép đỉnh $$a_2 = 2$$ làm đỉnh trung gian (bước
    tính $$W_2$$), đường đi $$1 \rightarrow 2 \rightarrow 3$$ làm xuất hiện cặp $$(1,3)$$. Vì không có
    đỉnh trung gian mới nào ở bước cuối nên $$W_3 = W_2$$ chính là ma trận của quan hệ $$R^{*} = \{(1,2),(2,3),(1,3)\}$$.
  vi_terms:
