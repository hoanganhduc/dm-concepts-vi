    OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007 returned 0 hits in both normal and --loose
    modes for both candidate terms. The lone "bánh xe" hit in bib-ngodactan-2004 (tr. 160) is an unrelated
    combinatorics exercise about a physical wheel with 15 evenly spaced positions, NOT the wheel graph,
    so it is not recorded as denoting this concept. Exposition note: the trailing "ký hiệu là $$W_n$$"
    clause was removed from the definition because $$W_n$$ is already named at the start of the sentence
    and the notation field carries the symbol.'
- id: well-ordering-principle
  letter: W
  headword_en: Well-ordering principle
  notation: Tập các số nguyên không âm thường được ký hiệu $$\{0, 1, 2, \ldots\}$$; phần tử nhỏ nhất của
    một tập khác rỗng $$A$$ được ký hiệu $$\min A$$.
  rosen_ref: Rosen §5.2
  definition_vi: Nguyên lý thứ tự tốt khẳng định rằng mọi tập khác rỗng các số nguyên không âm đều có
    một phần tử nhỏ nhất. Tổng quát hơn, một tập được sắp thứ tự $$S$$ được gọi là có thứ tự tốt nếu mọi
    tập con khác rỗng của $$S$$ đều có một phần tử nhỏ nhất; tập các số nguyên không âm $$\{0, 1, 2, \ldots\}$$
    với thứ tự thông thường là một tập có thứ tự tốt.
  example_vi: Xét tập khác rỗng $$A = \{6, 2, 9, 4\}$$ gồm các số nguyên không âm. Theo nguyên lý thứ
    tự tốt, $$A$$ có một phần tử nhỏ nhất, ở đây là $$2$$.
