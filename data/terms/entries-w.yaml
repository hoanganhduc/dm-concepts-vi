  status: panel-approved
  notes: 'Only bib-hoangchithanh-2007 (2007, graph algorithms) attests a Vietnamese name for this concept:
    "thuật toán Warshall", appearing as "Thuật toán 1.2 (Warshall)" (pdf p.12) used "để tính ma trận bao
    đóng bắc cầu" (to compute the transitive closure matrix), and referenced again on pdf p.73 ("toán
    Warshall"). This source is OCR; both normal and --loose searches returned identical results. No 2019-2020
    source (bib-leanhvinh-2020, bib-nguyenhoangthach-2020, bib-nguyenhuudien-2019) attests any Warshall
    term, so the recommended term cannot be sourced from a newest-tier book; "thuật toán Warshall" is
    retained as recommended because it is the standard name and the only attested term. The candidate
    variants "thuật toán Roy-Warshall" and "thuật toán Floyd-Warshall" (and their bare forms "Roy-Warshall",
    "Floyd-Warshall") returned zero hits across all sources in both normal and loose modes, so they are
    not recorded as verified vi_terms. Context term "bao đóng bắc cầu" (transitive closure) co-occurs
    on the same page, confirming the term denotes THIS concept. definition_vi and notation $$W_k$$ follow
    Rosen §9.4: $$W_0$$ is the zero-one matrix of $$R$$ and $$W_n$$ is the matrix of the transitive closure
    $$R^{*}$$; the relation-level term "bao đóng bắc cầu" and notation $$R^{*}$$ are aligned with the
    companion entry transitive-closure (which carries the same attestation). Exposition: the in-line quasi-synonym
    gloss "tức là ma trận liên thông của đồ thị có hướng biểu diễn $$R$$" was MOVED out of the definition
    into notes, so the definition states the transitive-closure concept directly without an embedded synonym
    rephrasing. The phrases "ma trận liên thông" (connectivity/reachability matrix), "ma trận không-một"
    (zero-one matrix), and "đỉnh trung gian" (interior vertex) are descriptive Vietnamese renderings used
    in the definition/notes prose only, not claimed as attested vi_terms. Example tightening: the new
    pair $$(1,3)$$ arises at the $$W_2$$ step (interior vertex $$a_2 = 2$$), and $$W_3 = W_2$$ since no
    new interior vertex is added at the last step, so the reader is not misled into attributing the new
    pair to the $$W_3$$ step. see_also keeps the attested forward reference transitive-closure (exists,
    T chapter) and adds reachability (exists, R chapter; Warshall computes the reachability/connectivity
    matrix); the originally suggested "zero-one-matrix" is dropped because no such entry exists in the
    corpus. There are no other W-chapter entries to cross-link.'
