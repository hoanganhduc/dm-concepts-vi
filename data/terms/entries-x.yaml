- id: xor
  letter: X
  headword_en: XOR (exclusive or)
  notation: p \oplus q
  rosen_ref: Rosen §1.1
  definition_vi: Phép hay loại trừ của hai mệnh đề $$p$$ và $$q$$, ký hiệu $$p \oplus q$$, là mệnh đề
    phức hợp đúng khi đúng một trong hai mệnh đề $$p$$, $$q$$ nhận giá trị đúng, và sai trong các trường
    hợp còn lại.
  example_vi: Cho $$p$$ là mệnh đề "Hôm nay là thứ Hai" và $$q$$ là mệnh đề "Trời đang mưa". Khi đó $$p
    \oplus q$$ đúng khi và chỉ khi đúng một trong hai mệnh đề trên nhận giá trị đúng; nếu cả hai cùng
    đúng hoặc cả hai cùng sai thì $$p \oplus q$$ sai.
