  notes: 'Hai nguồn định nghĩa khái niệm này. bib-nguyenhuudien-2019 (2019, tr. 18 PDF), trong phần "Nhận
    xét" sau Phép tuyển, giới thiệu phép "hoặc" với bảng chân trị có dòng cuối $$1,1 \mapsto 0$$ và nêu
    nó "đúng khi đúng một trong hai mệnh đề $$p$$, $$q$$ đúng" — đúng là định nghĩa XOR; nguồn này cũng
    gọi thẳng phép đó là hay loại trừ ("exclusive or"). Bản dịch tham khảo bib-rosen-2003-vi (2003, tr.
    10 PDF), ĐỊNH NGHĨA 4, gọi nó là mệnh đề tuyển loại $$p \oplus q$$. Trong bib-nguyenhuudien-2019,
    tuyển bao hàm $$p \vee q$$ được gọi là phép "hay"/phép tuyển (định nghĩa ở tr. 17 với ký hiệu $$\vee$$),
    còn phép loại trừ được gọi là phép "hoặc" (tr. 18) — một quy ước đặt tên riêng của sách này (phần
    lớn sách Việt dùng phép tuyển/hoặc cho OR bao hàm). OCR ở bib-nguyenhuudien-2019 hiển thị ký hiệu
    $$\oplus$$ thành $$\vee$$ (find-term trả về "p∨q đúng khi trong 2 mệnh đề p và q có một mệnh đề đúng,
    một mệnh đề sai"); dòng bảng chân trị $$1,1 \mapsto 0$$ và phần lời phân biệt nó với OR bao hàm. Cách
    diễn đạt bằng prose, ví dụ "dòng mà $$p$$ và $$q$$ cùng đúng cho $$p \oplus q = 0$$", rõ hơn ký hiệu
    rút gọn. Cụm hit "XOR" trong bib-hoangchithanh-2007 (tr. 25 PDF, "w := u XOR v trong ngôn ngữ lập
    trình Pascal") là XOR theo bit/Pascal dùng trong lý thuyết trò chơi kiểu Nim, KHÔNG phải XOR mệnh
    đề của hai mệnh đề, nên không tính vào mục này (xem mục xor-bit-operation). Đính chính so với bản
    nháp khai thác trước: KHÔNG đúng khi nói "chỉ bib-nguyenhuudien-2019 định nghĩa khái niệm này" và
    "phép tuyển loại trừ trả về 0 hit kể cả --loose"; bản dịch tham khảo bib-rosen-2003-vi dùng dạng họ
    thuật ngữ tuyển loại / mệnh đề tuyển loại và là một biến thể đã xác minh. Lần khai thác tự động đã
    bỏ sót bib-rosen-2003-vi (bị loại bởi find-term.py), nhưng quy ước sách yêu cầu ghi MỌI biến thể từ
    MỌI nguồn (cũ + mới), và việc đọc trang đã xác nhận hit. Thuật ngữ chuẩn discrete-math "phép tuyển
    loại trừ" là một biến thể không xác minh được verbatim trong kho ngữ liệu và không còn được giữ làm
    trích dẫn rỗng-trang. Các hit "loại trừ" còn lại phần lớn là "nguyên lý bao hàm và loại trừ" (inclusion-exclusion),
    một khái niệm khác. Thuật ngữ khuyến nghị là "hay loại trừ" (nguồn mới nhất, không phải nguồn tham
    khảo); ví dụ tự chứa, chỉ dùng $$p$$, $$q$$, $$p \oplus q$$ mà định nghĩa giới thiệu.'
- id: xnor
  letter: X
  headword_en: XNOR (exclusive nor)
  notation: \overline{p \oplus q}
  rosen_ref: Rosen §1.1
  definition_vi: Phép tương đương của hai mệnh đề $$p$$ và $$q$$, ký hiệu $$\overline{p \oplus q}$$, là
    phủ định của phép hay loại trừ $$p \oplus q$$ của chúng. Mệnh đề này nhận giá trị đúng khi và chỉ
    khi $$p$$ và $$q$$ có cùng chân trị, nên tương đương logic với phép kéo theo hai chiều $$p \leftrightarrow
    q$$.
  example_vi: Với $$p$$ là mệnh đề "trời mưa" và $$q$$ là mệnh đề "đường ướt", mệnh đề $$\overline{p \oplus
    q}$$ đúng khi cả $$p$$ và $$q$$ cùng đúng hoặc cùng sai, và sai khi đúng một trong hai.
