  notes: 'XNOR/exclusive nor không được gọi tên trực tiếp trong nguồn Việt nào (không nguồn nào dùng "phép
    phủ định tuyển loại"). Theo Rosen, XNOR là phủ định của phép hay loại trừ và tương đương logic với
    phép kéo theo hai chiều $$p \leftrightarrow q$$, đúng đúng khi $$p$$ và $$q$$ cùng chân trị. Kho ngữ
    liệu chứng thực phép tương đương này (liên từ kéo theo hai chiều $$\leftrightarrow$$) trong bib-nguyenhuudien-2019
    (2019), nguồn duy nhất trong nhóm 2019-2020 bao quát logic mệnh đề (bảng chân trị tr. 19 PDF cho $$p
    \leftrightarrow q = 1$$ đúng khi $$p$$, $$q$$ trùng chân trị, khớp XNOR), và được CORROBORATE bởi
    bản dịch tham khảo bib-rosen-2003-vi (2003, tr. 13 PDF, ĐỊNH NGHĨA 6, mệnh đề tương đương $$p \leftrightarrow
    q$$). Đính chính so với bản nháp trước: KHÔNG đúng khi nói phép này "chỉ" có ở bib-nguyenhuudien-2019;
    bản dịch tham khảo bib-rosen-2003-vi cũng chứng thực "phép tương đương" (lần khai thác tự động trước
    đã bỏ sót nguồn này vì find-term.py loại nó). Thuật ngữ khuyến nghị "phép tương đương" là tên chuẩn
    của phép này; "phép kéo theo 2 chiều" là tên đồng nghĩa trong cùng nguồn nguyenhuudien-2019. Theo
    registry, bib-rosen-2003-vi là role:reference nên dù chứng thực, nó KHÔNG được làm thuật ngữ khuyến
    nghị/lead; recommended vẫn đặt ở thể "phép tương đương" của bib-nguyenhuudien-2019 (nguồn mới nhất).
    Không có nguồn 2019-2020 nào bao quát XNOR dưới một mục đồ thị/tổ hợp, nên 2019 là chứng thực mới
    nhất hiện có. Biến thể "tương đương logic" (tr. 21 PDF) chỉ quan hệ tương đương logic giữa các công
    thức ($$E \equiv F$$, cùng chân trị trong mọi gán giá trị), một khái niệm meta-level liên quan nhưng
    khác phép XNOR; ghi lại cho đầy đủ. Các ứng viên bị loại: "phép đồng giá trị" và "phủ định của phép
    tuyển loại trừ" trả về 0 hit ở cả chế độ thường và --loose. Các nguồn đồ thị OCR (bib-leanhvinh-2020,
    bib-hoangchithanh-2007) và bib-ngodactan-2004, bib-nguyenducnghia-2006, bib-nguyenhoangthach-2020
    dùng "tương đương" chỉ cho quan hệ tương đương và đẳng cấu đồ thị, không cho phép XNOR/kéo theo hai
    chiều.'
- id: xor-bit-operation
  letter: X
  headword_en: XOR bit operation
  notation: x \oplus y
  rosen_ref: Rosen §1.1
  definition_vi: Phép XOR theo bit của hai bit $$x$$ và $$y$$, ký hiệu $$x \oplus y$$, nhận giá trị $$1$$
    khi và chỉ khi một trong hai bit bằng $$1$$ và nhận giá trị $$0$$ trong các trường hợp còn lại. Phép
    toán này được mở rộng cho hai xâu bit có cùng độ dài bằng cách lấy XOR theo từng vị trí tương ứng.
  example_vi: Với hai bit $$x = 1$$ và $$y = 0$$ ta có $$x \oplus y = 1$$, còn $$1 \oplus 1 = 0$$ và $$0
    \oplus 0 = 0$$. Áp dụng theo từng vị trí cho hai xâu bit $$1011$$ và $$1100$$ ta được $$1011 \oplus
    1100 = 0111$$.
