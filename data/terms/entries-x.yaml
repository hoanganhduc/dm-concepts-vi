  notes: 'Khái niệm XOR theo bit (exclusive-or trên bit, mở rộng theo từng thành phần cho xâu bit) ĐƯỢC
    chứng thực trong kho ngữ liệu bởi hai nguồn. Bản dịch tham khảo bib-rosen-2003-vi (2003, tr. 14-15
    PDF) định nghĩa thẳng "XOR bit" trên hai xâu bit cùng chiều dài, với ví dụ tính theo từng vị trí ("10101
    01011 ⊕ XOR bit"). bib-hoangchithanh-2007 (tr. 25 PDF) giới thiệu cùng phép này dưới tên "phép toán
    $$\oplus$$-tổng" với $$w_i = (u_i + v_i) \bmod 2$$ trên các chữ số nhị phân của $$u, v$$, ký hiệu
    $$w = u \oplus v$$, và đồng nhất tường minh với câu lệnh Pascal "w := u XOR v". Nguồn hoangchithanh-2007
    là OCR; ký hiệu cộng-trong-vòng-tròn $$\oplus$$ bị OCR làm hỏng thành "¿—" / "d—" / "d~" (snippet
    "được gọi là d— tổng của u và v"), nên tên dự kiến là "phép (toán) $$\oplus$$-tổng" ("phép cộng theo
    modulo 2 từng bit"). Token "XOR" sống sót qua OCR ở cả hai nguồn. Đính chính so với bản nháp trước:
    KHÔNG đúng khi nói "nguồn duy nhất chứng thực khái niệm này là bib-hoangchithanh-2007" và "không cụm
    ứng viên nào xuất hiện verbatim" — bib-rosen-2003-vi chứng thực "XOR bit" verbatim (tr. 15 PDF), về
    thực chất chính là thuật ngữ khuyến nghị "phép XOR theo bit". Lần khai thác tự động trước đã bỏ sót
    bib-rosen-2003-vi (bị loại bởi find-term.py). Không nguồn 2019-2020 nào gọi tên phép này: các hit
    "loại trừ"/"tuyển" trong bib-ngodactan-2004 và bib-nguyenhuudien-2019 chỉ nguyên lý bao hàm-loại trừ
    và tuyển logic, KHÔNG phải XOR theo bit; các hit "modulo 2" chỉ đồng dư modulo 2; các hit "xâu bit"/"phép
    toán bit" trong bib-nguyenhuudien-2019 chỉ biểu diễn tập-dưới-dạng-xâu-bit và độ phức tạp bit, không
    phải XOR. Thuật ngữ khuyến nghị: thể chuẩn hiện đại "phép XOR theo bit" được giữ làm headword khuyến
    nghị (verified=false), vì ĐÚNG cụm verbatim này không xuất hiện trong kho — các thể được chứng thực
    là "XOR bit" (bib-rosen-2003-vi, tr. 15, role:reference nên không được làm lead) và "phép $$\oplus$$-tổng"
    (bib-hoangchithanh-2007, tr. 25). Do đó "phép XOR theo bit" là chuẩn-hóa chính tả của các thể đã được
    chứng thực, KHÔNG phải một sáng chế không có nguồn; điều khoản verified=false-recommended được thỏa
    vì chính cụm này chưa có chứng thực verbatim, và phép toán thì ĐÃ có nguồn. Token Pascal trần "XOR"
    (chỉ là từ khóa ngôn ngữ lập trình trong snippet hoangchithanh-2007, không phải tên thuật ngữ tiếng
    Việt) đã được bỏ khỏi vi_terms để giữ danh sách mang tính thuật ngữ; snippet Pascal vẫn được lưu trong
    thể "phép $$\oplus$$-tổng".'
