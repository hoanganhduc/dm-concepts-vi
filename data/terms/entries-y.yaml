- id: young-tableau
  letter: Y
  headword_en: Young tableau
  notation: \lambda \vdash n
  rosen_ref: Rosen §6.5
  ref_bib: ''
  definition_vi: Cho phân hoạch $$\lambda \vdash n$$ của số nguyên dương $$n$$, một *bảng Young (chuẩn)*
    ứng với $$\lambda$$ (ký hiệu $$T$$) là một cách điền các số $$1, 2, \ldots, n$$, mỗi số đúng một lần,
    vào các ô của giản đồ Young của $$\lambda$$ (một mảng ô được căn lề trái mà độ dài các dòng tạo thành
    $$\lambda$$), sao cho các số tăng ngặt theo mỗi dòng từ trái sang phải và tăng ngặt theo mỗi cột từ
    trên xuống dưới.
  example_vi: Với $$\lambda = (2,1) \vdash 3$$, giản đồ Young có hai ô ở dòng thứ nhất và một ô ở dòng
    thứ hai; cách điền dòng thứ nhất bằng $$1, 2$$ và dòng thứ hai bằng $$3$$ là một bảng Young, vì $$1
    < 2$$ trên dòng và $$1 < 3$$ trên cột.
  vi_terms:
