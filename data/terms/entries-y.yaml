  see_ref: ''
  notes: 'Khái niệm phép biến đổi $$Y$$-$$\Delta$$ (sao-tam giác) không được chứng thực trong bất kỳ nguồn
    tiếng Việt nào của kho ngữ liệu. Đã tìm trên cả bảy nguồn — bib-leanhvinh-2020, bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019, bib-hoangchithanh-2007, bib-nguyenducnghia-2006, bib-ngodactan-2004, VÀ bản
    dịch tham khảo bib-rosen-2003-vi qua một lần khai thác by-id riêng (find-term.py loại bib-rosen-2003-vi
    khỏi chế độ tìm-tất-cả mặc định) — ở cả chế độ thường lẫn --loose cho các nguồn OCR. Đã tìm các biến
    thể "phép biến đổi sao-tam giác", "biến đổi Y-Delta", "phép biến đổi Y-Delta", "sao tam giác", "tam
    giác sao", "biến đổi sao", "Y-Delta", "Delta-Y", "wye-delta": tất cả đều 0 hit. Hit "wye" duy nhất
    (bib-rosen-2003-vi tr. 935 PDF) là tạp âm OCR từ một bài tập đồ thị thành phố ("NewYerk"/New York),
    không phải phép biến đổi. Đính chính so với bản khai thác trước: ghi chú gốc chỉ liệt kê SÁU nguồn
    và bỏ sót bib-rosen-2003-vi; lần khai thác by-id riêng đã xác nhận Rosen-vi cũng 0 hit, nên kết luận
    không-chứng-thực vẫn đúng trên đủ bảy nguồn. Các nguồn có nói về phép toán đồ thị liên quan nhưng
    khác khái niệm này, gồm phép chia cạnh (bib-nguyenhoangthach-2020 tr. 81 "Định nghĩa 5.51. Phép chia
    cạnh", bib-hoangchithanh-2007 tr. 119), khái niệm hai đồ thị đồng cấu qua phép chia cạnh (bib-nguyenducnghia-2006
    tr. 161 "...đồng cấu nếu chúng có thể thu được từ cùng một đồ thị nào đó nhờ các phép chia cạnh";
    so sánh khái niệm đồng phôi ở bib-nguyenhoangthach-2020 tr. 81), và đồ thị sao $$K_{1,n}$$ như một
    lớp đồ thị (bib-leanhvinh-2020 tr. 15, tr. 82) — không phải phép biến đổi thay đỉnh bậc ba bằng tam
    giác trên ba láng giềng. Đây là khái niệm chuyên biệt (rút gọn đồ thị kiểu mạng điện) không xuất hiện
    trong các giáo trình toán rời rạc/lý thuyết đồ thị tiếng Việt đã khảo sát. Giữ một thuật ngữ chuẩn
    theo nghĩa đen "phép biến đổi sao-tam giác" với verified=false, page="" để vi_terms không rỗng. Hit
    "We Wye" (bib-hoangchithanh-2007 tr. 26) là tạp âm OCR, không liên quan. Bất biến: bản nháp trước
    khẳng định sai rằng phép biến đổi "giữ nguyên tính liên thông cốt yếu và cấu trúc minor của $$G$$";
    câu này đã được gỡ bỏ. Một phép $$Y$$-$$\Delta$$ tạo ra một đồ thị khác, nói chung KHÔNG tương đương
    minor, và làm thay đổi số đỉnh và số chu trình. Bất biến duy nhất luôn đúng là số cạnh được bảo toàn
    (mỗi phép xóa 3 cạnh và thêm 3 cạnh). Tính phẳng chỉ được bảo toàn CÓ ĐIỀU KIỆN — khi tam giác (hoặc
    sao) là một mặt của một biểu diễn phẳng — chứ KHÔNG vô điều kiện; ví dụ họ Petersen là một lớp tương
    đương $$Y$$-$$\Delta$$ không rút gọn được. Vì các phát biểu bất biến này hoặc có điều kiện hoặc không
    cần cho định nghĩa, chúng được để ở ghi chú thay vì khẳng định trong định nghĩa. rosen_ref "Rosen
    §10.7" là con trỏ chủ đề liên quan, không phải nguồn định nghĩa: §10.7 của Rosen bàn về đồ thị phẳng/công
    thức Euler/Kuratowski — ngữ cảnh tạo động lực cho phép biến đổi này (tính phẳng, minor kiểu Kuratowski)
    — chứ không định nghĩa trực tiếp phép $$Y$$-$$\Delta$$; điều này phù hợp với việc khái niệm vắng mặt
    trong kho tiếng Việt. see_also để trống: chưa có mục cùng chương Y nào để liên kết, và mục liên quan
    duy nhất (homeomorphic-graphs / graph-minor, qua thảo luận chia cạnh/đồng phôi) nằm ở chương khác
    nên chỉ là tham chiếu xuôi, không liên kết theo quy ước kebab-id cùng chương.'
