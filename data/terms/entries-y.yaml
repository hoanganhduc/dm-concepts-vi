  notes: 'Kết quả khai thác: KHÔNG nguồn tiếng Việt nào trong kho ngữ liệu chứng thực bất kỳ thuật ngữ
    ứng viên nào cho khái niệm bảng Young. Đã tìm trên cả bảy nguồn — bib-leanhvinh-2020, bib-nguyenhoangthach-2020,
    bib-nguyenhuudien-2019, bib-hoangchithanh-2007, bib-nguyenducnghia-2006, bib-ngodactan-2004, VÀ bản
    dịch tham khảo bib-rosen-2003-vi qua một lần khai thác by-id riêng (find-term.py loại bib-rosen-2003-vi
    khỏi chế độ tìm-tất-cả mặc định, EXCLUDE_DEFAULT, dòng 25). Cả bốn ứng viên ("bảng Young", "biểu đồ
    Young", "bảng Young chuẩn", "lược đồ Young") trả về 0 hit ở cả chế độ thường lẫn --loose, kể cả ở
    các nguồn OCR bib-leanhvinh-2020 và bib-hoangchithanh-2007 và ở bib-rosen-2003-vi. "giản đồ Young"
    và "biểu đồ Young" cũng trả về 0 hit (kể cả --loose ở Rosen-vi). Tìm "Young" trần chỉ trả về các kết
    quả không liên quan: bất đẳng thức Young ("bất đẳng thức Young", bib-leanhvinh-2020 tr. 239) và nhà
    toán học Youngs trong định lý Ringel-Youngs (bib-ngodactan-2004 tr. 214, 299, 301, 332). Từ tiếng
    Anh "tableau" cũng trả về 0 hit. Khái niệm bảng Young vì vậy không được bao quát trong kho ngữ liệu
    (bao gồm cả nguồn tham khảo Rosen-vi). Đính chính so với bản khai thác trước: ghi chú gốc chỉ liệt
    kê SÁU nguồn và bỏ sót bib-rosen-2003-vi; lần khai thác by-id riêng đã xác nhận Rosen-vi cũng 0 hit,
    nên kết luận không-chứng-thực vẫn đúng và nay được nêu trên đủ bảy nguồn. Theo quy ước, đúng một thuật
    ngữ chuẩn được giữ làm khuyến nghị với verified=false và page="" để vi_terms không rỗng. Thuật ngữ
    khuyến nghị: "bảng Young" (calque của "Young tableau", "bảng" chỉ một bảng/mảng). Phân biệt chuẩn
    vs nửa-chuẩn: vì ký hiệu $$\lambda \vdash n$$, ngữ cảnh Rosen §6.5 và ví dụ điền $$1, 2, 3$$ mỗi số
    đúng một lần đều chỉ tới *bảng Young chuẩn*, định nghĩa được chốt theo thể chuẩn — các số $$1, \ldots,
    n$$ dùng đúng một lần và tăng ngặt theo CẢ dòng lẫn cột. Thể *nửa chuẩn* (semistandard) cho phép lặp
    số nguyên dương tùy ý với dòng không giảm (yếu) và cột tăng ngặt; thể đó không được định nghĩa ở mục
    này để định nghĩa và ví dụ khớp nhau. Các biến thể (cũng không chứng thực trong kho): "biểu đồ Young"
    và "lược đồ Young" thực ra chỉ giản đồ Young nền (giản đồ/khung Young) chứ không phải bảng đã điền;
    "bảng Young chuẩn" chỉ chính thể chuẩn được định nghĩa ở đây. Ký hiệu phân hoạch $$\lambda \vdash
    n$$ nghĩa là $$\lambda$$ là một phân hoạch của số nguyên dương $$n$$, cho độ dài các dòng của giản
    đồ. Trong định nghĩa, giản đồ Young nền được gọi là "giản đồ Young" (calque, "giản đồ" = diagram);
    đây là lựa chọn diagram có chủ ý, phân biệt với "biểu đồ/lược đồ/khung Young". Quy ước bao math áp
    dụng xuyên suốt. rosen_ref "Rosen §6.5" là con trỏ chủ đề liên quan: bảng Young xuất hiện quanh phần
    sinh hoán vị/tổ hợp của Rosen chứ không là một định nghĩa lõi được đánh số, phù hợp với việc khái
    niệm vắng mặt trong kho tiếng Việt.'
- id: y-delta-transform
  letter: Y
  headword_en: Y-delta transform
  notation: Y \leftrightarrow \Delta
  rosen_ref: Rosen §10.7
  ref_bib: ''
  definition_vi: Phép biến đổi sao-tam giác ($$Y$$-$$\Delta$$) trên đồ thị $$G$$, ký hiệu $$Y \leftrightarrow
    \Delta$$, là phép thay một đỉnh bậc ba $$v$$ với ba láng giềng phân biệt $$a$$, $$b$$, $$c$$ cùng
    ba cạnh kề $$va$$, $$vb$$, $$vc$$ (cấu hình hình sao $$Y$$) bởi một tam giác trên ba láng giềng đó
    (cấu hình tam giác $$\Delta$$), hoặc thực hiện phép thay ngược lại ($$\Delta$$-$$Y$$). Nếu một cạnh
    của tam giác đã có sẵn thì các cạnh song song được gộp lại để giữ đồ thị đơn.
  example_vi: Cho đỉnh $$v$$ của $$G$$ có đúng ba láng giềng phân biệt $$a$$, $$b$$, $$c$$. Phép biến
    đổi sao-tam giác xóa $$v$$ cùng ba cạnh $$va$$, $$vb$$, $$vc$$, rồi thêm ba cạnh $$ab$$, $$bc$$, $$ca$$,
    tạo thành tam giác trên $$\{a, b, c\}$$.
