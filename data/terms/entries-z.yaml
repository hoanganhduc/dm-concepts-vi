- id: zorns-lemma
  letter: Z
  headword_en: Zorn's lemma
  notation: ''
  rosen_ref: Rosen §9.6
  definition_vi: Bổ đề Zorn khẳng định rằng nếu $$P$$ là một tập khác rỗng được sắp thứ tự bộ phận sao
    cho mọi xích (tập con được sắp thứ tự toàn phần) của $$P$$ đều có một chặn trên trong $$P$$, thì $$P$$
    chứa ít nhất một phần tử cực đại.
  example_vi: Trong tập tất cả các lọc trên một tập, được sắp thứ tự bộ phận bởi quan hệ bao hàm $$\subseteq$$,
    hợp của một xích các lọc lại là một lọc và là chặn trên của xích đó; theo bổ đề Zorn, mỗi lọc đều
    nằm trong một lọc cực đại.
  vi_terms:
  - term: bổ đề Zorn
    source_id: ''
    page: ''
    recommended: true
    verified: false
    pdf_page: 0
    snippet: ''
  see_also: []
  status: panel-approved
  see_ref: ''
  notes: 'Concept = Zorn''s lemma on partially ordered sets.


    NONEMPTINESS FIX (panel correctness, med): the definition now states the load-bearing hypothesis that
    $$P$$ is NONEMPTY ("khác rỗng"), matching the standard Rosen/textbook statement: a NONEMPTY poset
    in which every chain has an upper bound has a maximal element. The chain / upper-bound / maximal-element
    machinery is otherwise stated correctly.


    ATTESTATION: only bib-ngodactan-2004 (2004) attests this concept, at PDF page 324, in a filter context:
    "Theo Bổ đề Zorn, mỗi lọc đều chứa trong một lọc cực đại". The OCR renders "Bổ" as "Bô’", so an exact
    search for "bổ đề Zorn" returns 0 hits while the substring "đề Zorn" catches the line; the term value
    is normalized to "bổ đề Zorn" while the snippet preserves the raw OCR "Bô’ đề Zorn" for traceability.
    NO 2019-2020 source attests any candidate (verified across all six corpus sources, including --loose
    runs on the two OCR sources bib-leanhvinh-2020 and bib-hoangchithanh-2007, both 0 hits). The 2019-2020
    preference is soft ("where possible"); the recommended term is anchored to the only attesting source,
    which is policy-compliant.


    DROPPED: "định lý Zorn" is a genuine alternative rendering but is attested in NO corpus source (verified=false),
    so it is dropped per citation hygiene. "đề Zorn" is not a distinct term — only the truncated OCR substring
    match.


    The example mirrors the 2004 source''s filter context (lọc / lọc cực đại) and is self-contained: it
    uses only the poset, chain, upper-bound, and maximal-element notions the definition introduces. see_also
    empty: no other letter-Z entries exist; related concepts (partial order, chain, maximal element) are
    cross-chapter forward references, not linked.'
- id: zero-one-matrix
  letter: Z
  headword_en: Zero-one matrix
  notation: A = [a_{ij}],\ a_{ij} \in \{0, 1\}
  rosen_ref: Rosen §2.6
  definition_vi: Một ma trận $$0$$-$$1$$ là ma trận mà mọi phần tử đều bằng $$0$$ hoặc $$1$$, ký hiệu
    $$A = [a_{ij}]$$ với $$a_{ij} \in \{0, 1\}$$. Loại ma trận này thường được dùng để biểu diễn các cấu
    trúc rời rạc như quan hệ và đồ thị; khi biểu diễn một quan hệ $$R$$, ta đặt $$a_{ij} = 1$$ khi và
    chỉ khi cặp phần tử tương ứng thuộc $$R$$.
  example_vi: Với tập $$A = \{1, 2, 3\}$$, tập $$B = \{a, b, c\}$$ và quan hệ $$R = \{(1, a), (1, b),
    (1, c)\}$$, ma trận tương ứng là ma trận $$0$$-$$1$$ cấp $$3 \times 3$$ có hàng đầu gồm ba số $$1$$
    và hai hàng còn lại gồm toàn số $$0$$.
