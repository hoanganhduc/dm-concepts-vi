  notes: 'Concept = a zero-one matrix, i.e. any matrix with every entry in $$\{0, 1\}$$ (Rosen §2.6),
    used mainly to represent relations and graphs.


    RECOMMENDED PROMOTION (panel correctness + exposition, high): the recommended term is now "(0,1)-ma
    trận" (nguyenducnghia-2006 tr. 168 PDF, where the adjacency matrix of a graph is stated to be a "(0,1)-ma
    trận"). This is the faithful Vietnamese rendering whose denotation MATCHES the general headword "zero-one
    matrix". The previous recommended term "ma trận quan hệ" (relation matrix) names only the SPECIAL
    CASE in which a 0-1 matrix encodes a relation, so it is demoted to a verified=true variant. The locked
    2019-2020 preference is soft ("where possible"); here it yields to the hard requirement that the recommended
    term name the headword concept, so the 2006 direct equivalent is preferred over the 2019 application-specific
    term. This trade-off is documented explicitly per convention.


    SYNONYM-GLOSS FIX (panel exposition, high): the definition no longer contains the English parenthetical
    "(zero-one matrix)" nor inlines "ma trận quan hệ" as a synonym; the English headword lives in headword_en
    and the relation-matrix terminology now lives only in vi_terms/notes.


    VERIFIED VARIANTS: "ma trận quan hệ" (relation matrix; nguyenhuudien-2019 tr. 114 PDF) and "ma trận
    biểu diễn của quan hệ" (representation matrix of a relation; same source tr. 108 PDF) — both name
    the relation-representation special case. DROPPED candidate "ma trận nhị phân" (binary matrix): 0
    hits in any source (normal and --loose), so not listed. "ma trận kề" (adjacency matrix) is a distinct
    special case (graphs) and a separate entry, not a variant of the general concept.


    NOTES LANGUAGE: rewritten in English for chapter consistency (the other three Z entries use English).


